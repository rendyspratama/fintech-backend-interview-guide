  <line x1="80" y1="38" x2="80" y2="310" stroke="var(--border)" stroke-width="2"/>
  <text x="280" y="25" text-anchor="middle" fill="var(--text)" font-size="14" font-weight="600">Participant A</text>
  <line x1="280" y1="38" x2="280" y2="310" stroke="var(--border)" stroke-width="2"/>
  <text x="460" y="25" text-anchor="middle" fill="var(--text)" font-size="14" font-weight="600">Participant B</text>
  <line x1="460" y1="38" x2="460" y2="310" stroke="var(--border)" stroke-width="2"/>

  <text x="270" y="60" fill="var(--amber)" font-size="12" font-weight="700">PHASE 1: PREPARE</text>
  <line x1="80" y1="75" x2="275" y2="75" stroke="var(--amber)" stroke-width="2" marker-end="url(#pc-a)"/>
  <line x1="80" y1="75" x2="455" y2="90" stroke="var(--amber)" stroke-width="2" marker-end="url(#pc-a)"/>
  <text x="180" y="68" text-anchor="middle" fill="var(--amber)" font-size="11">prepare?</text>

  <line x1="275" y1="115" x2="85" y2="115" stroke="var(--ledger)" stroke-width="2" marker-end="url(#pc-g)"/>
  <line x1="455" y1="130" x2="85" y2="120" stroke="var(--ledger)" stroke-width="2" marker-end="url(#pc-g)"/>
  <text x="180" y="108" text-anchor="middle" fill="var(--ledger)" font-size="11">yes, locked & ready</text>

  <line x1="20" y1="145" x2="500" y2="145" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="270" y="165" fill="var(--red)" font-size="12" font-weight="700">PHASE 2: COMMIT</text>

  <line x1="80" y1="185" x2="275" y2="185" stroke="var(--blue)" stroke-width="2" marker-end="url(#pc-b)"/>
  <line x1="80" y1="185" x2="455" y2="200" stroke="var(--blue)" stroke-width="2" marker-end="url(#pc-b)"/>
  <text x="180" y="178" text-anchor="middle" fill="var(--blue)" font-size="11">commit!</text>

  <rect x="240" y="215" width="280" height="60" rx="6" fill="var(--red)" fill-opacity="0.15" stroke="var(--red)"/>
  <text x="380" y="235" text-anchor="middle" fill="var(--red)" font-size="11" font-weight="700">DANGER ZONE</text>
  <text x="380" y="250" text-anchor="middle" fill="var(--text)" font-size="10.5">if coordinator crashes here, A may commit</text>
  <text x="380" y="263" text-anchor="middle" fill="var(--text)" font-size="10.5">while B stays locked, waiting forever</text>

  <text x="260" y="305" text-anchor="middle" fill="var(--text-dim)" font-size="12">Every participant must say yes before ANY of them commit</text>

  <defs>
    <marker id="pc-a" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--amber)"/></marker>
    <marker id="pc-g" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ledger)"/></marker>
    <marker id="pc-b" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--blue)"/></marker>
  </defs>
</svg>`,
ex:`A single database engine uses 2PC internally to commit a transaction across multiple internal shards/nodes atomically — but doing this across independently-owned microservices (each with its own DB) is generally avoided in favor of sagas.`,
trade:[`Gives true atomicity across participants, but is blocking: if the coordinator crashes after "prepare" but before "commit," participants hold locks indefinitely waiting for a decision — a real availability risk.`,`Rarely used across microservice/team boundaries at scale because of this blocking behavior and tight coupling; sagas are generally preferred despite being weaker consistency, because they don't create this availability hazard.`],
code:`// A minimal 2PC coordinator in Go. Notice the key difference from the
// saga above: EVERY participant must say "yes" in Phase 1 before ANY
// of them are told to actually commit in Phase 2 — locks are held by
// every participant the whole time in between.

type Participant interface {
    Prepare() error // lock resources, return nil only if ready to commit
    Commit() error
    Abort() error
}

func TwoPhaseCommit(participants []Participant) error {
    // ---- Phase 1: Prepare ----
    prepared := []Participant{}
    for _, p := range participants {
        if err := p.Prepare(); err != nil {
            // Someone said no -> tell everyone who already said yes to abort.
            for _, pp := range prepared {
                _ = pp.Abort()
            }
            return fmt.Errorf("prepare phase failed, aborted all: %w", err)
        }
        prepared = append(prepared, p)
    }

    // ---- Phase 2: Commit ----
    // Every participant has said yes and is holding its locks.
    // This is the dangerous part: if the coordinator crashes here,
    // partway through telling participants to commit, some
    // participants may be committed while others are still just
    // sitting there prepared and locked, waiting indefinitely.
    for _, p := range participants {
        if err := p.Commit(); err != nil {
            return fmt.Errorf("commit failed mid-phase-2, manual recovery needed: %w", err)
        }
    }
    return nil
}`},

{cat:"PT", title:"Strategy Pattern", def:`Define a family of interchangeable algorithms behind a common interface, letting you swap the implementation at runtime without changing the code that uses it.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="220" y="20" width="140" height="30" rx="5" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="290" y="40" text-anchor="middle" fill="var(--text-dim)" font-size="9.5">Checkout flow</text>
  <line x1="290" y1="50" x2="290" y2="70" stroke="var(--border)" stroke-width="2"/>
  <rect x="200" y="70" width="180" height="26" rx="5" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="290" y="88" text-anchor="middle" fill="var(--ledger)" font-size="9">FraudCheckStrategy (interface)</text>
  <line x1="240" y1="96" x2="140" y2="120" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="290" y1="96" x2="290" y2="120" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="340" y1="96" x2="440" y2="120" stroke="var(--border)" stroke-width="1.5"/>
  <rect x="80" y="122" width="120" height="24" rx="4" fill="var(--panel)" stroke="var(--border)"/>
  <text x="140" y="138" text-anchor="middle" fill="var(--text-dim)" font-size="8">Rule-based</text>
  <rect x="230" y="122" width="120" height="24" rx="4" fill="var(--amber)" fill-opacity="0.2" stroke="var(--amber)"/>
  <text x="290" y="138" text-anchor="middle" fill="var(--amber)" font-size="8">ML model (active)</text>
  <rect x="380" y="122" width="120" height="24" rx="4" fill="var(--panel)" stroke="var(--border)"/>
  <text x="440" y="138" text-anchor="middle" fill="var(--text-dim)" font-size="8">Manual review</text>
</svg>`,
ex:`A `+"`FraudCheckStrategy`"+` interface has implementations for rule-based scoring, an ML model, and a manual-review-only mode for high-risk regions — the checkout flow calls the interface without knowing (or caring) which strategy is active, allowing A/B testing or per-region configuration.`,
trade:[`Makes adding new algorithms easy without touching existing code (Open/Closed principle), but can be overkill if you genuinely only ever have one implementation — don't add the abstraction speculatively.`]},

{cat:"PT", title:"Adapter Pattern", def:`Wrap an incompatible interface (often third-party) behind the interface your application actually expects, isolating the rest of the codebase from that vendor's specific API shape.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="40" width="130" height="40" rx="6" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="85" y="64" text-anchor="middle" fill="var(--text-dim)" font-size="9">Your application</text>
  <line x1="150" y1="60" x2="210" y2="60" stroke="var(--ledger)" stroke-width="2" marker-end="url(#adArrow)"/>
  <defs><marker id="adArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ledger)"/></marker></defs>
  <rect x="215" y="40" width="140" height="40" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="285" y="64" text-anchor="middle" fill="var(--ledger)" font-size="9">Adapter (your interface)</text>
  <line x1="355" y1="60" x2="415" y2="60" stroke="var(--amber)" stroke-width="2" marker-end="url(#adArrow2)"/>
  <defs><marker id="adArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--amber)"/></marker></defs>
  <rect x="420" y="40" width="130" height="40" rx="6" fill="var(--amber)" fill-opacity="0.12" stroke="var(--amber)" stroke-width="2"/>
  <text x="485" y="64" text-anchor="middle" fill="var(--amber)" font-size="9">Vendor's real API</text>
  <text x="285" y="105" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">Swapping vendors only means rewriting the adapter, not the whole app</text>
</svg>`,
ex:`Wrapping Stripe's and Adyen's very different SDKs behind a common internal `+"`PaymentGateway`"+` interface means the core payment-processing logic doesn't change when you add a third provider or swap vendors — only the adapter implementation changes.`,
trade:[`Isolates vendor-specific complexity and makes swapping providers much cheaper later, but the adapter itself needs careful design to not just leak the vendor's quirks through a thin wrapper — a bad adapter gives false confidence of abstraction.`]},

{cat:"PT", title:"Singleton (and Why It's Risky Distributed)", def:`Ensures a class has exactly one instance within a process, with global access to it. In a distributed, multi-instance, stateless-service world, a "singleton" only means one instance *per process* — it does not give you a single instance across your whole fleet, which is a common and dangerous misunderstanding.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="280" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">3 service instances, each with its own "singleton"</text>
  <rect x="40" y="35" width="130" height="60" rx="6" fill="var(--panel)" stroke="var(--border)"/>
  <text x="105" y="55" text-anchor="middle" fill="var(--text-dim)" font-size="9">Instance A</text>
  <circle cx="105" cy="75" r="12" fill="var(--red)" fill-opacity="0.2" stroke="var(--red)"/>
  <text x="105" y="79" text-anchor="middle" fill="var(--red)" font-size="7">"singleton"</text>

  <rect x="215" y="35" width="130" height="60" rx="6" fill="var(--panel)" stroke="var(--border)"/>
  <text x="280" y="55" text-anchor="middle" fill="var(--text-dim)" font-size="9">Instance B</text>
  <circle cx="280" cy="75" r="12" fill="var(--red)" fill-opacity="0.2" stroke="var(--red)"/>
  <text x="280" y="79" text-anchor="middle" fill="var(--red)" font-size="7">"singleton"</text>

  <rect x="390" y="35" width="130" height="60" rx="6" fill="var(--panel)" stroke="var(--border)"/>
  <text x="455" y="55" text-anchor="middle" fill="var(--text-dim)" font-size="9">Instance C</text>
  <circle cx="455" cy="75" r="12" fill="var(--red)" fill-opacity="0.2" stroke="var(--red)"/>
  <text x="455" y="79" text-anchor="middle" fill="var(--red)" font-size="7">"singleton"</text>

  <rect x="40" y="110" width="480" height="30" fill="var(--red)" fill-opacity="0.08" stroke="var(--red)" stroke-dasharray="3 2"/>
  <text x="280" y="129" text-anchor="middle" fill="var(--red)" font-size="9">Three separate "the one instance" — not one instance across the fleet</text>
</svg>`,
ex:`A developer implements a Singleton in-memory rate limiter assuming it enforces a global limit — but with 20 service instances running behind a load balancer, each has its own singleton, so the "global" limit is actually 20x higher than intended. The real fix is a shared, external store (Redis) for the counter, not a language-level Singleton.`,
trade:[`Singletons are fine for genuinely process-local concerns (a local cache, a config object), but must never be assumed to provide fleet-wide coordination — that requires an external, shared system.`,`Overuse of Singleton for convenience creates hidden global state that makes testing harder (shared state leaks between tests) — prefer dependency injection where practical.`]},

{cat:"PT", title:"Repository Pattern", def:`Abstracts data access behind an interface that looks like an in-memory collection (e.g., `+"`find`"+`, `+"`save`"+`), decoupling business logic from the specific persistence technology (SQL, NoSQL, in-memory for tests).`,
diagram:`<svg viewBox="0 0 560 140" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="200" y="20" width="160" height="30" rx="5" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="280" y="40" text-anchor="middle" fill="var(--text-dim)" font-size="9.5">Business logic</text>
  <line x1="280" y1="50" x2="280" y2="70" stroke="var(--border)" stroke-width="2"/>
  <rect x="180" y="70" width="200" height="26" rx="5" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="280" y="88" text-anchor="middle" fill="var(--ledger)" font-size="9">AccountRepository (find, save)</text>
  <line x1="220" y1="96" x2="130" y2="118" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="280" y1="96" x2="280" y2="118" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="340" y1="96" x2="430" y2="118" stroke="var(--border)" stroke-width="1.5"/>
  <rect x="70" y="120" width="120" height="20" rx="4" fill="var(--panel)" stroke="var(--border)"/>
  <text x="130" y="134" text-anchor="middle" fill="var(--text-dim)" font-size="7.5">Postgres impl</text>
  <rect x="220" y="120" width="120" height="20" rx="4" fill="var(--panel)" stroke="var(--border)"/>
  <text x="280" y="134" text-anchor="middle" fill="var(--text-dim)" font-size="7.5">In-memory (tests)</text>
  <rect x="370" y="120" width="120" height="20" rx="4" fill="var(--panel)" stroke="var(--border)"/>
  <text x="430" y="134" text-anchor="middle" fill="var(--text-dim)" font-size="7.5">NoSQL impl</text>
</svg>`,
ex:`A `+"`TransactionRepository`"+` interface lets the core transfer logic be unit-tested against an in-memory fake implementation, without spinning up a real Postgres instance for every test, while production code uses the real SQL-backed implementation.`,
trade:[`Improves testability and keeps persistence details out of business logic, but can leak abstraction if the interface tries too hard to hide genuinely important DB-specific behavior (like transaction boundaries or isolation level) that the business logic actually needs to be aware of.`]},

{cat:"PT", title:"Dependency Injection", def:`Instead of a class creating the things it depends on internally (like directly instantiating a database connection or a payment gateway client inside itself), those dependencies are handed to it from the outside — usually through its constructor. The class just declares "I need something that can do X," without deciding for itself exactly which concrete implementation that is.

This is the practical, everyday application of the Dependency Inversion principle (the "D" in SOLID, covered earlier) — Dependency Inversion is the *principle* ("depend on abstractions"), and Dependency Injection is the common *technique* for actually achieving it in real code.

Many frameworks provide a "DI container" — a tool that automatically figures out what each class needs and constructs the whole dependency graph for you, rather than you manually wiring every object together by hand.`,
diagram:`<svg viewBox="0 0 560 140" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="200" y="50" width="160" height="40" rx="6" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="280" y="74" text-anchor="middle" fill="var(--text-dim)" font-size="9.5">PaymentService(gateway)</text>
  <rect x="30" y="15" width="130" height="26" rx="4" fill="var(--ledger)" fill-opacity="0.18" stroke="var(--ledger)"/>
  <text x="95" y="33" text-anchor="middle" fill="var(--ledger)" font-size="8.5">Prod: StripeGateway</text>
  <line x1="95" y1="41" x2="230" y2="52" stroke="var(--ledger)" stroke-width="2" marker-end="url(#diArrow)"/>
  <rect x="30" y="98" width="130" height="26" rx="4" fill="var(--amber)" fill-opacity="0.18" stroke="var(--amber)"/>
  <text x="95" y="116" text-anchor="middle" fill="var(--amber)" font-size="8.5">Test: FakeGateway</text>
  <line x1="95" y1="98" x2="230" y2="90" stroke="var(--amber)" stroke-width="2" marker-end="url(#diArrow2)"/>
  <defs>
    <marker id="diArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ledger)"/></marker>
    <marker id="diArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--amber)"/></marker>
  </defs>
  <text x="450" y="74" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">PaymentService code never changes between the two</text>
</svg>`,
ex:`A `+"`PaymentService`"+` class takes a `+"`PaymentGateway`"+` interface as a constructor parameter, rather than creating a specific `+"`StripeGateway`"+` instance internally. In production, the real Stripe implementation is injected; in a unit test, a fake/mock implementation is injected instead — the `+"`PaymentService`"+` code itself never changes between these two situations, since it only ever knew about the interface, not the concrete implementation.`,
trade:[`Makes testing dramatically easier (swap in a fake dependency without changing the class under test) and makes swapping real implementations later low-risk, but overusing DI containers/frameworks for very simple applications can add configuration complexity and "magic" that makes it harder to trace where an object actually came from — plain, manual constructor injection is often enough without needing a full DI framework.`]},

{cat:"PT", title:"Change Data Capture (CDC)", def:`A way to keep two systems in sync by watching a database's internal change log (the same log it uses for its own replication) and streaming every insert/update/delete out as an event — instead of your application code manually publishing an event every time it writes to the database, which is easy to accidentally forget.`,
diagram:`<svg viewBox="0 0 560 140" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="40" width="120" height="40" rx="6" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="80" y="64" text-anchor="middle" fill="var(--text-dim)" font-size="10">Database</text>
  <line x1="140" y1="60" x2="200" y2="60" stroke="var(--border)" stroke-width="1.5"/>
  <rect x="80" y="20" width="60" height="16" fill="var(--panel-2)" stroke="var(--border)" stroke-dasharray="2 2"/>
  <text x="110" y="31" text-anchor="middle" fill="var(--text-faint)" font-size="6.5">internal change log</text>

  <rect x="200" y="40" width="120" height="40" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="260" y="64" text-anchor="middle" fill="var(--ledger)" font-size="10">CDC reader</text>
  <line x1="320" y1="60" x2="420" y2="60" stroke="var(--ledger)" stroke-width="2" marker-end="url(#cdcArrow)"/>
  <defs><marker id="cdcArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ledger)"/></marker></defs>
  <rect x="420" y="40" width="120" height="40" rx="6" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-width="2"/>
  <text x="480" y="64" text-anchor="middle" fill="var(--amber)" font-size="10">Event stream</text>

  <text x="280" y="105" text-anchor="middle" fill="var(--text-faint)" font-size="9">No app code has to remember to publish — every write is captured automatically.</text>
</svg>`,
ex:`A tool like Debezium reads Postgres's write-ahead log and automatically publishes a `+"`row changed`"+` event to Kafka every time a row in the `+"`transactions`"+` table changes — the fraud and analytics teams get a reliable stream of every transaction without the payments team having to remember to manually publish events for every code path that touches that table.`,
trade:[`Guarantees you never "forget" to publish an event, since it reads from the database itself rather than trusting application code — but the events describe raw row changes (technical shape), not necessarily meaningful business events, so consumers sometimes need translation logic.`,`Adds an extra moving piece (the CDC tool) to operate and monitor, and ties your event stream's shape closely to your database schema, which can make schema changes trickier.`]},

{cat:"PT", title:"Dead Letter Queue (DLQ)", def:`A separate queue where messages get moved after they repeatedly fail to be processed (instead of blocking the main queue forever or being silently dropped) — so a broken or malformed message doesn't stop every message behind it, and someone can investigate it later.`,
diagram:`<svg viewBox="0 0 480 160" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="50" width="60" height="35" rx="5" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
  <text x="50" y="72" text-anchor="middle" fill="var(--text)" font-size="10">msg 1</text>
  <rect x="85" y="50" width="60" height="35" rx="5" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
  <text x="115" y="72" text-anchor="middle" fill="var(--text)" font-size="10">msg 2</text>
  <rect x="150" y="50" width="60" height="35" rx="5" fill="var(--red)" fill-opacity="0.2" stroke="var(--red)"/>
  <text x="180" y="66" text-anchor="middle" fill="var(--text)" font-size="9">msg 3</text>
  <text x="180" y="78" text-anchor="middle" fill="var(--red)" font-size="8" font-weight="600">fails ×5</text>
  <rect x="215" y="50" width="60" height="35" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="245" y="72" text-anchor="middle" fill="var(--text)" font-size="10">msg 4</text>

  <text x="145" y="30" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Main queue keeps flowing →</text>

  <line x1="180" y1="85" x2="180" y2="115" stroke="var(--red)" stroke-width="2" marker-end="url(#dq-r)"/>
  <rect x="330" y="50" width="120" height="45" rx="6" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)" stroke-width="2"/>
  <text x="390" y="70" text-anchor="middle" fill="var(--red)" font-size="11" font-weight="700">Dead Letter Queue</text>
  <text x="390" y="85" text-anchor="middle" fill="var(--text-dim)" font-size="9">for later inspection</text>
  <line x1="210" y1="70" x2="325" y2="70" stroke="var(--red)" stroke-width="2" marker-end="url(#dq-r)"/>

  <text x="240" y="135" text-anchor="middle" fill="var(--text-faint)" font-size="10.5">msg 3 doesn't block msg 4 and beyond</text>

  <defs>
    <marker id="dq-r" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--red)"/></marker>
  </defs>
</svg>`,
diagram:`<svg viewBox="0 0 480 160" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="50" width="70" height="40" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="55" y="74" text-anchor="middle" fill="var(--text)" font-size="10">msg 4</text>
  <rect x="95" y="50" width="70" height="40" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="130" y="74" text-anchor="middle" fill="var(--text)" font-size="10">msg 3</text>
  <rect x="170" y="50" width="70" height="40" rx="5" fill="var(--red)" fill-opacity="0.2" stroke="var(--red)" stroke-width="2"/>
  <text x="205" y="70" text-anchor="middle" fill="var(--text)" font-size="10">msg 2</text>
  <text x="205" y="82" text-anchor="middle" fill="var(--red)" font-size="8" font-weight="700">malformed ✗×5</text>

  <line x1="205" y1="90" x2="205" y2="115" stroke="var(--red)" stroke-width="2" marker-end="url(#dq-r)"/>
  <rect x="150" y="118" width="110" height="35" rx="5" fill="var(--red)" fill-opacity="0.15" stroke="var(--red)"/>
  <text x="205" y="140" text-anchor="middle" fill="var(--text)" font-size="10" font-weight="600">Dead Letter Queue</text>

  <line x1="240" y1="70" x2="270" y2="70" stroke="var(--ledger)" stroke-width="2" marker-end="url(#dq-g)"/>
  <rect x="275" y="50" width="70" height="40" rx="5" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
  <text x="310" y="74" text-anchor="middle" fill="var(--text)" font-size="10">msg 1 ✓</text>
  <text x="310" y="20" text-anchor="middle" fill="var(--ledger)" font-size="10" font-weight="600">Main queue keeps flowing</text>

  <defs>
    <marker id="dq-r" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--red)"/></marker>
    <marker id="dq-g" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--ledger)"/></marker>
  </defs>
</svg>`,
ex:`A malformed webhook payload from a partner keeps causing the payment-processing consumer to crash on every retry; after 5 failed attempts, it's automatically moved to a DLQ. The main queue keeps flowing for every other (valid) message, and an engineer is alerted to inspect the DLQ and fix or manually reprocess the bad one.`,
trade:[`Prevents one bad message ("poison message") from blocking an entire queue, but a DLQ needs active monitoring and a clear process for someone to actually look at what lands there — an unwatched DLQ just becomes a silent pile of dropped, unprocessed work.`]},

{cat:"PT", title:"Inbox Pattern", def:`The consumer-side counterpart to the Outbox pattern: before processing an incoming event, check (and record) whether you've already seen this exact event ID — if so, skip it. This protects against the fact that message brokers typically guarantee "at-least-once" delivery, meaning the same event can arrive more than once.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="90" y="18" fill="var(--text-dim)" font-size="10.5" font-weight="600">Broker (at-least-once)</text>
  <rect x="20" y="30" width="130" height="26" fill="var(--panel)" stroke="var(--border)"/>
  <text x="85" y="47" text-anchor="middle" fill="var(--text-dim)" font-size="9">event id=xyz, delivery #1</text>
  <line x1="150" y1="43" x2="230" y2="43" stroke="var(--ledger)" stroke-width="2" marker-end="url(#inArrow)"/>
  <defs><marker id="inArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ledger)"/></marker></defs>
  <rect x="235" y="30" width="150" height="26" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="310" y="47" text-anchor="middle" fill="var(--ledger)" font-size="9">not in inbox → process it</text>

  <rect x="20" y="70" width="130" height="26" fill="var(--panel)" stroke="var(--border)"/>
  <text x="85" y="87" text-anchor="middle" fill="var(--text-dim)" font-size="9">event id=xyz, delivery #2</text>
  <line x1="150" y1="83" x2="230" y2="83" stroke="var(--red)" stroke-width="2" stroke-dasharray="3 2" marker-end="url(#inArrow2)"/>
  <defs><marker id="inArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--red)"/></marker></defs>
  <rect x="235" y="70" width="150" height="26" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)"/>
  <text x="310" y="87" text-anchor="middle" fill="var(--red)" font-size="9">already in inbox → skip</text>

  <text x="200" y="125" text-anchor="middle" fill="var(--text-faint)" font-size="9">The redelivered event never reaches business logic a second time</text>
</svg>`,
ex:`A `+"`TransactionCompleted`"+` event gets delivered twice due to a network retry on the broker's side. The consumer checks an "inbox" table for that event's ID before processing; since it's already there from the first delivery, it skips reprocessing instead of crediting the merchant's account twice.`,
trade:[`Essential for correctness whenever you have at-least-once delivery (which is most real-world message brokers) and the operation being triggered isn't naturally idempotent on its own — adds a small lookup/write cost per event, which is a very reasonable price for correctness on money-related events.`]},

{cat:"PT", title:"Factory / Abstract Factory", def:`Factory: a method whose job is to create and return an object, hiding the decision of exactly which concrete type to construct from the calling code. Abstract Factory: takes this further by producing a whole family of related objects that are meant to be used together, without the caller needing to know their concrete types.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="200" y="20" width="160" height="30" rx="5" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="280" y="40" text-anchor="middle" fill="var(--text-dim)" font-size="9">createGateway("US")</text>
  <line x1="280" y1="50" x2="280" y2="70" stroke="var(--border)" stroke-width="2" marker-end="url(#facArrow)"/>
  <defs><marker id="facArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <rect x="90" y="80" width="130" height="30" rx="5" fill="var(--ledger)" fill-opacity="0.18" stroke="var(--ledger)" stroke-width="2"/>
  <text x="155" y="100" text-anchor="middle" fill="var(--ledger)" font-size="8.5">StripeGateway</text>
  <rect x="340" y="80" width="130" height="30" rx="5" fill="var(--amber)" fill-opacity="0.18" stroke="var(--amber)" stroke-width="2"/>
  <text x="405" y="100" text-anchor="middle" fill="var(--amber)" font-size="8.5">AdyenGateway</text>
  <text x="280" y="122" text-anchor="middle" fill="var(--text-faint)" font-size="8">Caller never picks the concrete type directly</text>
</svg>`,
ex:`A `+"`PaymentMethodFactory`"+` takes a payment type string ("card", "bank_transfer", "wallet") and returns the right concrete handler object — the checkout code just calls `+"`factory.create(type)`"+` and works with the result through a common interface, without an if/else chain scattered through the business logic.`,
trade:[`Centralizes and simplifies object-creation logic that would otherwise be duplicated everywhere a new instance is needed, but adding a factory for something that only ever has one implementation is unnecessary ceremony — introduce it once you actually have multiple types to choose between.`]},

{cat:"PT", title:"Decorator Pattern", def:`Wraps an object to add extra behavior before or after its original behavior, without changing its code — you can stack multiple decorators to combine behaviors, like layers around a core function.`,
diagram:`<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="20" width="360" height="160" rx="10" fill="none" stroke="var(--amber)" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="200" y="35" text-anchor="middle" fill="var(--amber)" font-size="10.5" font-weight="600">Rate Limiting</text>
  <rect x="40" y="45" width="320" height="120" rx="10" fill="none" stroke="var(--blue)" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="200" y="60" text-anchor="middle" fill="var(--blue)" font-size="10.5" font-weight="600">Authentication</text>
  <rect x="60" y="70" width="280" height="80" rx="10" fill="none" stroke="var(--ledger)" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="200" y="85" text-anchor="middle" fill="var(--ledger)" font-size="10.5" font-weight="600">Logging</text>
  <rect x="110" y="95" width="180" height="45" rx="6" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="200" y="122" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="700">Core Handler</text>
</svg>`,
diagram:`<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="40" y="20" width="320" height="160" rx="10" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="200" y="38" text-anchor="middle" fill="var(--text-dim)" font-size="10" font-weight="600">Rate Limiting decorator</text>

  <rect x="60" y="45" width="280" height="120" rx="8" fill="var(--blue)" fill-opacity="0.12" stroke="var(--blue)" stroke-width="2"/>
  <text x="200" y="62" text-anchor="middle" fill="var(--text-dim)" font-size="10" font-weight="600">Auth Check decorator</text>

  <rect x="80" y="68" width="240" height="80" rx="8" fill="var(--amber)" fill-opacity="0.12" stroke="var(--amber)" stroke-width="2"/>
  <text x="200" y="85" text-anchor="middle" fill="var(--text-dim)" font-size="10" font-weight="600">Logging decorator</text>

  <rect x="110" y="92" width="180" height="40" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="200" y="117" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="700">Core handler</text>

  <text x="200" y="195" text-anchor="middle" fill="var(--text-faint)" font-size="10.5">Request passes through each layer before reaching the core, and back out again</text>
</svg>`,
ex:`An API request handler is wrapped with a logging decorator, then an authentication-check decorator, then a rate-limiting decorator — each layer adds one specific concern, and the core handler code stays focused purely on the actual business logic, with cross-cutting concerns stacked around it as middleware.`,
trade:[`Lets you compose behaviors flexibly without a combinatorial explosion of subclasses (e.g., "LoggedAuthenticatedRateLimitedHandler"), but too many stacked decorators can make it hard to trace exactly what happens to a request, since the logic is spread across many small wrapper layers instead of one place.`]},

{cat:"PT", title:"Observer Pattern", def:`An object (the "subject") maintains a list of dependents ("observers") and automatically notifies them whenever its state changes, without the subject needing to know any details about what its observers actually do with that notification.`,
diagram:`<svg viewBox="0 0 460 180" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="65" width="110" height="50" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="75" y="95" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="700">Transaction</text>

  <line x1="130" y1="80" x2="200" y2="35" stroke="var(--ledger)" stroke-width="1.5" marker-end="url(#ob-g)"/>
  <line x1="130" y1="90" x2="200" y2="90" stroke="var(--ledger)" stroke-width="1.5" marker-end="url(#ob-g)"/>
  <line x1="130" y1="100" x2="200" y2="145" stroke="var(--ledger)" stroke-width="1.5" marker-end="url(#ob-g)"/>

  <rect x="205" y="15" width="110" height="40" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="260" y="40" text-anchor="middle" fill="var(--text)" font-size="10.5">Email receipt</text>

  <rect x="205" y="70" width="110" height="40" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="260" y="95" text-anchor="middle" fill="var(--text)" font-size="10.5">Dashboard update</text>

  <rect x="205" y="125" width="110" height="40" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="260" y="150" text-anchor="middle" fill="var(--text)" font-size="10.5">Loyalty points</text>

  <text x="230" y="175" text-anchor="middle" fill="var(--text-faint)" font-size="10">Subject doesn't know or care what each observer does</text>

  <defs>
    <marker id="ob-g" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--ledger)"/></marker>
  </defs>
</svg>`,
diagram:`<svg viewBox="0 0 460 200" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="180" y="20" width="120" height="50" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="240" y="42" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="700">Transaction</text>
  <text x="240" y="58" text-anchor="middle" fill="var(--text-dim)" font-size="9">status → completed</text>

  <line x1="220" y1="70" x2="90" y2="120" stroke="var(--blue)" stroke-width="1.5" marker-end="url(#ob-b1)"/>
  <line x1="240" y1="70" x2="240" y2="120" stroke="var(--blue)" stroke-width="1.5" marker-end="url(#ob-b1)"/>
  <line x1="260" y1="70" x2="390" y2="120" stroke="var(--blue)" stroke-width="1.5" marker-end="url(#ob-b1)"/>

  <rect x="35" y="123" width="110" height="40" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="90" y="147" text-anchor="middle" fill="var(--text)" font-size="10">Send receipt email</text>

  <rect x="185" y="123" width="110" height="40" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="240" y="147" text-anchor="middle" fill="var(--text)" font-size="10">Update dashboard</text>

  <rect x="335" y="123" width="110" height="40" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="390" y="147" text-anchor="middle" fill="var(--text)" font-size="10">Loyalty points</text>

  <text x="240" y="188" text-anchor="middle" fill="var(--text-faint)" font-size="10.5">Subject doesn't know or care what each observer does</text>

  <defs>
    <marker id="ob-b1" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--blue)"/></marker>
  </defs>
</svg>`,
ex:`When a transaction's status changes to "completed," the `+"`Transaction`"+` object notifies its registered observers — one observer sends a receipt email, another updates a real-time dashboard, another triggers loyalty-points calculation — and the core transaction-processing code doesn't need to know any of those things exist.`,
trade:[`Decouples the thing that changes from the things that react to the change, making it easy to add new reactions later without touching existing code — but in a distributed system, this pattern is usually implemented via events on a message broker rather than in-process objects, since observers may live in entirely different services.`]},

// ---------------- TESTING STRATEGY ----------------
{cat:"TE", title:"Test Pyramid", def:`A guideline for how many tests of each type you should have, shaped like a pyramid.

Unit tests (the wide base) — many fast, cheap tests, each checking one small piece of logic in isolation.

Integration tests (the middle) — fewer of these, checking that multiple pieces actually work correctly together.

End-to-end tests (the narrow top) — even fewer of these — slower and more brittle, but they check the full real flow through the whole system.`,
diagram:`<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <polygon points="200,20 250,80 150,80" fill="var(--red)" fill-opacity="0.2" stroke="var(--red)" stroke-width="2"/>
  <text x="200" y="55" text-anchor="middle" fill="var(--red)" font-size="9.5">E2E</text>
  <text x="270" y="55" fill="var(--text-faint)" font-size="8">few, slow, brittle</text>

  <polygon points="150,80 250,80 290,140 110,140" fill="var(--amber)" fill-opacity="0.2" stroke="var(--amber)" stroke-width="2"/>
  <text x="200" y="115" text-anchor="middle" fill="var(--amber)" font-size="9.5">Integration</text>
  <text x="300" y="115" fill="var(--text-faint)" font-size="8">medium count</text>

  <polygon points="110,140 290,140 330,195 70,195" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)" stroke-width="2"/>
  <text x="200" y="172" text-anchor="middle" fill="var(--ledger)" font-size="9.5">Unit</text>
  <text x="340" y="172" fill="var(--text-faint)" font-size="8">many, fast, cheap</text>
</svg>`,
ex:`Core interest-calculation logic gets extensive unit tests (fast, isolated, run on every commit). The full checkout flow through real services gets a handful of E2E tests (slower, run less often) rather than trying to E2E-test every edge case of the calculation logic itself.`,
trade:[`Keeps the test suite fast and maintainable, but teams sometimes over-invest in E2E tests because they feel more "realistic" — leading to slow, flaky CI pipelines that erode trust in tests over time.`]},

{cat:"TE", title:"Contract Testing", def:`Verifies that a service (consumer) and the service it depends on (provider) agree on the shape of their interaction, without needing to run both together in a full integration test — the consumer defines expectations ("contracts") that the provider's test suite verifies it still satisfies.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="30" y="40" width="140" height="40" rx="6" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="100" y="64" text-anchor="middle" fill="var(--text-dim)" font-size="9">Consumer service</text>
  <line x1="170" y1="60" x2="230" y2="60" stroke="var(--ledger)" stroke-width="2" marker-end="url(#ctArrow)"/>
  <defs><marker id="ctArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ledger)"/></marker></defs>
  <rect x="235" y="40" width="120" height="40" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="295" y="64" text-anchor="middle" fill="var(--ledger)" font-size="9">Contract file</text>
  <line x1="355" y1="60" x2="415" y2="60" stroke="var(--amber)" stroke-width="2" marker-end="url(#ctArrow2)"/>
  <defs><marker id="ctArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--amber)"/></marker></defs>
  <rect x="420" y="40" width="130" height="40" rx="6" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="485" y="64" text-anchor="middle" fill="var(--text-dim)" font-size="9">Provider's test suite</text>
  <text x="290" y="105" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">Both sides checked against the same contract — no need to run both services together</text>
</svg>`,
ex:`The mobile app team's expected response shape for `+"`GET /accounts/{id}/balance`"+` is captured as a Pact contract; the backend team's CI pipeline runs that contract against their actual implementation, catching a breaking field rename before it ever reaches a shared staging environment.`,
trade:[`Catches breaking API changes earlier and cheaper than full E2E tests across teams, but requires organizational buy-in to maintain contracts as a shared artifact between teams — it doesn't work well if only one side participates.`]},

{cat:"TE", title:"Testing Concurrency & Idempotency", def:`Standard sequential unit tests often can't catch race conditions. Techniques include: deliberately running the same operation concurrently in a test (stress-style), using tools that detect race conditions statically or at runtime, and explicitly testing that retrying an operation (with the same idempotency key) produces the same result as the first attempt.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="280" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">Stress test: N threads hit the same endpoint at once</text>
  <circle cx="60" cy="55" r="10" fill="var(--ledger)" fill-opacity="0.3" stroke="var(--ledger)"/>
  <circle cx="100" cy="45" r="10" fill="var(--ledger)" fill-opacity="0.3" stroke="var(--ledger)"/>
  <circle cx="140" cy="60" r="10" fill="var(--ledger)" fill-opacity="0.3" stroke="var(--ledger)"/>
  <circle cx="180" cy="48" r="10" fill="var(--ledger)" fill-opacity="0.3" stroke="var(--ledger)"/>
  <line x1="200" y1="52" x2="260" y2="52" stroke="var(--border)" stroke-width="2" marker-end="url(#tcArrow)"/>
  <defs><marker id="tcArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <rect x="265" y="35" width="150" height="34" rx="6" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="340" y="57" text-anchor="middle" fill="var(--text-dim)" font-size="9">same idempotency key</text>
  <text x="340" y="95" text-anchor="middle" fill="var(--text-faint)" font-size="9">Assert: exactly one result, no lost or duplicated effect</text>
</svg>`,
ex:`A test fires 50 concurrent requests to withdraw money from the same account with a total requested amount exceeding the balance, asserting that the final balance never goes negative regardless of interleaving — this is the kind of test that would have caught a missing lock or a broken optimistic-locking retry loop.`,
trade:[`Concurrency tests are inherently less deterministic and can be flaky if not carefully designed (e.g., using proper synchronization barriers to actually force overlap) — worth the investment for money-moving code paths specifically, even if you don't do it everywhere.`]},

{cat:"TE", title:"Property-Based Testing for Financial Calculations", def:`Instead of hand-writing individual example-based test cases, define properties that should always hold (e.g., "the sum of all debits equals the sum of all credits" or "rounding never creates or destroys money") and let a framework generate many random inputs to try to falsify them.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="35" width="180" height="34" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="110" y="57" text-anchor="middle" fill="var(--ledger)" font-size="8.5">property: debits == credits</text>
  <line x1="200" y1="52" x2="260" y2="52" stroke="var(--border)" stroke-width="2" marker-end="url(#pbtArrow)"/>
  <defs><marker id="pbtArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <text x="230" y="42" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">generates 1000s of inputs</text>
  <rect x="265" y="35" width="60" height="18" fill="var(--panel)" stroke="var(--border)"/>
  <rect x="330" y="35" width="60" height="18" fill="var(--panel)" stroke="var(--border)"/>
  <rect x="265" y="57" width="60" height="18" fill="var(--red)" fill-opacity="0.2" stroke="var(--red)"/>
  <text x="295" y="70" text-anchor="middle" fill="var(--red)" font-size="7">falsified!</text>
  <rect x="330" y="57" width="60" height="18" fill="var(--panel)" stroke="var(--border)"/>
  <text x="290" y="100" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">Finds the specific edge case a hand-written example test would have missed</text>
</svg>`,
ex:`A property test generates thousands of random transaction sequences and asserts that total money in the system is conserved after every operation (no leaks from rounding), catching an edge case around currencies with different decimal precision that example-based tests happened to miss.`,
trade:[`Excellent at finding edge cases humans don't think to write examples for, but requires more upfront effort to define correct properties, and failures can be harder to immediately interpret than a simple example-based test failure.`]},

{cat:"TE", title:"Load & Soak Testing", def:`Load testing verifies behavior under expected (or peak) traffic volume. Soak testing runs sustained load over a long duration (hours/days) specifically to catch problems that only appear over time — memory leaks, connection pool exhaustion, gradual resource degradation.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="130" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">Load test — short, high volume</text>
  <path d="M20,80 L60,70 L100,35 L140,35 L180,80" fill="none" stroke="var(--ledger)" stroke-width="2"/>
  <text x="100" y="100" text-anchor="middle" fill="var(--text-faint)" font-size="8">minutes — peak throughput check</text>

  <text x="420" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">Soak test — long, sustained</text>
  <path d="M280,60 L560,55" fill="none" stroke="var(--amber)" stroke-width="2"/>
  <path d="M280,60 L560,80" fill="none" stroke="var(--red)" stroke-width="2" stroke-dasharray="3 2"/>
  <text x="420" y="100" text-anchor="middle" fill="var(--red)" font-size="8">hours/days — a slow memory leak only shows up here</text>
</svg>`,
ex:`A payment service passes a load test at 2x expected Black Friday traffic for 10 minutes, but a 24-hour soak test at normal load reveals a slow memory leak in a connection-pooling library that would have caused an outage on day two of a real sustained peak period.`,
trade:[`Load tests catch capacity limits; soak tests catch time-dependent degradation — they find genuinely different classes of bugs, so skipping soak testing leaves a real blind spot for anything long-running.`]},

{cat:"TE", title:"Test-Driven Development (TDD)", def:`A way of writing code where you write a failing test *first* (describing what the code should do), then write just enough code to make it pass, then clean up the code (refactor) while keeping the test passing — often summarized as "red, green, refactor."`,
diagram:`<svg viewBox="0 0 560 120" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <circle cx="90" cy="55" r="35" fill="var(--red)" fill-opacity="0.15" stroke="var(--red)" stroke-width="2"/>
  <text x="90" y="52" text-anchor="middle" fill="var(--red)" font-size="10" font-weight="600">Red</text>
  <text x="90" y="66" text-anchor="middle" fill="var(--red)" font-size="7">write a failing test</text>
  <line x1="122" y1="45" x2="188" y2="45" stroke="var(--border)" stroke-width="1.5" marker-end="url(#tddArrow)"/>
  <defs><marker id="tddArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <circle cx="280" cy="55" r="35" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="280" y="52" text-anchor="middle" fill="var(--ledger)" font-size="10" font-weight="600">Green</text>
  <text x="280" y="66" text-anchor="middle" fill="var(--ledger)" font-size="7">just enough code to pass</text>
  <line x1="312" y1="45" x2="378" y2="45" stroke="var(--border)" stroke-width="1.5" marker-end="url(#tddArrow2)"/>
  <defs><marker id="tddArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <circle cx="470" cy="55" r="35" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-width="2"/>
  <text x="470" y="52" text-anchor="middle" fill="var(--amber)" font-size="10" font-weight="600">Refactor</text>
  <text x="470" y="66" text-anchor="middle" fill="var(--amber)" font-size="7">clean up, test stays green</text>
  <path d="M 90 90 Q 280 130 470 90" fill="none" stroke="var(--text-faint)" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#tddArrow3)"/>
  <defs><marker id="tddArrow3" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--text-faint)"/></marker></defs>
</svg>`,
ex:`Before writing the interest-calculation function, you first write a test asserting `+"`calculateInterest(1000, 0.05, 12) == 50`"+`, watch it fail (since the function doesn't exist yet), write the simplest implementation that makes it pass, then clean up the implementation — confident the test will catch you if you accidentally break the behavior while refactoring.`,
trade:[`Forces you to think about the expected behavior and edge cases before writing implementation, and leaves you with a test suite "for free" as a byproduct — but writing tests first can feel slower up front, and it works best for logic with clear, well-understood inputs/outputs (like financial calculations) rather than exploratory or UI-heavy work where the right design isn't known yet.`,`TDD is a personal/team workflow discipline, not a replacement for the test pyramid — you still need to think about which layer (unit/integration/E2E) each test belongs to.`]},

{cat:"TE", title:"Test Data Management for Regulated Data", def:`Real customer data (names, account numbers, transaction history) is sensitive and often legally restricted from being copied into test/staging environments as-is. Test data management covers generating realistic synthetic data, or masking/anonymizing real data (replacing real values with fake-but-realistic ones) so tests remain meaningful without exposing real personal or financial information.`,
diagram:`<svg viewBox="0 0 560 120" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="35" width="180" height="30" rx="5" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)"/>
  <text x="110" y="55" text-anchor="middle" fill="var(--red)" font-size="8.5">name: "Jane Doe", acct: 44821...</text>
  <line x1="200" y1="50" x2="260" y2="50" stroke="var(--border)" stroke-width="2" marker-end="url(#tdmArrow)"/>
  <defs><marker id="tdmArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <text x="230" y="40" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">mask/synthesize</text>
  <rect x="265" y="35" width="180" height="30" rx="5" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="355" y="55" text-anchor="middle" fill="var(--ledger)" font-size="8.5">name: "Test User 042", acct: 00019...</text>
  <text x="230" y="90" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">Realistic enough to test with — no real personal data leaves production</text>
</svg>`,
ex:`Instead of copying production customer records into a staging database for testing, a masking pipeline replaces real names with fake ones, scrambles account numbers into realistic-but-fake numbers, and shifts dates, so the data still "looks real" enough to catch bugs but can never be traced back to an actual person.`,
trade:[`Synthetic data avoids any risk of a data leak from a lower-security test environment, but crafting synthetic data that reproduces real-world edge cases (unusual transaction patterns, rare currency combinations) takes deliberate effort — poorly generated synthetic data can miss the very edge cases you needed to test.`,`Masking real data preserves realistic patterns better than fully synthetic data, but must be done thoroughly and consistently (e.g., masking a customer's ID consistently everywhere it appears) or it risks re-identification.`]},

// ---------------- CACHING ----------------
{cat:"CH", title:"Cache-Aside vs Write-Through vs Write-Behind", def:`Three patterns for how an application's cache and database stay in sync.

Cache-aside (the most common) — the app checks the cache first; on a miss, it reads the database and then saves the result into the cache for next time.

Write-through — every write goes to the cache and the database at the same time, together, so they never disagree.

Write-behind — a write goes to the cache immediately (fast!) and is saved to the database later, asynchronously. This is the fastest option for writes, but if the app crashes before that database save happens, that write is lost.`,
diagram:`<svg viewBox="0 0 480 180" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="80" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">Cache-Aside</text>
  <rect x="30" y="30" width="60" height="30" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="60" y="49" text-anchor="middle" fill="var(--text)" font-size="9">App</text>
  <line x1="90" y1="45" x2="115" y2="45" stroke="var(--ledger)" stroke-width="1.5" marker-end="url(#cs-g2)"/>
  <text x="102" y="38" fill="var(--ledger)" font-size="7">1. miss</text>
  <rect x="120" y="30" width="60" height="30" rx="5" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
  <text x="150" y="49" text-anchor="middle" fill="var(--text)" font-size="9">Cache</text>
  <line x1="60" y1="60" x2="60" y2="90" stroke="var(--ledger)" stroke-width="1.5" marker-end="url(#cs-g2)"/>
  <text x="30" y="80" fill="var(--ledger)" font-size="7">2. read DB, populate cache</text>
  <rect x="30" y="95" width="60" height="30" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="60" y="114" text-anchor="middle" fill="var(--text)" font-size="9">DB</text>

  <text x="230" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">Write-Through</text>
  <rect x="195" y="30" width="55" height="30" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="222" y="49" text-anchor="middle" fill="var(--text)" font-size="9">App</text>
  <line x1="250" y1="40" x2="275" y2="30" stroke="var(--blue)" stroke-width="1.5" marker-end="url(#cs-b2)"/>
  <line x1="250" y1="50" x2="275" y2="90" stroke="var(--blue)" stroke-width="1.5" marker-end="url(#cs-b2)"/>
  <rect x="280" y="15" width="55" height="30" rx="5" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)"/>
  <text x="307" y="34" text-anchor="middle" fill="var(--text)" font-size="9">Cache</text>
  <rect x="280" y="80" width="55" height="30" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="307" y="99" text-anchor="middle" fill="var(--text)" font-size="9">DB</text>
  <text x="260" y="130" text-anchor="middle" fill="var(--text-faint)" font-size="8">both together, synchronously</text>

  <text x="410" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">Write-Behind</text>
  <rect x="375" y="30" width="55" height="30" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="402" y="49" text-anchor="middle" fill="var(--text)" font-size="9">App</text>
  <line x1="430" y1="45" x2="450" y2="45" stroke="var(--amber)" stroke-width="1.5" marker-end="url(#cs-a2)"/>
  <rect x="400" y="30" width="55" height="30" rx="5" fill="var(--amber)" fill-opacity="0.18" stroke="var(--amber)" style="display:none"/>
  <text x="440" y="60" text-anchor="middle" fill="var(--amber)" font-size="7">fast, async later</text>
  <rect x="440" y="30" width="30" height="30" rx="5" fill="var(--amber)" fill-opacity="0.18" stroke="var(--amber)"/>
  <text x="455" y="49" text-anchor="middle" fill="var(--text)" font-size="8">Cache</text>
  <line x1="455" y1="60" x2="425" y2="90" stroke="var(--amber)" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#cs-a2)"/>
  <rect x="390" y="90" width="55" height="30" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="417" y="109" text-anchor="middle" fill="var(--text)" font-size="9">DB</text>
  <text x="415" y="140" text-anchor="middle" fill="var(--red)" font-size="8">crash before flush = lost write</text>

  <defs>
    <marker id="cs-g2" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--ledger)"/></marker>
    <marker id="cs-b2" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--blue)"/></marker>
    <marker id="cs-a2" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--amber)"/></marker>
  </defs>
</svg>`,
ex:`Exchange rates use cache-aside (read-heavy, tolerant of a brief miss). A write-through pattern might be used for a session store where cache and DB should never disagree. Write-behind would be a poor fit for anything balance-related in fintech, given the risk of losing unflushed writes on a crash.`,
trade:[`Cache-aside is simple and safe for read-heavy, DB-authoritative data, but has a cache-miss penalty and needs stampede protection (see Thundering Herd).`,`Write-behind maximizes write throughput but risks data loss on crash before the flush — essentially never appropriate for authoritative financial data.`]},

{cat:"CH", title:"Cache Invalidation", def:`Deciding when cached data becomes stale and must be removed or refreshed. There are three common approaches, and most real systems combine more than one.

TTL-based expiry — the cache entry is simply deleted after a fixed time. Simple to implement, but it can serve stale data for up to the full TTL window before it expires.

Explicit invalidation on write — whenever the underlying data changes, the write path also deletes or updates the cache entry. More accurate than a TTL alone, but it requires every single writer to remember to do it, which is easy to miss.

Versioned keys — instead of mutating a cached entry, new data is written under a new key or version number, and readers are pointed at the latest version. This avoids ever serving a half-updated entry, at the cost of managing key lifecycles.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="90" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10" font-weight="600">TTL expiry</text>
  <rect x="20" y="30" width="140" height="24" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="90" y="46" text-anchor="middle" fill="var(--ledger)" font-size="8.5">cached, valid for 60s</text>
  <rect x="20" y="60" width="140" height="24" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)" stroke-dasharray="3 2"/>
  <text x="90" y="76" text-anchor="middle" fill="var(--red)" font-size="8.5">stale until TTL hits</text>

  <text x="290" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10" font-weight="600">Explicit invalidation</text>
  <rect x="220" y="30" width="140" height="24" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="290" y="46" text-anchor="middle" fill="var(--ledger)" font-size="8.5">write path deletes entry</text>
  <rect x="220" y="60" width="140" height="24" fill="var(--amber)" fill-opacity="0.12" stroke="var(--amber)"/>
  <text x="290" y="76" text-anchor="middle" fill="var(--amber)" font-size="8.5">accurate, but easy to miss a path</text>

  <text x="480" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10" font-weight="600">Versioned keys</text>
  <rect x="410" y="30" width="140" height="24" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="480" y="46" text-anchor="middle" fill="var(--ledger)" font-size="8.5">key:v1 → key:v2</text>
  <rect x="410" y="60" width="140" height="24" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="480" y="76" text-anchor="middle" fill="var(--ledger)" font-size="8.5">never half-updated</text>
</svg>`,
ex:`A merchant's cached profile data is invalidated explicitly whenever the merchant updates their settings, rather than relying purely on a TTL — since serving stale settlement bank details for even a few minutes could route a payout incorrectly.`,
trade:[`TTL-only is simple but always has a staleness window; explicit invalidation is more accurate but couples every write path to remembering the cache — a missed invalidation path is a classic source of "why is this still showing old data" bugs.`]},

{cat:"CH", title:"Multi-Level Caching", def:`Combining a fast local (in-process) cache with a shared distributed cache (Redis/Memcached) — checking local first, then distributed, then the database — to reduce both network hops and load on the shared cache layer.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="45" width="130" height="40" rx="6" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)" stroke-width="2"/>
  <text x="85" y="63" text-anchor="middle" fill="var(--ledger)" font-size="9">L1: in-process</text>
  <text x="85" y="77" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">nanoseconds</text>
  <line x1="150" y1="65" x2="215" y2="65" stroke="var(--border)" stroke-width="1.5" marker-end="url(#mlArrow)"/>
  <defs><marker id="mlArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <rect x="220" y="45" width="130" height="40" rx="6" fill="var(--amber)" fill-opacity="0.18" stroke="var(--amber)" stroke-width="2"/>
  <text x="285" y="63" text-anchor="middle" fill="var(--amber)" font-size="9">L2: Redis (shared)</text>
  <text x="285" y="77" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">~1ms, survives restarts</text>
  <line x1="350" y1="65" x2="415" y2="65" stroke="var(--border)" stroke-width="1.5" marker-end="url(#mlArrow2)"/>
  <defs><marker id="mlArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <rect x="420" y="45" width="120" height="40" rx="6" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)" stroke-width="2"/>
  <text x="480" y="63" text-anchor="middle" fill="var(--red)" font-size="9">Database</text>
  <text x="480" y="77" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">only on full miss</text>
  <text x="280" y="110" text-anchor="middle" fill="var(--text-faint)" font-size="9">Checked in order — each level only pays for what the one before it missed</text>
</svg>`,
ex:`Frequently-accessed, rarely-changing reference data (currency codes, fee schedules) is cached both locally in each app instance's memory (nanosecond access) and in Redis (shared, survives app restarts), falling back to the database only on a full miss at both levels.`,
trade:[`Reduces latency and shared-cache load significantly, but adds a second layer of invalidation to reason about — a local cache can go stale independently of the shared cache if invalidation isn't propagated to all instances (e.g., via pub/sub).`]},

{cat:"CH", title:"Why You Don't Cache Authoritative Balances", def:`Account balances are the canonical example of data that should generally not be cached without an extremely tight, explicit invalidation contract — a stale cached balance can let a customer overdraw an account or a service approve a payment that shouldn't be approved.`,
diagram:`<svg viewBox="0 0 560 140" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="140" y="18" text-anchor="middle" fill="var(--red)" font-size="10.5" font-weight="600">Cached read — wrong for decisions</text>
  <rect x="30" y="30" width="220" height="26" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)"/>
  <text x="140" y="47" text-anchor="middle" fill="var(--red)" font-size="8.5">cache: balance = $100 (2s stale)</text>
  <text x="140" y="75" text-anchor="middle" fill="var(--red)" font-size="8">approves an $80 purchase the real balance can't cover</text>

  <text x="420" y="18" text-anchor="middle" fill="var(--ledger)" font-size="10.5" font-weight="600">Source-of-truth read — correct</text>
  <rect x="310" y="30" width="220" height="26" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="420" y="47" text-anchor="middle" fill="var(--ledger)" font-size="8.5">DB: balance = $60 (real-time)</text>
  <text x="420" y="75" text-anchor="middle" fill="var(--ledger)" font-size="8">correctly rejects the $80 purchase</text>

  <text x="280" y="110" text-anchor="middle" fill="var(--text-faint)" font-size="9">Caching for display is fine; the money-moving decision must always re-check the source of truth</text>
</svg>`,
ex:`If a checkout service reads a cached balance that's 2 seconds stale, it might approve a purchase that the real-time balance could no longer cover — the fix is to always re-verify the authoritative balance (or use a reservation/hold mechanism) at the actual moment of debit, never trust a cached read for the final approval decision.`,
trade:[`You can still cache balances for *display* purposes (a slightly-stale number shown in a UI is usually fine, with a clear "as of" indicator), as long as the actual money-moving decision always re-checks the source of truth.`]},

// ---------------- MESSAGING / APIs ----------------
{cat:"MA", title:"Kafka vs RabbitMQ vs SQS", def:`Three common message broker options, each with a different sweet spot.

Kafka — a distributed log built for very high throughput. Messages stay around and can be replayed later, and multiple independent consumers can each read the same stream at their own pace. Great when several different teams/services all need to react to the same events.

RabbitMQ — a traditional message broker with flexible routing rules. Good for complex routing logic and lower-latency point-to-point messaging, though it doesn't naturally support replay the way Kafka does.

SQS — a fully-managed, simple queue service. Easiest of the three to operate (nothing to maintain yourself), and a great default choice when you just need straightforward decoupling without replay or complicated routing needs.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="30" width="160" height="90" rx="6" fill="var(--ledger)" fill-opacity="0.12" stroke="var(--ledger)" stroke-width="2"/>
  <text x="100" y="52" text-anchor="middle" fill="var(--ledger)" font-size="10.5" font-weight="600">Kafka</text>
  <text x="100" y="72" text-anchor="middle" fill="var(--text-dim)" font-size="9">replayable log</text>
  <text x="100" y="88" text-anchor="middle" fill="var(--text-dim)" font-size="9">many independent readers</text>
  <text x="100" y="104" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">high ops complexity</text>

  <rect x="200" y="30" width="160" height="90" rx="6" fill="var(--amber)" fill-opacity="0.12" stroke="var(--amber)" stroke-width="2"/>
  <text x="280" y="52" text-anchor="middle" fill="var(--amber)" font-size="10.5" font-weight="600">RabbitMQ</text>
  <text x="280" y="72" text-anchor="middle" fill="var(--text-dim)" font-size="9">flexible routing rules</text>
  <text x="280" y="88" text-anchor="middle" fill="var(--text-dim)" font-size="9">low-latency point-to-point</text>
  <text x="280" y="104" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">no native replay</text>

  <rect x="380" y="30" width="160" height="90" rx="6" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="460" y="52" text-anchor="middle" fill="var(--text)" font-size="10.5" font-weight="600">SQS</text>
  <text x="460" y="72" text-anchor="middle" fill="var(--text-dim)" font-size="9">fully managed</text>
  <text x="460" y="88" text-anchor="middle" fill="var(--text-dim)" font-size="9">simplest to operate</text>
  <text x="460" y="104" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">no replay, simpler routing</text>
</svg>`,
ex:`A stream of `+"`TransactionCompleted`"+` events that multiple independent consumers (ledger, fraud, notifications, analytics) each need to read at their own pace, with replay capability for reprocessing, fits Kafka well. A simple background job queue for sending receipts fits SQS or RabbitMQ without needing Kafka's operational complexity.`,
trade:[`Kafka gives replay and high throughput but has real operational complexity (partitioning, consumer group management, retention tuning).`,`SQS is easiest to operate (managed) but lacks replay and has weaker ordering guarantees (standard queues) unless you use FIFO queues, which cap throughput.`,`Choosing the simplest tool that meets the actual requirement (replay? ordering? multiple independent consumers?) beats defaulting to Kafka for everything.`]},

{cat:"MA", title:"Kafka Partitioning & Ordering", def:`Kafka only guarantees message ordering *within* a partition, not across the whole topic. The partition key determines which partition a message lands in — messages with the same key always go to the same partition, preserving their relative order.`,
diagram:`<svg viewBox="0 0 460 190" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="230" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Topic: transactions (partitioned by account_id)</text>

  <rect x="20" y="35" width="130" height="40" rx="5" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="85" y="59" text-anchor="middle" fill="var(--text)" font-size="10">acct_A event 1</text>
  <line x1="150" y1="55" x2="180" y2="55" stroke="var(--ledger)" stroke-width="1.5" marker-end="url(#kp-g)"/>

  <rect x="185" y="35" width="130" height="40" rx="5" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="250" y="59" text-anchor="middle" fill="var(--text)" font-size="10" font-weight="600">Partition 0</text>
  <text x="250" y="90" text-anchor="middle" fill="var(--text-faint)" font-size="9">acct_A events, in order</text>

  <rect x="20" y="105" width="130" height="40" rx="5" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="85" y="129" text-anchor="middle" fill="var(--text)" font-size="10">acct_B event 1</text>
  <line x1="150" y1="125" x2="180" y2="125" stroke="var(--blue)" stroke-width="1.5" marker-end="url(#kp-b)"/>

  <rect x="185" y="105" width="130" height="40" rx="5" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)" stroke-width="2"/>
  <text x="250" y="129" text-anchor="middle" fill="var(--text)" font-size="10" font-weight="600">Partition 1</text>
  <text x="250" y="160" text-anchor="middle" fill="var(--text-faint)" font-size="9">acct_B events, in order</text>

  <text x="330" y="90" fill="var(--text-dim)" font-size="10">Account A's events</text>
  <text x="330" y="105" fill="var(--text-dim)" font-size="10">never interleave with</text>
  <text x="330" y="120" fill="var(--text-dim)" font-size="10">Account B's — but there's</text>
  <text x="330" y="135" fill="var(--text-dim)" font-size="10">no ordering between them</text>

  <defs>
    <marker id="kp-g" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--ledger)"/></marker>
    <marker id="kp-b" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--blue)"/></marker>
  </defs>
</svg>`,
ex:`Partitioning `+"`TransactionEvent`"+` messages by `+"`account_id`"+` guarantees all events for a given account are processed in order by the same consumer instance — critical since processing a `+"`Withdrawal`"+` before its preceding `+"`Deposit`"+` out of order could incorrectly reject it for insufficient funds.`,
trade:[`Good key selection (even distribution) avoids hot partitions, but a poorly chosen key (e.g., partitioning by a low-cardinality field, or a single "celebrity" account dominating volume) creates a bottleneck on one partition regardless of overall cluster size.`,`If you need global ordering across all accounts (rare, and usually a red flag for a scalability bottleneck), you're limited to a single partition — a real throughput ceiling.`]},

{cat:"MA", title:"REST vs gRPC vs GraphQL", def:`Three common ways for services or clients to talk to each other over the network.

REST — organizes an API around "resources" using plain HTTP and JSON. Simple, well understood by almost everyone, and a safe default for a public-facing API.

gRPC — uses a compact binary format (Protobuf) over HTTP/2. Very low latency and enforces a strict, typed contract between caller and callee. A great fit for fast internal service-to-service calls.

GraphQL — lets the client ask for exactly the fields it needs in a single request, instead of getting back a fixed shape of data. Useful when a front-end needs to combine lots of varied data efficiently, less commonly used for plain backend-to-backend calls.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="30" width="160" height="80" rx="6" fill="var(--ledger)" fill-opacity="0.12" stroke="var(--ledger)" stroke-width="2"/>
  <text x="100" y="52" text-anchor="middle" fill="var(--ledger)" font-size="10.5" font-weight="600">REST</text>
  <text x="100" y="72" text-anchor="middle" fill="var(--text-dim)" font-size="8.5">JSON over HTTP</text>
  <text x="100" y="88" text-anchor="middle" fill="var(--text-faint)" font-size="8">simple, public-facing default</text>

  <rect x="200" y="30" width="160" height="80" rx="6" fill="var(--amber)" fill-opacity="0.12" stroke="var(--amber)" stroke-width="2"/>
  <text x="280" y="52" text-anchor="middle" fill="var(--amber)" font-size="10.5" font-weight="600">gRPC</text>
  <text x="280" y="72" text-anchor="middle" fill="var(--text-dim)" font-size="8.5">binary Protobuf, HTTP/2</text>
  <text x="280" y="88" text-anchor="middle" fill="var(--text-faint)" font-size="8">fast internal service calls</text>

  <rect x="380" y="30" width="160" height="80" rx="6" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="460" y="52" text-anchor="middle" fill="var(--text)" font-size="10.5" font-weight="600">GraphQL</text>
  <text x="460" y="72" text-anchor="middle" fill="var(--text-dim)" font-size="8.5">client picks exact fields</text>
  <text x="460" y="88" text-anchor="middle" fill="var(--text-faint)" font-size="8">good for varied front-end needs</text>
</svg>`,
ex:`Internal calls between the payment service and the ledger service use gRPC for low latency and a strict schema contract. The public-facing merchant API uses REST for broad client compatibility and simplicity. A mobile app's dashboard aggregating many different account/transaction fields in one screen might use GraphQL to avoid multiple round trips.`,
trade:[`gRPC's strict typing and performance are excellent internally, but it's less friendly for public/external partner integrations expecting plain REST/JSON.`,`GraphQL gives clients flexibility but pushes complexity (query cost limiting, N+1 resolution) onto the server — needs careful guardrails to avoid abuse.`]},

{cat:"MA", title:"HTTP Methods & Idempotency", def:`Each standard HTTP method has a defined meaning, and — importantly — a defined expectation about whether it's "idempotent," meaning calling it multiple times with the same input has the same effect as calling it once.

GET — read data. Idempotent (and should never change anything, so it's always safe to call repeatedly, cache, or retry freely).

PUT — replace a resource entirely with the given data. Idempotent: calling it 5 times with the same body results in the same final state as calling it once.

DELETE — remove a resource. Idempotent: deleting something that's already deleted just means it's still gone — the end state is the same either way.

POST — create a new resource, or trigger an action. NOT idempotent by default: calling it twice can create two separate things (like two separate charges) — this is exactly why the Idempotency Keys pattern (covered in the Fintech-Specific section) exists, to bolt idempotency onto an operation that isn't naturally idempotent.

PATCH — apply a partial update. Usually NOT idempotent, depending on what the update actually says (e.g., "increment balance by 5" is not idempotent if retried; "set status to X" is).

Knowing this matters directly for retry logic: it's generally safe for a client (or a load balancer, or a proxy) to automatically retry a failed GET, PUT, or DELETE without asking — but automatically retrying a failed POST without an idempotency safeguard can cause real, duplicated side effects.`,
diagram:`<svg viewBox="0 0 560 140" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="80" y="20" text-anchor="middle" fill="var(--text-dim)" font-size="10" font-weight="600">GET / PUT / DELETE</text>
  <text x="80" y="35" text-anchor="middle" fill="var(--ledger)" font-size="9" font-weight="600">Idempotent</text>
  <rect x="20" y="45" width="120" height="24" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="80" y="61" text-anchor="middle" fill="var(--ledger)" font-size="8.5">call ×5 → same result</text>
