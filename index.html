  <text x="90" y="18" text-anchor="middle" fill="var(--ledger)" font-size="10.5" font-weight="600">Row lock</text>
  <rect x="30" y="30" width="120" height="70" fill="var(--panel)" stroke="var(--border)"/>
  <rect x="30" y="30" width="120" height="14" fill="var(--panel)" stroke="var(--border)"/>
  <rect x="30" y="44" width="120" height="14" fill="var(--red)" fill-opacity="0.3" stroke="var(--red)"/>
  <rect x="30" y="58" width="120" height="14" fill="var(--panel)" stroke="var(--border)"/>
  <rect x="30" y="72" width="120" height="14" fill="var(--panel)" stroke="var(--border)"/>
  <text x="90" y="112" text-anchor="middle" fill="var(--text-faint)" font-size="8">1 row locked, rest free</text>

  <text x="280" y="18" text-anchor="middle" fill="var(--amber)" font-size="10.5" font-weight="600">Page lock</text>
  <rect x="220" y="30" width="120" height="70" fill="var(--amber)" fill-opacity="0.2" stroke="var(--amber)" stroke-width="2"/>
  <text x="280" y="112" text-anchor="middle" fill="var(--text-faint)" font-size="8">a block of rows locked together</text>

  <text x="470" y="18" text-anchor="middle" fill="var(--red)" font-size="10.5" font-weight="600">Table lock (escalated)</text>
  <rect x="410" y="30" width="120" height="70" fill="var(--red)" fill-opacity="0.25" stroke="var(--red)" stroke-width="2"/>
  <text x="470" y="112" text-anchor="middle" fill="var(--red)" font-size="8">everything serialized, unrelated txns wait</text>
  <text x="280" y="140" text-anchor="middle" fill="var(--text-faint)" font-size="9">Too many held row locks → DB escalates to page/table under memory pressure</text>
</svg>`,
ex:`A large batch job updating millions of ledger rows in one transaction can trigger lock escalation to a table lock, unexpectedly blocking unrelated real-time transactions on completely different accounts in the same table.`,
trade:[`Row-level locking maximizes concurrency but has more overhead per lock; batch jobs should be chunked into smaller transactions specifically to avoid triggering escalation.`,`Understanding your specific database's escalation thresholds (SQL Server does this explicitly; Postgres/MySQL behave differently) is essential before running large batch updates in production.`]},

{cat:"CD", title:"Lock Contention & Hot Rows", def:`Lock contention happens when many operations all want to lock the same thing at the same time and have to wait in line for each other. A "hot row" is a single database row (like one very active account's balance) that gets touched so often that it becomes the line everyone is stuck waiting in — no matter how many servers or database replicas you add elsewhere, that one row can only be updated by one transaction at a time, so it caps your overall speed.`,
diagram:`<svg viewBox="0 0 600 170" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="260" y="65" width="80" height="40" rx="6" fill="var(--red)" fill-opacity="0.15" stroke="var(--red)" stroke-width="2"/>
  <text x="300" y="90" text-anchor="middle" fill="var(--red)" font-size="10" font-weight="600">hot row</text>
  <circle cx="70" cy="30" r="16" fill="var(--panel)" stroke="var(--border)"/>
  <text x="70" y="34" text-anchor="middle" fill="var(--text-dim)" font-size="8">req 1</text>
  <circle cx="70" cy="80" r="16" fill="var(--panel)" stroke="var(--border)"/>
  <text x="70" y="84" text-anchor="middle" fill="var(--text-dim)" font-size="8">req 2</text>
  <circle cx="70" cy="130" r="16" fill="var(--panel)" stroke="var(--border)"/>
  <text x="70" y="134" text-anchor="middle" fill="var(--text-dim)" font-size="8">req 3</text>
  <line x1="86" y1="30" x2="255" y2="75" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="86" y1="80" x2="255" y2="85" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="86" y1="130" x2="255" y2="95" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="70" y="155" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">all requests, however parallel, funnel through one row</text>
  <line x1="340" y1="85" x2="460" y2="85" stroke="var(--ledger)" stroke-width="2" marker-end="url(#hotArrow)"/>
  <defs><marker id="hotArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ledger)"/></marker></defs>
  <rect x="460" y="65" width="110" height="40" rx="6" fill="none" stroke="var(--border)" stroke-dasharray="4 3"/>
  <text x="515" y="82" text-anchor="middle" fill="var(--text-dim)" font-size="9">throughput ≈</text>
  <text x="515" y="96" text-anchor="middle" fill="var(--text-dim)" font-size="9">1 / (lock hold time)</text>
</svg>`,
ex:`A popular merchant's account balance row gets debited and credited thousands of times per second. If every one of those updates locks that same row, they queue up one after another — adding more app servers doesn't help, because the bottleneck isn't your servers, it's that one row.`,
trade:[
  `Fix in application/thread code — keep locks short: only wrap the bare minimum of code in a lock. Do the slow stuff (logging, calling another service, writing a file) outside the lock, so you're not holding the door shut while doing unrelated work.`,
  `Fix in application/thread code — avoid locks entirely where you can: use built-in thread-safe tools (like Java's ConcurrentHashMap, or atomic counters) instead of manually wrapping a lock around a shared value.`,
  `Fix in application/thread code — split one big lock into many small ones ("lock striping"): instead of one lock guarding an entire list or map, split the data into chunks (e.g., 16 buckets) each with its own lock, so unrelated updates don't wait on each other.`,
  `Fix in the database — keep transactions short: do all your calculations first, then open the transaction, write, and commit immediately — never leave a transaction open while waiting on a slow network call or, worse, user input.`,
  `Fix in the database — prefer optimistic locking for hot rows: instead of locking the row while you read it, read it freely, then when you write, check that a version number hasn't changed. This lets many readers proceed without queuing, and only actually blocks on the (hopefully rare) real conflict.`,
  `Fix in the database — make sure your queries are actually using an index for their WHERE clause. A query without a useful index may scan (and briefly lock) far more rows than it needs to, dragging unrelated rows into the contention.`,
  `Fix in the database — process big updates/deletes in small batches (e.g., 1,000 rows at a time) instead of one huge transaction touching millions of rows at once — a giant transaction holds many locks for a long time, blocking everything else that needs those rows.`,
  `Fix in the database — for queue-style workloads (many workers picking up jobs from a shared table), use "SKIP LOCKED" so a worker just grabs the next available, unlocked row instead of waiting behind a row someone else already grabbed. Use "NOWAIT" when you'd rather fail fast and retry than wait at all.`,
  `Fix in the database — use the lowest isolation level that's still safe for what you're doing (e.g., Read Committed instead of Serializable) when you don't specifically need the stronger guarantee — higher isolation levels take more locks and hold them longer.`,
  `Structural fix — split the hot value into several sub-counters (e.g., 10 partial balances that sum to the real total) and add up all the sub-counters when you need to read the total. This trades a slightly more complex read for much higher write throughput, since writes now spread across 10 rows instead of fighting over 1.`,
  `Structural fix (the classic fintech answer) — switch from "one row holding the current balance, updated in place" to an append-only ledger: every transaction is a new row (an insert, never an update), and the balance is calculated by summing the ledger rows (or read from a periodically-refreshed snapshot). Inserts don't compete for the same row the way updates do, so this sidesteps hot-row contention almost entirely.`
]},

{cat:"CD", title:"MVCC (Multi-Version Concurrency Control)", def:`Instead of blocking readers when a writer is active, the database keeps multiple versions of a row and gives each transaction a consistent snapshot as of when it started — readers never block writers and vice versa (used by Postgres and MySQL/InnoDB).`,
diagram:`<svg viewBox="0 0 480 190" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="240" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Row: account #42 balance — 3 versions coexist</text>

  <rect x="20" y="35" width="130" height="45" rx="6" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="85" y="55" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">v1: balance=100</text>
  <text x="85" y="70" text-anchor="middle" fill="var(--text-faint)" font-size="9">committed 10:00</text>

  <rect x="175" y="35" width="130" height="45" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="240" y="55" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">v2: balance=150</text>
  <text x="240" y="70" text-anchor="middle" fill="var(--text-faint)" font-size="9">committed 10:05</text>

  <rect x="330" y="35" width="130" height="45" rx="6" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)" stroke-width="2"/>
  <text x="395" y="55" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">v3: balance=90</text>
  <text x="395" y="70" text-anchor="middle" fill="var(--text-faint)" font-size="9">uncommitted (in progress)</text>

  <text x="85" y="115" text-anchor="middle" fill="var(--text-dim)" font-size="10">Report started at 10:02</text>
  <text x="85" y="130" text-anchor="middle" fill="var(--ledger)" font-size="11" font-weight="600">→ sees v1 (its snapshot)</text>

  <text x="395" y="115" text-anchor="middle" fill="var(--text-dim)" font-size="10">New query right now</text>
  <text x="395" y="130" text-anchor="middle" fill="var(--ledger)" font-size="11" font-weight="600">→ sees v2 (latest committed)</text>

  <text x="240" y="165" text-anchor="middle" fill="var(--text-faint)" font-size="11">Neither reader ever blocked on the in-progress writer (v3)</text>
</svg>`,
ex:`A reporting query summing account balances for a dashboard runs concurrently with live transfers updating those same accounts; MVCC lets the report see a consistent snapshot without blocking the transfers, and without the transfers blocking the report.`,
trade:[`Great default for read-heavy + write-heavy mixed workloads, but old row versions need cleanup (vacuuming in Postgres) — neglecting this causes table bloat and performance degradation over time.`,`MVCC solves reader-writer blocking, but doesn't eliminate write-write conflicts — you still need locking or optimistic checks for concurrent writers to the same row.`]},

{cat:"CD", title:"Deadlock Detection in Databases", def:`This is the same problem as thread deadlocks, but between database transactions instead of application threads. The database keeps a small map of "who is waiting on whom." If it finds a cycle — Transaction A is waiting for a row Transaction B is holding, and Transaction B is waiting for a row Transaction A is holding — it knows they'll wait forever, so it automatically kills one of them (called the "victim") and lets the other continue. The killed transaction gets a deadlock error back and needs to retry.`,
diagram:`<svg viewBox="0 0 460 220" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <circle cx="150" cy="60" r="34" fill="var(--panel)" stroke="var(--red)" stroke-width="2"/>
  <text x="150" y="65" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">Txn A</text>
  <circle cx="310" cy="60" r="34" fill="var(--panel)" stroke="var(--red)" stroke-width="2"/>
  <text x="310" y="65" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">Txn B</text>
  <path d="M 182 50 A 90 90 0 0 1 278 50" fill="none" stroke="var(--red)" stroke-width="2" marker-end="url(#dlArrow1)"/>
  <text x="230" y="24" text-anchor="middle" fill="var(--red)" font-size="9">waits for B's row</text>
  <path d="M 278 72 A 90 90 0 0 1 182 72" fill="none" stroke="var(--red)" stroke-width="2" marker-end="url(#dlArrow2)"/>
  <text x="230" y="106" text-anchor="middle" fill="var(--red)" font-size="9">waits for A's row</text>
  <defs>
    <marker id="dlArrow1" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--red)"/></marker>
    <marker id="dlArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--red)"/></marker>
  </defs>
  <text x="230" y="145" text-anchor="middle" fill="var(--text-dim)" font-size="10.5">Wait-for graph has a cycle → database picks a victim</text>
  <rect x="70" y="165" width="140" height="34" rx="6" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)"/>
  <text x="140" y="186" text-anchor="middle" fill="var(--red)" font-size="10">Txn A killed, retries</text>
  <rect x="250" y="165" width="140" height="34" rx="6" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)"/>
  <text x="320" y="186" text-anchor="middle" fill="var(--ledger)" font-size="10">Txn B continues, commits</text>
</svg>`,
ex:`Two transfers run at the same time in opposite directions:
— Transaction A: `+"`UPDATE accounts SET balance = balance - 50 WHERE id = 1`"+`, then tries to update account 2.
— Transaction B: `+"`UPDATE accounts SET balance = balance - 50 WHERE id = 2`"+`, then tries to update account 1.
A is holding account 1 and waiting for account 2. B is holding account 2 and waiting for account 1. The database spots this cycle within milliseconds and cancels one of them with a deadlock error — the app catches that error and simply retries the whole transaction.

The real fix, the same as with threads, is lock ordering: make every transaction that touches multiple accounts always update the lower account ID first, regardless of transfer direction. So both A and B would update account 1 before account 2 — meaning whichever transaction gets to account 1 first just makes the other one wait its turn normally, instead of the two of them locking each other out.`,
trade:[`Your application code must always expect deadlock errors can happen and be ready to automatically retry — this is normal, expected behavior under concurrent access, not a bug to eliminate entirely.`,`Preventing deadlocks with consistent lock ordering is better than just relying on retry, because every retry adds delay, and under very high traffic the same transactions can deadlock again and again, wasting time each round.`]},

{cat:"CD", title:"Advisory Locks & Distributed DB Concurrency", def:`Advisory locks are application-defined locks the database tracks on your behalf (identified by an arbitrary key you choose) that don't correspond to any actual row or table — useful for coordinating logic that isn't naturally tied to a specific row. This is distinct from distributed locks (Redis/ZooKeeper), which coordinate across services rather than within a single database.`,
diagram:`<svg viewBox="0 0 560 140" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="140" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">Advisory lock — no real row involved</text>
  <rect x="30" y="30" width="220" height="40" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="140" y="55" text-anchor="middle" fill="var(--ledger)" font-size="9">pg_advisory_lock('daily-close-job')</text>
  <text x="140" y="88" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">coordinates logic with no natural row to lock</text>

  <text x="440" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">Distributed lock — across services</text>
  <rect x="330" y="30" width="220" height="40" rx="6" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-width="2"/>
  <text x="440" y="55" text-anchor="middle" fill="var(--amber)" font-size="9">Redis/ZooKeeper lock key</text>
  <text x="440" y="88" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">coordinates across many separate services</text>
</svg>`,
ex:`A nightly reconciliation job needs to ensure only one instance runs at a time across multiple app servers; rather than building separate coordination infrastructure, it takes a Postgres advisory lock on a fixed key (e.g., `+"`hashtext('reconciliation-job')`"+`) for the job's duration — any other instance's attempt to acquire the same key fails immediately.`,
trade:[`Cheaper and simpler than standing up a separate distributed-locking system (Redis/ZooKeeper) when you already have the database in the loop, but ties your coordination mechanism to that specific database's availability and doesn't work if the coordinating processes span multiple independent databases.`]},

// ---------------- DATABASE THEORY & DESIGN ----------------
{cat:"DB", title:"SQL vs NoSQL vs NewSQL", def:`Three broad families of database, each trading off different things.

SQL (relational, like Postgres/MySQL) — strong consistency, real joins between tables, and mature, well-tested transaction support. The safest default for anything that needs correctness guarantees.

NoSQL (document, key-value, or wide-column stores) — trades away some of that in exchange for flexible schemas, easier horizontal scaling, or very high write throughput, depending on which kind of NoSQL store you pick.

NewSQL (CockroachDB, Google Spanner, YugabyteDB) — tries to give you the best of both: horizontal scale across many machines, while still keeping SQL-style queries and strong consistency guarantees.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="30" width="160" height="80" rx="6" fill="var(--ledger)" fill-opacity="0.12" stroke="var(--ledger)" stroke-width="2"/>
  <text x="100" y="52" text-anchor="middle" fill="var(--ledger)" font-size="10.5" font-weight="600">SQL</text>
  <text x="100" y="72" text-anchor="middle" fill="var(--text-dim)" font-size="8.5">strong consistency, joins</text>
  <text x="100" y="88" text-anchor="middle" fill="var(--text-faint)" font-size="8">hard to scale writes</text>

  <rect x="200" y="30" width="160" height="80" rx="6" fill="var(--amber)" fill-opacity="0.12" stroke="var(--amber)" stroke-width="2"/>
  <text x="280" y="52" text-anchor="middle" fill="var(--amber)" font-size="10.5" font-weight="600">NoSQL</text>
  <text x="280" y="72" text-anchor="middle" fill="var(--text-dim)" font-size="8.5">flexible schema, scales easily</text>
  <text x="280" y="88" text-anchor="middle" fill="var(--text-faint)" font-size="8">weak/no multi-row txns</text>

  <rect x="380" y="30" width="160" height="80" rx="6" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="460" y="52" text-anchor="middle" fill="var(--text)" font-size="10.5" font-weight="600">NewSQL</text>
  <text x="460" y="72" text-anchor="middle" fill="var(--text-dim)" font-size="8.5">SQL semantics, horizontal scale</text>
  <text x="460" y="88" text-anchor="middle" fill="var(--text-faint)" font-size="8">more ops complexity</text>
</svg>`,
ex:`Core account/ledger data goes in Postgres or a NewSQL store (needs ACID + joins + strong consistency). Session tokens and idempotency keys go in Redis (key-value, low latency). Audit/event logs go in a wide-column or document store (high write volume, denormalized, rarely joined).`,
trade:[`Relational: strongest correctness guarantees and query flexibility, but harder to scale writes horizontally without sharding effort.`,`NoSQL: easier horizontal scale and schema flexibility, but weaker/no multi-row transactions and joins — pushes consistency logic into the application.`,`NewSQL: closest to "best of both," but with more operational complexity and often higher latency per transaction than a single-node relational DB.`,`Fintech default: core money data on relational/NewSQL; NoSQL for supporting, non-authoritative data.`]},

{cat:"DB", title:"Elasticsearch: What It Is & Core Components", def:`Elasticsearch (often shortened to "ES") is a distributed search and analytics engine. It's built on top of a library called Lucene, and it specializes in one thing regular databases aren't great at: searching through large amounts of text and data very quickly, including fuzzy/partial matches, ranking results by relevance, and aggregating (summarizing) huge datasets fast.

It's grouped under "NoSQL" in the earlier comparison, but it's really its own specialized category — most teams don't use it as their main database; they use it alongside a regular database, specifically for search and analytics needs that database isn't built for.

The core building blocks:

Cluster — the whole Elasticsearch setup: one or more servers working together as one logical system.

Node — a single server (or process) that's part of the cluster. A cluster is made of many nodes.

Index — roughly Elasticsearch's version of a "table" in a relational database. It's a collection of related documents.

Document — roughly Elasticsearch's version of a "row." It's a single JSON record — for example, one log entry, or one transaction record.

Mapping — roughly Elasticsearch's version of a "schema." It defines what fields a document has and how each field should be treated (as searchable text, as an exact-match value, as a number, as a date, and so on).

Shard — a smaller, self-contained slice of an index. Every index is actually split into multiple shards under the hood, which is what makes Elasticsearch able to scale — see the dedicated Sharding topic below.`,
diagram:`<svg viewBox="0 0 560 180" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="20" width="520" height="140" rx="8" fill="none" stroke="var(--border)" stroke-dasharray="4 3"/>
  <text x="80" y="40" fill="var(--text-dim)" font-size="10" font-weight="600">Cluster</text>
  <rect x="45" y="50" width="120" height="90" rx="6" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="105" y="68" text-anchor="middle" fill="var(--text-dim)" font-size="9" font-weight="600">Node</text>
  <rect x="55" y="76" width="45" height="24" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)"/>
  <text x="77" y="92" text-anchor="middle" fill="var(--ledger)" font-size="7">Shard</text>
  <rect x="105" y="76" width="45" height="24" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)"/>
  <text x="127" y="92" text-anchor="middle" fill="var(--ledger)" font-size="7">Shard</text>
  <text x="105" y="122" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">Index = "table"</text>

  <rect x="220" y="50" width="120" height="90" rx="6" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="280" y="68" text-anchor="middle" fill="var(--text-dim)" font-size="9" font-weight="600">Node</text>
  <rect x="230" y="76" width="45" height="24" fill="var(--amber)" fill-opacity="0.2" stroke="var(--amber)"/>
  <text x="252" y="92" text-anchor="middle" fill="var(--amber)" font-size="7">Shard</text>
  <rect x="280" y="76" width="45" height="24" fill="var(--amber)" fill-opacity="0.2" stroke="var(--amber)"/>
  <text x="302" y="92" text-anchor="middle" fill="var(--amber)" font-size="7">Shard</text>

  <rect x="395" y="50" width="120" height="90" rx="6" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="455" y="68" text-anchor="middle" fill="var(--text-dim)" font-size="9" font-weight="600">Node</text>
  <text x="455" y="100" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">Document = "row"</text>
</svg>`,
ex:`A fintech company wants customer support agents to search through millions of transaction records by free-text description ("find anything mentioning 'refund dispute'"), even with typos or partial matches. Their main Postgres database can technically do a text search, but it's slow and limited at that scale. So transaction records are also copied into an Elasticsearch index, purpose-built for this kind of fast, flexible search — while Postgres remains the actual source of truth for the transaction data itself.`,
trade:[`Elasticsearch is excellent at search and analytics, but it's generally not meant to be your primary system of record for critical transactional data — it has weaker consistency and transaction guarantees than a relational database, so the common pattern is: keep your real source of truth in a proper database, and sync a copy into Elasticsearch (often via CDC, covered earlier in this guide) purely for search and analytics.`]},

{cat:"DB", title:"How Elasticsearch Achieves Fast Reads (Inverted Index)", def:`A regular database, searching for "find all rows where the description contains the word refund," often has to scan through rows checking each one — slow at scale unless you have a very specific kind of index built for exactly that phrase, which is hard to do for free-text search.

Elasticsearch instead builds something called an inverted index. Instead of storing "this document contains these words" (a normal, forward way of thinking about it), it flips it around and stores "this word appears in these documents." So when you search for the word "refund," Elasticsearch doesn't scan every document — it just looks up "refund" directly in this reversed index and instantly gets the list of matching documents back.

A few other things that contribute to Elasticsearch's speed:

It's built for reading, and does a lot of work upfront at write time (breaking text into searchable words, building the inverted index) so that the read/search itself stays cheap.

Data is distributed across multiple shards (see the next topic) so a single search can be run in parallel across many machines at once, and the partial results are combined at the end.

It keeps frequently-used data structures cached in memory, and uses a "near real-time" model — new writes become searchable within about a second, not instantly, which is a deliberate trade-off that keeps both writes and reads fast.`,
diagram:`<svg viewBox="0 0 560 170" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="130" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">Forward (documents → words)</text>
  <rect x="30" y="30" width="200" height="24" fill="var(--panel)" stroke="var(--border)"/>
  <text x="130" y="46" text-anchor="middle" fill="var(--text-dim)" font-size="8">doc1: "refund order dispute"</text>
  <rect x="30" y="58" width="200" height="24" fill="var(--panel)" stroke="var(--border)"/>
  <text x="130" y="74" text-anchor="middle" fill="var(--text-dim)" font-size="8">doc2: "order shipped"</text>
  <text x="130" y="98" text-anchor="middle" fill="var(--text-faint)" font-size="8">finding "refund" means scanning every doc</text>

  <text x="440" y="18" text-anchor="middle" fill="var(--ledger)" font-size="10.5" font-weight="600">Inverted (words → documents)</text>
  <rect x="330" y="30" width="220" height="24" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="440" y="46" text-anchor="middle" fill="var(--ledger)" font-size="8">"refund" → [doc1]</text>
  <rect x="330" y="58" width="220" height="24" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="440" y="74" text-anchor="middle" fill="var(--ledger)" font-size="8">"order" → [doc1, doc2]</text>
  <text x="440" y="98" text-anchor="middle" fill="var(--ledger)" font-size="8">direct lookup — no scanning needed</text>
</svg>`,
ex:`Searching for every transaction where the memo field contains the word "refund" across 50 million records returns in well under a second, because Elasticsearch already has a pre-built inverted index mapping "refund" directly to every matching document — instead of having to check the memo field of all 50 million records one by one, the way a naive full-table text scan would.`,
trade:[`This design makes Elasticsearch extremely fast for search and read-heavy workloads, but the upfront indexing work at write time means writes are relatively more expensive than in a plain key-value or relational insert — Elasticsearch is optimized for "search often, write less often" access patterns, not for extremely high-frequency single-row updates.`]},

{cat:"DB", title:"Elasticsearch Indexing Pipeline: Analyzers & Tokenizers", def:`This is the actual process that happens at write time to turn raw text into the fast, searchable inverted index described above. Every piece of text goes through an "analyzer," which is really three steps chained together.

Step 1 — Character filters (optional): clean up the raw text before anything else happens. Example: stripping out HTML tags, or converting "&" into "and."

Step 2 — Tokenizer (required, exactly one per analyzer): breaks the text into individual pieces called "tokens." Example: the standard tokenizer splits "Refund Dispute #4521" into the tokens "Refund," "Dispute," "4521" — splitting on whitespace and punctuation.

Step 3 — Token filters (optional, can chain several): modify the tokens after they've been split. Common examples: lowercase (so "Refund" and "refund" match each other), stop word removal (dropping common, low-value words like "the" or "and"), stemming (reducing "disputing," "disputed," "disputes" all down to the root "disput," so searching for any form matches all of them).

The result of this whole pipeline — the final list of processed tokens — is exactly what gets stored in the inverted index. This is why the analyzer you choose matters so much: it directly decides what a search will and won't match.

A field can also be mapped as "keyword" instead of "text," which means it skips this whole analysis pipeline and is stored and matched as one single exact value, not broken into searchable tokens at all.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="40" width="110" height="30" rx="5" fill="var(--panel)" stroke="var(--border)"/>
  <text x="75" y="59" text-anchor="middle" fill="var(--text-dim)" font-size="7.5">"Refund Dispute #4521"</text>
  <line x1="130" y1="55" x2="170" y2="55" stroke="var(--border)" stroke-width="1.5" marker-end="url(#esArrow1)"/>
  <defs><marker id="esArrow1" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <rect x="175" y="40" width="90" height="30" rx="5" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="220" y="59" text-anchor="middle" fill="var(--ledger)" font-size="7.5">1. Char filters</text>
  <line x1="265" y1="55" x2="300" y2="55" stroke="var(--border)" stroke-width="1.5" marker-end="url(#esArrow2)"/>
  <defs><marker id="esArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <rect x="305" y="40" width="80" height="30" rx="5" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)"/>
  <text x="345" y="59" text-anchor="middle" fill="var(--amber)" font-size="7.5">2. Tokenizer</text>
  <line x1="385" y1="55" x2="420" y2="55" stroke="var(--border)" stroke-width="1.5" marker-end="url(#esArrow3)"/>
  <defs><marker id="esArrow3" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <rect x="425" y="40" width="115" height="30" rx="5" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)"/>
  <text x="482" y="59" text-anchor="middle" fill="var(--red)" font-size="7.5">3. Token filters</text>
  <text x="280" y="95" text-anchor="middle" fill="var(--text-faint)" font-size="8">Result: ["refund","dispute","4521"] → stored in the inverted index</text>
</svg>`,
ex:`A transaction memo field "Refund - Order #4521 (Disputed)" gets analyzed at write time into tokens like "refund," "order," "4521," "disput" (lowercased and stemmed). Later, a search for "disputing order 4521" gets analyzed the same way at search time into "disput," "order," "4521" — and because both went through the same stemming and lowercasing, they match, even though the original text and the search text weren't written the exact same way.

Meanwhile, the transaction's status field is mapped as "keyword" (not "text"), storing the exact value "DISPUTED" — useful for exact filters like "show me all transactions with status = DISPUTED," where you want an exact match, not a fuzzy text search.`,
trade:[`Choosing "text" (analyzed, tokenized) vs "keyword" (exact, unanalyzed) for each field is one of the most important mapping decisions in Elasticsearch — text fields support fuzzy/partial search but can't be used for exact filtering or sorting the way you'd expect; keyword fields support exact filtering and sorting but won't match partial or reworded text at all. Many real setups map the same field both ways at once (one as text, one as keyword) specifically to support both use cases.`,`Getting the analyzer wrong is a common, hard-to-notice mistake — if the same text isn't analyzed consistently at write time and search time, searches that should intuitively match will silently return nothing, and it's not always obvious why.`]},

{cat:"DB", title:"Elasticsearch Query Types: Term vs Match vs Aggregation", def:`Three fundamentally different kinds of questions you can ask Elasticsearch, and it's important to pick the right one.

Term query — an exact match query. It does NOT run the text through an analyzer first — it looks for the precise value you gave, exactly as stored. Use this against "keyword" fields, or against fields where you deliberately want an exact match.

Match query — a full-text search query. It DOES run your search text through the same analyzer the field used at index time, then finds documents containing those resulting tokens, ranking results by relevance (how well they match) rather than just a plain yes/no. Use this against "text" fields for natural, fuzzy, human-style search.

Aggregation query — not about finding individual matching documents at all, but about summarizing/grouping data across many documents at once, similar to a SQL "GROUP BY." Examples: "count how many transactions per status," "average transaction amount per day," "top 10 merchants by transaction volume."

A single request to Elasticsearch can combine these: run a match query to find relevant documents, apply a term-query filter to narrow it further, and run an aggregation on top of the filtered results — all in one round trip.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="30" width="160" height="50" rx="6" fill="var(--ledger)" fill-opacity="0.12" stroke="var(--ledger)" stroke-width="2"/>
  <text x="100" y="50" text-anchor="middle" fill="var(--ledger)" font-size="9.5" font-weight="600">Term</text>
  <text x="100" y="66" text-anchor="middle" fill="var(--text-faint)" font-size="8">exact match, no analysis</text>

  <rect x="200" y="30" width="160" height="50" rx="6" fill="var(--amber)" fill-opacity="0.12" stroke="var(--amber)" stroke-width="2"/>
  <text x="280" y="50" text-anchor="middle" fill="var(--amber)" font-size="9.5" font-weight="600">Match</text>
  <text x="280" y="66" text-anchor="middle" fill="var(--text-faint)" font-size="8">analyzed, ranked by relevance</text>

  <rect x="380" y="30" width="160" height="50" rx="6" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="460" y="50" text-anchor="middle" fill="var(--text)" font-size="9.5" font-weight="600">Aggregation</text>
  <text x="460" y="66" text-anchor="middle" fill="var(--text-faint)" font-size="8">GROUP BY-style summarizing</text>
</svg>`,
ex:`Term query: `+"`status: \"DISPUTED\"`"+` — finds only documents where the keyword field status is exactly "DISPUTED," no analysis, no fuzzy matching, no partial credit.

Match query: searching the memo text field for "refund disput" — finds documents whose analyzed memo tokens overlap with the analyzed search tokens, ranking a memo that closely matches higher than one that only loosely matches.

Aggregation: "group all of last month's transactions by status, and give me a count for each" — returns something like `+"`{DISPUTED: 340, RESOLVED: 1200, PENDING: 90}`"+` in one fast query, without pulling back a single individual transaction document.`,
trade:[`Using a term query against a "text" field (instead of "keyword") often silently returns nothing, because the field was broken into lowercased, stemmed tokens at index time, and your exact, unprocessed search value doesn't match any of them — this exact-vs-analyzed mismatch is one of the most common beginner mistakes in Elasticsearch.`,`Aggregations are extremely powerful for dashboards and reporting (much faster than pulling all matching documents back and summarizing them yourself in application code), but a very high-cardinality aggregation (grouping by a field with millions of unique values, like a unique transaction ID) can be memory-intensive on the cluster — aggregations are best suited to fields with a reasonably bounded number of distinct values.`]},

{cat:"DB", title:"Elasticsearch Sharding", def:`Every Elasticsearch index is split into multiple shards, and each shard is a complete, independent mini search-index on its own. This is what lets an index scale beyond what a single machine could hold or search through alone — different shards can live on different nodes, and a search runs across all of them in parallel.

There are two kinds of shards:

Primary shard — holds the actual, authoritative copy of a slice of the index's data. You choose how many primary shards an index has when you create it.

Replica shard — a copy of a primary shard, kept in sync, sitting on a different node. Replicas exist for two reasons: if a node goes down, a replica can take over so no data is lost, and replicas can also serve read/search traffic, spreading the load across more machines.

The important catch: the number of primary shards is normally fixed once an index is created. You can add more replica shards later fairly easily (to handle more read traffic), but changing the number of primary shards usually means creating a brand new index with the new shard count and reindexing (copying) all the data into it — you can't just "add one more primary shard" to an existing index the way you might casually add a server to a pool.`,
diagram:`<svg viewBox="0 0 560 300" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">

  <rect x="10" y="45" width="170" height="230" rx="8" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="95" y="65" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="700">Node A</text>
  <rect x="30" y="80" width="130" height="50" rx="5" fill="var(--ledger-dim)" stroke="var(--ledger)"/>

  <rect x="30" y="140" width="130" height="50" rx="5" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)"/>
  <text x="95" y="170" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Replica 2</text>

  <rect x="195" y="45" width="170" height="230" rx="8" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="280" y="65" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="700">Node B</text>
  <rect x="215" y="80" width="130" height="50" rx="5" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
  <text x="280" y="110" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Primary 2</text>
  <rect x="215" y="140" width="130" height="50" rx="5" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)"/>
  <text x="280" y="170" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Replica 3</text>

  <rect x="380" y="45" width="170" height="230" rx="8" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="465" y="65" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="700">Node C</text>
  <rect x="400" y="80" width="130" height="50" rx="5" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
  <text x="465" y="110" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Primary 3</text>
  <rect x="400" y="140" width="130" height="50" rx="5" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)"/>
  <text x="465" y="170" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Replica 1</text>

  <text x="95" y="210" text-anchor="middle" fill="var(--text-faint)" font-size="10.5">Replica 2 backs up</text>
  <text x="95" y="223" text-anchor="middle" fill="var(--text-faint)" font-size="10.5">Node A's own primary</text>
  <text x="280" y="248" text-anchor="middle" fill="var(--ledger)" font-size="11" font-weight="600">■ Primary shard (authoritative)</text>
  <text x="280" y="264" text-anchor="middle" fill="var(--blue)" font-size="11" font-weight="600">■ Replica shard (copy, on a different node)</text>
</svg>`,
ex:`An index of transaction records is created with 5 primary shards and 1 replica of each (10 shards total, spread across the cluster). A search for "refund" is broken into 5 smaller searches, one per primary shard (or its replica), run in parallel, and the results are merged together and ranked before being returned — much faster than searching one giant index sequentially. If a node holding one primary shard fails, its replica on another node is automatically promoted, and no data or search capability is lost.`,
trade:[`Too few shards limits how much you can parallelize search and how far you can scale later. Too many shards adds overhead (each shard has some fixed memory/resource cost, even when small) and can actually slow things down — this is why picking a sensible shard count upfront, based on expected data volume, matters far more in Elasticsearch than it might in some other systems.`,`Because changing the primary shard count later requires reindexing into a new index, many teams deliberately plan for future growth by either estimating shard count generously upfront, or using time-based indices (like one index per month) so that future growth just means creating new indices with a better shard count, rather than resizing an existing one.`]},

{cat:"DB", title:"Scaling Elasticsearch", def:`A few complementary strategies, often used together, for growing an Elasticsearch deployment as data and traffic increase.

Add more nodes (horizontal scaling) — since an index is already split into shards, adding more nodes to the cluster lets Elasticsearch spread those shards across more machines, increasing both storage capacity and parallel search throughput.

Add more replicas — if search (read) traffic is the bottleneck rather than data volume, adding more replica shards lets more nodes serve the same search traffic in parallel, without needing to change the primary shard count at all.

Use time-based indices — for data that naturally arrives over time (like logs or transaction records), it's common to create a new index per day or per month (for example, "transactions-2026-07") instead of one giant ever-growing index. This makes it easy to control shard count as you go, and makes deleting old data cheap (just delete the whole old index, instead of a slow row-by-row delete).

Use a hot-warm-cold architecture — put your newest, most-searched data on fast, expensive hardware (the "hot" tier), move older, less-frequently-searched data to cheaper, slower hardware (the "warm" tier), and eventually to very cheap storage for data that's rarely accessed but needs to be retained for compliance (the "cold" tier). This keeps costs down without deleting data you're still required to keep.

Use Index Lifecycle Management (ILM) — automate the above: define rules like "after 30 days, move this index to the warm tier; after 1 year, move it to cold storage; after 7 years, delete it," and let Elasticsearch handle the transitions automatically instead of doing it manually.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="280" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">Hot-warm-cold, automated by ILM</text>
  <rect x="20" y="30" width="150" height="46" rx="6" fill="var(--red)" fill-opacity="0.15" stroke="var(--red)" stroke-width="2"/>
  <text x="95" y="50" text-anchor="middle" fill="var(--red)" font-size="9">Hot (0-30 days)</text>
  <text x="95" y="65" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">fast, expensive</text>
  <line x1="170" y1="53" x2="220" y2="53" stroke="var(--border)" stroke-width="1.5" marker-end="url(#esScaleArrow)"/>
  <defs><marker id="esScaleArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <rect x="225" y="30" width="150" height="46" rx="6" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-width="2"/>
  <text x="300" y="50" text-anchor="middle" fill="var(--amber)" font-size="9">Warm (30d-1yr)</text>
  <text x="300" y="65" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">cheaper, slower</text>
  <line x1="375" y1="53" x2="425" y2="53" stroke="var(--border)" stroke-width="1.5" marker-end="url(#esScaleArrow2)"/>
  <defs><marker id="esScaleArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <rect x="430" y="30" width="110" height="46" rx="6" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="485" y="50" text-anchor="middle" fill="var(--text-dim)" font-size="9">Cold (1-7yr)</text>
  <text x="485" y="65" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">cheapest, rare access</text>
  <text x="280" y="105" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">ILM rules move (and eventually delete) indices automatically</text>
</svg>`,
ex:`A fintech company's transaction-search index grows by millions of records daily. They use daily time-based indices, keep the last 30 days on fast hot-tier nodes (since customer support mostly searches recent transactions), automatically move indices older than 30 days to cheaper warm-tier storage, and automatically delete indices older than 7 years to match their regulatory data-retention policy — all handled automatically through Index Lifecycle Management rules, with no one manually managing this month by month.`,
trade:[`Time-based indices and ILM together solve most of the "how do we keep this manageable and affordable as it grows forever" problem, but they require some upfront design thinking (how to split indices, what the retention rules should be) rather than just letting one index grow indefinitely by default.`,`Hot-warm-cold architectures save real money at scale, but add operational complexity — you now have different hardware tiers to manage and monitor, and a bug in your ILM rules could accidentally delete data before it's supposed to be deleted, or move it to slow storage while it's still being actively queried.`]},

{cat:"DB", title:"Isolation Levels & Anomalies", def:`SQL defines four levels of isolation, controlling how much one transaction is allowed to "see" of another transaction's in-progress work. Going down this list, each level fixes one more problem, but also costs a bit more performance.

Read Uncommitted — the weakest level. You can see another transaction's changes even before it commits (a "dirty read") — risky, since that data might get rolled back and never actually happen.

Read Committed — you only ever see committed data, never uncommitted changes. But if you read the same row twice in one transaction, it might have changed in between (a "non-repeatable read").

Repeatable Read — reading the same row twice always gives the same result within one transaction. But a new row matching your query's filter could still appear if you re-run the same query (a "phantom read"), and a subtler bug called "write skew" is still possible.

Serializable — the strongest level. Transactions behave completely as if they ran one after another, never overlapping at all. Safest, but the most locking/retrying, so the lowest throughput under heavy concurrent access.`,
diagram:`<svg viewBox="0 0 560 300" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="140" y="24" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Dirty Read</text>
  <text x="260" y="24" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Non-Repeatable</text>
  <text x="380" y="24" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Phantom Read</text>
  <text x="500" y="24" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Write Skew</text>

  <text x="20" y="70" fill="var(--text)" font-size="12" font-weight="600">Read Uncommitted</text>
  <text x="20" y="120" fill="var(--text)" font-size="12" font-weight="600">Read Committed</text>
  <text x="20" y="170" fill="var(--text)" font-size="12" font-weight="600">Repeatable Read</text>
  <text x="20" y="220" fill="var(--text)" font-size="12" font-weight="600">Serializable</text>

  <g font-size="18" text-anchor="middle" font-weight="700">
    <text x="140" y="65" fill="var(--red)">✗</text>
    <text x="260" y="65" fill="var(--red)">✗</text>
    <text x="380" y="65" fill="var(--red)">✗</text>
    <text x="500" y="65" fill="var(--red)">✗</text>

    <text x="140" y="115" fill="var(--ledger)">✓</text>
    <text x="260" y="115" fill="var(--red)">✗</text>
    <text x="380" y="115" fill="var(--red)">✗</text>
    <text x="500" y="115" fill="var(--red)">✗</text>

    <text x="140" y="165" fill="var(--ledger)">✓</text>
    <text x="260" y="165" fill="var(--ledger)">✓</text>
    <text x="380" y="165" fill="var(--red)">✗</text>
    <text x="500" y="165" fill="var(--red)">✗</text>

    <text x="140" y="215" fill="var(--ledger)">✓</text>
    <text x="260" y="215" fill="var(--ledger)">✓</text>
    <text x="380" y="215" fill="var(--ledger)">✓</text>
    <text x="500" y="215" fill="var(--ledger)">✓</text>
  </g>

  <line x1="0" y1="40" x2="560" y2="40" stroke="var(--border)" stroke-width="1"/>
  <line x1="0" y1="90" x2="560" y2="90" stroke="var(--border)" stroke-width="1"/>
  <line x1="0" y1="140" x2="560" y2="140" stroke="var(--border)" stroke-width="1"/>
  <line x1="0" y1="190" x2="560" y2="190" stroke="var(--border)" stroke-width="1"/>

  <text x="280" y="260" text-anchor="middle" fill="var(--ledger)" font-size="12" font-weight="600">✓ = prevented at this level</text>
  <text x="280" y="280" text-anchor="middle" fill="var(--red)" font-size="12" font-weight="600">✗ = still possible at this level</text>
</svg>`,
ex:`A transfer service uses Serializable isolation (or explicit locking) for balance updates to prevent write skew — e.g., two concurrent withdrawals that each individually check "balance ≥ amount" under Repeatable Read could both pass and overdraw the account, since neither sees the other's uncommitted change.`,
trade:[`Higher isolation levels prevent more anomalies but reduce concurrency (more locking/aborts) — Serializable can mean more transaction retries under load.`,`Choosing the right level per operation matters: analytics queries can often tolerate Read Committed; money-moving transactions usually need Serializable or equivalent explicit locking.`]},

{cat:"DB", title:"Database Anomaly: Dirty Read", def:`A dirty read happens when your transaction reads a value that another transaction has written but not yet committed. If that other transaction later rolls back (cancels its changes), you've just made a decision based on data that, officially, never actually happened.

This is the anomaly that only "Read Uncommitted" allows — every other standard isolation level blocks it.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="20" y="18" fill="var(--text-dim)" font-size="10.5" font-weight="600">Txn A</text>
  <text x="300" y="18" fill="var(--text-dim)" font-size="10.5" font-weight="600">Txn B (Read Uncommitted)</text>
  <line x1="20" y1="26" x2="20" y2="130" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="300" y1="26" x2="300" y2="130" stroke="var(--border)" stroke-width="1.5"/>
  <circle cx="20" cy="45" r="4" fill="var(--amber)"/>
  <text x="34" y="49" fill="var(--text-dim)" font-size="9.5">writes balance = $80 (uncommitted)</text>
  <circle cx="300" cy="70" r="4" fill="var(--red)"/>
  <text x="314" y="74" fill="var(--red)" font-size="9.5">reads $80, approves a purchase</text>
  <circle cx="20" cy="100" r="4" fill="var(--red)"/>
  <text x="34" y="104" fill="var(--red)" font-size="9.5">ROLLBACK — balance reverts to $100</text>
  <line x1="20" y1="45" x2="300" y2="70" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="160" y="128" text-anchor="middle" fill="var(--red)" font-size="9">B acted on a value that officially never existed</text>
</svg>`,
ex:`Transaction A starts a withdrawal, temporarily reducing an account's balance in memory as part of an uncommitted transaction. Transaction B (running under Read Uncommitted) reads that in-progress, not-yet-committed balance and approves a purchase based on it. Then Transaction A hits an error and rolls back, undoing the withdrawal — but Transaction B already approved a purchase based on a balance that, as far as the official record is concerned, never existed.`,
trade:[`Dirty reads are almost never acceptable for financial data — the fix is simply never using Read Uncommitted for anything that touches money. It's really only ever appropriate for rough, non-critical analytics where seeing slightly-wrong, in-progress data is an acceptable trade for speed.`]},

{cat:"DB", title:"Database Anomaly: Non-Repeatable Read", def:`A non-repeatable read happens when you read the same row twice within a single transaction, and get two different answers — because another, already-committed transaction changed that row in between your two reads.

This is allowed under "Read Committed" but prevented from "Repeatable Read" and above.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="20" y="18" fill="var(--text-dim)" font-size="10.5" font-weight="600">Txn A (Read Committed, still open)</text>
  <text x="380" y="18" fill="var(--text-dim)" font-size="10.5" font-weight="600">Txn C</text>
  <line x1="20" y1="26" x2="20" y2="130" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="380" y1="26" x2="380" y2="130" stroke="var(--border)" stroke-width="1.5"/>
  <circle cx="20" cy="45" r="4" fill="var(--ledger)"/>
  <text x="34" y="49" fill="var(--text-dim)" font-size="9.5">reads balance = $500</text>
  <circle cx="380" cy="75" r="4" fill="var(--amber)"/>
  <text x="394" y="79" fill="var(--text-dim)" font-size="9.5">deposits $100, COMMITs</text>
  <circle cx="20" cy="105" r="4" fill="var(--red)"/>
  <text x="34" y="109" fill="var(--red)" font-size="9.5">reads balance again = $600 (same txn!)</text>
  <line x1="380" y1="75" x2="20" y2="105" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="3,3"/>
</svg>`,
ex:`Within one transaction, a report first reads an account's balance as $500. While that same transaction is still running, a completely separate, already-committed transaction deposits $100 into that account. When the original transaction reads the balance again a moment later, it now sees $600 — the same query gave two different answers in the same transaction, which can produce a confusing, internally inconsistent report.`,
trade:[`Fine for many read-only, non-critical reports where a small chance of mid-transaction change is acceptable — but if a transaction needs to make a decision based on a value staying the same throughout its whole execution (e.g., checking a balance and then acting on it later in the same transaction), you need at least Repeatable Read.`]},

{cat:"DB", title:"Database Anomaly: Phantom Read", def:`A phantom read happens when you run the same query twice within one transaction — not asking about one specific row, but asking a broader question like "give me all rows matching this condition" — and get a different set of rows back the second time, because another transaction inserted or deleted a row that now newly matches (or no longer matches) your filter.

This is subtly different from a non-repeatable read: a non-repeatable read is about one row changing, a phantom read is about the whole set of matching rows changing.`,
diagram:`<svg viewBox="0 0 560 160" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="20" y="18" fill="var(--text-dim)" font-size="10.5" font-weight="600">Fraud review txn</text>
  <text x="380" y="18" fill="var(--text-dim)" font-size="10.5" font-weight="600">Another txn</text>
  <line x1="20" y1="26" x2="20" y2="140" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="380" y1="26" x2="380" y2="140" stroke="var(--border)" stroke-width="1.5"/>
  <circle cx="20" cy="45" r="4" fill="var(--ledger)"/>
  <text x="34" y="49" fill="var(--text-dim)" font-size="9.5">query &gt;$10k txns → 5 rows</text>
  <circle cx="380" cy="80" r="4" fill="var(--amber)"/>
  <text x="394" y="84" fill="var(--text-dim)" font-size="9.5">inserts a new $15k txn, COMMITs</text>
  <circle cx="20" cy="115" r="4" fill="var(--red)"/>
  <text x="34" y="119" fill="var(--red)" font-size="9.5">re-runs same query → 6 rows (1 phantom)</text>
  <line x1="380" y1="80" x2="20" y2="115" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="3,3"/>
</svg>`,
ex:`A fraud-review process queries "all transactions over $10,000 in the last hour" and gets 5 results. While it's still working through those 5, another transaction for $15,000 gets committed by someone else. If the fraud process re-runs the exact same query a moment later, it now sees 6 results — a new row "phantom" appeared that wasn't there the first time, potentially causing the review process to miss it if it already assumed it had "all" the results.`,
trade:[`Prevented by Serializable isolation (and, for the specific row ranges involved, sometimes by database-specific locking like range locks) — a real consideration for any process that needs a stable, complete view of "everything matching X" throughout its execution, not just one unchanging row.`]},

{cat:"DB", title:"Database Anomaly: Lost Update", def:`A lost update happens when two transactions both read the same value, both calculate a new value based on what they read, and both write their result back — and the second write silently overwrites the first, so one of the two updates is completely lost, with no error or warning at all.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="20" y="18" fill="var(--text-dim)" font-size="10.5" font-weight="600">Txn A (+$20 deposit)</text>
  <text x="330" y="18" fill="var(--text-dim)" font-size="10.5" font-weight="600">Txn B (+$20 deposit)</text>
  <line x1="20" y1="26" x2="20" y2="130" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="330" y1="26" x2="330" y2="130" stroke="var(--border)" stroke-width="1.5"/>
  <circle cx="20" cy="45" r="4" fill="var(--ledger)"/>
  <text x="34" y="49" fill="var(--text-dim)" font-size="9.5">reads $100, computes $120</text>
  <circle cx="330" cy="70" r="4" fill="var(--ledger)"/>
  <text x="344" y="74" fill="var(--text-dim)" font-size="9.5">reads $100, computes $120</text>
  <circle cx="20" cy="100" r="4" fill="var(--amber)"/>
  <text x="34" y="104" fill="var(--text-dim)" font-size="9.5">writes $120</text>
  <circle cx="330" cy="120" r="4" fill="var(--red)"/>
  <text x="344" y="124" fill="var(--red)" font-size="9.5">writes $120 (overwrites A — should be $140)</text>
  <line x1="20" y1="100" x2="330" y2="120" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="3,3"/>
</svg>`,
ex:`Two concurrent requests both read an account balance of $100 to add a $20 deposit each. Both calculate $120 in their own memory and write $120 back. The correct final balance should be $140 (two separate $20 deposits), but because both writes independently computed from the same starting $100, one of the $20 deposits is silently lost — the balance ends up at $120, not $140, and nothing in the system ever flags an error.`,
trade:[`This is exactly the anomaly that pessimistic locking (lock the row before reading) or optimistic locking (check a version number hasn't changed before writing) is designed to prevent — never update a value by "read, calculate in application code, then write back" for money without one of these protections in place.`]},

{cat:"DB", title:"Database Anomaly: Write Skew (Serialization Anomaly)", def:`Write skew is a subtler anomaly where two transactions each read overlapping data, each individually make a change that looks perfectly valid on its own, but the two changes combined violate a rule that depends on both of them together. Each transaction, checked alone, did nothing wrong — the problem only exists when you look at the combined result.

This is sometimes grouped under the broader term "serialization anomaly," meaning any incorrect outcome that wouldn't have been possible if the transactions had truly run one at a time (serially), even though each transaction individually followed the rules it could see.`,
diagram:`<svg viewBox="0 0 560 170" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="20" y="18" fill="var(--text-dim)" font-size="10.5" font-weight="600">Owner A</text>
  <text x="330" y="18" fill="var(--text-dim)" font-size="10.5" font-weight="600">Owner B</text>
  <line x1="20" y1="26" x2="20" y2="140" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="330" y1="26" x2="330" y2="140" stroke="var(--border)" stroke-width="1.5"/>
  <circle cx="20" cy="45" r="4" fill="var(--ledger)"/>
  <text x="34" y="49" fill="var(--text-dim)" font-size="9.5">checks: anyone approved today? → No</text>
  <circle cx="330" cy="65" r="4" fill="var(--ledger)"/>
  <text x="344" y="69" fill="var(--text-dim)" font-size="9.5">checks: anyone approved today? → No</text>
  <circle cx="20" cy="95" r="4" fill="var(--amber)"/>
  <text x="34" y="99" fill="var(--text)" font-size="9.5">approves withdrawal, COMMITs (valid alone)</text>
  <circle cx="330" cy="120" r="4" fill="var(--red)"/>
  <text x="344" y="124" fill="var(--red)" font-size="9.5">approves withdrawal, COMMITs (valid alone)</text>
  <rect x="20" y="140" width="510" height="26" fill="var(--red)" fill-opacity="0.1" stroke="var(--red)" stroke-dasharray="3 2"/>
  <text x="30" y="157" fill="var(--red)" font-size="9.5">Combined: two approvals happened the same day — the rule only either checked alone.</text>
</svg>`,
ex:`An account requires at least one of two joint owners to approve any withdrawal over $1,000, and the rule is "at least one owner must remain who hasn't already used their approval today." Owner A checks "has someone else already approved today?" — sees no — and approves a withdrawal. At almost the same moment, Owner B runs the exact same check — also sees no, since Owner A's approval hasn't been committed yet — and also approves a separate withdrawal. Individually, each approval looked completely valid at the moment it was checked. Combined, the rule "only one approval per day" has now been violated by both happening at once.`,
trade:[`This is the one anomaly that even Repeatable Read does not protect against — only Serializable isolation (or explicit application-level locking on all the rows the decision actually depends on) prevents it, which is exactly why financial approval and limit-checking logic often needs the strongest isolation level available, even though it's the most expensive one.`]},

{cat:"DB", title:"Indexing Strategy", def:`An index is a data structure (usually B-Tree) that lets the database find rows without scanning the whole table, at the cost of extra storage and slower writes (every index must be updated on insert/update/delete).`,
diagram:`<svg viewBox="0 0 560 200" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="140" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Without index — full table scan</text>
  <g>
    <rect x="30" y="30" width="220" height="18" fill="var(--panel)" stroke="var(--border)"/>
    <rect x="30" y="50" width="220" height="18" fill="var(--panel)" stroke="var(--border)"/>
    <rect x="30" y="70" width="220" height="18" fill="var(--red)" fill-opacity="0.2" stroke="var(--red)"/>
    <rect x="30" y="90" width="220" height="18" fill="var(--panel)" stroke="var(--border)"/>
    <rect x="30" y="110" width="220" height="18" fill="var(--panel)" stroke="var(--border)"/>
  </g>
  <text x="140" y="140" text-anchor="middle" fill="var(--text-faint)" font-size="9">every row checked, one by one, to find the match</text>

  <text x="420" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">With B-Tree index — direct lookup</text>
  <circle cx="420" cy="45" r="18" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)" stroke-width="2"/>
  <text x="420" y="49" text-anchor="middle" fill="var(--ledger)" font-size="8">root</text>
  <line x1="405" y1="60" x2="380" y2="80" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="435" y1="60" x2="460" y2="80" stroke="var(--border)" stroke-width="1.5"/>
  <circle cx="380" cy="95" r="14" fill="var(--panel)" stroke="var(--border)"/>
  <circle cx="460" cy="95" r="14" fill="var(--ledger)" fill-opacity="0.35" stroke="var(--ledger)" stroke-width="2"/>
  <text x="460" y="118" text-anchor="middle" fill="var(--ledger)" font-size="8.5">match found</text>
  <text x="420" y="150" text-anchor="middle" fill="var(--text-faint)" font-size="9">O(log n) — a handful of comparisons, not a full scan</text>
</svg>`,
ex:`A `+"`transactions`"+` table queried heavily by `+"`account_id`"+` and `+"`created_at`"+` benefits from a composite index on `+"`(account_id, created_at)`"+` — put the equality-filtered column first, the range/sort column second, so the index serves both the filter and the ordering.`,
trade:[`More indexes speed up reads but slow down every write (each index needs maintenance) — on a high-TPS ledger table, over-indexing can become the actual bottleneck.`,`Composite index column order matters enormously — the same columns in the wrong order can make an index useless for a given query.`,`Periodically audit for unused indexes (via DB usage stats) and drop them; they're pure write-cost with no read benefit.`]},

{cat:"DB", title:"Query Plans & N+1", def:`EXPLAIN/EXPLAIN ANALYZE shows how the database will execute (or executed) a query — whether it uses an index, does a full scan, or picks a bad join order. The N+1 problem is issuing 1 query to fetch a list, then N additional queries (one per item) to fetch related data, instead of one batched query or join.`,
diagram:`<svg viewBox="0 0 560 170" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="130" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">N+1: 1 list query + N per-item queries</text>
  <rect x="30" y="30" width="200" height="22" fill="var(--panel)" stroke="var(--border)"/>
  <text x="130" y="45" text-anchor="middle" fill="var(--text-dim)" font-size="9">SELECT * FROM transactions (1)</text>
  <rect x="30" y="60" width="60" height="18" fill="var(--red)" fill-opacity="0.15" stroke="var(--red)"/>
  <rect x="95" y="60" width="60" height="18" fill="var(--red)" fill-opacity="0.15" stroke="var(--red)"/>
  <rect x="160" y="60" width="60" height="18" fill="var(--red)" fill-opacity="0.15" stroke="var(--red)"/>
  <text x="130" y="94" text-anchor="middle" fill="var(--red)" font-size="9">...N more merchant lookups, one per row</text>
  <text x="130" y="112" text-anchor="middle" fill="var(--red)" font-size="9" font-weight="600">101 total round trips for 100 rows</text>

  <text x="420" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Batched: 1 query total</text>
  <rect x="330" y="30" width="180" height="22" fill="var(--panel)" stroke="var(--border)"/>
  <text x="420" y="45" text-anchor="middle" fill="var(--text-dim)" font-size="9">SELECT * FROM transactions</text>
  <rect x="330" y="60" width="180" height="22" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)" stroke-width="2"/>
  <text x="420" y="75" text-anchor="middle" fill="var(--ledger)" font-size="8.5">JOIN merchants ON ...</text>
  <text x="420" y="100" text-anchor="middle" fill="var(--ledger)" font-size="9" font-weight="600">1 total round trip</text>
</svg>`,
ex:`Fetching 100 transactions, then looping to fetch each transaction's merchant details one at a time, issues 101 queries instead of 1 join or 1 batched `+"`WHERE merchant_id IN (...)`"+` — at scale this alone can dominate response latency.`,
trade:[`N+1 is easy to introduce accidentally with ORMs (lazy loading) — always check generated SQL for hot endpoints, not just unit test correctness.`,`EXPLAIN ANALYZE should be a standard step before shipping any new query on a high-traffic table, not just a debugging tool used after an incident.`]},

{cat:"DB", title:"Normalization vs Denormalization", def:`Normalization minimizes data duplication via structured relations (reduces update anomalies, but requires joins). Denormalization duplicates data intentionally to avoid joins and speed up reads, at the cost of needing to keep duplicates in sync on writes.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="130" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Normalized — one source of truth</text>
  <rect x="30" y="30" width="90" height="40" fill="var(--panel)" stroke="var(--border)"/>
  <text x="75" y="53" text-anchor="middle" fill="var(--text-dim)" font-size="8.5">merchants</text>
  <rect x="170" y="30" width="90" height="40" fill="var(--panel)" stroke="var(--border)"/>
  <text x="215" y="53" text-anchor="middle" fill="var(--text-dim)" font-size="8.5">transactions</text>
  <line x1="120" y1="50" x2="170" y2="50" stroke="var(--ledger)" stroke-width="2"/>
  <text x="145" y="42" text-anchor="middle" fill="var(--ledger)" font-size="7">JOIN</text>
  <text x="145" y="90" text-anchor="middle" fill="var(--text-faint)" font-size="8">every read pays a join</text>

  <text x="430" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Denormalized — read-optimized copy</text>
  <rect x="360" y="30" width="140" height="40" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-width="2"/>
  <text x="430" y="48" text-anchor="middle" fill="var(--amber)" font-size="8.5">transactions</text>
  <text x="430" y="62" text-anchor="middle" fill="var(--amber)" font-size="7.5">+ merchant_name copied in</text>
  <text x="430" y="90" text-anchor="middle" fill="var(--text-faint)" font-size="8">fast read, but a copy can drift stale</text>
</svg>`,
ex:`A normalized schema stores merchant name once in a `+"`merchants`"+` table, joined on every transaction read. A denormalized read-model (populated via CQRS projection) might copy the merchant name directly onto each transaction record for a fast dashboard query, updated asynchronously when merchant details change.`,
trade:[`Normalized: single source of truth, easy consistency, but joins add read latency at scale.`,`Denormalized: fast reads, but risk of stale/inconsistent duplicated data unless you have a reliable update propagation mechanism (e.g., CDC, event-driven projections).`,`Ledger/transaction tables are typically append-only and denormalized for read performance; the *authoritative* balance-affecting writes still go through normalized, tightly-controlled tables.`]},

{cat:"DB", title:"Modeling Money Correctly", def:`Currency values must never be stored as floating point (binary floats can't represent decimal fractions like $0.10 exactly, causing rounding errors that compound). Use fixed-point/decimal types (or integer minor units, e.g., cents) and model transactions as immutable, append-only ledger entries rather than mutable balance fields.`,
diagram:`<svg viewBox="0 0 560 140" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="140" y="18" text-anchor="middle" fill="var(--red)" font-size="11" font-weight="600">FLOAT — wrong</text>
  <rect x="30" y="30" width="220" height="26" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)"/>
  <text x="140" y="47" text-anchor="middle" fill="var(--red)" font-size="9.5">0.1 + 0.2 = 0.30000000000000004</text>
  <text x="140" y="75" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">binary floats can't represent decimal fractions exactly</text>

  <text x="420" y="18" text-anchor="middle" fill="var(--ledger)" font-size="11" font-weight="600">Integer cents — correct</text>
  <rect x="310" y="30" width="220" height="26" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="420" y="47" text-anchor="middle" fill="var(--ledger)" font-size="9.5">10 + 20 = 30 (cents)</text>
  <text x="420" y="75" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">integer arithmetic — exact, no drift</text>

  <rect x="30" y="95" width="500" height="30" fill="none" stroke="var(--border)" stroke-dasharray="4 3"/>
  <text x="45" y="114" fill="var(--text-dim)" font-size="9">At scale, float drift compounds into real reconciliation discrepancies auditors will flag.</text>
</svg>`,
ex:`Storing `+"`amount DECIMAL(19,4)`"+` (or an integer cents column) instead of `+"`FLOAT`"+` avoids the classic bug where repeated float arithmetic on prices/balances drifts by fractions of a cent — which, at scale, becomes a real reconciliation discrepancy that auditors will flag.`,
trade:[`Integer minor units (cents) are simplest and fastest but require careful handling of currencies with different decimal precision (e.g., JPY has no minor unit).`,`Decimal types are more flexible for multi-currency systems but need consistent rounding rules applied at defined points (never let rounding happen implicitly in arithmetic).`]},

{cat:"DB", title:"OLTP vs OLAP", def:`Two fundamentally different kinds of database workloads, and confusing them is a common, real design mistake.

OLTP (Online Transaction Processing) — many small, fast read/write operations, usually touching just one or a few rows at a time: "get this customer's balance," "record this one transaction." This is what your core ledger/application database is built for, and it's optimized for quick, precise, individual operations at high volume.

OLAP (Online Analytical Processing) — big, complex queries that scan and aggregate huge amounts of data at once: "total transaction volume by region for the last 12 months," "average transaction size per merchant category." This is what data warehouses and BI/reporting tools are built for, and they're optimized for scanning and summarizing large volumes efficiently, not for many small individual row lookups.

Running heavy OLAP-style analytical queries directly against your OLTP production database is a classic mistake — a huge aggregation query can lock up rows, hog resources, and slow down (or even block) the exact real-time transaction processing that database exists to handle quickly. The standard fix is separating them: keep your OLTP database lean and fast for real transactions, and periodically copy (or stream, via CDC — covered earlier) data into a separate OLAP-oriented data warehouse for reporting and analytics.`,
diagram:`<svg viewBox="0 0 560 170" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="120" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">OLTP — many small ops</text>
  <rect x="20" y="30" width="26" height="18" fill="var(--ledger)" fill-opacity="0.25" stroke="var(--ledger)"/>
  <rect x="50" y="30" width="26" height="18" fill="var(--ledger)" fill-opacity="0.25" stroke="var(--ledger)"/>
  <rect x="80" y="30" width="26" height="18" fill="var(--ledger)" fill-opacity="0.25" stroke="var(--ledger)"/>
  <rect x="110" y="30" width="26" height="18" fill="var(--ledger)" fill-opacity="0.25" stroke="var(--ledger)"/>
  <rect x="140" y="30" width="26" height="18" fill="var(--ledger)" fill-opacity="0.25" stroke="var(--ledger)"/>
  <rect x="170" y="30" width="26" height="18" fill="var(--ledger)" fill-opacity="0.25" stroke="var(--ledger)"/>
  <text x="120" y="65" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">thousands/sec, 1-few rows each</text>

  <line x1="230" y1="40" x2="330" y2="40" stroke="var(--border)" stroke-width="2" marker-end="url(#olapArrow)"/>
  <text x="280" y="30" text-anchor="middle" fill="var(--text-faint)" font-size="8">CDC / nightly copy</text>
  <defs><marker id="olapArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>

  <text x="440" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">OLAP — few, huge scans</text>
  <rect x="340" y="30" width="200" height="30" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-width="2"/>
  <text x="440" y="49" text-anchor="middle" fill="var(--amber)" font-size="9">SUM(...) GROUP BY region</text>
  <text x="440" y="75" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">scans millions of rows, runs occasionally</text>

  <rect x="20" y="95" width="520" height="40" fill="none" stroke="var(--border)" stroke-dasharray="4 3"/>
  <text x="35" y="115" fill="var(--text-dim)" font-size="9.5">Running the OLAP query directly against the OLTP database risks locking</text>
  <text x="35" y="129" fill="var(--text-dim)" font-size="9.5">rows real transactions need — separation avoids that interference entirely.</text>
</svg>`,
ex:`A fintech company's core ledger database (OLTP) handles thousands of individual transaction writes per second. Their finance team's monthly "revenue by region" report used to run directly against that same database, occasionally causing real transaction processing to slow down during report generation. Moving that reporting workload to a separate data warehouse (OLAP), fed by a nightly (or CDC-streamed) copy of the ledger data, completely isolates the two — the heavy analytical query can no longer interfere with real-time payment processing at all.`,
trade:[`Keeping OLTP and OLAP workloads separate adds real infrastructure (a second system, and a way to keep it in sync — often via CDC, covered earlier in this guide), but protects your core transactional system from being destabilized by analytical query load, which is a serious operational risk if ignored.`,`OLAP-oriented systems are often built on genuinely different underlying storage technology (columnar storage, which stores each column's data together instead of each row together) specifically because it makes "scan and aggregate one column across millions of rows" dramatically faster than a row-oriented OLTP database can manage — a real example of picking storage technology to match the actual access pattern.`]},
