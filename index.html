OAuth2 — a framework for delegated authorization: it lets one app act on a user's behalf with limited, specific permissions ("scopes"), without ever seeing the user's actual password.

OIDC (OpenID Connect) — adds an identity/login layer on top of OAuth2, since OAuth2 by itself was only ever designed for authorization, not for actually proving who someone is.

JWT (JSON Web Token) — a common format for carrying these claims/permissions around as a signed token. The catch: once issued, a JWT is valid until it expires — there's no built-in, free way to instantly revoke one early.`,
ex:`A third-party budgeting app uses OAuth2 to get a scoped, read-only token to view a user's transaction history without ever seeing their bank login credentials — the token's scope (AuthZ) is limited to "read transactions," not "initiate transfers."`,
trade:[`JWTs avoid a database lookup on every request (stateless, self-contained), but that same property makes revocation hard — a compromised JWT is valid until it expires unless you add a token-blocklist check, which reintroduces the state you were trying to avoid.`,`Short JWT expiry + refresh tokens is the common compromise: limits the damage window of a leaked token while avoiding a lookup on every single request.`]},

{cat:"SC", title:"Encryption at Rest & in Transit (KMS/HSM)", def:`Two different moments where data needs protecting, plus the systems that manage the keys.

Encryption in transit (TLS) — protects data while it's moving across the network, so someone intercepting the traffic can't read it.

Encryption at rest — protects data while it's sitting in storage, so if someone gets access to the raw disk or database files, the data is still unreadable without the key.

KMS (Key Management Service) / HSM (Hardware Security Module) — a secure, dedicated system for managing the encryption keys themselves. Often used with "envelope encryption": your actual data is encrypted with a data key, and that data key is itself encrypted using a master key that lives safely inside the KMS/HSM.`,
ex:`Bank account numbers stored in the database are encrypted at rest using envelope encryption, with the master key held in a cloud KMS that has strict access logging — so a database backup leak alone doesn't expose usable account numbers without also compromising the KMS.`,
trade:[`Envelope encryption limits blast radius (rotating the master key doesn't require re-encrypting all data) and centralizes key access auditing, but adds a dependency on the KMS/HSM's availability and a small latency cost on decrypt operations.`]},

{cat:"SC", title:"Tokenization of Sensitive Data", def:`Replacing a sensitive value (like a full card number) with a non-sensitive token that has no exploitable mathematical relationship to the original, with the real value stored only in a tightly controlled, isolated vault — used throughout your systems instead of the raw sensitive value.`,
ex:`After a card is entered at checkout, the payment processor returns a token; your systems store and reference that token everywhere (refunds, recurring billing) and never touch the raw card number again — dramatically reducing your PCI-DSS compliance scope since most of your infrastructure never handles raw card data at all.`,
trade:[`Massively reduces the scope (and cost) of compliance audits and breach impact, but adds a dependency on the tokenization provider/vault for any operation that ever needs the real value (e.g., specific processor requirements) — a single point that must be highly available and secure.`]},

{cat:"SC", title:"mTLS & Service-to-Service Auth", def:`Mutual TLS: both client and server present certificates and verify each other's identity (not just the server proving its identity to the client, as in standard TLS) — commonly used inside a service mesh so services only accept connections from verified, authorized peers.`,
ex:`The ledger service only accepts connections from services presenting a valid internal certificate issued by the company's internal CA, so even if an attacker gains network access inside the VPC, they can't simply call the ledger service's API without a valid service identity.`,
trade:[`Strong internal security boundary (defense in depth beyond network segmentation alone), but adds certificate issuance/rotation operational overhead — usually handled by a service mesh (Istio/Linkerd) or platform team rather than each service implementing it manually.`]},

{cat:"SC", title:"Secrets Management", def:`Storing passwords, API keys, database credentials, and encryption keys in a dedicated, access-controlled system (like Vault or a cloud provider's secrets manager) instead of hardcoding them in source code or plain config files — so secrets can be rotated, access-audited, and revoked without a code change.`,
ex:`Instead of a database password sitting in a config file checked into version control (where anyone with repo access can read it, forever, even after rotation), the application fetches the current password from Vault at startup, and rotating the password just means updating it in Vault — no redeploy needed, and old copies of the code never had the real value in them.`,
trade:[`Removes secrets from source control and gives you an audit log of who accessed which secret and when, but adds a runtime dependency (the app needs network access to the secrets manager at startup) and requires a secure way to authenticate the app to the secrets manager itself in the first place.`]},

{cat:"SC", title:"Input Validation & Audit Trail (Non-Repudiation)", def:`Input validation means checking that data coming into your system is well-formed and expected before acting on it, preventing injection attacks and malformed-data bugs. Non-repudiation is the guarantee that an action can be reliably traced back to who performed it, with proof strong enough that they can't credibly deny having done it — achieved through immutable, detailed audit logs.`,
ex:`Validating that a transfer amount is a positive number within expected bounds (not negative, not absurdly large, not a string containing SQL) prevents both attacks and accidental bugs. Separately, logging "user X approved refund Y at timestamp Z from IP W" in an immutable audit log means that if a dispute arises later about who authorized a refund, there's reliable evidence — this is often a regulatory requirement, not just a nice-to-have.`,
trade:[`Validation should happen as early as possible (reject bad input immediately) but must be consistent everywhere data enters the system — a single unvalidated entry point undermines the protection everywhere else.`,`Audit logs must be tamper-resistant (append-only, ideally write-once storage) — a log an admin can quietly edit doesn't actually provide non-repudiation, since the "proof" could be altered.`]},

// ---------------- MULTI-REGION / LB / DR ----------------
{cat:"MR", title:"Load Balancing Algorithms (L4 vs L7)", def:`L4 (transport layer) — balances traffic based only on IP address and port, without understanding what's actually inside the request. Fast and simple, but can't make smart decisions based on the content of the request.

L7 (application layer) — actually understands HTTP, so it can route based on the URL path, headers, or cookies. This enables smarter routing (like sending only certain paths to a new service version), at the cost of a bit more processing per request.

Common algorithms for choosing which server gets the next request: round robin (just cycle through servers in order), least connections (send it to whichever server currently has the fewest active connections), and consistent hashing (route the same kind of request to the same server every time, useful for cache or session affinity).`,
ex:`An L7 load balancer routes `+"`/api/v2/*`"+` payment requests to the new service version while everything else goes to the legacy service, enabling a gradual, path-based migration — something an L4 balancer can't do since it doesn't parse HTTP paths.`,
trade:[`L4 is faster and simpler but can't make content-aware routing decisions; L7 enables powerful routing (canarying, A/B, path-based) at the cost of more processing per request.`,`Least-connections balancing handles uneven request durations better than round robin, but requires the balancer to track live connection state per backend.`]},

{cat:"MR", title:"Active-Active vs Active-Passive", def:`Two ways to run infrastructure across multiple regions for reliability.

Active-active — multiple regions all serve live traffic at the same time. This uses resources efficiently, but now two regions could both try to write to the same piece of data at once, and something needs to resolve that conflict.

Active-passive — one region is the primary, handling all traffic; the other sits on standby, ready to take over if the primary fails. This completely avoids the conflicting-write problem, but the standby capacity sits mostly idle, and there's still a short gap in service while failover happens.`,
ex:`A global payments platform might run active-passive for the core ledger (avoiding the complexity of resolving concurrent conflicting writes to the same account across regions) while running active-active for stateless services like fraud-scoring or the public API gateway, which don't have this conflict problem.`,
trade:[`Active-active gives better resource utilization and lower failover latency, but multi-region concurrent writes to the same record require real conflict-resolution logic (or partitioning by region-owner) — genuinely hard to get right for financial data.`,`Active-passive is simpler and safer for data with strict consistency needs, but wastes standby capacity and has a real (non-zero) failover time during an actual regional outage.`]},

{cat:"MR", title:"RTO vs RPO", def:`Two numbers that shape your disaster-recovery design, answering two different questions.

RTO (Recovery Time Objective) — "how long can we be down?" This drives how fast and automated your failover process needs to be.

RPO (Recovery Point Objective) — "how much recent data can we afford to lose?" measured in time (like "at most 5 minutes of data"). This drives how often you back up or replicate data.`,
ex:`A ledger system might target an RPO near zero (can't lose a single committed transaction — requires synchronous replication to a standby before acknowledging a write) and an RTO of a few minutes (automated failover, acceptable brief unavailability), whereas an analytics warehouse might tolerate an RPO of a few hours (nightly batch replication is fine) with a looser RTO.`,
trade:[`Near-zero RPO (synchronous replication) costs write latency on every transaction; a looser RPO (async replication) is faster but risks losing the most recent transactions in a disaster.`,`These targets should be set explicitly per data type/service by the business, not assumed — "how much money loss risk is acceptable" is a business decision, not just an engineering one.`]},

{cat:"MR", title:"Data Residency & Sovereignty", def:`Legal/regulatory requirements that certain data (especially financial and personal data) must be stored and/or processed within specific geographic/jurisdictional boundaries, restricting how you can architect global replication and failover.`,
ex:`A customer's transaction data for an EU-based account might legally need to stay within the EU, meaning your global architecture can't simply replicate every account's data to a US region for a "closest region" latency optimization — the shard/region assignment must be tied to the customer's regulatory home region, not just performance.`,
trade:[`Constrains your architecture options (can't always pick the "ideal" technical topology), often requiring per-region data sovereignty combined with cross-region-safe aggregation (e.g., only anonymized/aggregated data crosses borders for global reporting).`,`Increases operational complexity (multiple independent regional deployments rather than one global one) but is a hard legal requirement, not an optional trade-off, in many jurisdictions.`]},

{cat:"MR", title:"Backup Strategies & Point-in-Time Recovery", def:`Full backup — a complete copy of everything at one moment in time. Easy to restore from, but slow and expensive to take often, since it copies all the data every single time.

Incremental backup — only saves what's changed since the last backup. Much faster and cheaper to create, but restoring means replaying the last full backup plus every incremental since then, in order.

Point-in-time recovery (PITR) — combines a base backup with a continuous log of every single change (like a database's write-ahead log), so you can restore the database to any exact second in the past — not just to whenever your last scheduled backup happened to run.`,
ex:`A bug accidentally corrupts a batch of transactions at 3:07pm. With PITR, you can restore the database to exactly 3:06pm — one minute before the bug ran — rather than losing everything back to last night's full backup, which would have discarded many hours of legitimate, correct transactions along with the bad ones.`,
trade:[`PITR gives much more precise recovery and minimizes data loss, but requires continuously storing and shipping the change log somewhere safe, plus regular testing that restores actually work — an untested backup is not a real backup.`,`Full backups are simpler to reason about and restore from, but taking them frequently enough to bound data loss can be expensive at scale — most real systems combine periodic full backups with continuous log shipping for PITR.`]},

// ---------------- FINTECH-SPECIFIC ----------------
{cat:"FT", title:"Double-Entry Bookkeeping", def:`Every financial transaction is recorded as at least two balanced entries — a debit to one account and an equal credit to another — so the books are always mathematically self-consistent (total debits always equal total credits) and every movement of money has a fully traceable counterpart.`,
ex:`A $50 payment from a customer's wallet to a merchant is recorded as a debit of $50 from the customer's account and a credit of $50 to the merchant's account (plus, realistically, additional entries for any platform fee), rather than a single "balance decreased by $50" update — this structure makes auditing and error detection dramatically easier.`,
trade:[`Doubles the number of write operations per transaction compared to a naive single-balance update, but the self-balancing property (sum of all entries = 0) gives you a powerful, cheap sanity check that catches bugs and fraud that a single mutable balance field never would.`]},

{cat:"FT", title:"Idempotency Keys in Payment APIs", def:`A client-generated unique key attached to a payment request so that if the request is retried (due to a timeout or network failure) without the client knowing whether the first attempt succeeded, the server recognizes the retry and returns the original result instead of processing the payment again.`,
ex:`A mobile app's checkout call times out on a flaky connection; the app retries with the same idempotency key. The server, having already completed the first charge, returns the original success response instead of charging the customer a second time.`,
trade:[`Essential for safe retries on any money-moving endpoint, but requires storing keys with a sensible TTL (long enough to cover realistic retry windows, short enough to bound storage) and clear semantics for what happens if a retry arrives with the same key but a *different* payload (should be rejected as a client error).`]},

{cat:"FT", title:"Reconciliation", def:`The process of comparing your internal ledger records against an external source of truth (a bank statement, a payment processor's settlement report) to detect and resolve discrepancies — because distributed systems and third-party integrations mean your internal state and the external state can drift.`,
ex:`An end-of-day batch job compares every transaction in your internal ledger against the settlement file from your card processor, flagging any transaction present in one but not the other (a missing webhook, a duplicate charge, a processor-side delay) for investigation before books are closed for the day.`,
trade:[`Catches real-world discrepancies that pure code correctness can't prevent (network failures, processor bugs, timing differences), but is inherently a detective control (after the fact) rather than preventive — it needs to be paired with fast alerting and a clear resolution/escalation process, not just run silently.`]},

{cat:"FT", title:"PCI-DSS & Tokenization Scope", def:`PCI-DSS is the security standard for any system that stores, processes, or transmits cardholder data, with strict requirements around encryption, access control, logging, and network segmentation. "Scope" refers to which systems are actually subject to these requirements — minimizing scope (e.g., via tokenization) reduces audit cost and risk.`,
ex:`By tokenizing card numbers at the point of entry (handled by a PCI-compliant processor's hosted field or SDK) and never letting raw card numbers touch your own servers, most of your infrastructure falls outside PCI scope entirely, dramatically simplifying your compliance audit.`,
trade:[`Reduces compliance burden and breach blast radius significantly, but requires disciplined engineering practices to maintain that scope boundary — a single logging statement or debug endpoint that accidentally captures raw card data can pull a system back into full PCI scope.`]},

{cat:"FT", title:"Settlement & Clearing (T+1/T+2)", def:`Clearing is the process of confirming and reconciling a transaction between parties; settlement is the actual transfer/exchange of funds. "T+1"/"T+2" notation means settlement happens 1 or 2 business days after the transaction date — a common source of the gap between "transaction shown as complete" and "money actually moved" that engineers building on top of banking rails need to model correctly.`,
ex:`A customer sees a payment as "completed" in the app immediately, but the actual movement of funds between banks might not finalize for 1-2 business days — your system needs a distinct state (e.g., "authorized" vs "settled") to correctly represent this, since treating them as the same state can cause incorrect balance/availability calculations.`,
trade:[`Modeling settlement as a distinct, later state adds complexity to your transaction state machine, but conflating "authorized" with "settled" is a common source of serious bugs (e.g., allowing a customer to spend funds that haven't actually cleared yet).`]},

{cat:"FT", title:"Multi-Currency Handling & Rounding", def:`Different currencies have different numbers of decimal places (USD has cents, 2 decimal places; JPY has no minor unit at all; some currencies have 3). Converting between currencies and rounding correctly at defined points is critical — get it wrong and you either lose money on every conversion or create small discrepancies that compound into real accounting problems at scale.`,
ex:`Converting $100.00 USD to JPY at a given exchange rate produces a result with fractional yen, which don't exist as a real unit — the system must round to a whole yen using a clearly defined, consistent rule (and clearly defined *where* in the calculation rounding happens), otherwise repeated conversions back and forth could slowly create or destroy tiny amounts of money that auditors will eventually catch.`,
trade:[`Rounding rules (round half up, round half to even/banker's rounding, always round down in the platform's favor, etc.) must be chosen deliberately and applied consistently — different rounding rules in different parts of the codebase is a classic, hard-to-find source of reconciliation discrepancies.`,`Storing exchange rates and doing conversion math needs the same "never use floating point for money" discipline as regular currency amounts.`]},

{cat:"FT", title:"Regulatory Compliance Basics (SOC 2, GDPR, KYC/AML)", def:`Four terms that come up constantly in fintech, each covering a different concern.

SOC 2 — an audit standard that proves your company has proper controls in place around security, availability, and how you handle data. Often required before larger enterprise customers will even consider working with you.

GDPR — an EU regulation giving individuals real rights over their own personal data: the right to access it, delete it, or take a copy of it elsewhere. It also restricts how and where that data can be stored and processed.

KYC (Know Your Customer) — verifying a customer's real identity before letting them move money, to prevent fraud and stop illegal activity before it starts.

AML (Anti-Money Laundering) — ongoing monitoring of transaction patterns to catch and report activity that looks like it could be money laundering.`,
ex:`A new user signing up for a payment account must complete identity verification (KYC) before they can send or receive money above a certain threshold — this isn't just a UX step, it's a legal requirement, and skipping or weakening it exposes the company to real regulatory penalties, not just a security risk.`,
trade:[`As a backend engineer, you're rarely making the compliance policy decisions yourself, but you're very often building the systems that enforce them (identity verification gates, data deletion pipelines for GDPR requests, suspicious-activity flagging for AML) — understanding the "why" behind these requirements helps you build them correctly instead of treating them as arbitrary extra steps.`,`GDPR's "right to be deleted" is often in tension with financial record-keeping laws requiring you to retain transaction records for years — real systems need a designed way to reconcile these (e.g., anonymizing personal details while keeping the financial record itself).`]},

{cat:"FT", title:"Fraud/Risk System Integration", def:`Fraud scoring (checking whether a transaction looks suspicious) is often a separate service or even a separate team's system, and it usually can't be allowed to slow down or block every legitimate transaction while it "thinks" — so it's commonly integrated asynchronously, with a fast synchronous check for obvious cases and a slower async check for deeper analysis.`,
ex:`A payment gets an instant, simple rule-based risk check synchronously (blocking obviously fraudulent patterns immediately), while a more thorough machine-learning-based fraud score runs asynchronously afterward — if that later check flags the transaction as high-risk, the system might freeze the funds or trigger a manual review, rather than making every single customer wait for the slow check to complete before their payment even goes through.`,
trade:[`Synchronous fraud checks give the strongest protection (block before money moves) but add latency to every transaction — asynchronous checks keep the experience fast but mean a bad transaction might briefly complete before being caught, requiring a "claw back" mechanism (hold, freeze, or reversal) for that window.`,`The fraud system becoming unavailable shouldn't be allowed to fully block payments (a classic cascading-failure risk) — needs a clear, deliberately-chosen fallback policy (fail open with monitoring vs fail closed) agreed on with the risk team in advance, not decided ad hoc during an incident.`]},

// ---------------- DB PERFORMANCE AT SCALE ----------------
{cat:"PF", title:"Finding Slow Queries", def:`The first, cheapest step in any DB performance investigation: enable slow query logging, use EXPLAIN/EXPLAIN ANALYZE to see the actual execution plan, and use aggregated statistics (pg_stat_statements, performance_schema) to find queries that are cumulatively expensive even if no single execution is dramatically slow.`,
ex:`pg_stat_statements reveals that a seemingly fast (50ms) query is actually the top consumer of total database time because it runs 2 million times per day — a query that looked fine in isolated testing turns out to be the real bottleneck at production volume.`,
trade:[`Aggregated statistics catch "death by a thousand cuts" queries that per-request tracing might miss; EXPLAIN ANALYZE actually executes the query (careful running it against production for expensive writes) versus EXPLAIN alone which only estimates.`]},

{cat:"PF", title:"Read Replicas & Replication Lag", def:`Routing read-heavy traffic (reporting, dashboards, search) to read replicas offloads the primary/writer, but replicas lag behind the primary by some amount, meaning a read immediately after a write might not reflect that write yet.`,
ex:`A user completes a transfer and immediately refreshes their transaction history, which is served from a lagging read replica — the new transaction might not appear for a moment, confusing the user and generating support tickets, unless the app explicitly reads that specific query from the primary right after a write (read-your-writes routing).`,
trade:[`Offloads significant read load from the primary, but requires the application to make a deliberate choice per query about consistency needs — not every read can tolerate replica lag, and getting this wrong causes confusing, hard-to-reproduce user-facing bugs.`]},

{cat:"PF", title:"Partitioning", def:`Splitting a single large table into smaller physical pieces (by range, list, or hash) that the database manages internally, so queries can skip irrelevant partitions (partition pruning) and maintenance operations (like archiving old data) become cheap on a per-partition basis.`,
ex:`A `+"`transactions`"+` table partitioned by month lets you cheaply archive/drop data older than the regulatory retention period (a single partition drop instead of a slow row-by-row delete) and lets queries filtered by recent date ranges skip scanning years of old partitions entirely.`,
trade:[`Great for time-series-like data (transaction/audit logs) with natural range boundaries, but doesn't help with horizontal scale across multiple machines by itself — it's a single-node organizational technique, not a substitute for sharding when you need more write capacity than one node can provide.`]},

{cat:"PF", title:"Sharding & Shard Key Selection", def:`Splitting data across multiple independent database instances (not just partitions within one instance) to scale writes horizontally. The shard key — the column used to decide which shard a row lives on — is the single most important decision, since it must align with your dominant query pattern to avoid expensive cross-shard operations.`,
ex:`Sharding by `+"`account_id`"+` means every query for a given account's data (the vast majority of your traffic) hits exactly one shard — but a report needing to aggregate across *all* accounts (e.g., total platform balance) now requires a expensive fan-out query across every shard, which needs to be designed for explicitly rather than assumed to just work.`,
trade:[`Enables horizontal write scale beyond a single machine's ceiling, but a poorly chosen shard key creates hot shards (uneven distribution, e.g., one huge enterprise customer overwhelming their shard) and cross-shard joins/transactions become genuinely hard or impossible.`,`Resharding later (splitting an overloaded shard) is a significant migration project — getting the shard key reasonably right early saves enormous pain later.`]},

{cat:"PF", title:"Vertical vs Horizontal Scaling", def:`Vertical scaling: make a single machine bigger (more CPU/RAM/IOPS) — simple, no architectural change, but has a hard ceiling and doesn't fix bad queries. Horizontal scaling: add more machines (read replicas, partitioning, sharding) — more complex to build and operate, but scales further and improves fault tolerance (no single machine is a total single point of failure).`,
ex:`A team facing DB slowness first upgrades to a bigger instance (vertical — fast, cheap to try) which buys 6 months of runway while they build out read replicas and eventually sharding (horizontal — the real long-term fix) for genuinely global, high-growth scale.`,
trade:[`Vertical scaling is the right *first* lever to pull (cheapest, fastest, no code changes) but should never be your only long-term strategy for a system expected to keep growing — plan the horizontal path before you're forced into it under incident pressure.`]},

{cat:"PF", title:"Scaling a Database Globally (Users Across Many Countries)", def:`Everything earlier in this section (indexing, read replicas, partitioning, sharding) helps one region handle more load. Going global adds one new, harder question on top: users are now spread across continents, and light travels at a fixed speed — a request from Singapore to a database in the US will always take longer than a request from a US user to that same database, no matter how well-tuned the database is. Global scaling is mostly about deciding, deliberately, where each piece of data's "true copy" lives and how far a user has to reach to touch it.

The three broad approaches, from simplest to most complex:

1. Single region, global users (simplest). Keep one database in one region, and just let far-away users pay the extra network latency. Fine for lower-traffic or early-stage products where engineering simplicity matters more than shaving off latency.

2. Single writer region, regional read replicas (the common middle ground). Keep the single source of truth (all writes) in one home region, but place read-only replicas in other regions close to users. Reads become fast everywhere; writes still travel back to the home region, but writes (like "confirm this payment") are usually a smaller share of total traffic than reads (like "show me my transaction history"). This is a very natural fit for a fintech ledger — one true, strongly consistent home for money-moving writes, fast local reads for dashboards, with the well-known caveat that a read *immediately following your own write* can look stale on a replica unless you specifically route that one read back to the primary.

3. Multi-region writers with a clear ownership rule (most complex, only when truly needed). Let more than one region accept writes, but avoid write conflicts by giving each piece of data one clear "home region" — for example, a customer's account is always written to the region matching their home country, so two regions are never fighting to update the very same account at the same time. This is often forced by regulation anyway (data residency laws), which conveniently pushes you toward a design that also solves the technical conflict problem.`,
ex:`A payments company serving Southeast Asia, Europe, and the US keeps each customer's account data owned by their home region (a Singapore customer's account always writes to the Singapore region, a German customer's always writes to the EU region) — satisfying local data-residency law and avoiding cross-region write conflicts at the same time. Meanwhile, read-only replicas of each region's data are placed near the other regions purely to make cross-region customer support lookups fast, clearly labeled as "may be a few seconds behind."`,
trade:[
  `The simplest approach (single region) costs you nothing in engineering complexity but means far-away users always feel a slower app — often an acceptable trade-off until growth in that region justifies the investment.`,
  `Regional read replicas fix the "reads feel slow" problem cheaply, but you must decide, on a case-by-case basis, which reads can tolerate a few seconds of staleness (a transaction history list) versus which reads must go to the primary (checking if a payment can be approved right now).`,
  `Owning data by home region solves both the legal requirement and the write-conflict problem in one design decision, but a report that needs to look across *all* regions at once (like "total global transaction volume today") now has to specifically query every region and add the results together — a feature you have to build on purpose, not something that comes for free.`,
  `Whatever approach you pick, the money-moving write path should almost always stay strongly consistent within its home region — global scale should change *where* the source of truth lives, not weaken the consistency guarantees around it.`
]},

// ---------------- DEBUGGING PRODUCTION ----------------
{cat:"DG", title:"Stabilize First, Understand Second", def:`When a production bug is actively causing harm, the immediate priority is limiting damage (feature flag off, roll back the deploy, circuit-break the affected path) — not fully understanding the root cause first. Root-cause analysis happens after the bleeding has stopped, ideally with the evidence preserved.`,
ex:`A newly-deployed change is causing duplicate charges. The correct first move is rolling back the deploy or disabling the feature flag immediately — even before you know exactly why it's happening — rather than spending 30 minutes debugging live while more customers get double-charged.`,
trade:[`Fast mitigation sometimes means you lose some debugging context (e.g., rolling back before capturing every relevant log) — a reasonable trade in almost all cases, since the cost of continued customer harm usually far outweighs the cost of a slightly harder post-hoc investigation.`]},

{cat:"DG", title:"Distributed Tracing for Debugging", def:`Using a trace ID that follows a single request across every service it touches lets you pinpoint exactly which service and which specific call in a complex chain caused a failure or slowdown, instead of manually correlating separate logs from a dozen services by timestamp.`,
ex:`A slow checkout request's trace shows 900ms spent in the fraud-check service specifically, out of a 1000ms total — immediately narrowing the investigation to one service instead of guessing across payment, ledger, fraud, and notification services.`,
trade:[`Requires trace context propagation to be correctly implemented across every service boundary (including async/queue-based hops, which are easy to forget) — a broken trace chain at any hop makes this powerful tool useless for that request.`]},

{cat:"DG", title:"Hypothesis-Driven Debugging", def:`Explicitly stating a specific, falsifiable hypothesis ("I believe X causes Y because Z") before testing it, and testing it with the safest available method (read-only queries, replaying in a sandbox/shadow environment) — rather than randomly poking at production or guessing.`,
ex:`Instead of randomly restarting services hoping the issue goes away, the on-call engineer states: "I believe the spike in errors started when the new fraud-rule config deployed at 2:14pm, because the error timestamps align exactly" — then verifies by checking if reverting just that config resolves the issue, confirming or refuting the hypothesis with evidence.`,
trade:[`Slower per individual test than "just trying things," but dramatically faster overall since it avoids the common trap of randomly changing multiple things at once and never actually learning what fixed it (or whether it's really fixed).`]},

{cat:"DG", title:"Data Repair vs Code Repair", def:`Fixing the bug in code prevents future occurrences, but doesn't fix records that were already written incorrectly — bad data (e.g., wrong balances from a bug) requires its own separate, carefully audited correction process, distinct from and often riskier than the code fix itself.`,
ex:`After fixing a bug that occasionally double-recorded a fee, the team must also identify every affected transaction, calculate the correct correction for each, and apply it through an audited process (often itself logged as a new corrective transaction rather than silently editing history) — the code fix alone leaves the already-corrupted records wrong.`,
trade:[`Correcting financial data directly (e.g., a raw UPDATE) destroys the audit trail and is generally the wrong approach — better practice is to record an explicit corrective transaction/adjustment, preserving full history of both the error and its correction for auditors.`]},

{cat:"DG", title:"Blameless Postmortems", def:`A structured after-action review focused on the timeline, root cause, and contributing factors (including gaps in monitoring/process) — explicitly not on assigning individual blame, since a punitive culture discourages the honest reporting needed to actually learn from incidents.`,
ex:`A postmortem for a duplicate-charge incident identifies that the missing idempotency key wasn't caught in code review because there was no checklist item for it, and that alerting was 20 minutes slower than it should have been because the relevant dashboard didn't include that specific error type — producing concrete action items for both gaps, not a note about who wrote the bug.`,
trade:[`Requires genuine organizational commitment (a postmortem that quietly still results in blame undermines trust and future honesty), but is one of the highest-leverage practices for actually reducing repeat incidents over time.`]},

{cat:"DG", title:"Debugging a Global, Multi-Region Application", def:`Everything in the earlier debugging steps still applies, but a bug in a global application adds a few extra questions you need to ask right away, because the same code can behave differently in different places at the same time.

Which region is actually affected? A global app usually runs the same code in several regions at once. Before anything else, check whether the problem is happening everywhere, or only in one region — that single fact completely changes where you look next. A problem in only one region often points to something specific to that region: a regional database replica, a regional config value, a local network provider, or even a regional deploy that hasn't finished rolling out yet.

Is it really a bug, or just normal replication delay? In a global system, one region's copy of the data is often a few seconds behind another's. Something that looks like "the data is wrong" might just be "the data hasn't arrived here yet." Always check replication lag between regions before assuming the data itself is incorrect.

Are the clocks actually in sync? Different regions' servers can have slightly different clock times. If you're trying to figure out the order that things happened by comparing timestamps from logs in two different regions, a small clock difference can make events look like they happened in the wrong order even when they didn't. Where possible, use a trace ID to follow the request's actual path instead of trusting timestamps alone across regions.

Did this only break for users tied to a specific region's data? If accounts or data are owned by a specific home region (very common for regulatory reasons in fintech), a bug might only affect customers whose data lives in that one region's database, even though the exact same application code is running everywhere.`,
ex:`Customers in Europe report a transaction not showing up, while customers in the US see no problem. Checking replication lag shows the EU read-replica is 45 seconds behind its primary — much higher than the usual 1-2 seconds — because of a temporary network slowdown between two data centers. This isn't a code bug at all; it's a regional infrastructure issue, and the fix is investigating the network link and possibly routing that read to the primary temporarily, not searching through application code for a bug that doesn't exist there.`,
trade:[
  `Always confirm "which region(s)" before deep-diving into code — it's a 30-second check that can save hours of debugging application logic for what's actually a regional infrastructure or replication issue.`,
  `Trace IDs that follow a request across regions are far more reliable than comparing timestamps from different regions' logs, since clocks can differ slightly between regions even with time-sync services in place.`,
  `A fix that works by simply redeploying to "fix" one broken region can hide a deeper problem (like a bad regional config or a partial rollout) — confirm the actual cause before considering the incident closed, even if a redeploy or restart made the symptom go away.`
]},

// ---------------- CLOUD, CI/CD & CONTAINERS ----------------
{cat:"CC", title:"Containers & Docker", def:`A container packages up an application together with everything it needs to run — code, runtime, system libraries, configuration — into one self-contained unit that behaves the same way no matter which machine it runs on. Docker is the most widely-used tool for building and running containers.

This solves the classic "it works on my machine" problem: instead of hoping a server has the exact right version of a language runtime or library already installed, the container brings its own copy of everything it needs along with it.

A container is different from a full virtual machine — it shares the host machine's operating system kernel instead of running a whole separate guest operating system, which makes containers much lighter and faster to start than VMs.`,
ex:`A payment service that needs a specific version of a language runtime and a specific set of libraries is packaged into a Docker container. It runs identically whether it's on a developer's laptop, a staging server, or in production — no more "it worked in staging but broke in prod because the library version was different."`,
trade:[`Containers start in seconds (versus minutes for a full VM) and use far less memory/disk overhead, but they share the host's kernel, so they offer a bit less isolation between workloads than a full VM does — a genuine security consideration for multi-tenant environments handling sensitive financial data.`,`Building a good container image (small size, minimal attack surface, no unnecessary tools installed) takes real discipline — a lazily-built image can be needlessly large and carry security vulnerabilities from unused packages.`]},

{cat:"CC", title:"Container Orchestration (Kubernetes)", def:`Once you have many containers running across many machines, you need something to decide which container runs where, restart it if it crashes, scale it up or down based on load, and route traffic to it. Kubernetes is the most widely-used tool for this job — it's often described as an "operating system for your cluster of servers."

Key building blocks: a Pod is the smallest deployable unit (usually one container, sometimes a few tightly coupled ones). A Deployment describes how many copies of a Pod should be running and manages rolling out updates. A Service gives a stable network address to a group of Pods, even as individual Pods are created and destroyed.`,
ex:`A ledger service is deployed as a Kubernetes Deployment with a minimum of 5 running Pods at all times. If one Pod crashes, Kubernetes automatically starts a replacement without anyone needing to intervene. During a traffic spike, Kubernetes can automatically add more Pods (see Capacity Planning & Autoscaling), and during a deployment, it can roll out the new version gradually, pod by pod, exactly like the rolling-deployment pattern described earlier in this guide.`,
trade:[`Kubernetes gives you powerful self-healing, scaling, and rollout capabilities essentially "for free" once configured, but it has a genuinely steep learning curve and real operational overhead — running it well requires dedicated platform expertise, which is why many smaller teams start with simpler managed container services before adopting full Kubernetes.`]},

{cat:"CC", title:"CI/CD Pipelines", def:`CI (Continuous Integration) means every time someone changes code, it's automatically built and tested, so problems are caught within minutes instead of being discovered days later when several people's changes have piled up together.

CD (Continuous Delivery/Deployment) extends this further: once code passes all its automated checks, it's automatically prepared for release (Continuous Delivery) or even automatically released to production (Continuous Deployment) — without someone manually copying files to a server by hand.

A typical pipeline: code is pushed → automated tests run → a container image is built → the image is scanned for security vulnerabilities → it's deployed to a staging environment → (often) more automated tests run there → it's deployed to production, frequently using one of the zero-downtime deployment strategies covered earlier in this guide.`,
ex:`A developer pushes a change to the fraud-scoring service. The CI pipeline automatically runs the full test suite, builds a new container image, and scans it for known security vulnerabilities in its dependencies. If everything passes, the CD pipeline automatically deploys it as a canary release, watches error rates for 10 minutes, and only then rolls it out to 100% of traffic — all without a human manually running any of these steps.`,
trade:[`Automating this pipeline dramatically reduces human error (forgetting a step, deploying the wrong version) and lets teams ship far more frequently and confidently, but a pipeline with weak or slow tests gives false confidence — "the pipeline passed" is only as trustworthy as the tests and checks actually built into it.`,`For a fintech company specifically, the pipeline itself becomes part of your compliance story — auditors will often want to see that changes can't reach production without passing through automated tests and, often, a required human approval step for especially sensitive changes.`]},

{cat:"CC", title:"Infrastructure as Code (IaC)", def:`Instead of manually clicking through a cloud provider's dashboard to create servers, databases, and networking rules, you write that configuration down as code (using tools like Terraform or CloudFormation) and let a tool apply it automatically. The code becomes the single source of truth for what infrastructure should exist.`,
ex:`Instead of an engineer manually creating a new database instance through a web console for a new regional deployment (easy to make an inconsistent one-off mistake, and hard to reproduce exactly), the team writes a Terraform file describing exactly what that database should look like — its size, its backup settings, its network access rules — and applies the same file to create an identical instance in every region, with the configuration itself reviewed and version-controlled like any other code change.`,
trade:[`Makes infrastructure changes repeatable, reviewable (via the same code-review process as application code), and auditable (a git history of every infrastructure change) — extremely valuable for a regulated fintech environment where "who changed this and why" needs a real answer.`,`Has a learning curve and an upfront time investment versus just clicking around a console — but that investment pays off quickly once you need to reproduce an environment, review a change before it happens, or recover from a mistake by simply reverting the code.`]},

{cat:"CC", title:"Cloud Basics: Regions, Availability Zones & Managed Services", def:`A cloud Region is a distinct geographic location (like "US East" or "EU West") — this is the "region" referenced throughout this guide's multi-region topics. Within a region, there are usually several Availability Zones (AZs) — physically separate data centers with independent power and networking, close enough for fast connections between them, but far enough apart that one AZ's outage (a power failure, a fire) shouldn't take down another.

A Managed Service is something the cloud provider operates for you — like a managed database or managed Kubernetes — where the provider handles the underlying maintenance (patching, hardware failures, backups) so your team can focus on the application instead of the infrastructure it runs on.`,
ex:`A ledger database is deployed across 3 Availability Zones within one region, so that a single data center losing power doesn't take the whole database down — a failover to a replica in another AZ happens automatically within seconds. The team uses a managed database service rather than running their own database servers, so the cloud provider handles patching and hardware failures, freeing the team to focus on the schema and query performance instead.`,
trade:[`Spreading across multiple AZs (not just multiple regions) is a cheap, effective way to survive a single data-center-level failure without the added complexity of true multi-region architecture, and is usually a sensible default even for a single-region deployment.`,`Managed services reduce operational burden significantly, but they also mean less low-level control and, at scale, sometimes higher cost than self-managing — a real trade-off to evaluate rather than an automatic "always use managed" answer.`]},
];

/* =========================================================
   RENDER LOGIC
   ========================================================= */
const STORAGE_KEY = "fintech-guide-progress";
function getDone(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }catch(e){ return {}; }
}
function setDone(map){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(map)); }catch(e){}
}

TOPICS.forEach((t,i)=>{ t.id = t.cat + "-" + i; });

let currentId = null;
let doneMap = getDone();

function escapeHTML(str){
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function formatText(text){
  // splits on blank lines into separate <p> blocks, and single newlines into <br> within a block
  return text.split(/\n\s*\n/).map(block=>{
    return "<p>" + block.split("\n").map(line=>escapeHTML(line)).join("<br>") + "</p>";
  }).join("");
}
function formatInline(text){
  // for list items: keep on one flow but still respect explicit line breaks
  return text.split("\n").map(line=>escapeHTML(line)).join("<br>");
}

function catInfo(code){ return CATEGORIES.find(c=>c.code===code); }

function renderNav(filterText){
  const nav = document.getElementById('nav');
  const noResults = document.getElementById('no-results');
  nav.innerHTML = "";
  const q = (filterText||"").trim().toLowerCase();
  let totalShown = 0;

  CATEGORIES.forEach(cat=>{
    const topics = TOPICS.filter(t=>t.cat===cat.code);
    const matches = topics.filter(t=>{
      if(!q) return true;
      return (t.title+" "+t.def+" "+t.ex).toLowerCase().includes(q);
    });
    if(matches.length===0) return;
    totalShown += matches.length;

    const group = document.createElement('div');
    group.className = 'cat-group' + (q ? '' : '');
    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `<span class="cat-code">${cat.code}</span><span class="cat-title">${cat.name}</span><span class="cat-count">${matches.length}</span><span class="cat-chevron">▾</span>`;
    header.onclick = ()=>{ group.classList.toggle('collapsed'); };
    group.appendChild(header);

    const topicsWrap = document.createElement('div');
    topicsWrap.className = 'cat-topics';
    matches.forEach(t=>{
      const item = document.createElement('div');
      item.className = 'topic-item' + (t.id===currentId ? ' active':'') + (doneMap[t.id] ? ' done':'');
      item.innerHTML = `<span class="dot"></span><span>${highlight(t.title,q)}</span>`;
      item.onclick = ()=>selectTopic(t.id);
      topicsWrap.appendChild(item);
    });
    group.appendChild(topicsWrap);
    nav.appendChild(group);
  });

  noResults.style.display = totalShown===0 ? 'block' : 'none';
  updateProgress();
}

function highlight(text,q){
  if(!q) return text;
  const idx = text.toLowerCase().indexOf(q);
  if(idx===-1) return text;
  return text.slice(0,idx) + "<mark>" + text.slice(idx,idx+q.length) + "</mark>" + text.slice(idx+q.length);
}

function updateProgress(){
  const total = TOPICS.length;
  const done = Object.keys(doneMap).filter(k=>doneMap[k]).length;
  document.getElementById('progress-bar').style.width = (total? (done/total*100):0) + "%";
  document.getElementById('progress-label').textContent = `${done} / ${total} reviewed`;
}

function renderLanding(){
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="landing">
      <div class="code">Start here</div>
      <h1>Everything you need before the loop.</h1>
      <p class="lead">A searchable field guide covering distributed systems, concurrency, databases, reliability, and fintech-specific engineering — each topic with a definition, a concrete fintech example, and the real trade-offs.</p>
      <div class="stat-row">
        <div class="stat"><div class="num">${TOPICS.length}</div><div class="lbl">Topics</div></div>
        <div class="stat"><div class="num">${CATEGORIES.length}</div><div class="lbl">Sections</div></div>
      </div>
      <div class="tip">Tip: use the search box on the left, or click through sections. Mark topics as reviewed — progress is saved locally in your browser, so it's still here next time you open this file.</div>
    </div>`;
}

function selectTopic(id){
  currentId = id;
  const t = TOPICS.find(x=>x.id===id);
  if(!t) return;
  const cat = catInfo(t.cat);
  const idxInCat = TOPICS.filter(x=>x.cat===t.cat).findIndex(x=>x.id===id);
  const allIdx = TOPICS.findIndex(x=>x.id===id);
  const prev = TOPICS[allIdx-1];
  const next = TOPICS[allIdx+1];

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="topic-view">
      <div class="topic-header">
        <div class="breadcrumb">${cat.code}<span class="sep">/</span>${cat.name}</div>
        <h2 class="topic-title">${t.title}</h2>
        <button class="mark-done-btn ${doneMap[t.id]?'is-done':''}" id="mark-btn">${doneMap[t.id] ? '✓ Reviewed' : 'Mark as reviewed'}</button>
      </div>
      <div class="card def">
        <div class="card-label">Definition</div>
        ${formatText(t.def)}
      </div>
      <div class="card ex">
        <div class="card-label">Fintech Example</div>
        ${formatText(t.ex)}
      </div>
      <div class="card trade">
        <div class="card-label">Trade-offs</div>
        <ul>${t.trade.map(x=>`<li>${formatInline(x)}</li>`).join('')}</ul>
      </div>
      ${t.code ? `<div class="card code">
        <div class="card-label">Code Example (Go)</div>
        <pre><code>${escapeHTML(t.code)}</code></pre>
      </div>` : ''}
      <div class="nav-buttons">
        ${prev ? `<div class="nav-btn prev" id="prev-btn"><div class="dir">← Previous</div><div class="ttl">${prev.title}</div></div>` : '<div style="flex:1"></div>'}
        ${next ? `<div class="nav-btn next" id="next-btn"><div class="dir">Next →</div><div class="ttl">${next.title}</div></div>` : '<div style="flex:1"></div>'}
      </div>
    </div>`;

  document.getElementById('mark-btn').onclick = ()=>{
    doneMap[t.id] = !doneMap[t.id];
    setDone(doneMap);
    renderNav(document.getElementById('search').value);
    selectTopic(t.id);
  };
  if(prev) document.getElementById('prev-btn').onclick = ()=>selectTopic(prev.id);
  if(next) document.getElementById('next-btn').onclick = ()=>selectTopic(next.id);

  renderNav(document.getElementById('search').value);
  main.scrollTop = 0;
  if(window.innerWidth <= 860) document.getElementById('sidebar').classList.remove('open');
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

/* Search wiring */
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', (e)=>renderNav(e.target.value));
document.addEventListener('keydown', (e)=>{
  if(e.key === '/' && document.activeElement !== searchInput){
    e.preventDefault();
    searchInput.focus();
  }
  if(e.key === 'Escape'){
    searchInput.value = '';
    searchInput.blur();
    renderNav('');
  }
});

/* Soft copy-deterrent: blocks the obvious right-click-copy and ctrl+C paths.
   As noted above, this is a speed bump, not real protection — View Source,
   DevTools, and screenshots all still work regardless of this code. */
document.addEventListener('contextmenu', (e)=>{
  if(e.target.closest('.card')) e.preventDefault();
});
document.addEventListener('copy', (e)=>{
  if(e.target.closest && e.target.closest('.card')) e.preventDefault();
});

/* Theme toggle */
const THEME_KEY = "fintech-guide-theme";
function applyTheme(theme){
  if(theme === 'light'){
    document.documentElement.setAttribute('data-theme','light');
    document.getElementById('theme-toggle').textContent = '☀️ Light';
  } else {
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('theme-toggle').textContent = '🌙 Dark';
  }
}
function getInitialTheme(){
  const saved = localStorage.getItem(THEME_KEY);
  if(saved === 'light' || saved === 'dark') return saved;
  return (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
}
let currentTheme = getInitialTheme();
applyTheme(currentTheme);
document.getElementById('theme-toggle').onclick = ()=>{
  currentTheme = currentTheme === 'light' ? 'dark' : 'light';
  localStorage.setItem(THEME_KEY, currentTheme);
  applyTheme(currentTheme);
};

/* Init */
console.log('%cFintech Backend Field Guide', 'font-size:14px;font-weight:bold;color:#4ECE94;');
console.log('%cCreated by rendyspratama', 'font-size:11px;color:#9AA7B4;');
renderNav('');
renderLanding();
</script>
