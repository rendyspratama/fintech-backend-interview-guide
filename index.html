    <marker id="k8-x" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--text-faint)"/></marker>
  </defs>
</svg>`,
ex:`A ledger service is deployed as a Kubernetes Deployment with a minimum of 5 running Pods at all times. If one Pod crashes, Kubernetes automatically starts a replacement without anyone needing to intervene. During a traffic spike, Kubernetes can automatically add more Pods (see Capacity Planning & Autoscaling), and during a deployment, it can roll out the new version gradually, pod by pod, exactly like the rolling-deployment pattern described earlier in this guide.`,
trade:[`Kubernetes gives you powerful self-healing, scaling, and rollout capabilities essentially "for free" once configured, but it has a genuinely steep learning curve and real operational overhead — running it well requires dedicated platform expertise, which is why many smaller teams start with simpler managed container services before adopting full Kubernetes.`]},

{cat:"CC", title:"Liveness vs Readiness Probes", def:`Two different health checks Kubernetes (and similar orchestrators) can run against a container, answering two different questions.

Liveness probe — "is this container still alive, or has it gotten stuck/deadlocked?" If a liveness probe fails, Kubernetes assumes the container is broken beyond recovery and restarts it.

Readiness probe — "is this container ready to actually receive traffic right now?" If a readiness probe fails, Kubernetes stops sending new traffic to that specific Pod, but does NOT restart it — it just waits, and starts sending traffic again once the probe passes.

The distinction matters a lot: a container might be perfectly alive (liveness passes) but temporarily unable to serve traffic — for example, right at startup while it's still connecting to a database, or briefly overloaded and intentionally shedding load. Restarting a container in that situation (which is what would happen if this were mistakenly wired to the liveness probe instead) wouldn't fix anything and would just cause unnecessary churn.`,
diagram:`<svg viewBox="0 0 560 160" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="30" y="30" width="200" height="26" rx="5" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="130" y="47" text-anchor="middle" fill="var(--ledger)" font-size="9.5">Liveness: PASS (process running)</text>
  <rect x="30" y="65" width="200" height="26" rx="5" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)" stroke-width="2"/>
  <text x="130" y="82" text-anchor="middle" fill="var(--red)" font-size="9.5">Readiness: FAIL (still connecting to DB)</text>
  <text x="130" y="112" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">Result: no traffic routed here yet, but no restart triggered</text>

  <rect x="330" y="30" width="200" height="26" rx="5" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="430" y="47" text-anchor="middle" fill="var(--ledger)" font-size="9.5">Liveness: FAIL (deadlocked)</text>
  <rect x="330" y="65" width="200" height="26" rx="5" fill="var(--text-faint)" fill-opacity="0.12" stroke="var(--border)" stroke-width="2"/>
  <text x="430" y="82" text-anchor="middle" fill="var(--text-faint)" font-size="9.5">Readiness: irrelevant here</text>
  <text x="430" y="112" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">Result: Kubernetes restarts the container</text>
</svg>`,
ex:`A payment service takes 15 seconds at startup to establish its database connection pool. Its readiness probe fails during those 15 seconds, so Kubernetes correctly holds back traffic until it's actually ready — but its liveness probe passes the whole time, since the process itself is running fine, just not ready yet. If these were reversed (liveness tied to database connectivity), Kubernetes might repeatedly restart a perfectly healthy container that just needs a few more seconds to finish starting up.`,
trade:[`Getting these two probes conceptually confused (or pointing both at the same check) is a common, subtle Kubernetes misconfiguration — it either causes unnecessary restart loops (liveness too strict) or sends traffic to a Pod that isn't actually ready to handle it (readiness missing or too lenient).`,`A good readiness probe should check things that specifically indicate "can I serve a request right now" (like a healthy DB connection), while a good liveness probe should check the much narrower question of "is this process fundamentally stuck" — an overly broad liveness check risks unnecessary restarts for problems a restart wouldn't even fix.`]},

{cat:"CC", title:"Graceful Shutdown", def:`When an orchestrator like Kubernetes needs to stop a container (during a deployment, a scale-down, or a node replacement), it doesn't just kill the process instantly — it sends a signal (typically SIGTERM) meaning "please finish up and shut down," and only forcibly kills the process (SIGKILL) if it hasn't stopped after a grace period.

A well-behaved application listens for that SIGTERM signal and, instead of shutting down immediately, does a short, deliberate wind-down: stop accepting brand-new requests, finish any requests already in progress, close database connections cleanly, and only then actually exit.

Without this, a container shutting down abruptly can drop in-flight requests entirely — a customer's request might be halfway through processing (like partway through recording a transaction) when the process is killed, leaving things in an inconsistent state.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <line x1="30" y1="70" x2="530" y2="70" stroke="var(--border)" stroke-width="2"/>
  <circle cx="70" cy="70" r="6" fill="var(--amber)"/>
  <text x="70" y="52" text-anchor="middle" fill="var(--amber)" font-size="9.5" font-weight="600">SIGTERM received</text>
  <rect x="90" y="80" width="140" height="24" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="160" y="96" text-anchor="middle" fill="var(--ledger)" font-size="8.5">stop accepting new requests</text>
  <rect x="240" y="80" width="140" height="24" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="310" y="96" text-anchor="middle" fill="var(--ledger)" font-size="8.5">finish in-flight requests</text>
  <circle cx="440" cy="70" r="6" fill="var(--ledger)"/>
  <text x="440" y="52" text-anchor="middle" fill="var(--ledger)" font-size="9.5" font-weight="600">clean exit</text>
  <text x="440" y="115" text-anchor="middle" fill="var(--text-faint)" font-size="8">within grace period</text>
  <line x1="230" y1="130" x2="500" y2="130" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="365" y="145" text-anchor="middle" fill="var(--red)" font-size="8.5">if grace period expires first → SIGKILL, forced</text>
</svg>`,
ex:`During a rolling deployment, Kubernetes sends SIGTERM to an old Pod that's being replaced. The payment service catches this signal, immediately tells its load balancer registration to stop receiving new requests, waits for the 3 requests currently in flight to finish processing (up to a configured grace period), and only then shuts down — versus a naive implementation that exits instantly, potentially cutting off a customer's in-progress payment request mid-transaction.`,
trade:[`Implementing this properly requires the application code to actually listen for the shutdown signal and coordinate a clean wind-down — it doesn't happen automatically just because you're running in Kubernetes; the orchestrator only gives you the opportunity (the signal and a grace period), the application still has to use it correctly.`,`The grace period needs to be long enough for realistic in-flight requests to finish, but not so long that deployments become painfully slow — this is a real tuning decision, not a "set it and forget it" default.`]},

{cat:"CC", title:"CI/CD Pipelines", def:`CI (Continuous Integration) means every time someone changes code, it's automatically built and tested, so problems are caught within minutes instead of being discovered days later when several people's changes have piled up together.

CD (Continuous Delivery/Deployment) extends this further: once code passes all its automated checks, it's automatically prepared for release (Continuous Delivery) or even automatically released to production (Continuous Deployment) — without someone manually copying files to a server by hand.

A typical pipeline: code is pushed → automated tests run → a container image is built → the image is scanned for security vulnerabilities → it's deployed to a staging environment → (often) more automated tests run there → it's deployed to production, frequently using one of the zero-downtime deployment strategies covered earlier in this guide.`,
diagram:`<svg viewBox="0 0 520 120" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <g font-size="9.5" text-anchor="middle">
    <rect x="10" y="40" width="75" height="40" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
    <text x="47" y="63" fill="var(--text)">Push code</text>
    <line x1="85" y1="60" x2="105" y2="60" stroke="var(--text-faint)" marker-end="url(#ci-x)"/>

    <rect x="110" y="40" width="75" height="40" rx="5" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
    <text x="147" y="63" fill="var(--text)">Run tests</text>
    <line x1="185" y1="60" x2="205" y2="60" stroke="var(--text-faint)" marker-end="url(#ci-x)"/>

    <rect x="210" y="40" width="75" height="40" rx="5" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)"/>
    <text x="247" y="63" fill="var(--text)">Build image</text>
    <line x1="285" y1="60" x2="305" y2="60" stroke="var(--text-faint)" marker-end="url(#ci-x)"/>

    <rect x="310" y="40" width="75" height="40" rx="5" fill="var(--amber)" fill-opacity="0.18" stroke="var(--amber)"/>
    <text x="347" y="63" fill="var(--text)">Scan for vulns</text>
    <line x1="385" y1="60" x2="405" y2="60" stroke="var(--text-faint)" marker-end="url(#ci-x)"/>

    <rect x="410" y="40" width="100" height="40" rx="5" fill="var(--violet)" fill-opacity="0.18" stroke="var(--violet)"/>
    <text x="460" y="55" fill="var(--text)">Deploy</text>
    <text x="460" y="68" fill="var(--text)">(canary/blue-green)</text>
  </g>
  <text x="260" y="105" text-anchor="middle" fill="var(--text-faint)" font-size="10">Any failed step stops the pipeline before reaching production</text>
  <defs>
    <marker id="ci-x" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--text-faint)"/></marker>
  </defs>
</svg>`,
ex:`A developer pushes a change to the fraud-scoring service. The CI pipeline automatically runs the full test suite, builds a new container image, and scans it for known security vulnerabilities in its dependencies. If everything passes, the CD pipeline automatically deploys it as a canary release, watches error rates for 10 minutes, and only then rolls it out to 100% of traffic — all without a human manually running any of these steps.`,
trade:[`Automating this pipeline dramatically reduces human error (forgetting a step, deploying the wrong version) and lets teams ship far more frequently and confidently, but a pipeline with weak or slow tests gives false confidence — "the pipeline passed" is only as trustworthy as the tests and checks actually built into it.`,`For a fintech company specifically, the pipeline itself becomes part of your compliance story — auditors will often want to see that changes can't reach production without passing through automated tests and, often, a required human approval step for especially sensitive changes.`]},

{cat:"CC", title:"Infrastructure as Code (IaC)", def:`Instead of manually clicking through a cloud provider's dashboard to create servers, databases, and networking rules, you write that configuration down as code (using tools like Terraform or CloudFormation) and let a tool apply it automatically. The code becomes the single source of truth for what infrastructure should exist.`,

  <defs>
    <marker id="iacArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker>
    <marker id="iacArrow3" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker>
    <marker id="iacArrow4" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker>
  </defs>
  <rect x="405" y="18" width="130" height="22" rx="4" fill="var(--panel)" stroke="var(--border)"/>
  <text x="470" y="33" text-anchor="middle" fill="var(--text-dim)" font-size="7.5">DB (US region)</text>
  <rect x="405" y="44" width="130" height="22" rx="4" fill="var(--panel)" stroke="var(--border)"/>
  <text x="470" y="59" text-anchor="middle" fill="var(--text-dim)" font-size="7.5">DB (EU region, identical)</text>
  <rect x="405" y="70" width="130" height="22" rx="4" fill="var(--panel)" stroke="var(--border)"/>
  <text x="470" y="85" text-anchor="middle" fill="var(--text-dim)" font-size="7.5">Network rules</text>
  <text x="280" y="120" text-anchor="middle" fill="var(--text-faint)" font-size="9">Same file reproduces identical infrastructure — no manual console drift between regions</text>
</svg>`,
ex:`Instead of an engineer manually creating a new database instance through a web console for a new regional deployment (easy to make an inconsistent one-off mistake, and hard to reproduce exactly), the team writes a Terraform file describing exactly what that database should look like — its size, its backup settings, its network access rules — and applies the same file to create an identical instance in every region, with the configuration itself reviewed and version-controlled like any other code change.`,
trade:[`Makes infrastructure changes repeatable, reviewable (via the same code-review process as application code), and auditable (a git history of every infrastructure change) — extremely valuable for a regulated fintech environment where "who changed this and why" needs a real answer.`,`Has a learning curve and an upfront time investment versus just clicking around a console — but that investment pays off quickly once you need to reproduce an environment, review a change before it happens, or recover from a mistake by simply reverting the code.`]},

{cat:"CC", title:"Cloud Basics: Regions, Availability Zones & Managed Services", def:`A cloud Region is a distinct geographic location (like "US East" or "EU West") — this is the "region" referenced throughout this guide's multi-region topics. Within a region, there are usually several Availability Zones (AZs) — physically separate data centers with independent power and networking, close enough for fast connections between them, but far enough apart that one AZ's outage (a power failure, a fire) shouldn't take down another.

A Managed Service is something the cloud provider operates for you — like a managed database or managed Kubernetes — where the provider handles the underlying maintenance (patching, hardware failures, backups) so your team can focus on the application instead of the infrastructure it runs on.`,
diagram:`<svg viewBox="0 0 460 170" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="20" width="420" height="130" rx="10" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="230" y="15" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Region: US-East</text>

  <rect x="45" y="45" width="110" height="80" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="100" y="70" text-anchor="middle" fill="var(--text)" font-size="10" font-weight="600">AZ-1</text>
  <text x="100" y="90" text-anchor="middle" fill="var(--text-dim)" font-size="9">DB primary</text>

  <rect x="175" y="45" width="110" height="80" rx="6" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)" stroke-width="2"/>
  <text x="230" y="70" text-anchor="middle" fill="var(--text)" font-size="10" font-weight="600">AZ-2</text>
  <text x="230" y="90" text-anchor="middle" fill="var(--text-dim)" font-size="9">DB replica</text>

  <rect x="305" y="45" width="110" height="80" rx="6" fill="var(--amber)" fill-opacity="0.18" stroke="var(--amber)" stroke-width="2"/>
  <text x="360" y="70" text-anchor="middle" fill="var(--text)" font-size="10" font-weight="600">AZ-3</text>
  <text x="360" y="90" text-anchor="middle" fill="var(--text-dim)" font-size="9">DB replica</text>

  <text x="230" y="165" text-anchor="middle" fill="var(--text-faint)" font-size="10">One AZ losing power doesn't take down the others</text>
</svg>`,
ex:`A ledger database is deployed across 3 Availability Zones within one region, so that a single data center losing power doesn't take the whole database down — a failover to a replica in another AZ happens automatically within seconds. The team uses a managed database service rather than running their own database servers, so the cloud provider handles patching and hardware failures, freeing the team to focus on the schema and query performance instead.`,
trade:[`Spreading across multiple AZs (not just multiple regions) is a cheap, effective way to survive a single data-center-level failure without the added complexity of true multi-region architecture, and is usually a sensible default even for a single-region deployment.`,`Managed services reduce operational burden significantly, but they also mean less low-level control and, at scale, sometimes higher cost than self-managing — a real trade-off to evaluate rather than an automatic "always use managed" answer.`]},

{cat:"CC", title:"Serverless / FaaS (Function as a Service)", def:`Instead of running a container or server that's always on and waiting for requests, you deploy just a function, and the cloud provider (AWS Lambda, Google Cloud Functions, and similar) runs it only when actually triggered — automatically handling all the scaling, and you're typically billed only for the actual time your code runs, not for idle capacity sitting around waiting.

A "cold start" is the extra latency the very first request pays when the provider has to spin up a fresh instance of your function from scratch (loading your code, initializing any connections) before it can actually run — subsequent requests, if they reuse that already-warm instance, skip this cost.

Because the provider can spin up (or throw away) any number of instances of your function at any time, serverless functions need to be built statelessly (see the Stateless vs Stateful topic) — you can't rely on anything staying in memory between invocations, since the very next request might be handled by a completely fresh, unrelated instance.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <circle cx="60" cy="60" r="8" fill="var(--amber)"/>
  <text x="60" y="42" text-anchor="middle" fill="var(--amber)" font-size="9" font-weight="600">Trigger</text>
  <line x1="70" y1="60" x2="150" y2="60" stroke="var(--red)" stroke-width="2" marker-end="url(#faasArrow)"/>
  <defs><marker id="faasArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--red)"/></marker></defs>
  <rect x="155" y="40" width="140" height="40" rx="6" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)" stroke-width="2"/>
  <text x="225" y="58" text-anchor="middle" fill="var(--red)" font-size="8.5">cold start:</text>
  <text x="225" y="72" text-anchor="middle" fill="var(--red)" font-size="8.5">spin up fresh instance</text>

  <line x1="60" y1="100" x2="150" y2="100" stroke="var(--ledger)" stroke-width="2" marker-end="url(#faasArrow2)"/>
  <defs><marker id="faasArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ledger)"/></marker></defs>
  <text x="60" y="118" text-anchor="middle" fill="var(--text-dim)" font-size="8">Next trigger</text>
  <rect x="155" y="90" width="140" height="30" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="225" y="109" text-anchor="middle" fill="var(--ledger)" font-size="8.5">warm instance reused — fast</text>

  <text x="450" y="65" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">No memory carries over</text>
  <text x="450" y="80" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">between different instances</text>
</svg>`,
ex:`A function that processes an uploaded receipt image and extracts the transaction amount is a good serverless fit — it runs occasionally, in short bursts, and doesn't need to be "always on" waiting around between uploads. But this same serverless model is exactly what creates the connection-pooling exhaustion problem covered earlier in this guide — a sudden burst of uploads can spin up hundreds of function instances almost instantly, each potentially trying to open its own fresh database connection at the same time.`,
trade:[`Serverless removes a lot of operational burden (no servers to patch, automatic scaling, pay-per-use) and is a great fit for bursty, infrequent, or event-driven workloads, but cold starts add unpredictable latency that can be a real problem for latency-sensitive request paths, and the stateless requirement means you can't rely on the simple in-memory patterns (local caching, connection reuse across requests) that a long-running server could.`,`Not a universal replacement for traditional servers or containers — a service handling constant, high, predictable traffic often runs more cost-effectively and predictably on always-on containers (covered earlier) than as serverless functions.`]},

{cat:"CC", title:"Service Mesh", def:`Once you have many microservices all calling each other, a lot of cross-cutting concerns come up repeatedly for every single service: encrypting traffic between services (mTLS, covered in the Security section), retrying failed calls, load balancing between instances, and collecting observability data about every call. A service mesh handles all of this at the infrastructure level, outside your application code, instead of every team having to implement it themselves inside every service.

The common implementation approach: a small proxy (called a "sidecar") is deployed alongside every single service instance, and all network traffic in and out of that service actually passes through its sidecar first. The sidecars handle the mTLS encryption, retries, and traffic routing, and report metrics/traces centrally — meaning your actual application code can stay focused purely on business logic, with the mesh transparently handling the networking concerns around it.`,
diagram:`<svg viewBox="0 0 460 160" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="30" y="40" width="140" height="80" rx="8" fill="none" stroke="var(--border)" stroke-width="2"/>
  <rect x="45" y="55" width="70" height="50" rx="5" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="80" y="84" text-anchor="middle" fill="var(--text)" font-size="10">Service A</text>
  <rect x="120" y="55" width="35" height="50" rx="5" fill="var(--amber)" fill-opacity="0.25" stroke="var(--amber)" stroke-width="2"/>
  <text x="137" y="84" text-anchor="middle" fill="var(--text)" font-size="8" font-weight="600">side-</text>
  <text x="137" y="94" text-anchor="middle" fill="var(--text)" font-size="8" font-weight="600">car</text>

  <line x1="170" y1="80" x2="260" y2="80" stroke="var(--amber)" stroke-width="2" marker-end="url(#sm-a)"/>
  <text x="215" y="70" text-anchor="middle" fill="var(--amber)" font-size="9" font-weight="600">mTLS + retries</text>

  <rect x="260" y="40" width="140" height="80" rx="8" fill="none" stroke="var(--border)" stroke-width="2"/>
  <rect x="325" y="55" width="70" height="50" rx="5" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="360" y="84" text-anchor="middle" fill="var(--text)" font-size="10">Service B</text>
  <rect x="270" y="55" width="35" height="50" rx="5" fill="var(--amber)" fill-opacity="0.25" stroke="var(--amber)" stroke-width="2"/>
  <text x="287" y="84" text-anchor="middle" fill="var(--text)" font-size="8" font-weight="600">side-</text>
  <text x="287" y="94" text-anchor="middle" fill="var(--text)" font-size="8" font-weight="600">car</text>

  <text x="215" y="145" text-anchor="middle" fill="var(--text-faint)" font-size="10.5">App code never talks directly — sidecars handle it transparently</text>

  <defs>
    <marker id="sm-a" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--amber)"/></marker>
  </defs>
</svg>`,
ex:`A company running 50 microservices adopts a service mesh (like Istio or Linkerd) so that every service automatically gets mTLS encryption between services, automatic retries on failed calls, and consistent request tracing — all without any individual team having to write that logic themselves inside their own service's code. When the security team wants to enforce "every service must use mTLS," they configure this once at the mesh level, rather than needing every one of the 50 teams to implement it independently and correctly.`,
trade:[`Centralizes a lot of genuinely hard, easy-to-get-wrong cross-cutting concerns (mTLS, retries, observability) outside individual application code, which is a real win for consistency across many services and teams — but it adds a real operational and performance cost (every request now passes through an extra sidecar proxy hop) and a genuinely steep learning curve, similar to the trade-off already discussed for Kubernetes itself.`,`Usually only worth adopting once you have enough microservices that the cost of each team reimplementing these concerns independently clearly outweighs the mesh's own operational complexity — it's not a default choice for a small number of services.`]},

{cat:"CC", title:"Blue-Green vs Canary Deployment", def:`Zero-Downtime Deployment (covered elsewhere) describes the general goal — never taking the service offline to release new code. Blue-green and canary are two different concrete strategies for actually achieving it, and they make very different trade-offs between safety and cost.

Blue-green deployment — you run two complete, identical production environments ("blue" and "green"). Only one serves live traffic at a time. To release, you deploy the new version to the idle environment, verify it, then flip a router or load balancer to send all traffic to it instantly. Rolling back is just as instant: flip back to the other environment.

Canary deployment — instead of an instant all-or-nothing switch, the new version is rolled out to a small slice of real traffic first (say, 5%), monitored closely, and only gradually expanded to 100% if it looks healthy. A problem is caught while it's only affecting a small fraction of users, not everyone at once.`,
diagram:`<svg viewBox="0 0 620 200" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="150" y="20" text-anchor="middle" fill="var(--text-dim)" font-size="12" font-weight="600">Blue-Green — instant full switch</text>
  <rect x="30" y="40" width="110" height="50" rx="6" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)" stroke-width="2"/>
  <text x="85" y="62" text-anchor="middle" fill="var(--ledger)" font-size="10" font-weight="600">Blue (live)</text>
  <text x="85" y="76" text-anchor="middle" fill="var(--text-dim)" font-size="8">100% traffic</text>
  <rect x="170" y="40" width="110" height="50" rx="6" fill="var(--panel)" stroke="var(--border)" stroke-dasharray="4 3"/>
  <text x="225" y="62" text-anchor="middle" fill="var(--text-dim)" font-size="10">Green (idle)</text>
  <text x="225" y="76" text-anchor="middle" fill="var(--text-faint)" font-size="8">new version, 0%</text>
  <text x="150" y="112" text-anchor="middle" fill="var(--text-faint)" font-size="10">router flips 100% → Green, instantly, all at once</text>

  <text x="470" y="20" text-anchor="middle" fill="var(--text-dim)" font-size="12" font-weight="600">Canary — gradual ramp</text>
  <rect x="340" y="40" width="90" height="26" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="385" y="58" text-anchor="middle" fill="var(--text-dim)" font-size="8.5">old: 95%</text>
  <rect x="340" y="70" width="90" height="20" fill="var(--amber)" fill-opacity="0.3" stroke="var(--amber)"/>
  <text x="385" y="84" text-anchor="middle" fill="var(--amber)" font-size="8.5">new: 5%</text>
  <line x1="440" y1="60" x2="470" y2="60" stroke="var(--text-faint)" stroke-width="2" marker-end="url(#cgArrow)"/>
  <rect x="480" y="40" width="90" height="14" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="525" y="50" text-anchor="middle" fill="var(--text-dim)" font-size="7.5">old: 50%</text>
  <rect x="480" y="56" width="90" height="14" fill="var(--amber)" fill-opacity="0.3" stroke="var(--amber)"/>
  <text x="525" y="66" text-anchor="middle" fill="var(--amber)" font-size="7.5">new: 50%</text>
  <text x="470" y="112" text-anchor="middle" fill="var(--text-faint)" font-size="10">expands only if metrics stay healthy at each step</text>
  <defs><marker id="cgArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--text-faint)"/></marker></defs>
</svg>`,
ex:`A payments API uses canary deployment for a new fraud-scoring model: it's routed to 2% of live traffic first, its decisions are compared against the existing model's for a day, and only expanded to 100% once the metrics confirm it isn't flagging legitimate transactions at a higher rate than the old model — a mistake here caught at 2% instead of 100% is the entire point.`,
trade:[`Blue-green gives an instant, simple rollback (flip the router back) but requires paying for two full production-sized environments simultaneously during the switch, and a bad release still affects 100% of traffic the moment it's flipped — there's no partial-exposure safety net.`,`Canary limits the blast radius of a bad release far better than blue-green, but it's operationally more complex (you need real traffic-splitting infrastructure and metrics that can reliably distinguish "the new version is unhealthy" from normal noise at a small sample size), and a slow ramp means a bad release still affects some real users before being caught.`]},

{cat:"CC", title:"Feature Flags", def:`A feature flag is a runtime switch that turns a piece of functionality on or off (or routes it to a subset of users) without deploying new code — the code for both the old and new behavior already exists in production, and the flag just decides which path actually runs for a given request.

This decouples two things that deployment alone conflates: *shipping* code (getting it running in production) and *releasing* a feature (actually turning it on for users). New code can be deployed dark — running in production, flag off, doing nothing — well before the team is ready for users to see it, which removes deployment-day risk from the release decision.

Flags are also the mechanism that makes canary deployments and gradual rollouts practical at the feature level (as opposed to the whole-service level): a flag can be turned on for 1% of users, then 10%, then 100%, and instantly flipped back off if something looks wrong — no redeploy or rollback needed.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="90" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10" font-weight="600">Deployed dark</text>
  <rect x="20" y="30" width="140" height="30" rx="5" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="90" y="50" text-anchor="middle" fill="var(--text-dim)" font-size="9">flag OFF, code live, 0% users</text>

  <line x1="160" y1="45" x2="220" y2="45" stroke="var(--border)" stroke-width="2" marker-end="url(#ffArrow)"/>
  <defs><marker id="ffArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>

  <text x="300" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10" font-weight="600">Gradual ramp</text>
  <rect x="220" y="30" width="160" height="30" rx="5" fill="var(--amber)" fill-opacity="0.18" stroke="var(--amber)" stroke-width="2"/>
  <text x="300" y="50" text-anchor="middle" fill="var(--amber)" font-size="9">1% → 10% → 100%</text>

  <line x1="380" y1="45" x2="440" y2="45" stroke="var(--border)" stroke-width="2" marker-end="url(#ffArrow2)"/>
  <defs><marker id="ffArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>

  <text x="490" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10" font-weight="600">Fully released</text>
  <rect x="440" y="30" width="100" height="30" rx="5" fill="var(--ledger)" fill-opacity="0.18" stroke="var(--ledger)" stroke-width="2"/>
  <text x="490" y="50" text-anchor="middle" fill="var(--ledger)" font-size="9">100% users</text>

  <line x1="300" y1="60" x2="300" y2="90" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#ffArrow3)"/>
  <defs><marker id="ffArrow3" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--red)"/></marker></defs>
  <text x="300" y="105" text-anchor="middle" fill="var(--red)" font-size="8.5">flip back to 0% instantly — no redeploy needed</text>

  <text x="280" y="135" text-anchor="middle" fill="var(--text-faint)" font-size="9">Shipping code and releasing a feature become two separate, independent decisions.</text>
</svg>`,
ex:`A new interest-calculation engine is deployed behind a flag, dark, for two weeks while the team validates its output against the old engine on internal accounts only. When confident, the flag is turned on for 1% of real customer accounts, watched closely, then ramped to 100% — and if a discrepancy is found at any point, the flag is flipped back off instantly, with no deploy or rollback required.`,
trade:[`Decouples release timing from deploy timing and enables instant, redeploy-free rollback, but every long-lived flag is genuinely two code paths that both need to keep working and both need test coverage — flags that are never cleaned up after the feature fully ships become permanent complexity and a real source of confusing, hard-to-reason-about behavior.`,`Flag state itself becomes a dependency the system relies on at request time (usually fetched from a flag service or cache) — if that flag service is slow or unavailable, the fallback behavior it defaults to needs to be deliberately chosen, not accidental, since "flag service down" now has to be treated as its own real failure mode.`]},
];

/* =========================================================
   RENDER LOGIC
   ========================================================= */
const STORAGE_KEY = "fintech-guide-progress";
function getDone(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }catch(e){ return {}; }
}
function setDone(map){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(map)); }catch(e){}
}

TOPICS.forEach((t,i)=>{ t.id = t.cat + "-" + i; });

let currentId = null;
let doneMap = getDone();

function escapeHTML(str){
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function formatText(text){
  // splits on blank lines into separate <p> blocks, and single newlines into <br> within a block
  return text.split(/\n\s*\n/).map(block=>{
    return "<p>" + block.split("\n").map(line=>escapeHTML(line)).join("<br>") + "</p>";
  }).join("");
}
function formatInline(text){
  // for list items: keep on one flow but still respect explicit line breaks
  return text.split("\n").map(line=>escapeHTML(line)).join("<br>");
}

function catInfo(code){ return CATEGORIES.find(c=>c.code===code); }

function renderNav(filterText){
  const nav = document.getElementById('nav');
  const noResults = document.getElementById('no-results');
  nav.innerHTML = "";
  const q = (filterText||"").trim().toLowerCase();
  let totalShown = 0;

  CATEGORIES.forEach(cat=>{
    const topics = TOPICS.filter(t=>t.cat===cat.code);
    const matches = topics.filter(t=>{
      if(!q) return true;
      return (t.title+" "+t.def+" "+t.ex).toLowerCase().includes(q);
    });
    if(matches.length===0) return;
    totalShown += matches.length;

    const group = document.createElement('div');
    group.className = 'cat-group' + (q ? '' : '');
    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `<span class="cat-code">${cat.code}</span><span class="cat-title">${cat.name}</span><span class="cat-count">${matches.length}</span><span class="cat-chevron">▾</span>`;
    header.onclick = ()=>{ group.classList.toggle('collapsed'); };
    group.appendChild(header);

    const topicsWrap = document.createElement('div');
    topicsWrap.className = 'cat-topics';
    matches.forEach(t=>{
      const item = document.createElement('div');
      item.className = 'topic-item' + (t.id===currentId ? ' active':'') + (doneMap[t.id] ? ' done':'');
      item.innerHTML = `<span class="dot"></span><span>${highlight(t.title,q)}</span>`;
      item.onclick = ()=>selectTopic(t.id);
      topicsWrap.appendChild(item);
    });
    group.appendChild(topicsWrap);
    nav.appendChild(group);
  });

  noResults.style.display = totalShown===0 ? 'block' : 'none';
  updateProgress();
}

function highlight(text,q){
  if(!q) return text;
  const idx = text.toLowerCase().indexOf(q);
  if(idx===-1) return text;
  return text.slice(0,idx) + "<mark>" + text.slice(idx,idx+q.length) + "</mark>" + text.slice(idx+q.length);
}

function updateProgress(){
  const total = TOPICS.length;
  const done = Object.keys(doneMap).filter(k=>doneMap[k]).length;
  document.getElementById('progress-bar').style.width = (total? (done/total*100):0) + "%";
  document.getElementById('progress-label').textContent = `${done} / ${total} reviewed`;
}

function renderCoverageMap(){
  const counts = CATEGORIES.map(c => ({...c, count: TOPICS.filter(t=>t.cat===c.code).length}));
  const maxCount = Math.max(...counts.map(c=>c.count));
  const rows = counts.map(c => {
    const pct = ((c.count / maxCount) * 100).toFixed(1);
    return `<div class="cov-row" onclick="jumpToCategory('${c.code}')">
      <div class="cov-label">
        <span class="cov-code">${c.code}</span>
        <span class="cov-name">${escapeHTML(c.name)}</span>
      </div>
      <div class="cov-bar-track">
        <div class="cov-bar-fill" style="width:${pct}%"></div>
      </div>
      <div class="cov-count">${c.count}</div>
    </div>`;
  }).join('');
  return `<div class="cov-list">${rows}</div>`;
}

function jumpToCategory(code){
  const topic = TOPICS.find(t=>t.cat===code);
  if(topic) selectTopic(topic.id);
}

function renderLanding(){
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="landing">
      <div class="code">Start here</div>
      <h1>Everything you need before the loop.</h1>
      <p class="lead">A searchable field guide covering distributed systems, concurrency, databases, reliability, and fintech-specific engineering — each topic with a definition, a concrete fintech example, and the real trade-offs.</p>
      <div class="stat-row">
        <div class="stat"><div class="num">${TOPICS.length}</div><div class="lbl">Topics</div></div>
        <div class="stat"><div class="num">${CATEGORIES.length}</div><div class="lbl">Sections</div></div>
      </div>
      <div class="coverage-map-wrap">
        ${renderCoverageMap()}
        <p class="coverage-caption">Every section, sized by how many topics it holds. Click any row to jump straight in.</p>
      </div>
      <div class="tip">Tip: use the search box on the left, or click through sections. Mark topics as reviewed — progress is saved locally in your browser, so it's still here next time you open this file.</div>

function selectTopic(id){
  currentId = id;
  const t = TOPICS.find(x=>x.id===id);
  if(!t) return;
  const cat = catInfo(t.cat);
  const idxInCat = TOPICS.filter(x=>x.cat===t.cat).findIndex(x=>x.id===id);
  const allIdx = TOPICS.findIndex(x=>x.id===id);
  const prev = TOPICS[allIdx-1];
  const next = TOPICS[allIdx+1];

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="topic-view">
      <div class="topic-header">
        <div class="breadcrumb"><span class="crumb-home" id="crumb-home">Home</span><span class="sep">/</span>${cat.code}<span class="sep">/</span>${cat.name}</div>
        <h2 class="topic-title">${t.title}</h2>
        <button class="mark-done-btn ${doneMap[t.id]?'is-done':''}" id="mark-btn">${doneMap[t.id] ? '✓ Reviewed' : 'Mark as reviewed'}</button>
      </div>
      <div class="card def">
        <div class="card-label">Definition</div>
        ${formatText(t.def)}
      </div>
      ${t.diagram ? `<div class="card diagram">
        <div class="card-label">Diagram</div>
        ${t.diagram}
      </div>` : ''}
      <div class="card ex">
        <div class="card-label">Fintech Example</div>
        ${formatText(t.ex)}
      </div>
      <div class="card trade">
        <div class="card-label">Trade-offs</div>
        <ul>${t.trade.map(x=>`<li>${formatInline(x)}</li>`).join('')}</ul>
      </div>
      ${t.code ? `<div class="card code">
        <div class="card-label">Code Example (Go)</div>
        <pre><code>${escapeHTML(t.code)}</code></pre>
      </div>` : ''}
      <div class="nav-buttons">
        ${prev ? `<div class="nav-btn prev" id="prev-btn"><div class="dir">← Previous</div><div class="ttl">${prev.title}</div></div>` : '<div style="flex:1"></div>'}
        ${next ? `<div class="nav-btn next" id="next-btn"><div class="dir">Next →</div><div class="ttl">${next.title}</div></div>` : '<div style="flex:1"></div>'}
      </div>
    </div>`;

  document.getElementById('mark-btn').onclick = ()=>{
    doneMap[t.id] = !doneMap[t.id];
    setDone(doneMap);
    renderNav(document.getElementById('search').value);
    selectTopic(t.id);
  };
  if(prev) document.getElementById('prev-btn').onclick = ()=>selectTopic(prev.id);
  if(next) document.getElementById('next-btn').onclick = ()=>selectTopic(next.id);
  document.getElementById('crumb-home').onclick = goHome;

  renderNav(document.getElementById('search').value);
  main.scrollTop = 0;
  if(window.innerWidth <= 860){
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }
}

function goHome(){
  currentId = null;
  renderLanding();
  renderNav(document.getElementById('search').value);
  document.getElementById('main').scrollTop = 0;
  if(window.innerWidth <= 860){
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

/* Search wiring */
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', (e)=>renderNav(e.target.value));
document.addEventListener('keydown', (e)=>{
  if(e.key === '/' && document.activeElement !== searchInput){
    e.preventDefault();
    searchInput.focus();
  }
  if(e.key === 'Escape'){
    searchInput.value = '';
    searchInput.blur();
    renderNav('');
  }
});

/* Soft copy-deterrent: blocks the obvious right-click-copy and ctrl+C paths.
   As noted above, this is a speed bump, not real protection — View Source,
   DevTools, and screenshots all still work regardless of this code. */
document.addEventListener('contextmenu', (e)=>{
  if(e.target.closest('.card')) e.preventDefault();
});
document.addEventListener('copy', (e)=>{
  if(e.target.closest && e.target.closest('.card')) e.preventDefault();
});

/* Theme toggle */
const THEME_KEY = "fintech-guide-theme";
function applyTheme(theme){
  if(theme === 'light'){
    document.documentElement.setAttribute('data-theme','light');
    document.getElementById('theme-toggle').textContent = '☀️ Light';
  } else {
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('theme-toggle').textContent = '🌙 Dark';
  }
}
function getInitialTheme(){
  const saved = localStorage.getItem(THEME_KEY);
  if(saved === 'light' || saved === 'dark') return saved;
  return (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
}
let currentTheme = getInitialTheme();
applyTheme(currentTheme);
document.getElementById('theme-toggle').onclick = ()=>{
  currentTheme = currentTheme === 'light' ? 'dark' : 'light';
  localStorage.setItem(THEME_KEY, currentTheme);
  applyTheme(currentTheme);
};
