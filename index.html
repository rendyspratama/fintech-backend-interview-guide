trade:[`Stronger models are easier to reason about but cost latency/availability; weaker models scale better but push complexity onto the application to handle "surprising" read results.`,`Different parts of the same product can and should use different consistency models — balance reads need strong consistency, activity feeds can be eventually consistent.`]},

{cat:"DS", title:"Quorum Reads/Writes (N, R, W)", def:`Used in systems that keep several copies (replicas) of the same data.

N is how many total copies of the data exist.

W is how many copies must confirm a write before it's considered successful.

R is how many copies get checked on a read, using whichever one has the newest value.

The rule to remember: if W + R is greater than N, a read is mathematically guaranteed to overlap with the most recent write, so you always get fresh data. If W + R is not greater than N, reads might miss the latest write and return something slightly stale — but writes and reads both complete faster.`,
diagram:`<svg viewBox="0 0 480 220" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="240" y="20" text-anchor="middle" fill="var(--text-dim)" font-size="12" font-weight="600">N = 3 replicas · W = 2 · R = 2 → W+R = 4 &gt; N (guaranteed overlap)</text>
  <rect x="40" y="50" width="120" height="70" rx="8" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="100" y="90" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="600">Replica 1</text>
  <rect x="180" y="50" width="120" height="70" rx="8" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="240" y="90" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="600">Replica 2</text>
  <rect x="320" y="50" width="120" height="70" rx="8" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="380" y="90" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="600">Replica 3</text>

  <text x="170" y="150" text-anchor="middle" fill="var(--ledger)" font-size="12" font-weight="600">← W=2 writes here</text>
  <text x="240" y="175" text-anchor="middle" fill="var(--blue)" font-size="12" font-weight="600">R=2 reads here (overlaps at least 1 written replica) →</text>
  <rect x="180" y="50" width="120" height="70" rx="8" fill="var(--blue)" fill-opacity="0.15" stroke="var(--blue)" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="40" y="50" width="120" height="70" rx="8" fill="none" stroke="var(--blue)" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="240" y="200" text-anchor="middle" fill="var(--text-faint)" font-size="11">Replica 2 is guaranteed to be in both the write set and the read set</text>
</svg>`,
ex:`A Dynamo-style leaderless datastore with N=3 replicas might use W=2, R=2 (W+R=4 > N=3) to guarantee every read sees the latest committed write for account metadata, while a less critical dataset might use W=1, R=1 for lower latency at the cost of possibly reading stale data.`,
trade:[`Tuning N/R/W lets you trade consistency for latency/availability per use case without changing the underlying system — a powerful knob, but easy to misconfigure (e.g., picking W+R ≤ N for data that actually needs strong consistency).`]},

{cat:"DS", title:"Split-Brain", def:`A failure mode where a network partition causes a cluster to divide into two (or more) groups that each believe they're the legitimate leader/primary, potentially both accepting writes independently — leading to conflicting, hard-to-reconcile state.`,
diagram:`<svg viewBox="0 0 480 220" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="40" width="180" height="140" rx="8" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="110" y="30" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Side A</text>
  <circle cx="110" cy="90" r="24" fill="var(--red)" fill-opacity="0.2" stroke="var(--red)" stroke-width="2"/>
  <text x="110" y="95" text-anchor="middle" fill="var(--text)" font-size="10" font-weight="700">"I'm leader"</text>
  <circle cx="65" cy="150" r="16" fill="var(--panel-2)" stroke="var(--border)"/>
  <circle cx="155" cy="150" r="16" fill="var(--panel-2)" stroke="var(--border)"/>

  <path d="M200,110 L280,110" stroke="var(--red)" stroke-width="3" stroke-dasharray="6,4"/>
  <text x="240" y="100" text-anchor="middle" fill="var(--red)" font-size="10" font-weight="700">✗ partition</text>

  <rect x="280" y="40" width="180" height="140" rx="8" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="370" y="30" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Side B</text>
  <circle cx="370" cy="90" r="24" fill="var(--red)" fill-opacity="0.2" stroke="var(--red)" stroke-width="2"/>
  <text x="370" y="95" text-anchor="middle" fill="var(--text)" font-size="10" font-weight="700">"I'm leader"</text>
  <circle cx="325" cy="150" r="16" fill="var(--panel-2)" stroke="var(--border)"/>
  <circle cx="415" cy="150" r="16" fill="var(--panel-2)" stroke="var(--border)"/>

  <text x="240" y="205" text-anchor="middle" fill="var(--red)" font-size="11" font-weight="600">Both sides accept writes independently — conflicting state on both</text>
</svg>`,
ex:`A database cluster's primary is isolated by a network partition; the remaining nodes elect a new primary and keep accepting writes. If the original primary doesn't step down (because it doesn't know it's partitioned) and keeps accepting writes too, you now have two "primaries" for the same ledger accepting conflicting transactions.`,
trade:[`Prevented via quorum-based leader election (a leader must be acknowledged by a majority, so only one side of a partition can ever have a majority) and fencing (forcibly cutting off a demoted leader's ability to write) — never solvable by "just add a timeout," which is a common naive first instinct.`]},

{cat:"DS", title:"Replication Strategies", def:`Three common ways to keep copies of data in sync across multiple servers.

Leader-follower (single-leader) — every write goes through one designated leader, which then copies the change to its followers. Simple, and there's never a conflict about which write "wins," but that one leader is a bottleneck and a single point of failure until a new leader takes over.

Multi-leader — more than one server can accept writes, and they copy changes to each other. This gives better write availability (useful across regions) but now two servers could accept conflicting writes to the same data at the same time, and something has to resolve that conflict.

Leaderless (Dynamo-style) — any replica can accept a write; correctness is achieved afterward using quorums (see the Quorum topic) and versioning, rather than routing everything through one designated leader.`,
diagram:`<svg viewBox="0 0 560 200" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="90" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Leader-Follower</text>
  <circle cx="90" cy="50" r="18" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="90" y="55" text-anchor="middle" fill="var(--text)" font-size="10" font-weight="700">L</text>
  <circle cx="50" cy="110" r="16" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <circle cx="90" cy="130" r="16" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <circle cx="130" cy="110" r="16" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <line x1="90" y1="68" x2="55" y2="97" stroke="var(--ledger)" stroke-width="1.5" marker-end="url(#rp-g)"/>
  <line x1="90" y1="68" x2="90" y2="114" stroke="var(--ledger)" stroke-width="1.5" marker-end="url(#rp-g)"/>
  <line x1="90" y1="68" x2="125" y2="97" stroke="var(--ledger)" stroke-width="1.5" marker-end="url(#rp-g)"/>
  <text x="90" y="165" text-anchor="middle" fill="var(--text-faint)" font-size="9.5">1 writer, many followers</text>

  <text x="270" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Multi-Leader</text>
  <circle cx="240" cy="70" r="17" fill="var(--blue)" fill-opacity="0.2" stroke="var(--blue)" stroke-width="2"/>
  <text x="240" y="75" text-anchor="middle" fill="var(--text)" font-size="10" font-weight="700">L1</text>
  <circle cx="310" cy="70" r="17" fill="var(--blue)" fill-opacity="0.2" stroke="var(--blue)" stroke-width="2"/>
  <text x="310" y="75" text-anchor="middle" fill="var(--text)" font-size="10" font-weight="700">L2</text>
  <line x1="257" y1="70" x2="293" y2="70" stroke="var(--blue)" stroke-width="1.5" marker-end="url(#rp-b)"/>
  <line x1="293" y1="80" x2="257" y2="80" stroke="var(--blue)" stroke-width="1.5" marker-end="url(#rp-b)"/>
  <text x="275" y="120" text-anchor="middle" fill="var(--amber)" font-size="9.5" font-weight="600">both accept writes —</text>
  <text x="275" y="133" text-anchor="middle" fill="var(--amber)" font-size="9.5" font-weight="600">conflicts possible</text>

  <text x="460" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Leaderless</text>
  <circle cx="430" cy="60" r="16" fill="var(--violet)" fill-opacity="0.18" stroke="var(--violet)" stroke-width="2"/>
  <circle cx="490" cy="60" r="16" fill="var(--violet)" fill-opacity="0.18" stroke="var(--violet)" stroke-width="2"/>
  <circle cx="460" cy="115" r="16" fill="var(--violet)" fill-opacity="0.18" stroke="var(--violet)" stroke-width="2"/>
  <line x1="430" y1="76" x2="460" y2="99" stroke="var(--violet)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="490" y1="76" x2="460" y2="99" stroke="var(--violet)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="430" y1="60" x2="490" y2="60" stroke="var(--violet)" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="460" y="150" text-anchor="middle" fill="var(--text-faint)" font-size="9.5">any node accepts writes,</text>
  <text x="460" y="163" text-anchor="middle" fill="var(--text-faint)" font-size="9.5">reconciled via quorum</text>

  <defs>
    <marker id="rp-g" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--ledger)"/></marker>
    <marker id="rp-b" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--blue)"/></marker>
  </defs>
</svg>`,
ex:`A single-region ledger uses leader-follower replication (simple, strongly consistent). A globally distributed shopping cart service might use multi-leader replication across regions for low local write latency, accepting that concurrent edits to the same cart need conflict resolution (e.g., "last write wins" or merge logic).`,
trade:[`Leader-follower is simplest and safest for data needing strong consistency, but write throughput and write availability are bounded by a single node.`,`Multi-leader and leaderless designs scale write availability globally, but push real conflict-resolution complexity onto the application — rarely worth it for core financial ledgers, often worth it for less critical, high-write-volume data.`]},

{cat:"DS", title:"Distributed Locks & Fencing Tokens", def:`A distributed lock (via Redis/ZooKeeper/etcd) coordinates exclusive access across processes. A fencing token is a monotonically increasing number issued with the lock so that a "resurrected" client holding a stale lock can't corrupt state after being paused (e.g., by GC) past the lock's expiry.`,
diagram:`<svg viewBox="0 0 520 220" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <line x1="40" y1="40" x2="40" y2="200" stroke="var(--border)" stroke-width="2"/>
  <text x="40" y="25" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Client A</text>
  <line x1="480" y1="40" x2="480" y2="200" stroke="var(--border)" stroke-width="2"/>
  <text x="480" y="25" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Storage</text>

  <circle cx="40" cy="60" r="5" fill="var(--ledger)"/>
  <text x="55" y="65" fill="var(--ledger)" font-size="11">acquires lock, token = 1</text>

  <rect x="10" y="80" width="60" height="35" rx="5" fill="var(--red)" fill-opacity="0.15" stroke="var(--red)"/>
  <text x="40" y="102" text-anchor="middle" fill="var(--red)" font-size="9">GC pause…</text>

  <circle cx="40" cy="130" r="5" fill="var(--amber)"/>
  <text x="55" y="135" fill="var(--amber)" font-size="11">lock TTL expires — another client takes over, token = 2</text>

  <circle cx="40" cy="160" r="5" fill="var(--red)"/>
  <text x="55" y="165" fill="var(--red)" font-size="11">resumes, tries to write with stale token = 1</text>

  <line x1="70" y1="160" x2="465" y2="160" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#fe-r)"/>

  <text x="480" y="185" text-anchor="middle" fill="var(--ledger)" font-size="11" font-weight="600">rejects: token 1 &lt; 2</text>

  <defs>
    <marker id="fe-r" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--red)"/></marker>
  </defs>
</svg>`,
ex:`A batch job acquires a lock to process end-of-day settlement, gets paused by a long GC pause past the lock's TTL, and another instance acquires the lock and starts processing. Without a fencing token, the resumed first instance could still write, corrupting the settlement. With fencing tokens, the storage layer rejects writes carrying a stale (lower) token.`,
trade:[`Locks alone (e.g., naive Redlock) assume no pauses longer than the TTL — an assumption that fails in practice (GC pauses, VM stalls).`,`Fencing tokens require the *storage layer* to check and reject stale tokens — locking alone at the application layer isn't sufficient protection.`]},

{cat:"DS", title:"Gossip Protocols", def:`A way for nodes in a large cluster to spread information (like "which nodes are alive," or configuration updates) to each other without needing a central coordinator to tell everyone directly. Each node periodically picks a few random other nodes and shares what it currently knows; those nodes then do the same with a few more random nodes, and so on. Within a small number of rounds, information spreads to the entire cluster — the same way a rumor spreads through a group of people, which is where the name comes from.

This scales very well to large clusters, since no single node needs to talk to every other node directly (which would get expensive fast as cluster size grows) — each node only ever needs to talk to a small, random handful of others each round.`,
diagram:`<svg viewBox="0 0 560 220" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="90" y="20" text-anchor="middle" fill="var(--text-dim)" font-size="12" font-weight="600">Round 1</text>
  <text x="270" y="20" text-anchor="middle" fill="var(--text-dim)" font-size="12" font-weight="600">Round 2</text>
  <text x="450" y="20" text-anchor="middle" fill="var(--text-dim)" font-size="12" font-weight="600">Round 3</text>

  <g>
    <circle cx="90" cy="50" r="9" fill="var(--ledger)"/>
    <circle cx="126" cy="66" r="9" fill="var(--panel-2)" stroke="var(--border)" stroke-width="1.5"/>
    <circle cx="140" cy="100" r="9" fill="var(--panel-2)" stroke="var(--border)" stroke-width="1.5"/>
    <circle cx="126" cy="134" r="9" fill="var(--panel-2)" stroke="var(--border)" stroke-width="1.5"/>
    <circle cx="90" cy="150" r="9" fill="var(--panel-2)" stroke="var(--border)" stroke-width="1.5"/>
    <circle cx="54" cy="134" r="9" fill="var(--panel-2)" stroke="var(--border)" stroke-width="1.5"/>
    <circle cx="40" cy="100" r="9" fill="var(--panel-2)" stroke="var(--border)" stroke-width="1.5"/>
    <circle cx="54" cy="66" r="9" fill="var(--panel-2)" stroke="var(--border)" stroke-width="1.5"/>
    <text x="90" y="180" text-anchor="middle" fill="var(--text-faint)" font-size="10">1 of 8 nodes knows</text>
  </g>

  <g>
    <circle cx="270" cy="50" r="9" fill="var(--ledger)"/>
    <circle cx="306" cy="66" r="9" fill="var(--panel-2)" stroke="var(--border)" stroke-width="1.5"/>
    <circle cx="320" cy="100" r="9" fill="var(--ledger)"/>
    <circle cx="306" cy="134" r="9" fill="var(--panel-2)" stroke="var(--border)" stroke-width="1.5"/>
    <circle cx="270" cy="150" r="9" fill="var(--panel-2)" stroke="var(--border)" stroke-width="1.5"/>
    <circle cx="234" cy="134" r="9" fill="var(--ledger)"/>
    <circle cx="220" cy="100" r="9" fill="var(--panel-2)" stroke="var(--border)" stroke-width="1.5"/>
    <circle cx="234" cy="66" r="9" fill="var(--panel-2)" stroke="var(--border)" stroke-width="1.5"/>
    <line x1="270" y1="50" x2="320" y2="100" stroke="var(--ledger)" stroke-width="1.5" stroke-dasharray="3,3"/>
    <line x1="270" y1="50" x2="234" y2="134" stroke="var(--ledger)" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="270" y="180" text-anchor="middle" fill="var(--text-faint)" font-size="10">3 of 8 nodes know</text>
  </g>

  <g>
    <circle cx="450" cy="50" r="9" fill="var(--ledger)"/>
    <circle cx="486" cy="66" r="9" fill="var(--ledger)"/>
    <circle cx="500" cy="100" r="9" fill="var(--ledger)"/>
    <circle cx="486" cy="134" r="9" fill="var(--ledger)"/>
    <circle cx="450" cy="150" r="9" fill="var(--ledger)"/>
    <circle cx="414" cy="134" r="9" fill="var(--ledger)"/>
    <circle cx="400" cy="100" r="9" fill="var(--ledger)"/>
    <circle cx="414" cy="66" r="9" fill="var(--ledger)"/>
    <text x="450" y="180" text-anchor="middle" fill="var(--ledger)" font-size="10" font-weight="600">all 8 nodes know</text>
  </g>

  <text x="280" y="210" text-anchor="middle" fill="var(--text-dim)" font-size="11">No central broadcaster — the information just spreads, round by round</text>
</svg>`,
ex:`In a large cluster of database nodes (Cassandra uses exactly this approach), when one node goes down, it doesn't need a central coordinator to broadcast "node 47 is down" to all 500 other nodes individually. Instead, the nodes that notice the failure mention it to a few random peers each round, and within a handful of rounds, the information has organically spread to the entire cluster — without any single node bearing the cost of contacting all 500 others directly.`,
trade:[`Scales gracefully to very large clusters without a central bottleneck or single point of failure for spreading state, but information takes a small, probabilistic amount of time to fully propagate (a few rounds) rather than arriving everywhere instantly — for information that must be immediately, guaranteedly consistent everywhere, a gossip protocol alone isn't the right tool; it's much better suited to things like failure detection and loose cluster membership, where "everyone finds out within a few seconds" is good enough.`]},

{cat:"DS", title:"Leader Election", def:`The process by which a group of nodes agrees on exactly one of themselves to act as "the leader" — the one node allowed to make certain decisions (like ordering writes, or coordinating a job) — without a human manually assigning the role.

This is a narrower, more specific problem than general consensus (Paxos & Raft, covered elsewhere): those algorithms are often used *to implement* leader election as one of their building blocks, but the concept of "pick exactly one coordinator right now, and detect when it's gone so someone else can take over" comes up on its own constantly, often via a dedicated coordination service (ZooKeeper, etcd, Consul) rather than a hand-rolled consensus algorithm.

The mechanism is usually built on a lease: the leader holds a time-limited lock in the coordination service and must keep renewing it before it expires. If the leader crashes or gets network-partitioned away, it stops renewing, the lease expires, and the remaining nodes race to acquire it and become the new leader.`,
diagram:`<svg viewBox="0 0 600 220" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <circle cx="120" cy="60" r="26" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)" stroke-width="2"/>
  <text x="120" y="55" text-anchor="middle" fill="var(--ledger)" font-size="10" font-weight="600">Leader</text>
  <text x="120" y="68" text-anchor="middle" fill="var(--text-dim)" font-size="8">(holds lease)</text>
  <circle cx="280" cy="60" r="22" fill="var(--panel)" stroke="var(--border)"/>
  <text x="280" y="64" text-anchor="middle" fill="var(--text-dim)" font-size="9">Follower</text>
  <circle cx="420" cy="60" r="22" fill="var(--panel)" stroke="var(--border)"/>
  <text x="420" y="64" text-anchor="middle" fill="var(--text-dim)" font-size="9">Follower</text>
  <text x="20" y="130" fill="var(--text-dim)" font-size="11">Leader crashes → stops renewing its lease before expiry.</text>
  <circle cx="120" cy="170" r="26" fill="var(--red)" fill-opacity="0.15" stroke="var(--red)" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="120" y="174" text-anchor="middle" fill="var(--red)" font-size="9">Lease expired</text>
  <circle cx="280" cy="170" r="24" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)" stroke-width="2"/>
  <text x="280" y="165" text-anchor="middle" fill="var(--ledger)" font-size="10" font-weight="600">New Leader</text>
  <text x="280" y="178" text-anchor="middle" fill="var(--text-dim)" font-size="8">(acquired lease)</text>
  <circle cx="420" cy="170" r="22" fill="var(--panel)" stroke="var(--border)"/>
  <text x="420" y="174" text-anchor="middle" fill="var(--text-dim)" font-size="9">Follower</text>
</svg>`,
ex:`In a Kafka consumer group, one consumer instance is elected "group leader" via a lease held in the cluster coordinator, responsible for assigning which partitions each consumer instance reads from. If that instance crashes, its lease expires, and a remaining instance is elected to take over partition assignment — without any manual intervention.`,
trade:[`Lease-based election means there's always a brief window, right after a real leader failure, where no leader is active (until the lease expires and a new one is elected) — systems that can't tolerate any gap need to explicitly design for that window rather than assuming leadership handoff is instant.`,`A badly-tuned lease duration is a real failure mode: too short, and a slow-but-alive leader can be wrongly declared dead and replaced (risking two nodes briefly believing they're both leader); too long, and a genuine crash takes longer than necessary to recover from.`]},

{cat:"DS", title:"CRDTs (Conflict-Free Replicated Data Types)", def:`A CRDT (Conflict-Free Replicated Data Type) is a data structure specifically designed so that when it's updated independently on multiple replicas at the same time — with no coordination between them — those replicas can always be merged back together automatically into one consistent result, with no conflicts and no need for a human or a consensus round to decide a winner.

This works because CRDTs restrict what operations are allowed to ones that are mathematically guaranteed to merge cleanly no matter what order they're applied in. A simple example: a counter that only ever increments (never decrements) can be merged across replicas just by taking the sum of each replica's increments — order doesn't matter, and there's never a conflict to resolve.

This matters most in systems that deliberately favor availability over strict consistency (see CAP Theorem, covered elsewhere) — allowing writes to happen on any replica even during a network partition, and trusting the CRDT's merge guarantee to reconcile everything once the partition heals, instead of blocking writes or picking an arbitrary "last write wins" loser.`,
diagram:`<svg viewBox="0 0 560 190" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="120" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Region A (offline)</text>
  <rect x="40" y="30" width="160" height="40" rx="6" fill="var(--panel)" stroke="var(--border)"/>
  <text x="120" y="54" text-anchor="middle" fill="var(--text)" font-size="10">local likes: +3</text>
  <text x="400" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Region B (offline)</text>
  <rect x="320" y="30" width="160" height="40" rx="6" fill="var(--panel)" stroke="var(--border)"/>
  <text x="400" y="54" text-anchor="middle" fill="var(--text)" font-size="10">local likes: +5</text>
  <text x="260" y="55" text-anchor="middle" fill="var(--red)" font-size="10" font-weight="600">✕ partition</text>

  <line x1="120" y1="70" x2="220" y2="120" stroke="var(--border)" stroke-width="1.5" marker-end="url(#crdtArrow)"/>
  <line x1="400" y1="70" x2="300" y2="120" stroke="var(--border)" stroke-width="1.5" marker-end="url(#crdtArrow)"/>
  <defs><marker id="crdtArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <rect x="180" y="122" width="160" height="44" rx="6" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)" stroke-width="2"/>
  <text x="260" y="142" text-anchor="middle" fill="var(--ledger)" font-size="10" font-weight="600">Partition heals</text>
  <text x="260" y="158" text-anchor="middle" fill="var(--ledger)" font-size="10">merge = sum(3, 5) = 8</text>
  <text x="260" y="182" text-anchor="middle" fill="var(--text-faint)" font-size="9">Order of merge doesn't matter — sum is commutative</text>
</svg>`,
ex:`A "like count" feature needs to keep working even if a region briefly loses connectivity to the rest of the cluster. Implemented as a grow-only counter CRDT (each replica tracks its own local increments), each region can keep accepting likes locally during the partition, and once connectivity returns, the counts merge into one correct total automatically — no likes are lost or double-counted.`,
trade:[`CRDTs only support a limited set of operations that are provably conflict-free (counters, sets with specific add/remove semantics, certain map structures) — they are not a general-purpose replacement for a normal data model, and forcing an arbitrary business object into a CRDT shape is often the wrong trade.`,`They're a poor fit for anything requiring a strict invariant across the whole system at all times — like an account balance that must never go negative — since a CRDT's whole point is letting replicas diverge temporarily and merge later, which is the opposite of the immediate, coordinated consistency financial balance updates usually need.`]},

// ---------------- THREAD SAFETY ----------------
{cat:"TS", title:"Race Conditions & Data Races", def:`A race condition is a bug where the outcome depends on timing/interleaving of concurrent operations. A data race specifically is when two threads access the same memory concurrently, at least one write, without synchronization.`,
diagram:`<svg viewBox="0 0 600 170" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="20" y="20" fill="var(--text-dim)" font-size="11" font-weight="600">Thread A</text>
  <text x="320" y="20" fill="var(--text-dim)" font-size="11" font-weight="600">Thread B</text>
  <line x1="20" y1="28" x2="20" y2="150" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="320" y1="28" x2="320" y2="150" stroke="var(--border)" stroke-width="1.5"/>
  <circle cx="20" cy="45" r="4" fill="var(--ledger)"/>
  <text x="34" y="49" fill="var(--text-dim)" font-size="9.5">read counter = 10</text>
  <circle cx="320" cy="65" r="4" fill="var(--ledger)"/>
  <text x="334" y="69" fill="var(--text-dim)" font-size="9.5">read counter = 10</text>
  <circle cx="20" cy="85" r="4" fill="var(--amber)"/>
  <text x="34" y="89" fill="var(--text-dim)" font-size="9.5">write counter = 11</text>
  <circle cx="320" cy="105" r="4" fill="var(--red)"/>
  <text x="334" y="109" fill="var(--red)" font-size="9.5">write counter = 11 (should be 12)</text>
  <line x1="20" y1="85" x2="320" y2="105" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="150" y="130" text-anchor="middle" fill="var(--red)" font-size="9">B never saw A's write — one increment is silently lost</text>
</svg>`,
ex:`Two threads both read an account balance of $100, both add a $20 deposit in memory, and both write back $120 — one deposit is silently lost instead of the balance being $140.`,
trade:[`Fixed via synchronization (locks, atomics) or by avoiding shared mutable state entirely (immutability, message passing).`,`Race conditions are notoriously hard to catch in testing since they depend on timing — favor design that makes them structurally impossible over relying on tests to catch them.`]},

{cat:"TS", title:"Mutex vs Semaphore vs Monitor", def:`Three tools for controlling access to shared code or data from multiple threads.

Mutex — only one thread is allowed in at a time. Everyone else waits in line.

Semaphore — like a mutex, but allows up to N threads in at once instead of just one (a "counting lock"). Useful when you want to allow some concurrency, just not unlimited concurrency.

Monitor — combines a lock with the ability for a thread to wait efficiently for a specific condition to become true (instead of constantly checking in a loop), and be woken up automatically once it does.`,
diagram:`<svg viewBox="0 0 600 190" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="90" y="20" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Mutex (1 in at a time)</text>
  <rect x="55" y="34" width="70" height="34" rx="5" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)" stroke-width="2"/>
  <text x="90" y="55" text-anchor="middle" fill="var(--ledger)" font-size="9">Thread A</text>
  <circle cx="30" cy="90" r="8" fill="var(--panel)" stroke="var(--border)"/>
  <circle cx="60" cy="90" r="8" fill="var(--panel)" stroke="var(--border)"/>
  <circle cx="90" cy="90" r="8" fill="var(--panel)" stroke="var(--border)"/>
  <text x="90" y="112" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">B, C, D waiting</text>

  <text x="300" y="20" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Semaphore (N=2 at a time)</text>
  <rect x="245" y="34" width="60" height="34" rx="5" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)" stroke-width="2"/>
  <text x="275" y="55" text-anchor="middle" fill="var(--ledger)" font-size="9">Thread A</text>
  <rect x="315" y="34" width="60" height="34" rx="5" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)" stroke-width="2"/>
  <text x="345" y="55" text-anchor="middle" fill="var(--ledger)" font-size="9">Thread B</text>
  <circle cx="290" cy="90" r="8" fill="var(--panel)" stroke="var(--border)"/>
  <circle cx="320" cy="90" r="8" fill="var(--panel)" stroke="var(--border)"/>
  <text x="305" y="112" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">C, D waiting for a permit</text>

  <text x="500" y="20" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Monitor (wait/notify)</text>
  <rect x="465" y="34" width="70" height="34" rx="5" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)" stroke-width="2"/>
  <text x="500" y="55" text-anchor="middle" fill="var(--ledger)" font-size="9">Holds lock</text>
  <rect x="465" y="80" width="70" height="30" rx="5" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-dasharray="3 2"/>
  <text x="500" y="99" text-anchor="middle" fill="var(--amber)" font-size="8.5">sleeping, not spinning</text>

  <rect x="20" y="140" width="560" height="40" fill="none" stroke="var(--border)" stroke-dasharray="4 3"/>
  <text x="35" y="158" fill="var(--text-dim)" font-size="9.5">Mutex = capacity 1. Semaphore = capacity N. Monitor = a lock plus an efficient</text>
  <text x="35" y="172" fill="var(--text-dim)" font-size="9.5">"wait for condition, then wake up" mechanism layered on top of either.</text>
</svg>`,
ex:`A mutex protects a single in-memory balance cache from concurrent writes. A semaphore with permit count 5 limits concurrent outbound calls to a rate-limited third-party payment gateway. A monitor lets worker threads wait efficiently for "new transaction available" rather than busy-polling.`,
trade:[`Mutexes are simplest but can become contention bottlenecks under high concurrency on hot resources.`,`Semaphores allow controlled parallelism but need careful permit-count tuning against downstream capacity.`,`Monitors avoid busy-waiting but add complexity (spurious wakeups, condition re-checking) that's easy to get subtly wrong.`]},

{cat:"TS", title:"Compare-And-Swap (CAS) / Atomics", def:`A CPU-level atomic instruction: "if the current value equals X, replace it with Y, else fail" — done in a single indivisible step. Lets you build lock-free counters and structures without a mutex.`,
diagram:`<svg viewBox="0 0 600 190" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="150" y="20" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Thread A: CAS(expected=5, new=6) — succeeds</text>
  <rect x="30" y="34" width="80" height="34" rx="5" fill="var(--panel)" stroke="var(--border)"/>
  <text x="70" y="55" text-anchor="middle" fill="var(--text)" font-size="11">value = 5</text>
  <line x1="110" y1="51" x2="170" y2="51" stroke="var(--ledger)" stroke-width="2" marker-end="url(#casArrow)"/>
  <text x="140" y="42" text-anchor="middle" fill="var(--ledger)" font-size="8">match!</text>
  <rect x="170" y="34" width="80" height="34" rx="5" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)" stroke-width="2"/>
  <text x="210" y="55" text-anchor="middle" fill="var(--ledger)" font-size="11">value = 6</text>

  <text x="450" y="20" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Thread B: CAS(expected=5, new=9) — fails, retries</text>
  <rect x="360" y="34" width="80" height="34" rx="5" fill="var(--panel)" stroke="var(--border)"/>
  <text x="400" y="55" text-anchor="middle" fill="var(--text)" font-size="11">value = 6</text>
  <line x1="440" y1="51" x2="500" y2="51" stroke="var(--red)" stroke-width="2" stroke-dasharray="3 2" marker-end="url(#casArrowR)"/>
  <text x="470" y="42" text-anchor="middle" fill="var(--red)" font-size="8">no match</text>
  <rect x="500" y="34" width="80" height="34" rx="5" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)" stroke-width="2"/>
  <text x="540" y="55" text-anchor="middle" fill="var(--red)" font-size="10">fail → reread</text>
  <defs>
    <marker id="casArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ledger)"/></marker>
    <marker id="casArrowR" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--red)"/></marker>
  </defs>
  <text x="20" y="110" fill="var(--text-dim)" font-size="10">B rereads the now-current value (6), recomputes its new value against it, and</text>
  <text x="20" y="126" fill="var(--text-dim)" font-size="10">retries CAS(expected=6, new=...) — no lock was ever held; the retry loop itself</text>
  <text x="20" y="142" fill="var(--text-dim)" font-size="10">is the entire concurrency-control mechanism.</text>
</svg>`,
ex:`An in-memory request counter for rate limiting uses AtomicInteger.compareAndSet instead of a mutex, avoiding lock contention on a very hot code path that's checked on every incoming API call.`,
trade:[`Lock-free and generally faster under contention than a mutex, but harder to reason about for anything beyond simple counters/references.`,`CAS loops can spin under very high contention (many failed retries) — sometimes a mutex is actually more predictable at extreme contention levels.`,`Not a substitute for transactional correctness across multiple related fields — CAS protects one memory location at a time.`]},

{cat:"TS", title:"Memory Visibility & Happens-Before", def:`Even without a data race bug in logic, one thread's write may not be visible to another thread due to CPU caching and compiler reordering, unless a "happens-before" relationship is established (via volatile, locks, or atomics).`,
diagram:`<svg viewBox="0 0 560 160" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="30" width="140" height="50" rx="6" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="90" y="50" text-anchor="middle" fill="var(--text-dim)" font-size="9">Thread A</text>
  <text x="90" y="66" text-anchor="middle" fill="var(--text-dim)" font-size="8">writes to its own CPU cache</text>
  <rect x="400" y="30" width="140" height="50" rx="6" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)" stroke-width="2"/>
  <text x="470" y="50" text-anchor="middle" fill="var(--red)" font-size="9">Thread B</text>
  <text x="470" y="66" text-anchor="middle" fill="var(--red)" font-size="8">may keep reading stale main-memory value</text>
  <text x="280" y="60" text-anchor="middle" fill="var(--red)" font-size="9" font-weight="600">✕ no happens-before</text>

  <rect x="20" y="105" width="140" height="40" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="90" y="128" text-anchor="middle" fill="var(--ledger)" font-size="9">volatile write / unlock</text>
  <line x1="160" y1="125" x2="400" y2="125" stroke="var(--ledger)" stroke-width="2" marker-end="url(#mvArrow)"/>
  <defs><marker id="mvArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ledger)"/></marker></defs>
  <rect x="400" y="105" width="140" height="40" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="470" y="128" text-anchor="middle" fill="var(--ledger)" font-size="9">volatile read / lock — sees it</text>
</svg>`,
ex:`A background thread sets a `+"`configReloaded = true`"+` flag after loading new fraud-rule config, but without `+"`volatile`"+` or proper synchronization, other threads might keep reading a cached `+"`false`"+` value indefinitely and never pick up the new rules.`,
trade:[`volatile guarantees visibility but not atomicity of compound operations (e.g., increment-and-check) — don't assume it replaces locking for anything beyond simple flags.`,`Understanding happens-before is essential for correctly reasoning about lock-free code — get it wrong and bugs appear only under specific CPU/JIT conditions, making them nearly impossible to reproduce.`]},

{cat:"TS", title:"Deadlock, Livelock, Starvation", def:`Three different ways concurrent code can get stuck.

Deadlock — two or more threads each hold something the other one needs, and each is waiting for the other to let go first — so neither ever moves, forever (this is called a "circular wait").

Livelock — threads keep actively reacting to each other and changing what they're doing, but nothing actually gets accomplished, like two people repeatedly stepping the same way trying to avoid each other in a hallway.

Starvation — one thread keeps getting skipped over in favor of others, so it never gets its turn, even though it isn't technically stuck.`,
diagram:`<svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <circle cx="120" cy="80" r="38" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="120" y="76" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="700">Thread A</text>
  <text x="120" y="92" text-anchor="middle" fill="var(--text-dim)" font-size="9.5">holds Account 1</text>

  <circle cx="300" cy="80" r="38" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)" stroke-width="2"/>
  <text x="300" y="76" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="700">Thread B</text>
  <text x="300" y="92" text-anchor="middle" fill="var(--text-dim)" font-size="9.5">holds Account 2</text>

  <path d="M158,70 Q210,40 262,70" fill="none" stroke="var(--red)" stroke-width="2" marker-end="url(#dl-r)"/>
  <text x="210" y="35" text-anchor="middle" fill="var(--red)" font-size="11" font-weight="600">waiting for Account 2</text>

  <path d="M262,95 Q210,130 158,95" fill="none" stroke="var(--red)" stroke-width="2" marker-end="url(#dl-r)"/>
  <text x="210" y="150" text-anchor="middle" fill="var(--red)" font-size="11" font-weight="600">waiting for Account 1</text>

  <text x="210" y="195" text-anchor="middle" fill="var(--red)" font-size="12" font-weight="700">Circular wait — neither ever proceeds</text>

  <defs>
    <marker id="dl-r" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--red)"/></marker>
  </defs>
</svg>`,
ex:`Imagine transferring money from Account 1 to Account 2, and at the same time, someone else is transferring money the other way (Account 2 to Account 1):
— Thread A (transfer 1→2): locks Account 1, then tries to lock Account 2.
— Thread B (transfer 2→1): locks Account 2, then tries to lock Account 1.
Thread A is now holding Account 1 and waiting for Account 2. Thread B is holding Account 2 and waiting for Account 1. Neither will ever let go, so both wait forever — that's the deadlock.

The standard fix is "lock ordering": always lock accounts in the same order, no matter which direction the transfer is going — for example, always lock the account with the *smaller* ID first. So both transfers become:
— Transfer 1→2: lock Account 1 first (smaller ID), then Account 2.
— Transfer 2→1: also lock Account 1 first (smaller ID), then Account 2 — even though the money is moving the opposite direction.
Now both threads try to grab Account 1 first. One of them gets it and proceeds to Account 2 next; the other simply waits its turn for Account 1 — no circular waiting, no deadlock, just a normal queue.`,
trade:[`Lock ordering completely prevents this kind of deadlock, but it only works if *every* piece of code that locks multiple accounts follows the same ordering rule — one forgotten exception anywhere in the codebase brings the deadlock risk right back.`,`A simpler backup plan: give every lock attempt a timeout. If a thread can't get the second lock within, say, 2 seconds, it gives up, releases what it's holding, and retries. This turns a silent forever-hang into a quick, visible, retryable failure — often preferred in production financial systems because it's a much safer failure mode than a frozen thread.`]},

{cat:"TS", title:"Immutability as a Thread-Safety Strategy", def:`If an object's state can never change after construction, it's inherently thread-safe to share across threads — there's nothing to race over.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="220" y="30" width="120" height="40" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="280" y="54" text-anchor="middle" fill="var(--ledger)" font-size="9">Immutable object</text>
  <line x1="220" y1="60" x2="130" y2="90" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="280" y1="70" x2="280" y2="90" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="340" y1="60" x2="430" y2="90" stroke="var(--border)" stroke-width="1.5"/>
  <text x="130" y="105" text-anchor="middle" fill="var(--text-dim)" font-size="8">Thread A reads</text>
  <text x="280" y="105" text-anchor="middle" fill="var(--text-dim)" font-size="8">Thread B reads</text>
  <text x="430" y="105" text-anchor="middle" fill="var(--text-dim)" font-size="8">Thread C reads</text>
  <text x="280" y="120" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">No lock needed — nothing can ever change to race over</text>
</svg>`,
ex:`Representing a completed transaction as an immutable value object (amount, timestamp, parties, status) means it can be freely passed between threads, cached, and logged without any synchronization concerns — only the process of *creating the next* transaction record needs coordination.`,
trade:[`Eliminates a whole category of concurrency bugs, but can increase memory allocation (new objects instead of in-place mutation) — usually a good trade for correctness-critical financial data.`,`Doesn't help when you genuinely need shared mutable state (e.g., a running balance) — that still needs proper synchronization or a different strategy (event sourcing, CAS).`]},

{cat:"TS", title:"False Sharing", def:`A performance (not correctness) problem: two threads modify different variables that happen to sit on the same CPU cache line, causing unnecessary cache invalidation traffic between cores even though there's no actual logical conflict.`,
diagram:`<svg viewBox="0 0 460 180" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="230" y="20" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">One CPU cache line (64 bytes)</text>
  <rect x="60" y="30" width="340" height="60" rx="6" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <line x1="230" y1="30" x2="230" y2="90" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="3,3"/>
  <rect x="70" y="42" width="140" height="36" rx="4" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
  <text x="140" y="65" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">successCount</text>
  <rect x="250" y="42" width="140" height="36" rx="4" fill="var(--blue)" fill-opacity="0.2" stroke="var(--blue)"/>
  <text x="320" y="65" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">failureCount</text>

  <text x="140" y="115" text-anchor="middle" fill="var(--ledger)" font-size="11" font-weight="600">Thread A writes ↑</text>
  <text x="320" y="115" text-anchor="middle" fill="var(--blue)" font-size="11" font-weight="600">Thread B writes ↑</text>

  <text x="230" y="150" text-anchor="middle" fill="var(--red)" font-size="12" font-weight="600">No logical conflict — but every write invalidates the whole line for the other core</text>
</svg>`,
ex:`Two counters — one tracking successful payments, one tracking failed payments — are declared adjacently in a struct and updated by different threads. Despite no logical race, throughput suffers because every update invalidates the other thread's cached copy of the cache line.`,
trade:[`Fixed with padding/alignment to separate hot variables onto different cache lines — a micro-optimization only worth pursuing after profiling shows it's a real bottleneck.`,`Easy to over-apply as premature optimization; only chase this once you have profiler evidence of cache-line contention.`]},

{cat:"TS", title:"Thread-Local Storage", def:`A mechanism giving each thread its own independent copy of a variable, so concurrent threads never see or interfere with each other's copy — no synchronization needed, since there's nothing shared.`,
diagram:`<svg viewBox="0 0 560 140" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="280" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">"requestId" — one variable name, one copy per thread</text>
  <rect x="30" y="35" width="140" height="50" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="100" y="55" text-anchor="middle" fill="var(--ledger)" font-size="9">Thread A</text>
  <text x="100" y="72" text-anchor="middle" fill="var(--ledger)" font-size="8">requestId = "abc"</text>
  <rect x="210" y="35" width="140" height="50" rx="6" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-width="2"/>
  <text x="280" y="55" text-anchor="middle" fill="var(--amber)" font-size="9">Thread B</text>
  <text x="280" y="72" text-anchor="middle" fill="var(--amber)" font-size="8">requestId = "xyz"</text>
  <rect x="390" y="35" width="140" height="50" rx="6" fill="var(--text)" fill-opacity="0.1" stroke="var(--border)" stroke-width="2"/>
  <text x="460" y="55" text-anchor="middle" fill="var(--text)" font-size="9">Thread C</text>
  <text x="460" y="72" text-anchor="middle" fill="var(--text)" font-size="8">requestId = "def"</text>
  <text x="280" y="115" text-anchor="middle" fill="var(--text-faint)" font-size="9">No lock needed — nothing is actually shared between the three copies</text>
</svg>`,
ex:`A per-request correlation ID or a database connection handle is stored in thread-local storage so that logging or DB calls anywhere in the call stack can access "the current request's" context without explicitly passing it through every function signature, and without any risk of one thread reading another's ID.`,
trade:[`Eliminates synchronization overhead entirely for per-thread state, but can quietly leak memory or stale state in thread-pool environments if not cleared after each task — a classic bug where a pooled thread "remembers" data from a previous, unrelated request.`,`Doesn't help (and isn't meant to help) with genuinely shared mutable state — it solves a different problem than locks/atomics.`]},

// ---------------- CONCURRENCY IN APPLICATIONS ----------------
{cat:"CA", title:"Concurrency vs Parallelism", def:`Concurrency is structuring a program to handle multiple tasks that can be in progress at once (may or may not run simultaneously). Parallelism is actually executing multiple tasks at the exact same time on multiple cores.`,
diagram:`<svg viewBox="0 0 480 180" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="120" y="20" text-anchor="middle" fill="var(--text-dim)" font-size="12" font-weight="600">Concurrency (1 core)</text>
  <text x="20" y="45" fill="var(--text-dim)" font-size="10">Core 1</text>
  <rect x="70" y="35" width="40" height="18" fill="var(--ledger)"/>
  <rect x="110" y="35" width="40" height="18" fill="var(--blue)"/>
  <rect x="150" y="35" width="40" height="18" fill="var(--ledger)"/>
  <rect x="190" y="35" width="40" height="18" fill="var(--blue)"/>
  <text x="150" y="70" text-anchor="middle" fill="var(--text-faint)" font-size="10">tasks interleave, never truly simultaneous</text>

  <text x="360" y="20" text-anchor="middle" fill="var(--text-dim)" font-size="12" font-weight="600">Parallelism (2 cores)</text>
  <text x="280" y="105" fill="var(--text-dim)" font-size="10">Core 1</text>
  <rect x="330" y="95" width="140" height="18" fill="var(--ledger)"/>
  <text x="280" y="140" fill="var(--text-dim)" font-size="10">Core 2</text>
  <rect x="330" y="130" width="140" height="18" fill="var(--blue)"/>
  <text x="400" y="165" text-anchor="middle" fill="var(--text-faint)" font-size="10">both run at the exact same instant</text>
</svg>`,
ex:`A single-core service handling thousands of concurrent HTTP connections via an event loop (Node.js) is concurrent but not parallel. A multi-threaded batch job crunching a settlement file across 16 CPU cores simultaneously is both concurrent and parallel.`,
trade:[`Concurrency (without parallelism) is enough for I/O-bound work (waiting on network/DB) since the CPU isn't the bottleneck.`,`Parallelism is needed for CPU-bound work (e.g., heavy fraud-scoring computation) where you actually need more cores doing simultaneous work.`]},

{cat:"CA", title:"Threads vs Coroutines / Green Threads", def:`Two different ways to run many things "at once."

OS threads — managed by the operating system, each one is relatively heavy (uses megabytes of memory just for its stack) and the OS decides when each one gets CPU time.

Coroutines / green threads / virtual threads (goroutines, Kotlin coroutines, Java virtual threads) — much lighter weight, managed by your programming language's runtime instead of the OS. Because each one is so cheap, you can run millions of them at once on the same machine, which is exactly what you want when most of them are just waiting on a slow network call rather than doing real work.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="130" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">OS threads — heavy, OS-scheduled</text>
  <rect x="30" y="30" width="55" height="60" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <rect x="95" y="30" width="55" height="60" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <rect x="160" y="30" width="55" height="60" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="130" y="110" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">a few thousand max — MB of stack each</text>

  <text x="440" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Coroutines — light, runtime-scheduled</text>
  <g fill="var(--ledger)" fill-opacity="0.3" stroke="var(--ledger)">
    <rect x="330" y="30" width="18" height="18"/><rect x="352" y="30" width="18" height="18"/><rect x="374" y="30" width="18" height="18"/><rect x="396" y="30" width="18" height="18"/><rect x="418" y="30" width="18" height="18"/><rect x="440" y="30" width="18" height="18"/>
    <rect x="330" y="52" width="18" height="18"/><rect x="352" y="52" width="18" height="18"/><rect x="374" y="52" width="18" height="18"/><rect x="396" y="52" width="18" height="18"/><rect x="418" y="52" width="18" height="18"/><rect x="440" y="52" width="18" height="18"/>
    <rect x="330" y="74" width="18" height="18"/><rect x="352" y="74" width="18" height="18"/><rect x="374" y="74" width="18" height="18"/><rect x="396" y="74" width="18" height="18"/><rect x="418" y="74" width="18" height="18"/><rect x="440" y="74" width="18" height="18"/>
  </g>
  <text x="400" y="110" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">millions possible — cheap, mostly just waiting</text>
</svg>`,
ex:`A payment-gateway proxy handling 100,000 concurrent slow upstream connections would exhaust memory with one OS thread per connection; using virtual threads or an async runtime lets each connection be represented cheaply while still writing simple sequential-looking code.`,
trade:[`Lightweight concurrency dramatically increases the number of concurrent tasks you can handle per machine, but debugging tools and stack traces can be less mature/intuitive than traditional threads.`,`Blocking calls inside a coroutine/green-thread runtime can still starve the underlying thread pool if not handled correctly — you need runtime-aware I/O libraries, not just any blocking call.`]},

{cat:"CA", title:"Event Loop & Non-Blocking I/O", def:`A single (or few) thread(s) repeatedly pull events (completed I/O, timers) off a queue and dispatch callbacks/continuations, never blocking on I/O — the OS notifies the loop when a socket is ready instead of a thread waiting on it.`,
diagram:`<svg viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <circle cx="120" cy="100" r="60" fill="none" stroke="var(--ledger)" stroke-width="2.5"/>
  <text x="120" y="96" text-anchor="middle" fill="var(--ledger)" font-size="11" font-weight="600">Event</text>
  <text x="120" y="110" text-anchor="middle" fill="var(--ledger)" font-size="11" font-weight="600">Loop</text>
  <path d="M 168 70 A 60 60 0 0 1 120 40" fill="none" stroke="var(--ledger)" stroke-width="2" marker-end="url(#elArrow)"/>
  <defs><marker id="elArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ledger)"/></marker></defs>

  <rect x="280" y="30" width="120" height="26" rx="4" fill="var(--panel)" stroke="var(--border)"/>
  <text x="340" y="47" text-anchor="middle" fill="var(--text-dim)" font-size="9.5">Socket A ready</text>
  <rect x="280" y="66" width="120" height="26" rx="4" fill="var(--panel)" stroke="var(--border)"/>
  <text x="340" y="83" text-anchor="middle" fill="var(--text-dim)" font-size="9.5">Timer fired</text>
  <rect x="280" y="102" width="120" height="26" rx="4" fill="var(--panel)" stroke="var(--border)"/>
  <text x="340" y="119" text-anchor="middle" fill="var(--text-dim)" font-size="9.5">Socket B ready</text>
  <text x="340" y="150" text-anchor="middle" fill="var(--text-faint)" font-size="9">OS notifies the loop — no thread ever blocks waiting</text>
  <line x1="180" y1="90" x2="278" y2="55" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="180" y1="100" x2="278" y2="90" stroke="var(--border)" stroke-width="1.5"/>

  <rect x="440" y="30" width="140" height="98" rx="6" fill="none" stroke="var(--border)" stroke-dasharray="4 3"/>
  <text x="510" y="48" text-anchor="middle" fill="var(--text-dim)" font-size="9" font-weight="600">Dispatch callback,</text>
  <text x="510" y="62" text-anchor="middle" fill="var(--text-dim)" font-size="9" font-weight="600">run to completion</text>
  <text x="510" y="86" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">(or resume the</text>
  <text x="510" y="99" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">suspended async fn)</text>
  <text x="510" y="115" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">then loop again</text>
</svg>`,
ex:`A webhook-delivery service uses an event loop (Netty/Node.js style) to manage tens of thousands of concurrent outbound HTTP calls to merchant endpoints without needing tens of thousands of OS threads.`,
trade:[`Extremely efficient for I/O-bound workloads with many concurrent connections, but a single long-running CPU-bound task (e.g., heavy JSON parsing or crypto) blocks the entire event loop for everyone.`,`Requires disciplined use of non-blocking libraries throughout the stack — one accidental blocking call defeats the whole model.`]},

{cat:"CA", title:"Thread Pool Sizing", def:`Choosing the number of worker threads: for CPU-bound work, roughly (number of cores); for I/O-bound work, a much larger pool since threads spend most time waiting, not computing.`,
diagram:`<svg viewBox="0 0 600 180" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="140" y="20" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">CPU-bound: pool ≈ core count</text>
  <rect x="20" y="34" width="60" height="30" fill="var(--ledger)" fill-opacity="0.25" stroke="var(--ledger)"/>
  <text x="50" y="53" text-anchor="middle" fill="var(--ledger)" font-size="9">busy</text>
  <rect x="90" y="34" width="60" height="30" fill="var(--ledger)" fill-opacity="0.25" stroke="var(--ledger)"/>
  <text x="120" y="53" text-anchor="middle" fill="var(--ledger)" font-size="9">busy</text>
  <rect x="160" y="34" width="60" height="30" fill="var(--ledger)" fill-opacity="0.25" stroke="var(--ledger)"/>
  <text x="190" y="53" text-anchor="middle" fill="var(--ledger)" font-size="9">busy</text>
  <text x="120" y="82" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">4 threads, 4 cores — no thread ever waits, all compute</text>

  <text x="460" y="20" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">I/O-bound: pool ≫ core count</text>
  <rect x="330" y="34" width="46" height="30" fill="var(--amber)" fill-opacity="0.2" stroke="var(--amber)"/>
  <text x="353" y="53" text-anchor="middle" fill="var(--amber)" font-size="8">waiting</text>
  <rect x="380" y="34" width="46" height="30" fill="var(--amber)" fill-opacity="0.2" stroke="var(--amber)"/>
  <text x="403" y="53" text-anchor="middle" fill="var(--amber)" font-size="8">waiting</text>
  <rect x="430" y="34" width="46" height="30" fill="var(--ledger)" fill-opacity="0.25" stroke="var(--ledger)"/>
  <text x="453" y="53" text-anchor="middle" fill="var(--ledger)" font-size="8">busy</text>
  <rect x="480" y="34" width="46" height="30" fill="var(--amber)" fill-opacity="0.2" stroke="var(--amber)"/>
  <text x="503" y="53" text-anchor="middle" fill="var(--amber)" font-size="8">waiting</text>
  <rect x="530" y="34" width="46" height="30" fill="var(--amber)" fill-opacity="0.2" stroke="var(--amber)"/>
  <text x="553" y="53" text-anchor="middle" fill="var(--amber)" font-size="8">waiting</text>
  <text x="453" y="82" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">100+ threads, 4 cores — most threads sit idle on network I/O</text>

  <rect x="20" y="110" width="560" height="50" fill="none" stroke="var(--border)" stroke-dasharray="4 3"/>
  <text x="35" y="130" fill="var(--text-dim)" font-size="9.5">Sizing for cores when work is I/O-bound leaves the CPU idle while requests</text>
  <text x="35" y="146" fill="var(--text-dim)" font-size="9.5">queue; sizing far past cores when work is CPU-bound just adds context-switch cost.</text>
</svg>`,
ex:`A thread pool calling an external card-network API (I/O-bound, ~200ms latency per call) benefits from a much larger pool (e.g., 100+ threads) than a thread pool doing in-memory fraud-score computation (CPU-bound, sized near core count).`,
trade:[`Oversized pools for CPU-bound work cause excessive context switching and cache thrashing with no throughput gain.`,`Undersized pools for I/O-bound work leave the CPU idle while requests queue up waiting for a free thread.`,`Unbounded pools risk resource exhaustion under load spikes — always bound the pool and pair it with a rejection/backpressure policy.`]},

{cat:"CA", title:"Futures, Promises & Structured Concurrency", def:`Futures/Promises represent a value that will be available later, enabling composable async code. Structured concurrency takes this further: child async tasks are scoped to a parent, so cancellation and error propagation are automatic and you can't "leak" a forgotten background task.`,
diagram:`<svg viewBox="0 0 600 190" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="230" y="20" width="140" height="34" rx="6" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)" stroke-width="2"/>
  <text x="300" y="42" text-anchor="middle" fill="var(--ledger)" font-size="10" font-weight="600">Parent request</text>
  <line x1="300" y1="54" x2="120" y2="90" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="300" y1="54" x2="300" y2="90" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="300" y1="54" x2="480" y2="90" stroke="var(--border)" stroke-width="1.5"/>
  <rect x="60" y="90" width="120" height="30" rx="5" fill="var(--panel)" stroke="var(--border)"/>
  <text x="120" y="109" text-anchor="middle" fill="var(--text-dim)" font-size="9">fraud-check future</text>
  <rect x="240" y="90" width="120" height="30" rx="5" fill="var(--panel)" stroke="var(--border)"/>
  <text x="300" y="109" text-anchor="middle" fill="var(--text-dim)" font-size="9">balance-check future</text>
  <rect x="420" y="90" width="120" height="30" rx="5" fill="var(--panel)" stroke="var(--border)"/>
  <text x="480" y="109" text-anchor="middle" fill="var(--text-dim)" font-size="9">limits-check future</text>

  <text x="300" y="145" text-anchor="middle" fill="var(--red)" font-size="10" font-weight="600">Client disconnects → parent cancelled</text>
  <text x="120" y="160" text-anchor="middle" fill="var(--red)" font-size="8.5">auto-cancelled</text>
  <text x="300" y="160" text-anchor="middle" fill="var(--red)" font-size="8.5">auto-cancelled</text>
  <text x="480" y="160" text-anchor="middle" fill="var(--red)" font-size="8.5">auto-cancelled</text>
  <text x="300" y="180" text-anchor="middle" fill="var(--text-faint)" font-size="9">No child task keeps running after its parent is gone — nothing to leak</text>
</svg>`,
ex:`A payment request kicks off parallel calls to fraud-check, balance-check, and limits-check as futures, combining results before deciding to approve. With structured concurrency, if the parent request is cancelled (client disconnected), all three child calls are automatically cancelled instead of running to completion pointlessly.`,
trade:[`Plain futures/callbacks can lead to "fire and forget" tasks that outlive their logical parent, silently consuming resources or completing after they no longer matter.`,`Structured concurrency adds a small amount of ceremony but prevents an entire class of resource-leak and lost-error bugs — worth it for anything beyond trivial async code.`]},

{cat:"CA", title:"Producer-Consumer & Backpressure", def:`Producers generate work faster than consumers can process it unless bounded. Backpressure is the mechanism by which a slow consumer signals producers to slow down (bounded queues, reactive streams, or blocking puts) instead of the system falling over from unbounded buffering.`,
diagram:`<svg viewBox="0 0 480 180" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="70" width="90" height="40" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="65" y="94" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Producer</text>

  <rect x="150" y="55" width="200" height="70" rx="6" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="250" y="48" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Bounded Queue</text>
  <rect x="160" y="70" width="24" height="40" fill="var(--amber)" fill-opacity="0.5"/>
  <rect x="188" y="70" width="24" height="40" fill="var(--amber)" fill-opacity="0.5"/>
  <rect x="216" y="70" width="24" height="40" fill="var(--amber)" fill-opacity="0.5"/>
  <rect x="244" y="70" width="24" height="40" fill="var(--panel-2)" stroke="var(--border)" stroke-dasharray="2,2"/>
  <rect x="272" y="70" width="24" height="40" fill="var(--panel-2)" stroke="var(--border)" stroke-dasharray="2,2"/>
  <rect x="300" y="70" width="24" height="40" fill="var(--panel-2)" stroke="var(--border)" stroke-dasharray="2,2"/>

  <rect x="390" y="70" width="90" height="40" rx="6" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)" stroke-width="2"/>
  <text x="435" y="94" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Consumer</text>

  <line x1="110" y1="90" x2="145" y2="90" stroke="var(--ledger)" stroke-width="2" marker-end="url(#pc-g2)"/>
  <line x1="350" y1="90" x2="385" y2="90" stroke="var(--blue)" stroke-width="2" marker-end="url(#pc-b2)"/>

  <text x="250" y="150" text-anchor="middle" fill="var(--amber)" font-size="12" font-weight="600">Queue fills up → producer is told to slow down or block</text>

  <defs>
    <marker id="pc-g2" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--ledger)"/></marker>
    <marker id="pc-b2" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--blue)"/></marker>
  </defs>
</svg>`,
ex:`A transaction-ingestion pipeline reading from Kafka processes records slower during a downstream DB hiccup. Without backpressure, an unbounded in-memory queue grows until the service OOMs; with backpressure (bounded queue + consumer lag causing the Kafka consumer to naturally slow its poll rate), the system degrades gracefully instead of crashing.`,
trade:[`Bounded queues force an explicit decision when full: block the producer, drop the item, or reject with an error — there's no free lunch, just choosing where the pain shows up.`,`Backpressure-aware systems (reactive streams, Kafka consumer groups) add complexity but prevent unbounded memory growth under load spikes.`]},

{cat:"CA", title:"Application-Level Concurrency Limiting", def:`Using a semaphore (or similar bounded-permit mechanism) to cap how many concurrent operations of a specific type an application will run at once — distinct from a rate limiter (which caps operations per time window); this caps *simultaneous in-flight* operations regardless of how fast they complete.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="280" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">Semaphore: max 3 concurrent calls to downstream</text>
  <rect x="30" y="30" width="50" height="26" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)"/>
  <text x="55" y="47" text-anchor="middle" fill="var(--ledger)" font-size="8">in-flight</text>
  <rect x="90" y="30" width="50" height="26" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)"/>
  <text x="115" y="47" text-anchor="middle" fill="var(--ledger)" font-size="8">in-flight</text>
  <rect x="150" y="30" width="50" height="26" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)"/>
  <text x="175" y="47" text-anchor="middle" fill="var(--ledger)" font-size="8">in-flight</text>
  <rect x="220" y="30" width="50" height="26" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-dasharray="3 2"/>
  <text x="245" y="47" text-anchor="middle" fill="var(--amber)" font-size="7.5">waits for a permit</text>
  <text x="150" y="80" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">Caps simultaneous requests regardless of how fast each one finishes —</text>
  <text x="150" y="95" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">different from a rate limiter, which caps requests per time window instead.</text>
</svg>`,
ex:`A service calling a third-party card network with a documented "max 20 concurrent connections" limit wraps those calls with a semaphore of 20 permits, so a sudden burst of 500 incoming payment requests queues politely behind the semaphore instead of opening 500 simultaneous connections and getting throttled or blacklisted by the card network.`,
trade:[`Protects both your own resources and your dependency's from being overwhelmed by concurrency spikes, but the permit count needs tuning against the dependency's real capacity — set it too low and you under-utilize available throughput, too high and you defeat the purpose.`,`Complements, rather than replaces, a time-window rate limiter — you often want both concurrency limits and rate limits on the same critical dependency.`]},

// ---------------- CONCURRENCY IN DATABASES ----------------
{cat:"CD", title:"Pessimistic Locking", def:`Lock a row (or range) before reading it with intent to modify, so no other transaction can touch it until you commit or roll back — assumes conflicts are likely, so it prevents them upfront (e.g., `+"`SELECT ... FOR UPDATE`"+`).`,
diagram:`<svg viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="20" y="18" fill="var(--text-dim)" font-size="11" font-weight="600">Txn A</text>
  <text x="20" y="58" fill="var(--text-dim)" font-size="9.5">SELECT ... FOR UPDATE (row locked)</text>
  <rect x="20" y="66" width="260" height="24" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)" stroke-width="2"/>
  <text x="150" y="82" text-anchor="middle" fill="var(--ledger)" font-size="9.5">holds lock, does work, COMMIT</text>

  <text x="320" y="18" fill="var(--text-dim)" font-size="11" font-weight="600">Txn B</text>
  <rect x="320" y="66" width="260" height="24" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)" stroke-dasharray="3 2"/>
  <text x="450" y="82" text-anchor="middle" fill="var(--red)" font-size="9.5">blocked, waiting for the lock</text>
  <line x1="280" y1="78" x2="320" y2="78" stroke="var(--border)" stroke-width="2" marker-end="url(#plArrow)"/>
  <defs><marker id="plArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>

  <rect x="20" y="110" width="560" height="34" fill="none" stroke="var(--border)" stroke-dasharray="4 3"/>
  <text x="35" y="130" fill="var(--text-dim)" font-size="9.5">Once A commits and releases the lock, B's SELECT ... FOR UPDATE proceeds — B's read is guaranteed fresh.</text>
</svg>`,
ex:`Transferring money between two accounts: `+"`SELECT balance FROM accounts WHERE id=1 FOR UPDATE`"+` locks that row so no concurrent transfer can read a stale balance and cause a lost update, at the cost of making concurrent transfers on the same account wait in line.`,
trade:[`Guarantees correctness under high contention on the same row, but serializes access — a "hot" account (e.g., a popular merchant) becomes a throughput bottleneck.`,`Risk of deadlock if multiple rows are locked in inconsistent order across transactions — mitigate with a fixed lock-acquisition order.`]},

{cat:"CD", title:"Optimistic Locking", def:`Don't lock upfront — read data with a version/timestamp column, and when writing, check the version hasn't changed; if it has, reject and retry. Assumes conflicts are rare, so it detects them after the fact instead of preventing them.`,
diagram:`<svg viewBox="0 0 600 170" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="20" y="18" fill="var(--text-dim)" font-size="11" font-weight="600">Txn A</text>
  <text x="20" y="40" fill="var(--text-dim)" font-size="9.5">reads row, version = 5</text>
  <text x="20" y="70" fill="var(--text)" font-size="9.5">UPDATE ... SET version=6 WHERE version=5</text>
  <rect x="20" y="78" width="260" height="24" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)" stroke-width="2"/>
  <text x="150" y="94" text-anchor="middle" fill="var(--ledger)" font-size="9.5">1 row affected → success</text>

  <text x="320" y="18" fill="var(--text-dim)" font-size="11" font-weight="600">Txn B (concurrent)</text>
  <text x="320" y="40" fill="var(--text-dim)" font-size="9.5">reads row, version = 5</text>
  <text x="320" y="70" fill="var(--text)" font-size="9.5">UPDATE ... SET version=6 WHERE version=5</text>
  <rect x="320" y="78" width="260" height="24" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)" stroke-width="2"/>
  <text x="450" y="94" text-anchor="middle" fill="var(--red)" font-size="9.5">0 rows affected → reject, retry</text>

  <rect x="20" y="118" width="560" height="34" fill="none" stroke="var(--border)" stroke-dasharray="4 3"/>
  <text x="35" y="138" fill="var(--text-dim)" font-size="9.5">No lock was ever taken — the version column in the WHERE clause is what catches the conflict, after the fact.</text>
</svg>`,
ex:`An account row has a `+"`version`"+` column. A transfer reads balance and version=5, computes the new balance, then writes `+"`UPDATE accounts SET balance=X, version=6 WHERE id=1 AND version=5`"+`. If another transaction already bumped the version, the update affects 0 rows and the app retries.`,
trade:[`Scales much better than pessimistic locking under low-to-moderate contention since there's no blocking — but under high contention on the same row, retries pile up and can actually perform worse than a lock would.`,`Requires the application to handle retry logic explicitly, including a cap on retries and a clear failure path.`]},

{cat:"CD", title:"Choosing Pessimistic vs Optimistic Locking (Decision Guide)", def:`Pessimistic Locking and Optimistic Locking (both covered elsewhere) solve the same problem — stop two concurrent transactions from clobbering each other's changes to the same row — but neither is a universal default. The right choice depends on how likely a conflict actually is and how expensive it is to lose one.

Three questions decide it in practice:

How often do two requests actually touch the same row at the same time? A shared, high-traffic row (a popular wallet, a single "total inventory" counter) sees frequent conflicts. A row that's almost always touched by only one user at a time (a person's own profile settings) rarely does.

How bad is a wasted retry? Optimistic locking's failure mode is "reject and retry" — cheap if retrying is fast and harmless, expensive if the work being redone is costly (a multi-step calculation) or if the user is sitting there waiting on it.

How bad is a wrong result, versus a slow one? Money-movement code (see the Wallet Overdraft Race Condition case study, covered elsewhere) needs the *stronger* guarantee, since an incorrect balance is a real financial loss, not just a UX annoyance — that pushes toward pessimistic locking even at some cost to throughput.

The general rule of thumb this produces: low-contention, low-stakes rows lean optimistic (better throughput, no blocking); high-contention or high-stakes rows — especially anything touching an account balance — lean pessimistic, accepting the throughput cost in exchange for correctness that doesn't depend on retry logic being right.`,
diagram:`<svg viewBox="0 0 640 260" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="16" width="600" height="1" fill="var(--border)"/>
  <text x="320" y="42" text-anchor="middle" fill="var(--text-dim)" font-size="12" font-weight="600">Is this row high-contention AND/OR is a lost update costly (money)?</text>

  <line x1="320" y1="52" x2="150" y2="100" stroke="var(--border)" stroke-width="1.5" marker-end="url(#lkArrow)"/>
  <text x="200" y="80" fill="var(--text-faint)" font-size="10">Yes</text>
  <line x1="320" y1="52" x2="490" y2="100" stroke="var(--border)" stroke-width="1.5" marker-end="url(#lkArrow)"/>
  <text x="435" y="80" fill="var(--text-faint)" font-size="10">No</text>
  <defs><marker id="lkArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>

  <rect x="60" y="100" width="180" height="70" rx="8" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)" stroke-width="2"/>
  <text x="150" y="124" text-anchor="middle" fill="var(--red)" font-size="11" font-weight="600">Pessimistic Locking</text>
  <text x="150" y="142" text-anchor="middle" fill="var(--text-dim)" font-size="9">SELECT ... FOR UPDATE</text>
  <text x="150" y="156" text-anchor="middle" fill="var(--text-dim)" font-size="9">e.g. wallet withdrawal</text>

  <rect x="400" y="100" width="180" height="70" rx="8" fill="var(--ledger)" fill-opacity="0.12" stroke="var(--ledger)" stroke-width="2"/>
  <text x="490" y="124" text-anchor="middle" fill="var(--ledger)" font-size="11" font-weight="600">Optimistic Locking</text>
  <text x="490" y="142" text-anchor="middle" fill="var(--text-dim)" font-size="9">version column + retry</text>
  <text x="490" y="156" text-anchor="middle" fill="var(--text-dim)" font-size="9">e.g. profile settings edit</text>

  <text x="150" y="196" text-anchor="middle" fill="var(--text-faint)" font-size="9.5">blocks, but never loses</text>
  <text x="150" y="209" text-anchor="middle" fill="var(--text-faint)" font-size="9.5">an update under contention</text>
  <text x="490" y="196" text-anchor="middle" fill="var(--text-faint)" font-size="9.5">no blocking; rare conflicts</text>
  <text x="490" y="209" text-anchor="middle" fill="var(--text-faint)" font-size="9.5">just retry cheaply</text>
</svg>`,
ex:`A wallet-withdrawal endpoint and a user-profile-update endpoint sit in the same service. The wallet endpoint uses pessimistic locking (\`SELECT balance FROM wallets WHERE id = ? FOR UPDATE\`) because withdrawals on the same wallet are both frequent enough to collide and expensive to get wrong. The profile endpoint uses optimistic locking (a \`version\` column) because two people almost never edit the same profile at the same instant, and if they do, asking one of them to retry costs nothing more than re-submitting a form.`,
trade:[`This decision isn't permanent or global — the same table can reasonably use pessimistic locking on its balance column and optimistic locking on a rarely-contended metadata column, since the right choice is a property of the access pattern for that specific field, not the table as a whole.`,`Defaulting to pessimistic locking "to be safe" everywhere avoids this decision but quietly taxes every code path with blocking and deadlock risk, even the ones that never see real contention — the decision is worth making deliberately per use case rather than picking one default for an entire codebase.`]},

{cat:"CD", title:"Lock Granularity & Escalation", def:`Locks can be taken at row, page, or table level. Finer granularity (row-level) allows more concurrency but costs more memory/overhead to track; the database may automatically escalate many row locks into a single table lock under memory pressure, unexpectedly serializing unrelated transactions.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
