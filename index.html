ex:`An end-of-day batch job compares every transaction in your internal ledger against the settlement file from your card processor, flagging any transaction present in one but not the other (a missing webhook, a duplicate charge, a processor-side delay) for investigation before books are closed for the day.`,
trade:[`Catches real-world discrepancies that pure code correctness can't prevent (network failures, processor bugs, timing differences), but is inherently a detective control (after the fact) rather than preventive — it needs to be paired with fast alerting and a clear resolution/escalation process, not just run silently.`]},

{cat:"FT", title:"PCI-DSS & Tokenization Scope", def:`PCI-DSS is the security standard for any system that stores, processes, or transmits cardholder data, with strict requirements around encryption, access control, logging, and network segmentation. "Scope" refers to which systems are actually subject to these requirements — minimizing scope (e.g., via tokenization) reduces audit cost and risk.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="140" y="18" text-anchor="middle" fill="var(--red)" font-size="10.5" font-weight="600">Without tokenization — wide PCI scope</text>
  <rect x="30" y="30" width="220" height="70" rx="6" fill="var(--red)" fill-opacity="0.1" stroke="var(--red)" stroke-dasharray="4 3"/>
  <rect x="45" y="45" width="60" height="20" fill="var(--red)" fill-opacity="0.2" stroke="var(--red)"/>
  <text x="75" y="59" text-anchor="middle" fill="var(--red)" font-size="7">Checkout</text>
  <rect x="115" y="45" width="60" height="20" fill="var(--red)" fill-opacity="0.2" stroke="var(--red)"/>
  <text x="145" y="59" text-anchor="middle" fill="var(--red)" font-size="7">Orders</text>
  <rect x="185" y="45" width="60" height="20" fill="var(--red)" fill-opacity="0.2" stroke="var(--red)"/>
  <text x="215" y="59" text-anchor="middle" fill="var(--red)" font-size="7">Reporting</text>
  <text x="140" y="85" text-anchor="middle" fill="var(--red)" font-size="7.5">every system touching raw card data is in scope</text>

  <text x="420" y="18" text-anchor="middle" fill="var(--ledger)" font-size="10.5" font-weight="600">With tokenization — narrow scope</text>
  <rect x="380" y="30" width="80" height="70" rx="6" fill="var(--red)" fill-opacity="0.1" stroke="var(--red)" stroke-dasharray="4 3"/>
  <text x="420" y="60" text-anchor="middle" fill="var(--red)" font-size="7">Tokenization vault</text>
  <rect x="310" y="45" width="55" height="20" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="337" y="59" text-anchor="middle" fill="var(--ledger)" font-size="7">Checkout</text>
  <rect x="480" y="45" width="55" height="20" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="507" y="59" text-anchor="middle" fill="var(--ledger)" font-size="7">Reporting</text>
  <text x="420" y="118" text-anchor="middle" fill="var(--ledger)" font-size="7.5">everything outside the vault only ever sees a token</text>
</svg>`,
ex:`By tokenizing card numbers at the point of entry (handled by a PCI-compliant processor's hosted field or SDK) and never letting raw card numbers touch your own servers, most of your infrastructure falls outside PCI scope entirely, dramatically simplifying your compliance audit.`,
trade:[`Reduces compliance burden and breach blast radius significantly, but requires disciplined engineering practices to maintain that scope boundary — a single logging statement or debug endpoint that accidentally captures raw card data can pull a system back into full PCI scope.`]},

{cat:"FT", title:"Settlement & Clearing (T+1/T+2)", def:`Clearing is the process of confirming and reconciling a transaction between parties; settlement is the actual transfer/exchange of funds. "T+1"/"T+2" notation means settlement happens 1 or 2 business days after the transaction date — a common source of the gap between "transaction shown as complete" and "money actually moved" that engineers building on top of banking rails need to model correctly.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <line x1="30" y1="60" x2="530" y2="60" stroke="var(--border)" stroke-width="2"/>
  <circle cx="60" cy="60" r="6" fill="var(--ledger)"/>
  <text x="60" y="42" text-anchor="middle" fill="var(--ledger)" font-size="9.5" font-weight="600">T: Transaction &amp; Clearing</text>
  <text x="60" y="80" text-anchor="middle" fill="var(--text-faint)" font-size="8">shown as "complete" to the user</text>
  <circle cx="480" cy="60" r="6" fill="var(--amber)"/>
  <text x="480" y="42" text-anchor="middle" fill="var(--amber)" font-size="9.5" font-weight="600">T+1/T+2: Settlement</text>
  <text x="480" y="80" text-anchor="middle" fill="var(--text-faint)" font-size="8">funds actually move between banks</text>
  <rect x="66" y="52" width="408" height="16" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-dasharray="3 2"/>
  <text x="270" y="105" text-anchor="middle" fill="var(--text-faint)" font-size="9">Gap where "complete" in the UI ≠ money has actually moved yet</text>
</svg>`,
ex:`A customer sees a payment as "completed" in the app immediately, but the actual movement of funds between banks might not finalize for 1-2 business days — your system needs a distinct state (e.g., "authorized" vs "settled") to correctly represent this, since treating them as the same state can cause incorrect balance/availability calculations.`,
trade:[`Modeling settlement as a distinct, later state adds complexity to your transaction state machine, but conflating "authorized" with "settled" is a common source of serious bugs (e.g., allowing a customer to spend funds that haven't actually cleared yet).`]},

{cat:"FT", title:"Multi-Currency Handling & Rounding", def:`Different currencies have different numbers of decimal places (USD has cents, 2 decimal places; JPY has no minor unit at all; some currencies have 3). Converting between currencies and rounding correctly at defined points is critical — get it wrong and you either lose money on every conversion or create small discrepancies that compound into real accounting problems at scale.`,
diagram:`<svg viewBox="0 0 560 120" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="30" width="150" height="40" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="95" y="52" text-anchor="middle" fill="var(--ledger)" font-size="9">USD: 2 decimals</text>
  <text x="95" y="65" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">$10.50</text>
  <rect x="205" y="30" width="150" height="40" rx="6" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-width="2"/>
  <text x="280" y="52" text-anchor="middle" fill="var(--amber)" font-size="9">JPY: 0 decimals</text>
  <text x="280" y="65" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">¥1050</text>
  <rect x="390" y="30" width="150" height="40" rx="6" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)" stroke-width="2"/>
  <text x="465" y="52" text-anchor="middle" fill="var(--red)" font-size="9">BHD: 3 decimals</text>
  <text x="465" y="65" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">10.500 BHD</text>
  <text x="280" y="95" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">Rounding at the wrong precision, silently, is where small money leaks compound</text>
</svg>`,
ex:`Converting $100.00 USD to JPY at a given exchange rate produces a result with fractional yen, which don't exist as a real unit — the system must round to a whole yen using a clearly defined, consistent rule (and clearly defined *where* in the calculation rounding happens), otherwise repeated conversions back and forth could slowly create or destroy tiny amounts of money that auditors will eventually catch.`,
trade:[`Rounding rules (round half up, round half to even/banker's rounding, always round down in the platform's favor, etc.) must be chosen deliberately and applied consistently — different rounding rules in different parts of the codebase is a classic, hard-to-find source of reconciliation discrepancies.`,`Storing exchange rates and doing conversion math needs the same "never use floating point for money" discipline as regular currency amounts.`]},

{cat:"FT", title:"Regulatory Compliance Basics (SOC 2, GDPR, KYC/AML)", def:`Four terms that come up constantly in fintech, each covering a different concern.

SOC 2 — an audit standard that proves your company has proper controls in place around security, availability, and how you handle data. Often required before larger enterprise customers will even consider working with you.

GDPR — an EU regulation giving individuals real rights over their own personal data: the right to access it, delete it, or take a copy of it elsewhere. It also restricts how and where that data can be stored and processed.

KYC (Know Your Customer) — verifying a customer's real identity before letting them move money, to prevent fraud and stop illegal activity before it starts.

AML (Anti-Money Laundering) — ongoing monitoring of transaction patterns to catch and report activity that looks like it could be money laundering.`,
diagram:`<svg viewBox="0 0 560 120" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="10" y="25" width="125" height="60" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="72" y="48" text-anchor="middle" fill="var(--ledger)" font-size="10" font-weight="600">SOC 2</text>
  <text x="72" y="65" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">proves security controls exist</text>
  <rect x="145" y="25" width="125" height="60" rx="6" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-width="2"/>
  <text x="207" y="48" text-anchor="middle" fill="var(--amber)" font-size="10" font-weight="600">GDPR</text>
  <text x="207" y="65" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">individual rights over data</text>
  <rect x="280" y="25" width="125" height="60" rx="6" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)" stroke-width="2"/>
  <text x="342" y="48" text-anchor="middle" fill="var(--red)" font-size="10" font-weight="600">KYC</text>
  <text x="342" y="65" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">verify identity before moving money</text>
  <rect x="415" y="25" width="125" height="60" rx="6" fill="var(--text)" fill-opacity="0.1" stroke="var(--border)" stroke-width="2"/>
  <text x="477" y="48" text-anchor="middle" fill="var(--text)" font-size="10" font-weight="600">AML</text>
  <text x="477" y="65" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">monitor for laundering patterns</text>
</svg>`,
ex:`A new user signing up for a payment account must complete identity verification (KYC) before they can send or receive money above a certain threshold — this isn't just a UX step, it's a legal requirement, and skipping or weakening it exposes the company to real regulatory penalties, not just a security risk.`,
trade:[`As a backend engineer, you're rarely making the compliance policy decisions yourself, but you're very often building the systems that enforce them (identity verification gates, data deletion pipelines for GDPR requests, suspicious-activity flagging for AML) — understanding the "why" behind these requirements helps you build them correctly instead of treating them as arbitrary extra steps.`,`GDPR's "right to be deleted" is often in tension with financial record-keeping laws requiring you to retain transaction records for years — real systems need a designed way to reconcile these (e.g., anonymizing personal details while keeping the financial record itself).`]},

{cat:"FT", title:"Fraud/Risk System Integration", def:`Fraud scoring (checking whether a transaction looks suspicious) is often a separate service or even a separate team's system, and it usually can't be allowed to slow down or block every legitimate transaction while it "thinks" — so it's commonly integrated asynchronously, with a fast synchronous check for obvious cases and a slower async check for deeper analysis.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="20" width="140" height="34" rx="6" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="90" y="42" text-anchor="middle" fill="var(--text-dim)" font-size="9">Incoming payment</text>
  <line x1="90" y1="54" x2="90" y2="72" stroke="var(--border)" stroke-width="1.5"/>
  <rect x="20" y="75" width="140" height="34" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="90" y="93" text-anchor="middle" fill="var(--ledger)" font-size="8.5">Sync rule check</text>
  <text x="90" y="105" text-anchor="middle" fill="var(--ledger)" font-size="7.5">blocks obvious fraud</text>

  <line x1="160" y1="92" x2="230" y2="92" stroke="var(--amber)" stroke-width="2" stroke-dasharray="3 2" marker-end="url(#frArrow)"/>
  <defs><marker id="frArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--amber)"/></marker></defs>
  <rect x="235" y="75" width="160" height="34" rx="6" fill="var(--amber)" fill-opacity="0.12" stroke="var(--amber)" stroke-width="2"/>
  <text x="315" y="93" text-anchor="middle" fill="var(--amber)" font-size="8.5">Async ML score (later)</text>
  <text x="315" y="105" text-anchor="middle" fill="var(--amber)" font-size="7.5">may freeze funds if high-risk</text>
  <text x="240" y="35" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">Customer isn't blocked waiting on the slow check</text>
</svg>`,
ex:`A payment gets an instant, simple rule-based risk check synchronously (blocking obviously fraudulent patterns immediately), while a more thorough machine-learning-based fraud score runs asynchronously afterward — if that later check flags the transaction as high-risk, the system might freeze the funds or trigger a manual review, rather than making every single customer wait for the slow check to complete before their payment even goes through.`,
trade:[`Synchronous fraud checks give the strongest protection (block before money moves) but add latency to every transaction — asynchronous checks keep the experience fast but mean a bad transaction might briefly complete before being caught, requiring a "claw back" mechanism (hold, freeze, or reversal) for that window.`,`The fraud system becoming unavailable shouldn't be allowed to fully block payments (a classic cascading-failure risk) — needs a clear, deliberately-chosen fallback policy (fail open with monitoring vs fail closed) agreed on with the risk team in advance, not decided ad hoc during an incident.`]},

{cat:"FT", title:"Ledger Design (Immutable Append-Only Ledger)", def:`Double-Entry Bookkeeping (covered elsewhere in this guide) is the accounting *model* — every transaction touches two balanced entries. Ledger design is the separate engineering question of how you actually store those entries so the record can be trusted.

The core idea: ledger rows are never updated or deleted once written. A correction isn't an UPDATE to a past row — it's a brand-new row that reverses or adjusts the old one, leaving both the mistake and the fix permanently visible in the history.

This matters because a financial ledger has to answer "what did the system believe, and when" for every point in its history, not just reflect the current state. An UPDATE-in-place ledger destroys that history the moment a row changes — you can no longer prove what balance was shown to a customer, or what an auditor saw, at any specific past moment.

Current balances are then a *derived* value — computed by summing the relevant ledger rows — rather than a separately stored number that a bug could silently push out of sync with the transaction history.`,
diagram:`<svg viewBox="0 0 640 260" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="20" y="24" fill="var(--text-dim)" font-size="12" font-weight="600">Append-only ledger — a correction is a NEW row, never an edit</text>
  <rect x="20" y="44" width="130" height="46" fill="var(--panel)" stroke="var(--border)"/>
  <text x="85" y="62" text-anchor="middle" fill="var(--text)" font-size="10">Row 1</text>
  <text x="85" y="78" text-anchor="middle" fill="var(--text-dim)" font-size="9">Deposit +$100</text>
  <rect x="170" y="44" width="130" height="46" fill="var(--panel)" stroke="var(--border)"/>
  <text x="235" y="62" text-anchor="middle" fill="var(--text)" font-size="10">Row 2</text>
  <text x="235" y="78" text-anchor="middle" fill="var(--text-dim)" font-size="9">Fee -$5 (wrong)</text>
  <rect x="320" y="44" width="150" height="46" fill="var(--red)" fill-opacity="0.15" stroke="var(--red)"/>
  <text x="395" y="62" text-anchor="middle" fill="var(--red)" font-size="10">Row 3 — Reversal</text>
  <text x="395" y="78" text-anchor="middle" fill="var(--text-dim)" font-size="9">Fee +$5 (undo row 2)</text>
  <rect x="490" y="44" width="130" height="46" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="555" y="62" text-anchor="middle" fill="var(--ledger)" font-size="10">Row 4 — Correction</text>
  <text x="555" y="78" text-anchor="middle" fill="var(--text-dim)" font-size="9">Fee -$2 (correct)</text>
  <line x1="150" y1="67" x2="170" y2="67" stroke="var(--border)" stroke-width="2" marker-end="url(#ledgerArrow)"/>
  <line x1="300" y1="67" x2="320" y2="67" stroke="var(--border)" stroke-width="2" marker-end="url(#ledgerArrow)"/>
  <line x1="470" y1="67" x2="490" y2="67" stroke="var(--border)" stroke-width="2" marker-end="url(#ledgerArrow)"/>
  <defs><marker id="ledgerArrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="var(--border)"/></marker></defs>
  <text x="20" y="130" fill="var(--text-dim)" font-size="11">Balance = SUM(all rows) = 100 - 5 + 5 - 2 = $98</text>
  <text x="20" y="152" fill="var(--text-dim)" font-size="11">— derived from history, not stored and mutated independently.</text>
  <rect x="20" y="176" width="600" height="60" fill="none" stroke="var(--border)" stroke-dasharray="4 3"/>
  <text x="35" y="196" fill="var(--text)" font-size="10" font-weight="600">Why not just UPDATE row 2 to -$2?</text>
  <text x="35" y="214" fill="var(--text-dim)" font-size="9.5">Because then there is no record that a $5 fee was ever charged or reversed —</text>
  <text x="35" y="228" fill="var(--text-dim)" font-size="9.5">an auditor, a customer dispute, or a bug investigation loses that history entirely.</text>
</svg>`,
ex:`A customer disputes a $5 fee. Instead of editing the original fee row to $0, the system writes a new reversal row for +$5 and, if a corrected fee is owed, a separate new row for the corrected amount. Support, audit, and the customer's statement all show the original charge, the reversal, and the correction as three distinct, timestamped events — not a silently changed number.`,
trade:[`Append-only storage means the ledger table only grows — it never shrinks — so query performance and storage cost need active management (partitioning by date, archiving old periods) as volume increases over the system's lifetime.`,`Computing a balance by summing history gets slower as history grows, which is why most real systems maintain a cached/materialized current balance alongside the ledger, reconciled periodically against the summed truth — reintroducing some of the "derived vs stored" tension the ledger model was meant to avoid, but in a controlled, auditable way.`]},

{cat:"FT", title:"Payment Rails: ACH, Wire, Card Networks & Real-Time Rails", def:`"Payment rail" means the underlying system that actually moves money between banks or accounts — different rails have very different speed, cost, and reversibility trade-offs, and a backend engineer building payment features needs to know which rail is in play to build the right guarantees.

ACH (Automated Clearing House) — a batch-based bank-to-bank transfer system, common in the US for things like payroll and bill pay. Cheap, but slow (often 1-3 business days) and reversible for days after the fact (a "return" can come back well after the transfer appeared to succeed).

Wire transfer — a same-day, bank-to-bank transfer that is effectively final once sent. Fast and (practically) irreversible, but expensive per transaction, which is why it's used for large, one-off transfers rather than everyday payments.

Card networks (Visa, Mastercard, etc.) — the rails behind debit/credit card payments, involving multiple intermediaries (issuing bank, acquiring bank, the network itself) and built-in dispute mechanisms (chargebacks) that can reverse a payment weeks after it settled.

Real-time rails (RTP, FedNow, and similar) — newer systems built to settle within seconds, 24/7, and be final almost immediately. Fast and (mostly) irreversible, which shifts fraud prevention earlier — there's much less of a window to catch a mistake after the fact.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <line x1="40" y1="65" x2="530" y2="65" stroke="var(--border)" stroke-width="2"/>
  <text x="30" y="20" fill="var(--text-faint)" font-size="9">slower, cheaper, more reversible</text>
  <text x="430" y="20" fill="var(--text-faint)" font-size="9" text-anchor="end">faster, pricier, less reversible</text>
  <circle cx="80" cy="65" r="6" fill="var(--ledger)"/>
  <text x="80" y="90" text-anchor="middle" fill="var(--ledger)" font-size="9" font-weight="600">ACH</text>
  <text x="80" y="104" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">1-3 days, reversible</text>
  <circle cx="240" cy="65" r="6" fill="var(--amber)"/>
  <text x="240" y="90" text-anchor="middle" fill="var(--amber)" font-size="9" font-weight="600">Card networks</text>
  <text x="240" y="104" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">chargebacks for weeks</text>
  <circle cx="380" cy="65" r="6" fill="var(--text)"/>
  <text x="380" y="90" text-anchor="middle" fill="var(--text)" font-size="9" font-weight="600">Wire</text>
  <text x="380" y="104" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">same-day, final</text>
  <circle cx="490" cy="65" r="6" fill="var(--red)"/>
  <text x="490" y="90" text-anchor="middle" fill="var(--red)" font-size="9" font-weight="600">Real-time rails</text>
  <text x="490" y="104" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">seconds, final</text>
</svg>`,
ex:`A payroll system uses ACH (cheap, and a few days' delay is acceptable for a scheduled payment), while a marketplace's "instant payout" feature to sellers uses a real-time rail and charges a fee for it — reflecting the real cost and irrevocability difference between the two rails, not just a UX choice.`,
trade:[`The faster and more final a rail is, the less time you have to catch fraud or a mistake before the money is truly gone — real-time rails push almost all of the risk-checking burden to before the transfer is initiated, unlike ACH where a return window offers a partial safety net.`,`Building a "generic payment" abstraction that hides which rail is used behind the scenes is convenient for product code, but the reversibility and timing differences between rails are exactly the kind of detail that leaks through during a dispute or an incident — the abstraction can't fully hide the underlying rail's real guarantees.`]},

{cat:"FT", title:"Chargebacks & Disputes", def:`A chargeback is a forced reversal of a card payment, initiated by the customer's bank (not the merchant), typically because the cardholder disputes the charge — claiming it was fraudulent, the goods never arrived, or they simply don't recognize it.

The distinguishing feature that makes chargebacks a real backend design problem: they can arrive weeks or even months after a payment already settled and was treated as final. A system that assumes "once settled, always settled" for card payments will eventually be wrong.

When a chargeback lands, the disputed funds are pulled back immediately (often before the merchant even gets a chance to respond), and the merchant is given a window to submit evidence (proof of delivery, signed agreements, prior correspondence) to contest it. The card network then decides whether the reversal stands.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <line x1="30" y1="60" x2="530" y2="60" stroke="var(--border)" stroke-width="2"/>
  <circle cx="60" cy="60" r="6" fill="var(--ledger)"/>
  <text x="60" y="42" text-anchor="middle" fill="var(--ledger)" font-size="9" font-weight="600">Payment settles</text>
  <text x="60" y="80" text-anchor="middle" fill="var(--text-faint)" font-size="8">treated as final</text>
  <circle cx="330" cy="60" r="6" fill="var(--red)"/>
  <text x="330" y="42" text-anchor="middle" fill="var(--red)" font-size="9" font-weight="600">Chargeback lands (T+45 days)</text>
  <text x="330" y="80" text-anchor="middle" fill="var(--red)" font-size="8">funds pulled back immediately</text>
  <circle cx="490" cy="60" r="6" fill="var(--amber)"/>
  <text x="490" y="42" text-anchor="middle" fill="var(--amber)" font-size="9" font-weight="600">Evidence window</text>
  <text x="490" y="80" text-anchor="middle" fill="var(--amber)" font-size="8">merchant contests, network decides</text>
</svg>`,
ex:`A customer receives their order but disputes the charge as "not recognized" 45 days later. The payment platform must locate the original settled transaction, reverse the relevant ledger entries (as new, dated rows — see Ledger Design), notify the merchant, and hold a window open for the merchant to submit delivery evidence before the case is closed either way.`,
trade:[`Chargebacks break the assumption that a settled payment is truly final, which means every downstream system that reacted to that payment (inventory, fulfillment, account credits) may need a compensating action months later — this is exactly the kind of edge case the Saga Pattern and the ledger's append-only design exist to handle cleanly.`,`Fighting a chargeback with evidence costs staff time and isn't guaranteed to win even when the merchant is clearly right, so most platforms track a "chargeback rate" per merchant closely — exceeding a threshold set by the card networks can get a merchant account suspended entirely, independent of any individual case's merits.`]},

{cat:"FT", title:"Idempotent Money Movement & Double-Spend Prevention", def:`"Idempotency Keys in Payment APIs" (covered elsewhere) solves the client-retry problem: the same API call, sent twice, doesn't move money twice. Double-spend prevention is the broader, systemic version of that same problem — making sure a given unit of money can't be moved, spent, or credited more than once, across any code path, not just a single retried request.

The general pattern: before actually moving funds, atomically check-and-reserve the source balance in the same transaction that records the movement, rather than checking the balance first and moving funds in a separate later step — a gap between "check" and "move" is exactly where a race condition lets the same funds be spent twice by two concurrent requests.

This is the same underlying problem as the classic database Lost Update anomaly (covered elsewhere in this guide), just applied specifically to money — which is why database-level concurrency control (row locking, or optimistic locking with a version check) is usually the actual mechanism enforcing it, not just application-level idempotency keys.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="130" y="18" text-anchor="middle" fill="var(--red)" font-size="10.5" font-weight="600">Naive: check then move (2 steps)</text>
  <rect x="30" y="30" width="90" height="26" fill="var(--panel)" stroke="var(--border)"/>
  <text x="75" y="47" text-anchor="middle" fill="var(--text-dim)" font-size="8">1. SELECT balance</text>
  <text x="130" y="42" fill="var(--red)" font-size="10" font-weight="700">⚡ gap</text>
  <rect x="150" y="30" width="90" height="26" fill="var(--panel)" stroke="var(--border)"/>
  <text x="195" y="47" text-anchor="middle" fill="var(--text-dim)" font-size="8">2. UPDATE balance</text>
  <text x="130" y="75" text-anchor="middle" fill="var(--red)" font-size="8.5">a second request can read stale data in this gap</text>

  <text x="420" y="18" text-anchor="middle" fill="var(--ledger)" font-size="10.5" font-weight="600">Fixed: atomic check-and-reserve</text>
  <rect x="340" y="30" width="200" height="26" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="440" y="47" text-anchor="middle" fill="var(--ledger)" font-size="7.5">UPDATE ... WHERE balance &gt;= amount</text>
  <text x="440" y="75" text-anchor="middle" fill="var(--ledger)" font-size="8.5">one statement — no gap for a race to land in</text>
</svg>`,
ex:`Two concurrent withdrawal requests both read a $100 balance and both attempt to withdraw $80. Without atomic check-and-reserve, both could succeed, leaving the account at -$60. With a properly guarded transaction (row lock or optimistic version check on the balance row), the second request re-reads the now-updated balance, sees only $20 available, and is correctly rejected.`,
trade:[`Row-level locking during the check-and-reserve step prevents double-spend cleanly but adds contention on hot accounts (see Lock Contention & Hot Rows) — a high-traffic merchant account can become a bottleneck exactly because every transaction against it needs this guard.`,`Idempotency keys alone are not sufficient protection against double-spend — they stop the *same* request from being replayed, but they do nothing to stop two genuinely different, legitimately concurrent requests from independently over-spending the same balance.`]},

{cat:"FT", title:"Case Study: The Wallet Overdraft Race Condition", def:`A concrete walkthrough of one of the most common real-world concurrency bugs in fintech backends — a wallet balance going negative because two concurrent withdrawal requests both acted on the same stale balance. This is the "Two concurrent withdrawal requests" example from Idempotent Money Movement (covered elsewhere), traced through in full mechanical detail so the actual timing gap is visible.

The naive, broken implementation does three separate steps against the database, each a separate round trip: read the current balance, check in application code whether it's sufficient for the withdrawal, then write the new balance back. Each step looks correct in isolation.

The bug is entirely in the gap between those steps. Nothing in this sequence stops a second request from doing its own read, in between the first request's read and its write. Both requests see the same starting balance, both independently decide "yes, sufficient funds," and both write back a value calculated from that same stale number — the second write simply overwrites the first, and one withdrawal is silently lost from the balance's perspective while both withdrawals actually went out.

This is a textbook instance of the database Lost Update anomaly (covered elsewhere in this guide) — the wallet case just makes the stakes concrete: it isn't a UI counter being wrong, it's real money leaving an account that the ledger never accounted for.`,
diagram:`<svg viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="20" y="22" fill="var(--text-dim)" font-size="12" font-weight="600">Two concurrent withdrawals against a $100 wallet, no locking</text>
  <text x="20" y="50" fill="var(--text)" font-size="11" font-weight="600">Request A (withdraw $80)</text>
  <text x="360" y="50" fill="var(--text)" font-size="11" font-weight="600">Request B (withdraw $80)</text>
  <line x1="20" y1="60" x2="20" y2="270" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="360" y1="60" x2="360" y2="270" stroke="var(--border)" stroke-width="1.5"/>

  <circle cx="20" cy="80" r="4" fill="var(--ledger)"/>
  <text x="34" y="84" fill="var(--text-dim)" font-size="10">t1: reads balance = $100</text>
  <circle cx="360" cy="105" r="4" fill="var(--ledger)"/>
  <text x="374" y="109" fill="var(--text-dim)" font-size="10">t2: reads balance = $100</text>

  <circle cx="20" cy="130" r="4" fill="var(--text-dim)"/>
  <text x="34" y="134" fill="var(--text-dim)" font-size="10">t3: checks $100 ≥ $80 → OK</text>
  <circle cx="360" cy="155" r="4" fill="var(--text-dim)"/>
  <text x="374" y="159" fill="var(--text-dim)" font-size="10">t4: checks $100 ≥ $80 → OK</text>

  <circle cx="20" cy="180" r="4" fill="var(--amber)"/>
  <text x="34" y="184" fill="var(--text)" font-size="10">t5: writes balance = $20 (100-80)</text>
  <circle cx="360" cy="205" r="4" fill="var(--red)"/>
  <text x="374" y="209" fill="var(--red)" font-size="10">t6: writes balance = $20 (100-80)</text>

  <line x1="20" y1="180" x2="360" y2="205" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="140" y="230" fill="var(--red)" font-size="9.5">B's write overwrites A's — it never saw A's update</text>

  <rect x="20" y="248" width="600" height="40" fill="var(--red)" fill-opacity="0.1" stroke="var(--red)" stroke-dasharray="4 3"/>
  <text x="35" y="266" fill="var(--red)" font-size="10.5" font-weight="600">Result: $160 actually left the account, but balance reads $20 — should read -$60.</text>
  <text x="35" y="280" fill="var(--text-dim)" font-size="9.5">The ledger of individual withdrawals is correct; only the derived balance field silently lost one update.</text>
</svg>`,
ex:`A wallet starts at $100. Request A and Request B are both withdrawal calls for $80, arriving milliseconds apart on two different application server instances. Both read the balance as $100 before either writes back. Both independently confirm "$100 is enough to cover $80." Both then write "new balance = $20." The second write wins — the database now shows $20, even though $160 total actually left the wallet. If this wallet also fed a Double-Entry Bookkeeping ledger (covered elsewhere) for the individual withdrawal entries, the ledger's transaction history would correctly show two $80 withdrawals — only the separately-stored current-balance field is wrong, which is exactly the kind of drift that Ledger Design's "balance as a derived value" approach exists to prevent.`,
trade:[`Prevention, concretely, comes down to closing the read-check-write gap with one of two mechanisms (see Choosing Pessimistic vs Optimistic Locking, covered elsewhere) — for a hot wallet balance, pessimistic locking is usually the right call:

Step 1 — Start a transaction and lock the row with intent to modify (\`SELECT balance FROM wallets WHERE id = ? FOR UPDATE\`), instead of a plain \`SELECT\`. This makes any second concurrent request wait, rather than reading the same stale value.

Step 2 — Check the balance against the withdrawal amount using the value just read inside that same locked transaction, not a value fetched earlier or cached.

Step 3 — Write the new balance and commit, still inside that same transaction, which releases the lock and lets the next waiting request finally see the updated value.

Step 4 — If a conditional update is preferred over an explicit lock, collapse steps 1–3 into one atomic statement instead: \`UPDATE wallets SET balance = balance - 80 WHERE id = ? AND balance >= 80\`, then check the affected row count — zero rows affected means insufficient funds, atomically, with no separate read step at all.

This adds real latency and lock contention on frequently-withdrawn-from wallets, which is the direct cost of buying back correctness.`,`Catching this class of bug in testing is hard precisely because it's timing-dependent — a test suite that runs requests sequentially, or even most concurrent load tests, can pass cleanly while the exact interleaving that causes the overdraft happens rarely enough in production to go unnoticed for a long time before it's finally hit at scale. Property-Based Testing for Financial Calculations and Testing Concurrency & Idempotency (both covered elsewhere) are specifically aimed at forcing this kind of interleaving to surface before production does.`,`Detecting it after the fact (rather than preventing it) usually falls to Reconciliation (covered elsewhere) — a scheduled job comparing the sum of ledger entries against the stored balance field catches this kind of drift, but only after the money has already moved, which is why prevention at write time is still the primary defense.`]},

// ---------------- DB PERFORMANCE AT SCALE ----------------
{cat:"PF", title:"Finding Slow Queries", def:`The first, cheapest step in any DB performance investigation, usually done with three complementary tools.

Slow query logging — the database records any query that took longer than a configured threshold, giving you a direct list of the worst individual offenders.

EXPLAIN / EXPLAIN ANALYZE — shows the actual execution plan the database chose for a specific query (which indexes it used, whether it scanned a whole table, how it joined tables), which is how you find *why* a query is slow, not just that it is.

Aggregated statistics (pg_stat_statements, performance_schema) — track cumulative time and call count per query pattern, which surfaces queries that are cumulatively expensive even though no single execution looked dramatically slow on its own.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="30" width="160" height="60" rx="6" fill="var(--ledger)" fill-opacity="0.12" stroke="var(--ledger)" stroke-width="2"/>
  <text x="100" y="52" text-anchor="middle" fill="var(--ledger)" font-size="9.5" font-weight="600">Slow query log</text>
  <text x="100" y="70" text-anchor="middle" fill="var(--text-faint)" font-size="8">worst individual queries</text>

  <rect x="200" y="30" width="160" height="60" rx="6" fill="var(--amber)" fill-opacity="0.12" stroke="var(--amber)" stroke-width="2"/>
  <text x="280" y="52" text-anchor="middle" fill="var(--amber)" font-size="9.5" font-weight="600">EXPLAIN ANALYZE</text>
  <text x="280" y="70" text-anchor="middle" fill="var(--text-faint)" font-size="8">why one query is slow</text>

  <rect x="380" y="30" width="160" height="60" rx="6" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="460" y="52" text-anchor="middle" fill="var(--text)" font-size="9.5" font-weight="600">pg_stat_statements</text>
  <text x="460" y="70" text-anchor="middle" fill="var(--text-faint)" font-size="8">cheap query run millions of times</text>
</svg>`,
ex:`pg_stat_statements reveals that a seemingly fast (50ms) query is actually the top consumer of total database time because it runs 2 million times per day — a query that looked fine in isolated testing turns out to be the real bottleneck at production volume.`,
trade:[`Aggregated statistics catch "death by a thousand cuts" queries that per-request tracing might miss; EXPLAIN ANALYZE actually executes the query (careful running it against production for expensive writes) versus EXPLAIN alone which only estimates.`]},

{cat:"PF", title:"Read Replicas & Replication Lag", def:`Routing read-heavy traffic (reporting, dashboards, search) to read replicas offloads the primary/writer, but replicas lag behind the primary by some amount, meaning a read immediately after a write might not reflect that write yet.`,
diagram:`<svg viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="30" y="30" width="130" height="55" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="95" y="63" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="700">Primary</text>
  <text x="95" y="20" text-anchor="middle" fill="var(--text-dim)" font-size="11">writes go here</text>

  <line x1="160" y1="57" x2="200" y2="57" stroke="var(--ledger)" stroke-width="2" marker-end="url(#rr-g)"/>
  <text x="180" y="47" text-anchor="middle" fill="var(--text-faint)" font-size="9">replicate</text>

  <rect x="205" y="30" width="120" height="55" rx="6" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)" stroke-width="2"/>
  <text x="265" y="63" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Replica A</text>
  <text x="265" y="100" text-anchor="middle" fill="var(--amber)" font-size="10" font-weight="600">lag: 0.8s</text>

  <rect x="345" y="30" width="120" height="55" rx="6" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)" stroke-width="2"/>
  <text x="405" y="63" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Replica B</text>
  <text x="405" y="100" text-anchor="middle" fill="var(--red)" font-size="10" font-weight="600">lag: 4.2s ⚠</text>

  <line x1="160" y1="57" x2="340" y2="57" stroke="var(--ledger)" stroke-width="2" marker-end="url(#rr-g)"/>

  <text x="240" y="140" text-anchor="middle" fill="var(--text-dim)" font-size="11">A read of Replica B right after a write may still show stale data</text>
  <text x="240" y="160" text-anchor="middle" fill="var(--text-faint)" font-size="10">"Read-your-writes" traffic should go to the Primary, not a lagging replica</text>

  <defs>
    <marker id="rr-g" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--ledger)"/></marker>
  </defs>
</svg>`,
ex:`A user completes a transfer and immediately refreshes their transaction history, which is served from a lagging read replica — the new transaction might not appear for a moment, confusing the user and generating support tickets, unless the app explicitly reads that specific query from the primary right after a write (read-your-writes routing).`,
trade:[`Offloads significant read load from the primary, but requires the application to make a deliberate choice per query about consistency needs — not every read can tolerate replica lag, and getting this wrong causes confusing, hard-to-reproduce user-facing bugs.`]},

{cat:"PF", title:"Partitioning", def:`Splitting a single large table into smaller physical pieces (by range, list, or hash) that the database manages internally, so queries can skip irrelevant partitions (partition pruning) and maintenance operations (like archiving old data) become cheap on a per-partition basis.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="280" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">transactions table, partitioned by month</text>
  <rect x="30" y="35" width="110" height="50" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="85" y="65" text-anchor="middle" fill="var(--text-dim)" font-size="9">Jan 2026</text>
  <rect x="150" y="35" width="110" height="50" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="205" y="65" text-anchor="middle" fill="var(--text-dim)" font-size="9">Feb 2026</text>
  <rect x="270" y="35" width="110" height="50" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)" stroke-width="2"/>
  <text x="325" y="65" text-anchor="middle" fill="var(--ledger)" font-size="9" font-weight="600">Mar 2026</text>
  <rect x="390" y="35" width="110" height="50" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="445" y="65" text-anchor="middle" fill="var(--text-dim)" font-size="9">Apr 2026</text>
  <text x="325" y="105" text-anchor="middle" fill="var(--ledger)" font-size="9">WHERE created_at IN March → only this partition is scanned</text>
  <text x="280" y="130" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">Old partitions can also be archived/dropped independently at near-zero cost</text>
</svg>`,
ex:`A `+"`transactions`"+` table partitioned by month lets you cheaply archive/drop data older than the regulatory retention period (a single partition drop instead of a slow row-by-row delete) and lets queries filtered by recent date ranges skip scanning years of old partitions entirely.`,
trade:[`Great for time-series-like data (transaction/audit logs) with natural range boundaries, but doesn't help with horizontal scale across multiple machines by itself — it's a single-node organizational technique, not a substitute for sharding when you need more write capacity than one node can provide.`]},

{cat:"PF", title:"Sharding & Shard Key Selection", def:`Splitting data across multiple independent database instances (not just partitions within one instance) to scale writes horizontally. The shard key — the column used to decide which shard a row lives on — is the single most important decision, since it must align with your dominant query pattern to avoid expensive cross-shard operations.`,
diagram:`<svg viewBox="0 0 480 210" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="180" y="10" width="120" height="40" rx="6" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="240" y="35" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">account_id % 3</text>

  <line x1="220" y1="50" x2="90" y2="90" stroke="var(--text-faint)" stroke-width="1.5" marker-end="url(#sh-f)"/>
  <line x1="240" y1="50" x2="240" y2="90" stroke="var(--text-faint)" stroke-width="1.5" marker-end="url(#sh-f)"/>
  <line x1="260" y1="50" x2="390" y2="90" stroke="var(--text-faint)" stroke-width="1.5" marker-end="url(#sh-f)"/>

  <rect x="30" y="95" width="120" height="90" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="90" y="120" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Shard 0</text>
  <text x="90" y="140" text-anchor="middle" fill="var(--text-dim)" font-size="10">accounts</text>
  <text x="90" y="155" text-anchor="middle" fill="var(--text-dim)" font-size="10">ending in 0,3,6,9</text>

  <rect x="180" y="95" width="120" height="90" rx="6" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)" stroke-width="2"/>
  <text x="240" y="120" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Shard 1</text>
  <text x="240" y="140" text-anchor="middle" fill="var(--text-dim)" font-size="10">accounts</text>
  <text x="240" y="155" text-anchor="middle" fill="var(--text-dim)" font-size="10">ending in 1,4,7</text>

  <rect x="330" y="95" width="120" height="90" rx="6" fill="var(--amber)" fill-opacity="0.18" stroke="var(--amber)" stroke-width="2"/>
  <text x="390" y="120" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Shard 2</text>
  <text x="390" y="140" text-anchor="middle" fill="var(--text-dim)" font-size="10">accounts</text>
  <text x="390" y="155" text-anchor="middle" fill="var(--text-dim)" font-size="10">ending in 2,5,8</text>

  <text x="240" y="200" text-anchor="middle" fill="var(--text-faint)" font-size="11">Every query for one account hits exactly one shard</text>

  <defs>
    <marker id="sh-f" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--text-faint)"/></marker>
  </defs>
</svg>`,
ex:`Sharding by `+"`account_id`"+` means every query for a given account's data (the vast majority of your traffic) hits exactly one shard — but a report needing to aggregate across *all* accounts (e.g., total platform balance) now requires a expensive fan-out query across every shard, which needs to be designed for explicitly rather than assumed to just work.`,
trade:[`Enables horizontal write scale beyond a single machine's ceiling, but a poorly chosen shard key creates hot shards (uneven distribution, e.g., one huge enterprise customer overwhelming their shard) and cross-shard joins/transactions become genuinely hard or impossible.`,`Resharding later (splitting an overloaded shard) is a significant migration project — getting the shard key reasonably right early saves enormous pain later.`]},

{cat:"PF", title:"Vertical vs Horizontal Scaling", def:`Vertical scaling: make a single machine bigger (more CPU/RAM/IOPS) — simple, no architectural change, but has a hard ceiling and doesn't fix bad queries. Horizontal scaling: add more machines (read replicas, partitioning, sharding) — more complex to build and operate, but scales further and improves fault tolerance (no single machine is a total single point of failure).`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="120" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Vertical — bigger box</text>
  <rect x="80" y="70" width="60" height="40" fill="var(--panel)" stroke="var(--border)"/>
  <rect x="60" y="30" width="100" height="80" fill="var(--ledger)" fill-opacity="0.18" stroke="var(--ledger)" stroke-width="2"/>
  <text x="110" y="74" text-anchor="middle" fill="var(--ledger)" font-size="9">bigger CPU/RAM</text>
  <text x="120" y="130" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">hard ceiling; still one point of failure</text>

  <text x="420" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Horizontal — more boxes</text>
  <rect x="320" y="60" width="50" height="50" fill="var(--ledger)" fill-opacity="0.18" stroke="var(--ledger)" stroke-width="2"/>
  <rect x="385" y="60" width="50" height="50" fill="var(--ledger)" fill-opacity="0.18" stroke="var(--ledger)" stroke-width="2"/>
  <rect x="450" y="60" width="50" height="50" fill="var(--ledger)" fill-opacity="0.18" stroke="var(--ledger)" stroke-width="2"/>
  <text x="420" y="130" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">no ceiling from one machine; more moving parts to operate</text>
</svg>`,
ex:`A team facing DB slowness first upgrades to a bigger instance (vertical — fast, cheap to try) which buys 6 months of runway while they build out read replicas and eventually sharding (horizontal — the real long-term fix) for genuinely global, high-growth scale.`,
trade:[`Vertical scaling is the right *first* lever to pull (cheapest, fastest, no code changes) but should never be your only long-term strategy for a system expected to keep growing — plan the horizontal path before you're forced into it under incident pressure.`]},

{cat:"PF", title:"Scaling a Database Globally (Users Across Many Countries)", def:`Everything earlier in this section (indexing, read replicas, partitioning, sharding) helps one region handle more load. Going global adds one new, harder question on top: users are now spread across continents, and light travels at a fixed speed — a request from Singapore to a database in the US will always take longer than a request from a US user to that same database, no matter how well-tuned the database is. Global scaling is mostly about deciding, deliberately, where each piece of data's "true copy" lives and how far a user has to reach to touch it.

The three broad approaches, from simplest to most complex:

1. Single region, global users (simplest). Keep one database in one region, and just let far-away users pay the extra network latency. Fine for lower-traffic or early-stage products where engineering simplicity matters more than shaving off latency.

2. Single writer region, regional read replicas (the common middle ground). Keep the single source of truth (all writes) in one home region, but place read-only replicas in other regions close to users. Reads become fast everywhere; writes still travel back to the home region, but writes (like "confirm this payment") are usually a smaller share of total traffic than reads (like "show me my transaction history"). This is a very natural fit for a fintech ledger — one true, strongly consistent home for money-moving writes, fast local reads for dashboards, with the well-known caveat that a read *immediately following your own write* can look stale on a replica unless you specifically route that one read back to the primary.

3. Multi-region writers with a clear ownership rule (most complex, only when truly needed). Let more than one region accept writes, but avoid write conflicts by giving each piece of data one clear "home region" — for example, a customer's account is always written to the region matching their home country, so two regions are never fighting to update the very same account at the same time. This is often forced by regulation anyway (data residency laws), which conveniently pushes you toward a design that also solves the technical conflict problem.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="90" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="9.5" font-weight="600">1. Single region</text>
  <circle cx="90" cy="60" r="22" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)" stroke-width="2"/>
  <text x="90" y="64" text-anchor="middle" fill="var(--ledger)" font-size="8">US (all)</text>
  <text x="90" y="100" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">far users pay full latency</text>

  <text x="280" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="9.5" font-weight="600">2. Writer + regional read replicas</text>
  <circle cx="280" cy="60" r="20" fill="var(--ledger)" fill-opacity="0.25" stroke="var(--ledger)" stroke-width="2"/>
  <text x="280" y="64" text-anchor="middle" fill="var(--ledger)" font-size="7.5">US writer</text>
  <circle cx="220" cy="95" r="15" fill="var(--amber)" fill-opacity="0.2" stroke="var(--amber)"/>
  <text x="220" y="99" text-anchor="middle" fill="var(--amber)" font-size="6.5">EU read</text>
  <circle cx="340" cy="95" r="15" fill="var(--amber)" fill-opacity="0.2" stroke="var(--amber)"/>
  <text x="340" y="99" text-anchor="middle" fill="var(--amber)" font-size="6.5">APAC read</text>

  <text x="470" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="9.5" font-weight="600">3. Multi-region writers</text>
  <circle cx="430" cy="60" r="17" fill="var(--ledger)" fill-opacity="0.25" stroke="var(--ledger)" stroke-width="2"/>
  <text x="430" y="64" text-anchor="middle" fill="var(--ledger)" font-size="6.5">US owns US accts</text>
  <circle cx="510" cy="60" r="17" fill="var(--red)" fill-opacity="0.2" stroke="var(--red)" stroke-width="2"/>
  <text x="510" y="64" text-anchor="middle" fill="var(--red)" font-size="6.5">EU owns EU accts</text>
</svg>`,
ex:`A payments company serving Southeast Asia, Europe, and the US keeps each customer's account data owned by their home region (a Singapore customer's account always writes to the Singapore region, a German customer's always writes to the EU region) — satisfying local data-residency law and avoiding cross-region write conflicts at the same time. Meanwhile, read-only replicas of each region's data are placed near the other regions purely to make cross-region customer support lookups fast, clearly labeled as "may be a few seconds behind."`,
trade:[
  `The simplest approach (single region) costs you nothing in engineering complexity but means far-away users always feel a slower app — often an acceptable trade-off until growth in that region justifies the investment.`,
  `Regional read replicas fix the "reads feel slow" problem cheaply, but you must decide, on a case-by-case basis, which reads can tolerate a few seconds of staleness (a transaction history list) versus which reads must go to the primary (checking if a payment can be approved right now).`,
  `Owning data by home region solves both the legal requirement and the write-conflict problem in one design decision, but a report that needs to look across *all* regions at once (like "total global transaction volume today") now has to specifically query every region and add the results together — a feature you have to build on purpose, not something that comes for free.`,
  `Whatever approach you pick, the money-moving write path should almost always stay strongly consistent within its home region — global scale should change *where* the source of truth lives, not weaken the consistency guarantees around it.`
]},

// ---------------- DEBUGGING PRODUCTION ----------------
{cat:"DG", title:"Stabilize First, Understand Second", def:`When a production bug is actively causing harm, the immediate priority is limiting damage (feature flag off, roll back the deploy, circuit-break the affected path) — not fully understanding the root cause first. Root-cause analysis happens after the bleeding has stopped, ideally with the evidence preserved.`,
diagram:`<svg viewBox="0 0 560 120" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="30" width="160" height="34" rx="6" fill="var(--red)" fill-opacity="0.15" stroke="var(--red)" stroke-width="2"/>
  <text x="100" y="52" text-anchor="middle" fill="var(--red)" font-size="9">1. Stabilize now</text>
  <text x="100" y="80" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">flag off, rollback, circuit-break</text>
  <line x1="180" y1="47" x2="240" y2="47" stroke="var(--border)" stroke-width="2" marker-end="url(#stArrow)"/>
  <defs><marker id="stArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <rect x="245" y="30" width="160" height="34" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="325" y="52" text-anchor="middle" fill="var(--ledger)" font-size="9">2. Understand later</text>
  <text x="325" y="80" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">root-cause with evidence preserved</text>
</svg>`,
ex:`A newly-deployed change is causing duplicate charges. The correct first move is rolling back the deploy or disabling the feature flag immediately — even before you know exactly why it's happening — rather than spending 30 minutes debugging live while more customers get double-charged.`,
trade:[`Fast mitigation sometimes means you lose some debugging context (e.g., rolling back before capturing every relevant log) — a reasonable trade in almost all cases, since the cost of continued customer harm usually far outweighs the cost of a slightly harder post-hoc investigation.`]},

{cat:"DG", title:"Distributed Tracing for Debugging", def:`Using a trace ID that follows a single request across every service it touches lets you pinpoint exactly which service and which specific call in a complex chain caused a failure or slowdown, instead of manually correlating separate logs from a dozen services by timestamp.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="280" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">One trace ID, spans across services</text>
  <rect x="30" y="30" width="80" height="18" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="70" y="42" text-anchor="middle" fill="var(--text-dim)" font-size="7">gateway</text>
  <rect x="115" y="30" width="60" height="18" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="145" y="42" text-anchor="middle" fill="var(--text-dim)" font-size="7">auth</text>
  <rect x="180" y="30" width="280" height="18" fill="var(--red)" fill-opacity="0.3" stroke="var(--red)"/>
  <text x="320" y="42" text-anchor="middle" fill="var(--red)" font-size="7.5">fraud-check: 800ms (the culprit)</text>
  <rect x="465" y="30" width="50" height="18" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="490" y="42" text-anchor="middle" fill="var(--text-dim)" font-size="7">ledger</text>
  <text x="280" y="75" text-anchor="middle" fill="var(--text-faint)" font-size="9">Same trace_id tags every span — no manual timestamp correlation needed</text>
</svg>`,
ex:`A slow checkout request's trace shows 900ms spent in the fraud-check service specifically, out of a 1000ms total — immediately narrowing the investigation to one service instead of guessing across payment, ledger, fraud, and notification services.`,
trade:[`Requires trace context propagation to be correctly implemented across every service boundary (including async/queue-based hops, which are easy to forget) — a broken trace chain at any hop makes this powerful tool useless for that request.`]},

{cat:"DG", title:"Hypothesis-Driven Debugging", def:`Explicitly stating a specific, falsifiable hypothesis ("I believe X causes Y because Z") before testing it, and testing it with the safest available method (read-only queries, replaying in a sandbox/shadow environment) — rather than randomly poking at production or guessing.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="35" width="160" height="40" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="100" y="55" text-anchor="middle" fill="var(--ledger)" font-size="8.5">Hypothesis: "X causes Y</text>
  <text x="100" y="68" text-anchor="middle" fill="var(--ledger)" font-size="8.5">because Z"</text>
  <line x1="180" y1="55" x2="240" y2="55" stroke="var(--border)" stroke-width="2" marker-end="url(#hdArrow)"/>
  <defs><marker id="hdArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <rect x="245" y="35" width="150" height="40" rx="6" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-width="2"/>
  <text x="320" y="58" text-anchor="middle" fill="var(--amber)" font-size="8.5">Test safely (read-only,</text>
  <text x="320" y="70" text-anchor="middle" fill="var(--amber)" font-size="8.5">sandbox replay)</text>
  <line x1="395" y1="55" x2="440" y2="55" stroke="var(--border)" stroke-width="2" marker-end="url(#hdArrow2)"/>
  <defs><marker id="hdArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <rect x="445" y="35" width="100" height="40" rx="6" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="495" y="58" text-anchor="middle" fill="var(--text-dim)" font-size="8.5">Confirm or</text>
  <text x="495" y="70" text-anchor="middle" fill="var(--text-dim)" font-size="8.5">falsify</text>
</svg>`,
ex:`Instead of randomly restarting services hoping the issue goes away, the on-call engineer states: "I believe the spike in errors started when the new fraud-rule config deployed at 2:14pm, because the error timestamps align exactly" — then verifies by checking if reverting just that config resolves the issue, confirming or refuting the hypothesis with evidence.`,
trade:[`Slower per individual test than "just trying things," but dramatically faster overall since it avoids the common trap of randomly changing multiple things at once and never actually learning what fixed it (or whether it's really fixed).`]},

{cat:"DG", title:"Data Repair vs Code Repair", def:`Fixing the bug in code prevents future occurrences, but doesn't fix records that were already written incorrectly — bad data (e.g., wrong balances from a bug) requires its own separate, carefully audited correction process, distinct from and often riskier than the code fix itself.`,
diagram:`<svg viewBox="0 0 560 120" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="30" y="25" width="220" height="60" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="140" y="48" text-anchor="middle" fill="var(--ledger)" font-size="9.5" font-weight="600">Code repair</text>
  <text x="140" y="65" text-anchor="middle" fill="var(--text-faint)" font-size="8">prevents future occurrences —</text>
  <text x="140" y="78" text-anchor="middle" fill="var(--text-faint)" font-size="8">does nothing for past records</text>

  <rect x="310" y="25" width="220" height="60" rx="6" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)" stroke-width="2"/>
  <text x="420" y="48" text-anchor="middle" fill="var(--red)" font-size="9.5" font-weight="600">Data repair</text>
  <text x="420" y="65" text-anchor="middle" fill="var(--text-faint)" font-size="8">separate, audited correction —</text>
  <text x="420" y="78" text-anchor="middle" fill="var(--text-faint)" font-size="8">fixes the already-wrong records</text>
</svg>`,
ex:`After fixing a bug that occasionally double-recorded a fee, the team must also identify every affected transaction, calculate the correct correction for each, and apply it through an audited process (often itself logged as a new corrective transaction rather than silently editing history) — the code fix alone leaves the already-corrupted records wrong.`,
trade:[`Correcting financial data directly (e.g., a raw UPDATE) destroys the audit trail and is generally the wrong approach — better practice is to record an explicit corrective transaction/adjustment, preserving full history of both the error and its correction for auditors.`]},

{cat:"DG", title:"Blameless Postmortems", def:`A structured after-action review focused on the timeline, root cause, and contributing factors (including gaps in monitoring/process) — explicitly not on assigning individual blame, since a punitive culture discourages the honest reporting needed to actually learn from incidents.`,
diagram:`<svg viewBox="0 0 560 120" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="150" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">Focus: timeline, root cause, contributing factors</text>
  <line x1="30" y1="60" x2="330" y2="60" stroke="var(--border)" stroke-width="2"/>
  <circle cx="60" cy="60" r="5" fill="var(--ledger)"/>
  <circle cx="150" cy="60" r="5" fill="var(--amber)"/>
  <circle cx="240" cy="60" r="5" fill="var(--red)"/>
  <circle cx="300" cy="60" r="5" fill="var(--ledger)"/>
  <text x="150" y="45" text-anchor="middle" fill="var(--text-faint)" font-size="8">detected → mitigated → resolved</text>
  <rect x="380" y="35" width="150" height="50" rx="6" fill="var(--red)" fill-opacity="0.1" stroke="var(--red)" stroke-dasharray="4 3"/>
  <text x="455" y="55" text-anchor="middle" fill="var(--red)" font-size="8.5">✕ "who did this?"</text>
  <text x="455" y="72" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">deliberately out of scope</text>
</svg>`,
ex:`A postmortem for a duplicate-charge incident identifies that the missing idempotency key wasn't caught in code review because there was no checklist item for it, and that alerting was 20 minutes slower than it should have been because the relevant dashboard didn't include that specific error type — producing concrete action items for both gaps, not a note about who wrote the bug.`,
trade:[`Requires genuine organizational commitment (a postmortem that quietly still results in blame undermines trust and future honesty), but is one of the highest-leverage practices for actually reducing repeat incidents over time.`]},

{cat:"DG", title:"Debugging a Global, Multi-Region Application", def:`Everything in the earlier debugging steps still applies, but a bug in a global application adds a few extra questions you need to ask right away, because the same code can behave differently in different places at the same time.

Which region is actually affected? A global app usually runs the same code in several regions at once. Before anything else, check whether the problem is happening everywhere, or only in one region — that single fact completely changes where you look next. A problem in only one region often points to something specific to that region: a regional database replica, a regional config value, a local network provider, or even a regional deploy that hasn't finished rolling out yet.

Is it really a bug, or just normal replication delay? In a global system, one region's copy of the data is often a few seconds behind another's. Something that looks like "the data is wrong" might just be "the data hasn't arrived here yet." Always check replication lag between regions before assuming the data itself is incorrect.

Are the clocks actually in sync? Different regions' servers can have slightly different clock times. If you're trying to figure out the order that things happened by comparing timestamps from logs in two different regions, a small clock difference can make events look like they happened in the wrong order even when they didn't. Where possible, use a trace ID to follow the request's actual path instead of trusting timestamps alone across regions.

Did this only break for users tied to a specific region's data? If accounts or data are owned by a specific home region (very common for regulatory reasons in fintech), a bug might only affect customers whose data lives in that one region's database, even though the exact same application code is running everywhere.`,
diagram:`<svg viewBox="0 0 560 140" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <circle cx="90" cy="60" r="30" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="90" y="56" text-anchor="middle" fill="var(--ledger)" font-size="9">US</text>
  <text x="90" y="70" text-anchor="middle" fill="var(--ledger)" font-size="8">healthy</text>
  <circle cx="280" cy="60" r="30" fill="var(--red)" fill-opacity="0.15" stroke="var(--red)" stroke-width="2"/>
  <text x="280" y="52" text-anchor="middle" fill="var(--red)" font-size="9">EU</text>
  <text x="280" y="66" text-anchor="middle" fill="var(--red)" font-size="7.5">45s replication lag</text>
  <circle cx="470" cy="60" r="30" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="470" y="56" text-anchor="middle" fill="var(--ledger)" font-size="9">APAC</text>
  <text x="470" y="70" text-anchor="middle" fill="var(--ledger)" font-size="8">healthy</text>
  <text x="280" y="115" text-anchor="middle" fill="var(--text-faint)" font-size="9">Same code everywhere — only EU's replica lag explains the symptom</text>
</svg>`,
ex:`Customers in Europe report a transaction not showing up, while customers in the US see no problem. Checking replication lag shows the EU read-replica is 45 seconds behind its primary — much higher than the usual 1-2 seconds — because of a temporary network slowdown between two data centers. This isn't a code bug at all; it's a regional infrastructure issue, and the fix is investigating the network link and possibly routing that read to the primary temporarily, not searching through application code for a bug that doesn't exist there.`,
trade:[
  `Always confirm "which region(s)" before deep-diving into code — it's a 30-second check that can save hours of debugging application logic for what's actually a regional infrastructure or replication issue.`,
  `Trace IDs that follow a request across regions are far more reliable than comparing timestamps from different regions' logs, since clocks can differ slightly between regions even with time-sync services in place.`,
  `A fix that works by simply redeploying to "fix" one broken region can hide a deeper problem (like a bad regional config or a partial rollout) — confirm the actual cause before considering the incident closed, even if a redeploy or restart made the symptom go away.`
]},

// ---------------- CLOUD, CI/CD & CONTAINERS ----------------
{cat:"CC", title:"Containers & Docker", def:`A container packages up an application together with everything it needs to run — code, runtime, system libraries, configuration — into one self-contained unit that behaves the same way no matter which machine it runs on. Docker is the most widely-used tool for building and running containers.

This solves the classic "it works on my machine" problem: instead of hoping a server has the exact right version of a language runtime or library already installed, the container brings its own copy of everything it needs along with it.

A container is different from a full virtual machine — it shares the host machine's operating system kernel instead of running a whole separate guest operating system, which makes containers much lighter and faster to start than VMs.`,
diagram:`<svg viewBox="0 0 460 190" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="110" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Virtual Machines</text>
  <rect x="20" y="30" width="180" height="140" rx="6" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="110" y="45" text-anchor="middle" fill="var(--text-dim)" font-size="9" font-weight="600">Host OS</text>
  <rect x="35" y="55" width="70" height="100" rx="4" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)"/>
  <text x="70" y="75" text-anchor="middle" fill="var(--text)" font-size="8.5">Guest OS</text>
  <text x="70" y="90" text-anchor="middle" fill="var(--text)" font-size="8.5">App A</text>
  <rect x="115" y="55" width="70" height="100" rx="4" fill="var(--amber)" fill-opacity="0.18" stroke="var(--amber)"/>
  <text x="150" y="75" text-anchor="middle" fill="var(--text)" font-size="8.5">Guest OS</text>
  <text x="150" y="90" text-anchor="middle" fill="var(--text)" font-size="8.5">App B</text>
  <text x="110" y="185" text-anchor="middle" fill="var(--text-faint)" font-size="9">each VM: full separate OS</text>

  <text x="350" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Containers</text>
  <rect x="260" y="30" width="180" height="140" rx="6" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="350" y="45" text-anchor="middle" fill="var(--text-dim)" font-size="9" font-weight="600">Shared Host OS Kernel</text>
  <rect x="275" y="55" width="70" height="100" rx="4" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)"/>
  <text x="310" y="90" text-anchor="middle" fill="var(--text)" font-size="8.5">App A</text>
  <rect x="355" y="55" width="70" height="100" rx="4" fill="var(--amber)" fill-opacity="0.18" stroke="var(--amber)"/>
  <text x="390" y="90" text-anchor="middle" fill="var(--text)" font-size="8.5">App B</text>
  <text x="350" y="185" text-anchor="middle" fill="var(--ledger)" font-size="9" font-weight="600">no guest OS — lighter, faster start</text>
</svg>`,
ex:`A payment service that needs a specific version of a language runtime and a specific set of libraries is packaged into a Docker container. It runs identically whether it's on a developer's laptop, a staging server, or in production — no more "it worked in staging but broke in prod because the library version was different."`,
trade:[`Containers start in seconds (versus minutes for a full VM) and use far less memory/disk overhead, but they share the host's kernel, so they offer a bit less isolation between workloads than a full VM does — a genuine security consideration for multi-tenant environments handling sensitive financial data.`,`Building a good container image (small size, minimal attack surface, no unnecessary tools installed) takes real discipline — a lazily-built image can be needlessly large and carry security vulnerabilities from unused packages.`]},

{cat:"CC", title:"Container Orchestration (Kubernetes)", def:`Once you have many containers running across many machines, you need something to decide which container runs where, restart it if it crashes, scale it up or down based on load, and route traffic to it. Kubernetes is the most widely-used tool for this job — it's often described as an "operating system for your cluster of servers."

Key building blocks: a Pod is the smallest deployable unit (usually one container, sometimes a few tightly coupled ones). A Deployment describes how many copies of a Pod should be running and manages rolling out updates. A Service gives a stable network address to a group of Pods, even as individual Pods are created and destroyed.`,
diagram:`<svg viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="260" y="25" text-anchor="middle" fill="var(--text-dim)" font-size="12">incoming traffic</text>
  <line x1="260" y1="32" x2="260" y2="55" stroke="var(--text-faint)" stroke-width="2" marker-end="url(#k8-x)"/>

  <rect x="150" y="58" width="220" height="45" rx="8" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)" stroke-width="2"/>
  <text x="260" y="86" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="700">Service (stable address)</text>

  <line x1="260" y1="103" x2="260" y2="125" stroke="var(--text-faint)" stroke-width="2" marker-end="url(#k8-x)"/>

  <rect x="130" y="128" width="260" height="45" rx="8" fill="var(--violet)" fill-opacity="0.15" stroke="var(--violet)" stroke-width="2"/>

  <line x1="180" y1="173" x2="120" y2="205" stroke="var(--text-faint)" stroke-width="1.5"/>
  <line x1="230" y1="173" x2="200" y2="205" stroke="var(--text-faint)" stroke-width="1.5"/>
  <line x1="290" y1="173" x2="300" y2="205" stroke="var(--text-faint)" stroke-width="1.5"/>
  <line x1="340" y1="173" x2="380" y2="205" stroke="var(--text-faint)" stroke-width="1.5"/>

  <rect x="60" y="208" width="90" height="55" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
  <text x="105" y="238" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Pod 1</text>

  <rect x="160" y="208" width="90" height="55" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
  <text x="205" y="238" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Pod 2</text>

  <rect x="260" y="208" width="90" height="55" rx="6" fill="var(--red)" fill-opacity="0.18" stroke="var(--red)" stroke-dasharray="5,3"/>
  <text x="305" y="232" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Pod 3</text>
  <text x="305" y="248" text-anchor="middle" fill="var(--red)" font-size="10" font-weight="600">crashed → restarting</text>

  <rect x="360" y="208" width="90" height="55" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
  <text x="405" y="238" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Pod 4</text>

  <text x="260" y="288" text-anchor="middle" fill="var(--text-dim)" font-size="11">Deployment notices Pod 3 is gone and automatically starts a replacement</text>
