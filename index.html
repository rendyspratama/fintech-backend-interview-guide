  <text x="80" y="90" text-anchor="middle" fill="var(--text-faint)" font-size="8">safe to retry freely</text>

  <text x="330" y="20" text-anchor="middle" fill="var(--text-dim)" font-size="10" font-weight="600">POST</text>
  <text x="330" y="35" text-anchor="middle" fill="var(--red)" font-size="9" font-weight="600">NOT idempotent</text>
  <rect x="270" y="45" width="120" height="24" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)"/>
  <text x="330" y="61" text-anchor="middle" fill="var(--red)" font-size="8.5">call ×2 → 2 charges</text>
  <text x="330" y="90" text-anchor="middle" fill="var(--text-faint)" font-size="8">needs an idempotency key</text>

  <text x="490" y="20" text-anchor="middle" fill="var(--text-dim)" font-size="10" font-weight="600">PATCH</text>
  <text x="490" y="35" text-anchor="middle" fill="var(--amber)" font-size="9" font-weight="600">Depends</text>
  <rect x="440" y="45" width="100" height="24" fill="var(--amber)" fill-opacity="0.12" stroke="var(--amber)"/>
  <text x="490" y="61" text-anchor="middle" fill="var(--amber)" font-size="7.5">"set X" ok, "+5" not</text>
</svg>`,
ex:`A flaky network causes a client's POST request to create a payment to time out — the client doesn't know if the server actually processed it before the connection dropped. Blindly retrying the POST could create a second, duplicate payment. This is exactly the scenario the Idempotency Keys pattern solves: the retry carries the same idempotency key as the original attempt, so the server recognizes it and returns the original result instead of processing a second payment.`,
trade:[`Building infrastructure (load balancers, HTTP client libraries) that automatically retries "safe" methods (GET) but not POST by default is a sensible, common convention — but it only holds if your application actually implements each method according to its intended idempotency semantics. A POST-based endpoint that's secretly *not* safe to retry, combined with automatic retry logic that assumes otherwise, is a real source of production bugs.`]},

{cat:"MA", title:"API Versioning & Backward Compatibility", def:`Strategies for evolving an API without breaking existing clients: additive-only changes (new optional fields, never remove/rename existing ones), explicit version numbers (URL path or header), and a clear deprecation policy with a defined sunset timeline communicated in advance.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <line x1="30" y1="65" x2="530" y2="65" stroke="var(--border)" stroke-width="2"/>
  <circle cx="80" cy="65" r="6" fill="var(--ledger)"/>
  <text x="80" y="50" text-anchor="middle" fill="var(--ledger)" font-size="9" font-weight="600">v1 released</text>
  <circle cx="280" cy="65" r="6" fill="var(--amber)"/>
  <text x="280" y="50" text-anchor="middle" fill="var(--amber)" font-size="9" font-weight="600">v2 released, v1 deprecated</text>
  <rect x="80" y="73" width="200" height="14" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-dasharray="2 2"/>
  <text x="180" y="105" text-anchor="middle" fill="var(--text-faint)" font-size="8">v1 still works — sunset window</text>
  <circle cx="480" cy="65" r="6" fill="var(--red)"/>
  <text x="480" y="50" text-anchor="middle" fill="var(--red)" font-size="9" font-weight="600">v1 sunset</text>
</svg>`,
ex:`Adding a new optional `+"`riskScore`"+` field to a transaction response is backward compatible; renaming `+"`amount`"+` to `+"`transactionAmount`"+` is not — the latter requires a new API version or a transition period supporting both field names simultaneously.`,
trade:[`Strict backward compatibility slows down how quickly you can "clean up" an API, but breaking external partner integrations in a fintech context (often bank/processor integrations with long change-management cycles) can be far more costly than the discipline of maintaining compatibility.`]},

{cat:"MA", title:"Pagination Strategies: Offset vs Cursor", def:`Two different ways to let a client fetch a large result set page by page.

Offset-based pagination — the client asks for something like "give me rows 100-120." Simple to understand and implement, but has two real problems at scale: the database still has to scan through and discard the first 100 rows every time to find row 100, which gets slower the deeper you page in; and if rows are being inserted or deleted while someone is paging through, rows can shift between pages, causing the same row to appear twice or a row to be skipped entirely.

Cursor-based (keyset) pagination — instead of an offset number, the client gets back a "cursor" — usually an encoded reference to the last item it saw (like the last row's ID or timestamp) — and the next request says "give me the next 20 after this cursor." The database can jump directly to that point using an index, without scanning and discarding earlier rows, and it doesn't suffer from the shifting-rows problem, since each page is defined relative to a specific row, not a shifting numeric position.`,
diagram:`<svg viewBox="0 0 480 170" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="130" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Offset (page 500 = "skip 9980")</text>
  <rect x="20" y="30" width="220" height="24" fill="var(--red)" fill-opacity="0.2" stroke="var(--red)"/>
  <text x="130" y="46" text-anchor="middle" fill="var(--red)" font-size="9.5">scan + discard 9980 rows first</text>
  <rect x="240" y="30" width="40" height="24" fill="var(--ledger)"/>
  <text x="260" y="46" text-anchor="middle" fill="var(--text)" font-size="9">page</text>
  <text x="130" y="75" text-anchor="middle" fill="var(--text-faint)" font-size="9.5">gets slower the deeper you page</text>

  <text x="130" y="110" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Cursor ("after id=9980")</text>
  <line x1="20" y1="135" x2="480" y2="135" stroke="var(--border)" stroke-width="2"/>
  <circle cx="240" cy="135" r="6" fill="var(--ledger)"/>
  <text x="240" y="120" text-anchor="middle" fill="var(--ledger)" font-size="9" font-weight="600">cursor</text>
  <rect x="240" y="145" width="40" height="18" fill="var(--ledger)" fill-opacity="0.6"/>
  <text x="260" y="158" text-anchor="middle" fill="var(--text)" font-size="8">next 20</text>
  <text x="130" y="163" text-anchor="middle" fill="var(--text-faint)" font-size="9.5">index jumps straight there — same speed at any depth</text>
</svg>`,
ex:`A transaction history API paginating through millions of records for a high-volume merchant performs consistently fast with cursor-based pagination even on page 500, because each request just uses an index to jump straight to "transactions after this ID" — whereas offset-based pagination asking for "page 500" would require the database to scan and discard 9,980 earlier rows first, getting slower the deeper the merchant pages back into their history.`,
trade:[`Cursor-based pagination is the better choice for large, frequently-changing datasets and is what most serious APIs use for anything at scale — but it doesn't support jumping directly to an arbitrary page number ("show me page 47"), since a cursor only knows how to move relative to a specific position, not an absolute page count.`,`Offset-based pagination remains fine for smaller, relatively static datasets where "jump to page N" is a genuinely useful feature and the performance/consistency downsides don't matter much at that scale.`]},

{cat:"MA", title:"Webhooks: Delivery, Retries & Signature Verification", def:`A webhook is a way for one system to notify another about an event by making an HTTP POST request to a URL the receiver registered in advance — instead of the receiver having to constantly poll "did anything happen yet?", the sender pushes the update the moment it happens.

Since the network is unreliable, a well-built webhook sender retries failed deliveries (usually with backoff, similar to the Retry pattern covered in the Reliability section) — which means the receiver needs to handle receiving the same webhook more than once (the Inbox pattern, covered earlier, is exactly the tool for this).

Because a webhook URL is just a public endpoint, anyone who discovers it could try sending fake webhook requests, pretending to be the real sender. To prevent this, senders typically sign each webhook payload with a secret key, and the receiver verifies that signature before trusting the payload — proving the request genuinely came from the expected sender and wasn't tampered with in transit.`,
diagram:`<svg viewBox="0 0 560 180" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="70" y="20" fill="var(--text-dim)" font-size="10.5" font-weight="600">Sender</text>
  <text x="470" y="20" fill="var(--text-dim)" font-size="10.5" font-weight="600">Merchant endpoint</text>
  <rect x="20" y="30" width="120" height="30" rx="5" fill="var(--panel)" stroke="var(--border)"/>
  <text x="80" y="49" text-anchor="middle" fill="var(--text-dim)" font-size="9">POST + signature</text>
  <line x1="140" y1="45" x2="400" y2="45" stroke="var(--ledger)" stroke-width="2" marker-end="url(#whArrow)"/>
  <rect x="400" y="30" width="140" height="30" rx="5" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)"/>
  <text x="470" y="49" text-anchor="middle" fill="var(--red)" font-size="9">endpoint down</text>
  <defs><marker id="whArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ledger)"/></marker></defs>

  <line x1="140" y1="85" x2="400" y2="85" stroke="var(--amber)" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#whArrow2)"/>
  <text x="270" y="78" text-anchor="middle" fill="var(--amber)" font-size="8.5">retry #1 (backoff)</text>
  <defs><marker id="whArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--amber)"/></marker></defs>
  <rect x="400" y="70" width="140" height="30" rx="5" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="470" y="89" text-anchor="middle" fill="var(--ledger)" font-size="9">verifies sig, processes</text>

  <line x1="140" y1="125" x2="400" y2="125" stroke="var(--text-faint)" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#whArrow3)"/>
  <text x="270" y="118" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">retry #2 (redundant)</text>
  <defs><marker id="whArrow3" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--text-faint)"/></marker></defs>
  <rect x="400" y="110" width="140" height="30" rx="5" fill="var(--panel)" stroke="var(--border)" stroke-dasharray="3 2"/>
  <text x="470" y="129" text-anchor="middle" fill="var(--text-faint)" font-size="9">dedup'd via Inbox, ignored</text>

  <text x="280" y="165" text-anchor="middle" fill="var(--text-faint)" font-size="9">Signature verification stops forged requests; the Inbox pattern absorbs duplicate retries.</text>
</svg>`,
ex:`A payment processor sends a webhook to notify a merchant's server the moment a payment settles. The merchant's endpoint verifies the request's signature (using a shared secret set up when the webhook was first configured) before trusting it — rejecting any request that fails this check, since an attacker could otherwise send a fake "payment settled" webhook trying to trick the merchant's system into releasing goods for a payment that never actually happened. If the merchant's server is briefly down when the webhook first arrives, the processor automatically retries with backoff, and the merchant's system recognizes and safely ignores the duplicate if it already processed the first successful delivery.`,
trade:[`Webhooks are far more efficient than polling for real-time updates, but they require the receiver to expose a publicly reachable endpoint and to build real reliability handling (signature verification, deduplication of retried deliveries, and a plan for what happens if their endpoint is down for an extended period and the sender eventually gives up retrying).`,`Skipping signature verification is a genuine, exploitable security hole in a payment context specifically — never trust a webhook's contents just because it arrived at the expected URL.`]},

{cat:"MA", title:"Schema Evolution (Avro/Protobuf + Registry)", def:`When events flow through a message broker to multiple independent consumers, the event schema needs to change over time without breaking consumers still running the old version. A schema registry (with Avro or Protobuf) enforces compatibility rules (e.g., only additive, optional-field changes) at publish time.`,
diagram:`<svg viewBox="0 0 560 160" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="20" width="150" height="30" rx="5" fill="var(--panel)" stroke="var(--border)"/>
  <text x="95" y="39" text-anchor="middle" fill="var(--text-dim)" font-size="9.5">Producer: publish v2 schema</text>
  <line x1="170" y1="35" x2="260" y2="35" stroke="var(--border)" stroke-width="2" marker-end="url(#seArrow)"/>
  <defs><marker id="seArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <rect x="260" y="15" width="150" height="40" rx="5" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="335" y="32" text-anchor="middle" fill="var(--ledger)" font-size="9.5">Schema Registry</text>
  <text x="335" y="47" text-anchor="middle" fill="var(--ledger)" font-size="8">checks compatibility</text>

  <line x1="410" y1="35" x2="480" y2="35" stroke="var(--ledger)" stroke-width="2" marker-end="url(#seArrow2)"/>
  <defs><marker id="seArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ledger)"/></marker></defs>
  <rect x="480" y="20" width="60" height="30" rx="5" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="510" y="39" text-anchor="middle" fill="var(--ledger)" font-size="8">v2 OK</text>

  <text x="335" y="80" text-anchor="middle" fill="var(--text-dim)" font-size="9.5">Consumers, mixed versions:</text>
  <rect x="80" y="95" width="130" height="28" rx="5" fill="var(--panel)" stroke="var(--border)"/>
  <text x="145" y="113" text-anchor="middle" fill="var(--text-dim)" font-size="8.5">Consumer (v1) — ignores new field</text>
  <rect x="330" y="95" width="150" height="28" rx="5" fill="var(--panel)" stroke="var(--border)"/>
  <text x="405" y="113" text-anchor="middle" fill="var(--text-dim)" font-size="8.5">Consumer (v2) — reads new field</text>
  <text x="280" y="145" text-anchor="middle" fill="var(--text-faint)" font-size="9">Additive-only change: both versions keep working, no coordinated deploy needed</text>
</svg>`,
ex:`Adding a new optional field to the `+"`TransactionCompleted`"+` event schema is safe and old consumers simply ignore the new field; removing or renaming a field that a downstream reconciliation consumer depends on would silently break that consumer's processing — a schema registry with compatibility checks catches this at publish/deploy time instead of at 2am in production.`,
trade:[`Adds infrastructure (the registry) and process overhead (schema review before publishing), but prevents an entire class of silent, hard-to-diagnose downstream breakage — especially valuable when producer and consumer teams are different and don't deploy in lockstep.`]},

// ---------------- SECURITY ----------------
{cat:"SC", title:"Symmetric vs Asymmetric Encryption, and Hashing vs Encryption", def:`Three basic crypto building blocks that are easy to mix up, but behave completely differently — and using the wrong one for the job is a common, serious mistake.

Symmetric encryption — the same single key both encrypts and decrypts the data. Fast, efficient, good for encrypting large amounts of data. The hard problem is safely getting that same key to both sides in the first place.

Asymmetric encryption — uses a mathematically linked pair of keys: a public key (safe to share with anyone) that encrypts, and a private key (kept secret) that's the only thing that can decrypt it. Solves the "how do we share a key safely" problem, but is much slower than symmetric encryption, so it's often only used to safely exchange a symmetric key, which then does the actual bulk encrypting.

Hashing — takes data and produces a fixed-size, one-way "fingerprint." Crucially, hashing is NOT encryption: it can never be reversed back into the original data, even with a key. It's used to verify data hasn't changed, or to check a value (like a password) without ever storing the real thing.

The distinction that trips people up most: encryption is for data you need to get back later in its original form (like a bank account number you'll need to display or use again). Hashing is for data you only ever need to *check*, never *retrieve* (like a password — you never need to know what the original password was, only whether what someone just typed matches).`,
diagram:`<svg viewBox="0 0 560 190" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="90" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">Symmetric</text>
  <rect x="30" y="30" width="120" height="26" fill="var(--panel)" stroke="var(--border)"/>
  <text x="90" y="47" text-anchor="middle" fill="var(--text-dim)" font-size="8.5">plaintext</text>
  <line x1="90" y1="56" x2="90" y2="76" stroke="var(--ledger)" stroke-width="2" marker-end="url(#cryptArrow)"/>
  <text x="105" y="70" fill="var(--ledger)" font-size="7.5">same key</text>
  <rect x="30" y="80" width="120" height="26" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="90" y="97" text-anchor="middle" fill="var(--ledger)" font-size="8.5">ciphertext</text>
  <text x="90" y="130" text-anchor="middle" fill="var(--text-faint)" font-size="8">fast, reversible with the same key</text>

  <text x="290" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">Asymmetric</text>
  <rect x="230" y="30" width="120" height="26" fill="var(--panel)" stroke="var(--border)"/>
  <text x="290" y="47" text-anchor="middle" fill="var(--text-dim)" font-size="8.5">plaintext</text>
  <line x1="290" y1="56" x2="290" y2="76" stroke="var(--amber)" stroke-width="2" marker-end="url(#cryptArrow2)"/>
  <text x="322" y="70" fill="var(--amber)" font-size="7.5">public key encrypts</text>
  <rect x="230" y="80" width="120" height="26" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)"/>
  <text x="290" y="97" text-anchor="middle" fill="var(--amber)" font-size="8.5">ciphertext</text>
  <text x="290" y="130" text-anchor="middle" fill="var(--text-faint)" font-size="8">slower; only the private key decrypts</text>

  <text x="470" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">Hashing</text>
  <rect x="410" y="30" width="120" height="26" fill="var(--panel)" stroke="var(--border)"/>
  <text x="470" y="47" text-anchor="middle" fill="var(--text-dim)" font-size="8.5">"hunter2"</text>
  <line x1="470" y1="56" x2="470" y2="76" stroke="var(--red)" stroke-width="2" marker-end="url(#cryptArrow3)"/>
  <rect x="410" y="80" width="120" height="26" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)"/>
  <text x="470" y="97" text-anchor="middle" fill="var(--red)" font-size="8">a1b2c3...(fixed size)</text>
  <text x="470" y="130" text-anchor="middle" fill="var(--red)" font-size="8" font-weight="600">one-way — never reversible</text>
  <defs>
    <marker id="cryptArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ledger)"/></marker>
    <marker id="cryptArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--amber)"/></marker>
    <marker id="cryptArrow3" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--red)"/></marker>
  </defs>
  <text x="280" y="160" text-anchor="middle" fill="var(--text-faint)" font-size="9">Encryption: get the original back later. Hashing: only ever check a match.</text>
</svg>`,
ex:`A card number needs to be usable again later (to process a future payment), so it's encrypted, not hashed — the system can decrypt it when it genuinely needs the real number. A user's login password should never need to be "retrieved" at all — the system only ever needs to check "does this match," so it's hashed (see the dedicated Password Storage topic), not encrypted. Mixing these up — for example, encrypting a password instead of hashing it — means anyone who steals the encryption key can recover every user's actual password, which defeats the entire point.`,
trade:[`TLS (covered in the Networking section) actually uses both: asymmetric encryption during the handshake to safely agree on a shared secret, then fast symmetric encryption for the actual data that follows — a practical example of using each tool for what it's actually good at.`,`A common, serious mistake is using reversible encryption for something that should be hashed (like passwords) — it might look secure since the value isn't stored in plain text, but it's fundamentally the wrong tool, because it means the true plaintext password can be recovered by anyone with the key.`]},

{cat:"SC", title:"Password Storage & Hashing", def:`Passwords should never be encrypted — remember from the previous topic, encryption is reversible, and a password should never need to be "recovered," only checked. Instead, passwords are hashed using algorithms specifically designed for this job: bcrypt, scrypt, or Argon2 (the current best-practice choice).

These password-hashing algorithms are deliberately slow — unlike a fast general-purpose hash (like SHA-256, which is built for speed and isn't suitable for passwords), these are intentionally designed to take a noticeable fraction of a second, which makes them resistant to an attacker trying millions of guesses per second if they ever steal your hashed password database.

A salt — random data unique to each password — is also mixed in before hashing. This means two users with the identical password "password123" end up with completely different stored hashes, which stops an attacker from using a single precomputed table of common password hashes (a "rainbow table") to crack many accounts at once.

At login, the system doesn't "decrypt" anything — it just hashes whatever the user just typed, using the same algorithm and salt, and checks if the result matches what's stored.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="90" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">Signup</text>
  <rect x="20" y="30" width="140" height="26" fill="var(--panel)" stroke="var(--border)"/>
  <text x="90" y="47" text-anchor="middle" fill="var(--text-dim)" font-size="8.5">"password123" + salt</text>
  <line x1="90" y1="56" x2="90" y2="76" stroke="var(--ledger)" stroke-width="2" marker-end="url(#pwArrow)"/>
  <defs><marker id="pwArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ledger)"/></marker></defs>
  <rect x="20" y="80" width="140" height="26" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="90" y="97" text-anchor="middle" fill="var(--ledger)" font-size="8">bcrypt(pw, salt) → stored</text>

  <text x="330" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">Login attempt</text>
  <rect x="250" y="30" width="140" height="26" fill="var(--panel)" stroke="var(--border)"/>
  <text x="320" y="47" text-anchor="middle" fill="var(--text-dim)" font-size="8.5">typed password + same salt</text>
  <line x1="320" y1="56" x2="320" y2="76" stroke="var(--amber)" stroke-width="2" marker-end="url(#pwArrow2)"/>
  <defs><marker id="pwArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--amber)"/></marker></defs>
  <rect x="250" y="80" width="140" height="26" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)"/>
  <text x="320" y="97" text-anchor="middle" fill="var(--amber)" font-size="8">bcrypt(attempt, salt)</text>

  <line x1="160" y1="93" x2="248" y2="93" stroke="var(--text-faint)" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="205" y="87" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">compare hashes</text>
  <text x="200" y="130" text-anchor="middle" fill="var(--text-faint)" font-size="9">Never decrypted — only two hashes compared for equality</text>
</svg>`,
ex:`When a user creates an account, their password is run through Argon2 with a random salt, and only the resulting hash (plus the salt) is stored — the actual password is never saved anywhere, not even temporarily. If the database is ever stolen in a breach, an attacker gets a list of slow-to-crack, uniquely-salted hashes, not a list of actual passwords they can immediately use to log in elsewhere.`,
trade:[`Using a fast, general-purpose hash function (like plain SHA-256 or MD5) for passwords is a common and serious mistake — these are built for speed, which is exactly the wrong property for password storage, since it makes brute-force guessing much cheaper for an attacker.`,`Because people reuse passwords across sites, even correctly-hashed password storage doesn't protect a user if they reused the same password elsewhere and that other, weaker site gets breached — this is part of why multi-factor authentication exists as a second, independent layer of protection.`]},

{cat:"SC", title:"Common Web Vulnerabilities: SQL Injection, XSS & CSRF", def:`Three of the most common attacks against web applications, each with a well-established prevention technique.

SQL Injection — happens when user input is directly concatenated into a SQL query string, letting an attacker inject their own SQL logic. For example, if a login query is built by literally pasting the username into a string, an attacker can type input that changes the meaning of the query itself, potentially bypassing the password check entirely or extracting data they shouldn't see.

The fix: always use parameterized queries (also called prepared statements), where user input is passed as data to the database driver, never pasted directly into the query text. This makes the injection structurally impossible, rather than relying on trying to "clean" the input yourself.

XSS (Cross-Site Scripting) — happens when user-supplied input is displayed on a page without being properly escaped, letting an attacker inject their own JavaScript that then runs in other users' browsers when they view that page. This could let an attacker steal session tokens or take actions as if they were the victim.

The fix: always escape/encode user-supplied content before rendering it as HTML (most modern frontend frameworks do this by default), and never blindly trust content flagged as "safe HTML" from user input.

CSRF (Cross-Site Request Forgery) — happens when a malicious website tricks a victim's browser into making a request to your site that the victim didn't intend, relying on the browser automatically attaching the victim's existing login cookies to that request.

The fix: use a CSRF token (a random value tied to the user's session that must be included in state-changing requests) and/or set cookies with `+"`SameSite=Strict`"+` or `+"`SameSite=Lax`"+`, which tells the browser not to send that cookie along with requests originating from other sites.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="90" y="18" text-anchor="middle" fill="var(--red)" font-size="10" font-weight="600">SQL Injection</text>
  <rect x="20" y="30" width="140" height="34" rx="5" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)"/>
  <text x="90" y="47" text-anchor="middle" fill="var(--red)" font-size="8">input pasted into query text</text>
  <text x="90" y="59" text-anchor="middle" fill="var(--ledger)" font-size="7.5">fix: parameterized queries</text>

  <text x="280" y="18" text-anchor="middle" fill="var(--red)" font-size="10" font-weight="600">XSS</text>
  <rect x="210" y="30" width="140" height="34" rx="5" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)"/>
  <text x="280" y="47" text-anchor="middle" fill="var(--red)" font-size="8">unescaped input rendered as HTML/JS</text>
  <text x="280" y="59" text-anchor="middle" fill="var(--ledger)" font-size="7.5">fix: escape output</text>

  <text x="470" y="18" text-anchor="middle" fill="var(--red)" font-size="10" font-weight="600">CSRF</text>
  <rect x="400" y="30" width="140" height="34" rx="5" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)"/>
  <text x="470" y="47" text-anchor="middle" fill="var(--red)" font-size="8">forged request rides victim's cookies</text>
  <text x="470" y="59" text-anchor="middle" fill="var(--ledger)" font-size="7.5">fix: CSRF token / SameSite</text>

  <text x="280" y="100" text-anchor="middle" fill="var(--text-faint)" font-size="9">All three: attacker-controlled input treated as trusted code or a trusted request</text>
</svg>`,
ex:`A login form vulnerable to SQL injection might let an attacker type something like `+"`' OR '1'='1`"+` into the username field, changing the query's logic to match every row instead of just the intended user — completely bypassing the password check. Using a parameterized query instead means that entire string is just treated as literal data to search for, not executable SQL, so the attack simply fails to match anything.`,
trade:[`These are extremely well-understood, decades-old attack classes with well-established fixes — there's rarely a good excuse for a modern system to be vulnerable to any of them, which is exactly why they're common interview questions: reviewers want to confirm you actually know the standard mitigation, not just that the vulnerability exists.`,`Framework defaults help a lot (most modern ORMs parameterize queries automatically, most frontend frameworks escape output by default), but relying purely on "the framework probably handles it" without understanding why is risky — a raw SQL query or a deliberately unescaped HTML render can still reintroduce these vulnerabilities even within a framework that protects against them by default.`]},

{cat:"SC", title:"CORS (Cross-Origin Resource Sharing)", def:`Browsers enforce a security rule called the Same-Origin Policy: by default, JavaScript running on one website (say, dashboard.example.com) is not allowed to make a request to a different origin (like api.example.com) and read the response — even though nothing stops the request from being sent, the browser blocks the page's JavaScript from seeing the result. This exists to stop a malicious site from silently reading data from other sites a victim happens to be logged into.

CORS is the mechanism that lets a server deliberately opt out of that restriction for specific origins, by returning response headers that tell the browser "responses to this origin are allowed to be read by that other origin's JavaScript." The most important header is `+"`Access-Control-Allow-Origin`"+`, which lists which origin(s) are permitted.

For anything beyond a simple GET request (like a POST with a JSON body, or a request carrying custom headers), the browser first automatically sends a separate "preflight" request — an OPTIONS request asking "would you actually allow this?" — before sending the real request at all. The server needs to explicitly answer that preflight correctly, or the browser never even attempts the real request.

A common, genuinely dangerous misconfiguration: setting `+"`Access-Control-Allow-Origin: *`"+` (allow literally any origin) while also allowing credentials (cookies) to be sent with the request. Browsers actually block this exact combination for good reason — if any website could read cookie-authenticated responses from your API, that defeats the entire purpose of the Same-Origin Policy. If you need to support credentialed requests, you must echo back a specific, validated origin, never a wildcard.`,
diagram:`<svg viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="80" y="25" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="600">Browser</text>
  <line x1="80" y1="38" x2="80" y2="180" stroke="var(--border)" stroke-width="2"/>
  <text x="400" y="25" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="600">api.example.com</text>
  <line x1="400" y1="38" x2="400" y2="180" stroke="var(--border)" stroke-width="2"/>

  <line x1="80" y1="60" x2="395" y2="60" stroke="var(--amber)" stroke-width="2" marker-end="url(#co-a)"/>
  <text x="240" y="52" text-anchor="middle" fill="var(--amber)" font-size="11" font-weight="600">1. OPTIONS preflight — "would you allow this?"</text>

  <line x1="400" y1="90" x2="85" y2="90" stroke="var(--ledger)" stroke-width="2" marker-end="url(#co-g)"/>
  <text x="240" y="82" text-anchor="middle" fill="var(--ledger)" font-size="11" font-weight="600">2. Access-Control-Allow-Origin: app.example.com</text>

  <line x1="80" y1="120" x2="395" y2="120" stroke="var(--blue)" stroke-width="2" marker-end="url(#co-b)"/>
  <text x="240" y="112" text-anchor="middle" fill="var(--blue)" font-size="11" font-weight="600">3. actual request now sent</text>

  <line x1="400" y1="150" x2="85" y2="150" stroke="var(--blue)" stroke-width="2" marker-end="url(#co-b)"/>
  <text x="240" y="142" text-anchor="middle" fill="var(--blue)" font-size="11" font-weight="600">4. response, readable by the page's JS</text>

  <text x="240" y="175" text-anchor="middle" fill="var(--text-faint)" font-size="10.5">If step 2's header doesn't match, step 4's response is blocked from JS entirely</text>

  <defs>
    <marker id="co-a" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--amber)"/></marker>
    <marker id="co-g" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--ledger)"/></marker>
    <marker id="co-b" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--blue)"/></marker>
  </defs>
</svg>`,
ex:`A single-page app hosted at app.example.com calls an API at api.example.com. Without CORS configured, the browser blocks the app's JavaScript from reading the API's response, even if the request itself technically succeeded on the server. The API team adds `+"`Access-Control-Allow-Origin: https://app.example.com`"+` to their responses (a specific origin, not a wildcard, since the app sends an auth cookie) — now the browser permits the app's own JavaScript to read the response, while a random unrelated website trying the same request from a user's browser is still blocked.`,
trade:[`CORS is a browser-enforced protection — it does nothing to stop a direct server-to-server call, a mobile app, or a tool like curl, since those aren't browsers and don't enforce the Same-Origin Policy at all. It specifically protects browser-based JavaScript from reading responses across origins it shouldn't.`,`It's common for developers to "fix" a CORS error during development by setting `+"`Access-Control-Allow-Origin: *`"+` everywhere and never revisiting it — this is a real security regression in production if the API also relies on cookies for authentication, since it can open the door to cross-site data theft.`]},

{cat:"SC", title:"AuthN vs AuthZ (OAuth2 / OIDC / JWT)", def:`Authentication (AuthN) — proving who you are (logging in).

Authorization (AuthZ) — proving what you're allowed to do, once you're already known to be you.

OAuth2 — a framework for delegated authorization: it lets one app act on a user's behalf with limited, specific permissions ("scopes"), without ever seeing the user's actual password.

OIDC (OpenID Connect) — adds an identity/login layer on top of OAuth2, since OAuth2 by itself was only ever designed for authorization, not for actually proving who someone is.

JWT (JSON Web Token) — a common format for carrying these claims/permissions around as a signed token. The catch: once issued, a JWT is valid until it expires — there's no built-in, free way to instantly revoke one early.`,
diagram:`<svg viewBox="0 0 480 210" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="80" width="90" height="40" rx="6" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="65" y="104" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">User</text>

  <rect x="150" y="80" width="90" height="40" rx="6" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)" stroke-width="2"/>
  <text x="195" y="104" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">Budget App</text>

  <rect x="150" y="15" width="150" height="40" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="225" y="39" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">Auth Server (bank)</text>

  <rect x="330" y="80" width="130" height="40" rx="6" fill="var(--amber)" fill-opacity="0.18" stroke="var(--amber)" stroke-width="2"/>
  <text x="395" y="104" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">Transactions API</text>

  <line x1="110" y1="95" x2="145" y2="95" stroke="var(--text-faint)" stroke-width="1.5" marker-end="url(#oa-x)"/>
  <text x="127" y="85" text-anchor="middle" fill="var(--text-faint)" font-size="8">1. "connect my bank"</text>

  <line x1="195" y1="80" x2="220" y2="58" stroke="var(--ledger)" stroke-width="1.5" marker-end="url(#oa-g)"/>
  <text x="230" y="70" fill="var(--ledger)" font-size="8">2. redirect to login</text>

  <line x1="225" y1="55" x2="65" y2="82" stroke="var(--text-faint)" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="120" y="60" fill="var(--text-faint)" font-size="8">user logs in directly with the bank</text>

  <line x1="250" y1="35" x2="330" y2="90" stroke="var(--amber)" stroke-width="1.5" marker-end="url(#oa-a)"/>
  <text x="300" y="55" fill="var(--amber)" font-size="8">3. scoped token</text>

  <line x1="240" y1="100" x2="325" y2="100" stroke="var(--blue)" stroke-width="1.5" marker-end="url(#oa-b)"/>
  <text x="285" y="115" fill="var(--blue)" font-size="8">4. read transactions</text>

  <text x="240" y="160" text-anchor="middle" fill="var(--text-dim)" font-size="10.5">Budget App never sees the user's bank password</text>

  <defs>
    <marker id="oa-x" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--text-faint)"/></marker>
    <marker id="oa-g" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--ledger)"/></marker>
    <marker id="oa-a" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--amber)"/></marker>
    <marker id="oa-b" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--blue)"/></marker>
  </defs>
</svg>`,
ex:`A third-party budgeting app uses OAuth2 to get a scoped, read-only token to view a user's transaction history without ever seeing their bank login credentials — the token's scope (AuthZ) is limited to "read transactions," not "initiate transfers."`,
trade:[`JWTs avoid a database lookup on every request (stateless, self-contained), but that same property makes revocation hard — a compromised JWT is valid until it expires unless you add a token-blocklist check, which reintroduces the state you were trying to avoid.`,`Short JWT expiry + refresh tokens is the common compromise: limits the damage window of a leaked token while avoiding a lookup on every single request.`]},

{cat:"SC", title:"Encryption at Rest & in Transit (KMS/HSM)", def:`Two different moments where data needs protecting, plus the systems that manage the keys.

Encryption in transit (TLS) — protects data while it's moving across the network, so someone intercepting the traffic can't read it.

Encryption at rest — protects data while it's sitting in storage, so if someone gets access to the raw disk or database files, the data is still unreadable without the key.

KMS (Key Management Service) / HSM (Hardware Security Module) — a secure, dedicated system for managing the encryption keys themselves. Often used with "envelope encryption": your actual data is encrypted with a data key, and that data key is itself encrypted using a master key that lives safely inside the KMS/HSM.`,
diagram:`<svg viewBox="0 0 440 190" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="30" y="30" width="220" height="130" rx="10" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="140" y="50" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">Encrypted with master key (in KMS)</text>
  <rect x="55" y="65" width="170" height="70" rx="8" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)" stroke-width="2"/>
  <text x="140" y="88" text-anchor="middle" fill="var(--text-dim)" font-size="10" font-weight="600">Encrypted with data key</text>
  <rect x="80" y="100" width="120" height="30" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="140" y="120" text-anchor="middle" fill="var(--text)" font-size="10.5" font-weight="700">Account number</text>

  <rect x="290" y="70" width="130" height="50" rx="8" fill="var(--amber)" fill-opacity="0.18" stroke="var(--amber)" stroke-width="2"/>
  <text x="355" y="90" text-anchor="middle" fill="var(--text)" font-size="10.5" font-weight="600">KMS / HSM</text>
  <text x="355" y="105" text-anchor="middle" fill="var(--text-dim)" font-size="9">holds master key</text>

  <line x1="250" y1="90" x2="285" y2="90" stroke="var(--amber)" stroke-width="2" marker-end="url(#en-a)"/>

  <text x="220" y="180" text-anchor="middle" fill="var(--text-faint)" font-size="10">Rotating the master key doesn't require re-encrypting the data itself</text>

  <defs>
    <marker id="en-a" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--amber)"/></marker>
  </defs>
</svg>`,
ex:`Bank account numbers stored in the database are encrypted at rest using envelope encryption, with the master key held in a cloud KMS that has strict access logging — so a database backup leak alone doesn't expose usable account numbers without also compromising the KMS.`,
trade:[`Envelope encryption limits blast radius (rotating the master key doesn't require re-encrypting all data) and centralizes key access auditing, but adds a dependency on the KMS/HSM's availability and a small latency cost on decrypt operations.`]},

{cat:"SC", title:"Tokenization of Sensitive Data", def:`Replacing a sensitive value (like a full card number) with a non-sensitive token that has no exploitable mathematical relationship to the original, with the real value stored only in a tightly controlled, isolated vault — used throughout your systems instead of the raw sensitive value.`,
diagram:`<svg viewBox="0 0 460 170" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="60" width="130" height="50" rx="6" fill="var(--red)" fill-opacity="0.15" stroke="var(--red)" stroke-width="2"/>
  <text x="85" y="80" text-anchor="middle" fill="var(--text)" font-size="10" font-weight="600">4242 4242 4242</text>
  <text x="85" y="95" text-anchor="middle" fill="var(--red)" font-size="9" font-weight="600">real card number</text>

  <line x1="150" y1="85" x2="185" y2="85" stroke="var(--text-faint)" stroke-width="2" marker-end="url(#tk-x)"/>

  <rect x="190" y="55" width="90" height="60" rx="6" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-width="2"/>
  <text x="235" y="80" text-anchor="middle" fill="var(--text)" font-size="10" font-weight="600">Vault</text>
  <text x="235" y="95" text-anchor="middle" fill="var(--text-dim)" font-size="8">isolated, PCI-scoped</text>

  <line x1="280" y1="85" x2="315" y2="85" stroke="var(--text-faint)" stroke-width="2" marker-end="url(#tk-x)"/>

  <rect x="320" y="60" width="120" height="50" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="380" y="80" text-anchor="middle" fill="var(--text)" font-size="10" font-weight="600">tok_9f8a2c1d</text>
  <text x="380" y="95" text-anchor="middle" fill="var(--ledger)" font-size="9" font-weight="600">used everywhere else</text>

  <text x="230" y="145" text-anchor="middle" fill="var(--text-faint)" font-size="10.5">Rest of your infrastructure only ever sees the token, never the real number</text>

  <defs>
    <marker id="tk-x" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--text-faint)"/></marker>
  </defs>
</svg>`,
ex:`After a card is entered at checkout, the payment processor returns a token; your systems store and reference that token everywhere (refunds, recurring billing) and never touch the raw card number again — dramatically reducing your PCI-DSS compliance scope since most of your infrastructure never handles raw card data at all.`,
trade:[`Massively reduces the scope (and cost) of compliance audits and breach impact, but adds a dependency on the tokenization provider/vault for any operation that ever needs the real value (e.g., specific processor requirements) — a single point that must be highly available and secure.`]},

{cat:"SC", title:"mTLS & Service-to-Service Auth", def:`Mutual TLS: both client and server present certificates and verify each other's identity (not just the server proving its identity to the client, as in standard TLS) — commonly used inside a service mesh so services only accept connections from verified, authorized peers.`,
diagram:`<svg viewBox="0 0 560 140" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="30" y="45" width="110" height="40" rx="6" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="85" y="69" text-anchor="middle" fill="var(--text-dim)" font-size="9.5">Service A</text>
  <rect x="420" y="45" width="110" height="40" rx="6" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
  <text x="475" y="69" text-anchor="middle" fill="var(--text-dim)" font-size="9.5">Service B</text>

  <line x1="140" y1="55" x2="415" y2="55" stroke="var(--ledger)" stroke-width="2" marker-end="url(#mtlsArrow1)"/>
  <text x="280" y="47" text-anchor="middle" fill="var(--ledger)" font-size="8.5">A presents cert → B verifies</text>
  <line x1="415" y1="75" x2="140" y2="75" stroke="var(--amber)" stroke-width="2" marker-end="url(#mtlsArrow2)"/>
  <text x="280" y="93" text-anchor="middle" fill="var(--amber)" font-size="8.5">B presents cert → A verifies</text>
  <defs>
    <marker id="mtlsArrow1" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ledger)"/></marker>
    <marker id="mtlsArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--amber)"/></marker>
  </defs>
  <text x="280" y="120" text-anchor="middle" fill="var(--text-faint)" font-size="9">Both directions verified — unlike standard TLS, where only the server proves identity</text>
</svg>`,
ex:`The ledger service only accepts connections from services presenting a valid internal certificate issued by the company's internal CA, so even if an attacker gains network access inside the VPC, they can't simply call the ledger service's API without a valid service identity.`,
trade:[`Strong internal security boundary (defense in depth beyond network segmentation alone), but adds certificate issuance/rotation operational overhead — usually handled by a service mesh (Istio/Linkerd) or platform team rather than each service implementing it manually.`]},

{cat:"SC", title:"Secrets Management", def:`Storing passwords, API keys, database credentials, and encryption keys in a dedicated, access-controlled system (like Vault or a cloud provider's secrets manager) instead of hardcoding them in source code or plain config files — so secrets can be rotated, access-audited, and revoked without a code change.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="130" y="18" text-anchor="middle" fill="var(--red)" font-size="10" font-weight="600">Hardcoded — risky</text>
  <rect x="30" y="30" width="200" height="30" rx="5" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)"/>
  <text x="130" y="50" text-anchor="middle" fill="var(--red)" font-size="8">API_KEY = "sk_live_abc123" in source</text>
  <text x="130" y="80" text-anchor="middle" fill="var(--text-faint)" font-size="8">baked into git history — hard to rotate or revoke</text>

  <text x="430" y="18" text-anchor="middle" fill="var(--ledger)" font-size="10" font-weight="600">Secrets manager — correct</text>
  <rect x="330" y="30" width="200" height="30" rx="5" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="430" y="50" text-anchor="middle" fill="var(--ledger)" font-size="8">fetched at runtime from Vault</text>
  <text x="430" y="80" text-anchor="middle" fill="var(--text-faint)" font-size="8">rotate, audit, and revoke without a code change</text>
</svg>`,
ex:`Instead of a database password sitting in a config file checked into version control (where anyone with repo access can read it, forever, even after rotation), the application fetches the current password from Vault at startup, and rotating the password just means updating it in Vault — no redeploy needed, and old copies of the code never had the real value in them.`,
trade:[`Removes secrets from source control and gives you an audit log of who accessed which secret and when, but adds a runtime dependency (the app needs network access to the secrets manager at startup) and requires a secure way to authenticate the app to the secrets manager itself in the first place.`]},

{cat:"SC", title:"Input Validation & Audit Trail (Non-Repudiation)", def:`Input validation means checking that data coming into your system is well-formed and expected before acting on it, preventing injection attacks and malformed-data bugs. Non-repudiation is the guarantee that an action can be reliably traced back to who performed it, with proof strong enough that they can't credibly deny having done it — achieved through immutable, detailed audit logs.`,
diagram:`<svg viewBox="0 0 560 120" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="30" width="150" height="30" rx="5" fill="var(--panel)" stroke="var(--border)"/>
  <text x="95" y="50" text-anchor="middle" fill="var(--text-dim)" font-size="8.5">raw request</text>
  <line x1="170" y1="45" x2="220" y2="45" stroke="var(--ledger)" stroke-width="2" marker-end="url(#ivArrow)"/>
  <defs><marker id="ivArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ledger)"/></marker></defs>
  <rect x="225" y="30" width="140" height="30" rx="5" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="295" y="50" text-anchor="middle" fill="var(--ledger)" font-size="8.5">validated &amp; processed</text>
  <line x1="365" y1="45" x2="415" y2="45" stroke="var(--amber)" stroke-width="2" marker-end="url(#ivArrow2)"/>
  <defs><marker id="ivArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--amber)"/></marker></defs>
  <rect x="420" y="30" width="120" height="30" rx="5" fill="var(--amber)" fill-opacity="0.12" stroke="var(--amber)"/>
  <text x="480" y="50" text-anchor="middle" fill="var(--amber)" font-size="8">audit log: who, what, when</text>
  <text x="280" y="90" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">Validation stops bad data; the immutable log proves who did what, later</text>
</svg>`,
ex:`Validating that a transfer amount is a positive number within expected bounds (not negative, not absurdly large, not a string containing SQL) prevents both attacks and accidental bugs. Separately, logging "user X approved refund Y at timestamp Z from IP W" in an immutable audit log means that if a dispute arises later about who authorized a refund, there's reliable evidence — this is often a regulatory requirement, not just a nice-to-have.`,
trade:[`Validation should happen as early as possible (reject bad input immediately) but must be consistent everywhere data enters the system — a single unvalidated entry point undermines the protection everywhere else.`,`Audit logs must be tamper-resistant (append-only, ideally write-once storage) — a log an admin can quietly edit doesn't actually provide non-repudiation, since the "proof" could be altered.`]},

// ---------------- MULTI-REGION / LB / DR ----------------
{cat:"MR", title:"Load Balancing Algorithms (L4 vs L7)", def:`L4 (transport layer) — balances traffic based only on IP address and port, without understanding what's actually inside the request. Fast and simple, but can't make smart decisions based on the content of the request.

L7 (application layer) — actually understands HTTP, so it can route based on the URL path, headers, or cookies. This enables smarter routing (like sending only certain paths to a new service version), at the cost of a bit more processing per request.

Common algorithms for choosing which server gets the next request: round robin (just cycle through servers in order), least connections (send it to whichever server currently has the fewest active connections), and consistent hashing (route the same kind of request to the same server every time, useful for cache or session affinity).`,
diagram:`<svg viewBox="0 0 560 280" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <circle cx="40" cy="140" r="26" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="40" y="145" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">Client</text>

  <rect x="120" y="30" width="140" height="60" rx="6" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)" stroke-width="2"/>
  <text x="190" y="55" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="700">L4 Balancer</text>
  <text x="190" y="72" text-anchor="middle" fill="var(--text-dim)" font-size="10.5">sees IP + port only</text>

  <rect x="120" y="190" width="140" height="60" rx="6" fill="var(--amber)" fill-opacity="0.18" stroke="var(--amber)" stroke-width="2"/>
  <text x="190" y="215" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="700">L7 Balancer</text>
  <text x="190" y="232" text-anchor="middle" fill="var(--text-dim)" font-size="10.5">reads path, headers, cookies</text>

  <line x1="66" y1="130" x2="115" y2="70" stroke="var(--text-faint)" stroke-width="2" marker-end="url(#lb-x)"/>
  <line x1="66" y1="150" x2="115" y2="215" stroke="var(--text-faint)" stroke-width="2" marker-end="url(#lb-x)"/>

  <line x1="260" y1="50" x2="330" y2="30" stroke="var(--blue)" stroke-width="1.5" marker-end="url(#lb-b)"/>
  <line x1="260" y1="65" x2="330" y2="70" stroke="var(--blue)" stroke-width="1.5" marker-end="url(#lb-b)"/>
  <line x1="260" y1="80" x2="330" y2="105" stroke="var(--blue)" stroke-width="1.5" marker-end="url(#lb-b)"/>
  <text x="290" y="20" fill="var(--text-faint)" font-size="9.5">round robin /</text>
  <text x="290" y="115" fill="var(--text-faint)" font-size="9.5">any server, no content awareness</text>

  <rect x="335" y="15" width="90" height="30" rx="4" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="380" y="35" text-anchor="middle" fill="var(--text)" font-size="10.5">Server 1</text>
  <rect x="335" y="55" width="90" height="30" rx="4" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="380" y="75" text-anchor="middle" fill="var(--text)" font-size="10.5">Server 2</text>
  <rect x="335" y="90" width="90" height="30" rx="4" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="380" y="110" text-anchor="middle" fill="var(--text)" font-size="10.5">Server 3</text>

  <line x1="260" y1="210" x2="330" y2="190" stroke="var(--amber)" stroke-width="1.5" marker-end="url(#lb-am)"/>
  <line x1="260" y1="225" x2="330" y2="230" stroke="var(--amber)" stroke-width="1.5" marker-end="url(#lb-am)"/>
  <text x="380" y="180" text-anchor="middle" fill="var(--text-dim)" font-size="10" font-weight="600">/api/v2/* →</text>

  <rect x="335" y="175" width="90" height="30" rx="4" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
  <text x="380" y="195" text-anchor="middle" fill="var(--text)" font-size="10">v2 service</text>
  <rect x="335" y="215" width="90" height="30" rx="4" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="380" y="235" text-anchor="middle" fill="var(--text)" font-size="10">v1 (legacy)</text>

  <defs>
    <marker id="lb-x" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--text-faint)"/></marker>
    <marker id="lb-b" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--blue)"/></marker>
    <marker id="lb-am" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--amber)"/></marker>
  </defs>
</svg>`,
ex:`An L7 load balancer routes `+"`/api/v2/*`"+` payment requests to the new service version while everything else goes to the legacy service, enabling a gradual, path-based migration — something an L4 balancer can't do since it doesn't parse HTTP paths.`,
trade:[`L4 is faster and simpler but can't make content-aware routing decisions; L7 enables powerful routing (canarying, A/B, path-based) at the cost of more processing per request.`,`Least-connections balancing handles uneven request durations better than round robin, but requires the balancer to track live connection state per backend.`]},

{cat:"MR", title:"Active-Active vs Active-Passive", def:`Two ways to run infrastructure across multiple regions for reliability.

Active-active — multiple regions all serve live traffic at the same time. This uses resources efficiently, but now two regions could both try to write to the same piece of data at once, and something needs to resolve that conflict.

Active-passive — one region is the primary, handling all traffic; the other sits on standby, ready to take over if the primary fails. This completely avoids the conflicting-write problem, but the standby capacity sits mostly idle, and there's still a short gap in service while failover happens.`,
diagram:`<svg viewBox="0 0 460 170" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="110" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Active-Active</text>
  <rect x="40" y="35" width="100" height="50" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="90" y="65" text-anchor="middle" fill="var(--text)" font-size="10.5" font-weight="600">Region A (live)</text>
  <rect x="40" y="100" width="100" height="50" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="90" y="130" text-anchor="middle" fill="var(--text)" font-size="10.5" font-weight="600">Region B (live)</text>
  <path d="M140,60 L145,60 L145,125 L140,125" fill="none" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="165" y="95" fill="var(--red)" font-size="9" font-weight="600">conflict risk</text>

  <text x="350" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Active-Passive</text>
  <rect x="300" y="35" width="100" height="50" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="350" y="65" text-anchor="middle" fill="var(--text)" font-size="10.5" font-weight="600">Region A (live)</text>
  <rect x="300" y="100" width="100" height="50" rx="6" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="350" y="130" text-anchor="middle" fill="var(--text-dim)" font-size="10.5">Region B (standby)</text>

  <text x="230" y="163" text-anchor="middle" fill="var(--text-faint)" font-size="10">Fintech ledgers usually pick Active-Passive to avoid conflicting writes</text>
</svg>`,
ex:`A global payments platform might run active-passive for the core ledger (avoiding the complexity of resolving concurrent conflicting writes to the same account across regions) while running active-active for stateless services like fraud-scoring or the public API gateway, which don't have this conflict problem.`,
trade:[`Active-active gives better resource utilization and lower failover latency, but multi-region concurrent writes to the same record require real conflict-resolution logic (or partitioning by region-owner) — genuinely hard to get right for financial data.`,`Active-passive is simpler and safer for data with strict consistency needs, but wastes standby capacity and has a real (non-zero) failover time during an actual regional outage.`]},

{cat:"MR", title:"RTO vs RPO", def:`Two numbers that shape your disaster-recovery design, answering two different questions.

RTO (Recovery Time Objective) — "how long can we be down?" This drives how fast and automated your failover process needs to be.

RPO (Recovery Point Objective) — "how much recent data can we afford to lose?" measured in time (like "at most 5 minutes of data"). This drives how often you back up or replicate data.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <line x1="30" y1="80" x2="530" y2="80" stroke="var(--border)" stroke-width="2"/>
  <circle cx="200" cy="80" r="6" fill="var(--red)"/>
  <text x="200" y="65" text-anchor="middle" fill="var(--red)" font-size="10" font-weight="600">Failure occurs</text>

  <rect x="80" y="95" width="120" height="24" fill="var(--amber)" fill-opacity="0.18" stroke="var(--amber)"/>
  <text x="140" y="111" text-anchor="middle" fill="var(--amber)" font-size="8.5">RPO window</text>
  <text x="140" y="135" text-anchor="middle" fill="var(--text-faint)" font-size="8">data since last replicated point — at risk of loss</text>

  <circle cx="380" cy="80" r="6" fill="var(--ledger)"/>
  <text x="380" y="65" text-anchor="middle" fill="var(--ledger)" font-size="10" font-weight="600">Service restored</text>
  <rect x="200" y="95" width="180" height="24" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="290" y="111" text-anchor="middle" fill="var(--ledger)" font-size="8.5">RTO window</text>
  <text x="290" y="135" text-anchor="middle" fill="var(--text-faint)" font-size="8">time spent down before service resumes</text>
</svg>`,
ex:`A ledger system might target an RPO near zero (can't lose a single committed transaction — requires synchronous replication to a standby before acknowledging a write) and an RTO of a few minutes (automated failover, acceptable brief unavailability), whereas an analytics warehouse might tolerate an RPO of a few hours (nightly batch replication is fine) with a looser RTO.`,
trade:[`Near-zero RPO (synchronous replication) costs write latency on every transaction; a looser RPO (async replication) is faster but risks losing the most recent transactions in a disaster.`,`These targets should be set explicitly per data type/service by the business, not assumed — "how much money loss risk is acceptable" is a business decision, not just an engineering one.`]},

{cat:"MR", title:"Data Residency & Sovereignty", def:`Legal/regulatory requirements that certain data (especially financial and personal data) must be stored and/or processed within specific geographic/jurisdictional boundaries, restricting how you can architect global replication and failover.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="20" width="220" height="90" rx="8" fill="none" stroke="var(--ledger)" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="130" y="38" text-anchor="middle" fill="var(--ledger)" font-size="10" font-weight="600">EU customer data</text>
  <rect x="60" y="55" width="140" height="35" rx="5" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="130" y="76" text-anchor="middle" fill="var(--ledger)" font-size="8.5">stays in EU region only</text>

  <rect x="320" y="20" width="220" height="90" rx="8" fill="none" stroke="var(--amber)" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="430" y="38" text-anchor="middle" fill="var(--amber)" font-size="10" font-weight="600">US customer data</text>
  <rect x="360" y="55" width="140" height="35" rx="5" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)"/>
  <text x="430" y="76" text-anchor="middle" fill="var(--amber)" font-size="8.5">stays in US region only</text>
</svg>`,
ex:`A customer's transaction data for an EU-based account might legally need to stay within the EU, meaning your global architecture can't simply replicate every account's data to a US region for a "closest region" latency optimization — the shard/region assignment must be tied to the customer's regulatory home region, not just performance.`,
trade:[`Constrains your architecture options (can't always pick the "ideal" technical topology), often requiring per-region data sovereignty combined with cross-region-safe aggregation (e.g., only anonymized/aggregated data crosses borders for global reporting).`,`Increases operational complexity (multiple independent regional deployments rather than one global one) but is a hard legal requirement, not an optional trade-off, in many jurisdictions.`]},

{cat:"MR", title:"Backup Strategies & Point-in-Time Recovery", def:`Full backup — a complete copy of everything at one moment in time. Easy to restore from, but slow and expensive to take often, since it copies all the data every single time.

Incremental backup — only saves what's changed since the last backup. Much faster and cheaper to create, but restoring means replaying the last full backup plus every incremental since then, in order.

Point-in-time recovery (PITR) — combines a base backup with a continuous log of every single change (like a database's write-ahead log), so you can restore the database to any exact second in the past — not just to whenever your last scheduled backup happened to run.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <line x1="30" y1="60" x2="530" y2="60" stroke="var(--border)" stroke-width="2"/>
  <circle cx="60" cy="60" r="6" fill="var(--ledger)"/>
  <text x="60" y="42" text-anchor="middle" fill="var(--ledger)" font-size="9" font-weight="600">Full backup (last night)</text>
  <circle cx="330" cy="60" r="6" fill="var(--red)"/>
  <text x="330" y="42" text-anchor="middle" fill="var(--red)" font-size="9" font-weight="600">Bug corrupts data (3:07pm)</text>
  <rect x="60" y="68" width="270" height="14" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-dasharray="2 2"/>
  <text x="195" y="100" text-anchor="middle" fill="var(--amber)" font-size="8">continuous log (WAL) covers this whole gap</text>
  <line x1="320" y1="60" x2="320" y2="60" stroke="var(--ledger)" stroke-width="3"/>
  <circle cx="320" cy="60" r="5" fill="var(--ledger)"/>
  <text x="320" y="115" text-anchor="middle" fill="var(--ledger)" font-size="9" font-weight="600">PITR restore target: 3:06pm</text>
</svg>`,
ex:`A bug accidentally corrupts a batch of transactions at 3:07pm. With PITR, you can restore the database to exactly 3:06pm — one minute before the bug ran — rather than losing everything back to last night's full backup, which would have discarded many hours of legitimate, correct transactions along with the bad ones.`,
trade:[`PITR gives much more precise recovery and minimizes data loss, but requires continuously storing and shipping the change log somewhere safe, plus regular testing that restores actually work — an untested backup is not a real backup.`,`Full backups are simpler to reason about and restore from, but taking them frequently enough to bound data loss can be expensive at scale — most real systems combine periodic full backups with continuous log shipping for PITR.`]},

{cat:"MR", title:"Disaster Recovery Testing & Failover Drills", def:`RTO and RPO (covered elsewhere) are the *targets* you set for how fast you can recover and how much data you can afford to lose. DR testing is the separate practice of actually proving, on a regular schedule, that a real failover would hit those targets — instead of trusting an untested runbook.

A DR drill deliberately triggers a failover (often to a genuinely unused standby region, not just a simulation) and measures what actually happens: how long the team took to detect the failure, how long the failover itself took, whether any data was lost or corrupted in the process, and whether the standby region could actually absorb full production traffic once it took over.

The uncomfortable, common finding: standby regions and backups that were never actually exercised often turn out to be broken in some way — an expired credential, a config drift between primary and standby, a scaling limit nobody tested — and the only way to find that out before a real incident is to actually run the drill.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="35" width="150" height="34" rx="6" fill="var(--red)" fill-opacity="0.15" stroke="var(--red)" stroke-width="2"/>
  <text x="95" y="57" text-anchor="middle" fill="var(--red)" font-size="9">Trigger real failover</text>
  <line x1="170" y1="52" x2="230" y2="52" stroke="var(--border)" stroke-width="2" marker-end="url(#drArrow)"/>
  <defs><marker id="drArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <rect x="235" y="35" width="150" height="34" rx="6" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-width="2"/>
  <text x="310" y="52" text-anchor="middle" fill="var(--amber)" font-size="8.5">Measure detection</text>
  <text x="310" y="64" text-anchor="middle" fill="var(--amber)" font-size="8.5">+ failover time</text>
  <line x1="385" y1="52" x2="445" y2="52" stroke="var(--border)" stroke-width="2" marker-end="url(#drArrow2)"/>
  <defs><marker id="drArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <rect x="450" y="35" width="100" height="34" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="500" y="57" text-anchor="middle" fill="var(--ledger)" font-size="8.5">Actual vs target</text>
  <text x="280" y="100" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">An untested runbook is a hope, not a guarantee — the drill proves the RTO/RPO for real</text>
</svg>`,
ex:`A quarterly DR drill fails over a payments platform's live traffic to its secondary region for one hour. The drill reveals that the secondary region's database connection pool was sized for the standby's usual idle load, not full production traffic — a problem that would have caused a second outage on top of the first, discovered safely in a drill instead of during a real primary-region failure.`,
trade:[`Running a real failover against production traffic is the only way to find the failure modes that a tabletop exercise or a staging-only test would miss, but it carries genuine risk to real users during the drill itself — this is why drills need their own careful blast-radius planning, rollback criteria, and often start in lower-stakes environments before graduating to production.`,`DR testing has an ongoing cost (engineering time, the operational risk of each drill) that's easy to deprioritize when nothing has gone wrong recently — but an RTO/RPO target that has never been tested against reality is a hope, not a guarantee.`]},

// ---------------- FINTECH-SPECIFIC ----------------
{cat:"FT", title:"Double-Entry Bookkeeping", def:`Every financial transaction is recorded as at least two balanced entries — a debit to one account and an equal credit to another — so the books are always mathematically self-consistent (total debits always equal total credits) and every movement of money has a fully traceable counterpart.`,
diagram:`<svg viewBox="0 0 440 160" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="30" y="30" width="160" height="90" rx="6" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)" stroke-width="2"/>
  <text x="110" y="52" text-anchor="middle" fill="var(--red)" font-size="11" font-weight="700">DEBIT</text>
  <text x="110" y="72" text-anchor="middle" fill="var(--text)" font-size="10">Customer wallet</text>
  <text x="110" y="90" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="700">-$50</text>

  <line x1="190" y1="75" x2="240" y2="75" stroke="var(--text-faint)" stroke-width="2" marker-end="url(#de-x)"/>

  <rect x="245" y="30" width="160" height="90" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="325" y="52" text-anchor="middle" fill="var(--ledger)" font-size="11" font-weight="700">CREDIT</text>
  <text x="325" y="72" text-anchor="middle" fill="var(--text)" font-size="10">Merchant account</text>
  <text x="325" y="90" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="700">+$50</text>

  <text x="220" y="145" text-anchor="middle" fill="var(--text-faint)" font-size="11">Sum of all entries = 0 — a cheap, powerful correctness check</text>

  <defs>
    <marker id="de-x" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--text-faint)"/></marker>
  </defs>
</svg>`,
ex:`A $50 payment from a customer's wallet to a merchant is recorded as a debit of $50 from the customer's account and a credit of $50 to the merchant's account (plus, realistically, additional entries for any platform fee), rather than a single "balance decreased by $50" update — this structure makes auditing and error detection dramatically easier.`,
trade:[`Doubles the number of write operations per transaction compared to a naive single-balance update, but the self-balancing property (sum of all entries = 0) gives you a powerful, cheap sanity check that catches bugs and fraud that a single mutable balance field never would.`]},

{cat:"FT", title:"Idempotency Keys in Payment APIs", def:`A client-generated unique key attached to a payment request so that if the request is retried (due to a timeout or network failure) without the client knowing whether the first attempt succeeded, the server recognizes the retry and returns the original result instead of processing the payment again.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="20" y="20" fill="var(--text-dim)" font-size="10.5" font-weight="600">Client</text>
  <text x="260" y="20" fill="var(--text-dim)" font-size="10.5" font-weight="600">Payment server</text>
  <line x1="60" y1="30" x2="60" y2="140" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="300" y1="30" x2="300" y2="140" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="60" y1="45" x2="300" y2="45" stroke="var(--ledger)" stroke-width="1.5" marker-end="url(#pkArrow1)"/>
  <text x="180" y="40" text-anchor="middle" fill="var(--text-dim)" font-size="8">POST /charge, key=k1</text>
  <text x="310" y="65" fill="var(--text-dim)" font-size="8.5">charges card, connection drops before response</text>
  <line x1="60" y1="95" x2="300" y2="95" stroke="var(--amber)" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#pkArrow2)"/>
  <text x="180" y="90" text-anchor="middle" fill="var(--amber)" font-size="8">retry: POST /charge, key=k1</text>
  <text x="310" y="112" fill="var(--ledger)" font-size="8.5">key k1 seen → returns original result</text>
  <text x="310" y="128" fill="var(--ledger)" font-size="8.5">(card is NOT charged a second time)</text>
  <defs>
    <marker id="pkArrow1" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ledger)"/></marker>
    <marker id="pkArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--amber)"/></marker>
  </defs>
</svg>`,
ex:`A mobile app's checkout call times out on a flaky connection; the app retries with the same idempotency key. The server, having already completed the first charge, returns the original success response instead of charging the customer a second time.`,
trade:[`Essential for safe retries on any money-moving endpoint, but requires storing keys with a sensible TTL (long enough to cover realistic retry windows, short enough to bound storage) and clear semantics for what happens if a retry arrives with the same key but a *different* payload (should be rejected as a client error).`]},

{cat:"FT", title:"Reconciliation", def:`The process of comparing your internal ledger records against an external source of truth (a bank statement, a payment processor's settlement report) to detect and resolve discrepancies — because distributed systems and third-party integrations mean your internal state and the external state can drift.`,
diagram:`<svg viewBox="0 0 460 170" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="110" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Your Ledger</text>
  <rect x="30" y="30" width="160" height="30" rx="4" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
  <text x="110" y="50" text-anchor="middle" fill="var(--text)" font-size="9.5">txn_001 — $50</text>
  <rect x="30" y="65" width="160" height="30" rx="4" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
  <text x="110" y="85" text-anchor="middle" fill="var(--text)" font-size="9.5">txn_002 — $120</text>
  <rect x="30" y="100" width="160" height="30" rx="4" fill="var(--red)" fill-opacity="0.15" stroke="var(--red)"/>
  <text x="110" y="120" text-anchor="middle" fill="var(--text)" font-size="9.5">txn_003 — $75</text>

  <text x="350" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Processor Statement</text>
  <rect x="270" y="30" width="160" height="30" rx="4" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
  <text x="350" y="50" text-anchor="middle" fill="var(--text)" font-size="9.5">txn_001 — $50</text>
  <rect x="270" y="65" width="160" height="30" rx="4" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
  <text x="350" y="85" text-anchor="middle" fill="var(--text)" font-size="9.5">txn_002 — $120</text>
  <rect x="270" y="100" width="160" height="30" rx="4" fill="var(--panel-2)" stroke="var(--border)" stroke-dasharray="3,2"/>
  <text x="350" y="120" text-anchor="middle" fill="var(--text-faint)" font-size="9">(missing)</text>

  <line x1="70" y1="45" x2="310" y2="45" stroke="var(--ledger)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="70" y1="80" x2="310" y2="80" stroke="var(--ledger)" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="230" y="150" text-anchor="middle" fill="var(--red)" font-size="11" font-weight="600">txn_003 flagged for investigation — present in one, missing in the other</text>
</svg>`,
