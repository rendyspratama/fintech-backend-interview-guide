/* =========================================================

const TOPICS = [
// ---------------- PROGRAMMING & CS FUNDAMENTALS ----------------
{cat:"CS", title:"Data Structures & Big-O Complexity for Backend Engineers", def:`Big-O notation describes how the time (or memory) a piece of code needs grows as the amount of data grows — not the exact speed, just the shape of how it scales. This matters for backend work not as an abstract exercise, but because picking the wrong structure is a real, common cause of an endpoint that works fine in testing and falls over in production once real data volume shows up.

The common complexity classes, from best to worst:

O(1) — constant time. The same speed no matter how much data there is — like looking up a value in a hash map by its key.

O(log n) — grows very slowly. Doubling the amount of data only adds a small, fixed amount of extra work — like finding a value in a sorted, balanced tree.

O(n) — grows directly in proportion to the data. Twice the data means twice the work — like scanning every item in a list one by one.

O(n log n) — a bit worse than linear, but still efficient at scale. This is the complexity of most good general-purpose sorting algorithms.

O(n²) — grows very fast. Twice the data can mean four times the work — the classic signature of a loop nested inside another loop, each scanning the same data.

O(2ⁿ) — exponential. Each single additional item doubles the total work. This shows up in naive recursive solutions that re-solve the same overlapping subproblem repeatedly instead of caching results — it's rarely acceptable at any real production data volume.

O(n!) — factorial, the worst of the common classes. Grows so explosively that it's only ever workable for tiny, fixed-size inputs (like brute-force checking every possible ordering of a small list) — you'd essentially never see this in backend request-handling code.

A few structures that come up constantly in backend code, and why their complexity matters:

Array / list — looking up an item by its position is instant (O(1)), but checking whether the list *contains* a particular value means checking every item one by one in the worst case (O(n)) — this gets slow once "every item" means millions of items.

Hash map (dictionary) — looking up a value by its key is close to instant (O(1)) on average, regardless of how many items are in it. This is why so much backend code reaches for a hash map/dictionary any time it needs fast lookups by ID — it's not a coincidence, it's the correct default tool for that job.

Tree (and its close relative, the B-Tree used inside database indexes) — keeps data sorted and allows fast lookups, range queries, and ordered traversal (O(log n) — much better than scanning everything, though not quite as fast as a hash map for a single exact lookup). This is exactly why the database Indexing Strategy topic earlier in this guide is built on B-Trees.

Heap / priority queue — efficiently always gives you the smallest (or largest) item first, which is why it's the structure behind things like "process the highest-priority job next" in a job queue.

The practical backend takeaway: an O(n) or worse operation sitting quietly inside a loop, or inside code that runs per-request, is one of the most common root causes of "why did this suddenly get slow once we had real production data" — and it's usually fixable by swapping in the right structure (very often, a hash map instead of scanning a list). O(2ⁿ) and O(n!) are included here for a complete picture, but in practice you'll almost never see them in backend code that's expected to handle real traffic — if you ever do, it's a five-alarm fire, not a normal trade-off to weigh.`,
diagram:`<svg viewBox="0 0 700 430" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <line x1="60" y1="390" x2="620" y2="390" stroke="var(--border)" stroke-width="2"/>
  <line x1="60" y1="390" x2="60" y2="20" stroke="var(--border)" stroke-width="2"/>

  <text x="568" y="359" fill="var(--ledger)" font-size="13" font-weight="600">O(1)</text>

  <polyline points="70,390 168,355 266,342 364,334 462,329 560,325" fill="none" stroke="var(--blue)" stroke-width="2.5"/>
  <text x="568" y="329" fill="var(--blue)" font-size="13" font-weight="600">O(log n)</text>

  <polyline points="70,355 168,334 266,320 364,308 462,299 560,291" fill="none" stroke="var(--amber)" stroke-width="2.5"/>
  <text x="568" y="295" fill="var(--amber)" font-size="13" font-weight="600">O(n)</text>

  <polyline points="70,390 168,334 266,301 364,279 462,262 560,248" fill="none" stroke="var(--violet)" stroke-width="2.5"/>
  <text x="568" y="252" fill="var(--violet)" font-size="13" font-weight="600">O(n log n)</text>

  <polyline points="70,355 168,308 266,273 364,247 462,225 560,207" fill="none" stroke="var(--red)" stroke-width="2.5"/>
  <text x="568" y="211" fill="var(--red)" font-size="13" font-weight="600">O(n²)</text>

  <polyline points="70,334 168,308 266,279 364,247 462,213 560,178" fill="none" stroke="var(--teal)" stroke-width="2.5"/>

  <polyline points="70,355 168,334 266,291 364,227 462,147 560,57" fill="none" stroke="var(--pink)" stroke-width="2.5"/>
  <text x="568" y="61" fill="var(--pink)" font-size="13" font-weight="600">O(n!)</text>
</svg>`,
ex:`A service checking "has this idempotency key already been used?" by looping through a list of the last 10,000 keys checking each one (O(n) per check) works fine in a demo with 50 keys, but becomes a real, measurable bottleneck at production volume. Storing those keys in a hash map (or a proper key-value store like Redis) instead makes that same check close to instant, regardless of how many keys exist — this is exactly the kind of practical, "which data structure" decision that shows up constantly in real backend code, even though it looks like a simple choice.`,
trade:[`Understanding Big-O isn't about memorizing academic notation — it's a practical tool for spotting the difference between code that will scale and code that will quietly become a production incident once the data volume grows past what anyone tested with.`,`This guide deliberately doesn't go deep into algorithm design or whiteboard-style coding-interview problems — the goal here is recognizing when a data-structure choice matters in real backend code, not mastering algorithmic puzzle-solving.`]},

{cat:"CS", title:"OS Basics: Process vs Thread, Stack vs Heap", def:`Underneath all the application-level concurrency covered earlier in this guide (coroutines, thread pools, and so on) sits the operating system's own, more fundamental building blocks.

Process — a running program with its own private, isolated slice of memory. Two separate processes can't accidentally read or corrupt each other's memory, which makes them safer to isolate from each other, but switching the CPU between processes (a "context switch") is relatively expensive, and processes can't share memory directly without deliberate, explicit mechanisms.

Thread — a unit of execution that lives *inside* a process, sharing that process's memory with any other threads in the same process. This makes sharing data between threads cheap and easy (no explicit mechanism needed) — but that's exactly why the Thread Safety topics covered earlier in this guide (race conditions, locks, atomics) exist at all: shared memory is convenient, but it's also exactly what creates the risk of two threads corrupting the same data at the same time.

Stack — memory used for the current function call and its local variables, automatically cleaned up the moment that function returns. Fast to use, but limited in size (which is why infinite/very deep recursion causes a "stack overflow").

Heap — memory that persists beyond a single function call, explicitly allocated and (depending on the language) either manually freed or cleaned up later by a garbage collector. More flexible than the stack, but slower to allocate and, if never properly cleaned up, the source of memory leaks.`,

  <text x="380" y="115" text-anchor="middle" fill="var(--text-dim)" font-size="8">flexible, manual/GC cleanup</text>
</svg>`,
ex:`A web server might run as a single process with a pool of many threads, all sharing access to the same in-memory cache (fast, but exactly why that cache needs proper locking, as covered in the Thread Safety section) — versus running as several separate, isolated processes, each with its own memory and its own separate copy of the cache (safer in isolation, but now the caches can disagree with each other, and you need an external shared store like Redis if they need to stay in sync).`,
trade:[`Threads are cheaper to create and communicate between than full processes, which is why most high-concurrency backend servers are built around threads (or even lighter-weight coroutines, covered earlier) rather than spinning up a whole new process per request — but that convenience is exactly the trade-off that makes thread safety a real, ongoing engineering concern rather than a solved problem you can ignore.`]},

{cat:"CS", title:"Stateless vs Stateful Services (Twelve-Factor App Principles)", def:`A stateless service doesn't keep any request-specific data in its own memory between requests — every request carries (or can retrieve from a shared external store) everything needed to handle it, so any instance of the service can handle any request, and instances can be added, removed, or restarted freely without losing anything.

A stateful service keeps some of that data locally in memory (like a user's session, or an in-progress computation), which means a specific request needs to reach the specific instance holding that data — a real constraint on how freely you can scale, load balance, and recover from failures.

The "Twelve-Factor App" is a well-known set of principles for building backend services that scale cleanly in the cloud, and "keep the application itself stateless, and push state out to backing services" is one of its central ideas — alongside others like: keep configuration in environment variables (not hardcoded), treat backing services (databases, caches, message queues) as attached resources that can be swapped without code changes, and keep processes disposable (they can be started or stopped instantly, without a lengthy startup/shutdown routine — which directly connects back to the Graceful Shutdown topic covered earlier).`,

  <text x="460" y="90" text-anchor="middle" fill="var(--text-faint)" font-size="8">must always return to this exact instance</text>
</svg>`,
ex:`A stateless authentication approach validates a signed token (like a JWT, covered in the Security section) on every request without needing to remember anything about earlier requests — any server instance can handle any request, which is exactly why load balancing and autoscaling work so cleanly. A stateful alternative that keeps logged-in sessions in each server's local memory would require "sticky sessions" (always routing the same user back to the same instance), which directly limits how freely you can scale, rebalance, or replace instances.`,
trade:[`Statelessness is what makes horizontal scaling, load balancing, and easy recovery from failure actually simple — this is precisely why so many patterns throughout this guide (external caches instead of local ones, externalized session/config, idempotent APIs) all push in the same direction.`,`Some things are genuinely hard to make fully stateless (a long-lived WebSocket connection, covered in the Networking section, inherently ties a client to a specific server instance for its duration) — the practical goal isn't "eliminate all state everywhere," it's "don't keep state in application memory by default, and be deliberate on the specific occasions where you genuinely need to."`]},

// ---------------- NETWORKING FUNDAMENTALS ----------------
{cat:"NW", title:"The OSI 7 Layers", def:`A conceptual model that breaks down everything involved in network communication into 7 stacked layers, from the physical wire up to the actual application. Each layer only talks to the layers directly above and below it, which is what lets you swap out one layer (like switching from WiFi to Ethernet) without the layers above needing to know or care.

Layer 1 — Physical: the actual physical medium — cables, radio waves (WiFi), voltage signals. Just raw bits traveling somewhere.

Layer 2 — Data Link: handles communication between two directly-connected devices on the same local network, using physical addresses (MAC addresses). Ethernet and WiFi protocols live here.

Layer 3 — Network: handles routing data across different networks to reach a destination that isn't directly connected — this is where IP (Internet Protocol) and IP addresses live.

Layer 4 — Transport: handles getting data reliably (or not) from one specific application on one machine to a specific application on another — this is where TCP and UDP live (see the dedicated topic below).

Layer 5 — Session: manages opening, maintaining, and closing a "conversation" between two applications. In practice, a lot of what this layer conceptually covers is now handled inside the application layer or the transport layer in real-world systems.

Layer 6 — Presentation: handles translating data into a common format both sides understand — encryption/decryption (like TLS) and data format conversion conceptually live here, though in practice TLS is often described as sitting "on top of" TCP rather than as its own strict layer.

Layer 7 — Application: the layer your actual code lives at — HTTP, gRPC, DNS, and other protocols your application directly uses.

In everyday backend work, you'll mostly think in terms of a simpler 4-layer model (Link, Internet, Transport, Application) rather than the full academic 7 layers — but interviewers still commonly ask about the 7-layer version, so it's worth knowing both.`,

  </g>
</svg>`,
ex:`When your service makes an HTTPS call to a payment processor: your application code works at Layer 7 (building an HTTP request), TLS encryption happens conceptually around Layer 6, TCP at Layer 4 breaks it into a reliable byte stream, IP at Layer 3 routes it across the internet to the right server, and Layer 1/2 handle the actual physical transmission over cables and network hardware — all of this happens on every single API call, and you almost never have to think about most of these layers directly, which is exactly the point of the model.`,
trade:[`You'll rarely operate at Layers 1, 2, 5, or 6 directly as a backend engineer — the layers that matter day-to-day are 3 (IP/routing), 4 (TCP/UDP), and 7 (HTTP/your application protocol) — but understanding the full stack helps you reason about where a problem actually lives when something goes wrong (e.g., is this a DNS issue, a TCP connection issue, or an application-level bug?).`]},

{cat:"NW", title:"TCP vs UDP", def:`Two different transport-layer (Layer 4) protocols, with fundamentally different guarantees.

TCP (Transmission Control Protocol) — connection-based and reliable. It guarantees that data arrives in order, with nothing missing (it automatically retransmits lost pieces), and it manages flow so a fast sender doesn't overwhelm a slow receiver. This reliability comes at the cost of some overhead and latency.

UDP (User Datagram Protocol) — connectionless and unreliable. It just fires data off with no guarantee it arrives, no guarantee of order, and no automatic retry. In exchange, it has much lower overhead and latency.`,
diagram:`<svg viewBox="0 0 560 160" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">

  <rect x="150" y="35" width="50" height="26" fill="var(--red)" fill-opacity="0.15" stroke="var(--red)" stroke-dasharray="3 2"/>
  <text x="175" y="52" text-anchor="middle" fill="var(--red)" font-size="8">lost →</text>
  <rect x="150" y="70" width="50" height="26" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)"/>
  <text x="175" y="87" text-anchor="middle" fill="var(--ledger)" font-size="8">3 (retransmit)</text>
  <text x="130" y="120" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">receiver waits, packet 3 resent automatically</text>

  <text x="440" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">UDP — fire and forget</text>
  <rect x="370" y="35" width="50" height="26" fill="var(--amber)" fill-opacity="0.2" stroke="var(--amber)"/>
  <text x="395" y="52" text-anchor="middle" fill="var(--amber)" font-size="9">1</text>
  <rect x="430" y="35" width="50" height="26" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)" stroke-dasharray="3 2"/>
  <text x="455" y="52" text-anchor="middle" fill="var(--red)" font-size="8">lost, gone</text>
  <rect x="490" y="35" width="50" height="26" fill="var(--amber)" fill-opacity="0.2" stroke="var(--amber)"/>
  <text x="515" y="52" text-anchor="middle" fill="var(--amber)" font-size="9">3</text>
  <text x="440" y="120" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">no retry — receiver just moves on without packet 2</text>
</svg>`,
ex:`A payment API call needs TCP — you absolutely need every byte of that request and response to arrive, in order, with nothing silently dropped. A live stock-price ticker or video call might use UDP for parts of its data, because getting the very latest price update a moment faster is more valuable than perfectly retransmitting an old, now-stale price update that arrived late.`,
trade:[`Almost all normal backend/API traffic (HTTP, database connections, gRPC) runs on TCP, because losing or reordering data silently would be a correctness disaster for most business logic — UDP is reserved for specific cases where speed matters more than perfect reliability, and where the application itself can tolerate or work around missing data.`]},

{cat:"NW", title:"TCP Handshake & Connection Lifecycle", def:`Before any data can be sent over TCP, the two sides perform a "three-way handshake" to establish a connection:

Step 1 (SYN) — the client sends a SYN ("synchronize") packet to the server, essentially saying "I'd like to start a connection."

Step 2 (SYN-ACK) — the server responds with a SYN-ACK packet, saying "okay, acknowledged, and here's my own synchronize request back."

Step 3 (ACK) — the client sends an ACK packet, acknowledging the server's response, and the connection is now officially open.

Only after this handshake completes can actual application data (like an HTTP request) start flowing. Closing a connection involves a similar back-and-forth (often called a "four-way close").`,
diagram:`<svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="80" y="30" text-anchor="middle" fill="var(--text)" font-size="15" font-weight="600">Client</text>
  <line x1="80" y1="45" x2="80" y2="270" stroke="var(--border)" stroke-width="2"/>
  <text x="400" y="30" text-anchor="middle" fill="var(--text)" font-size="15" font-weight="600">Server</text>
  <line x1="400" y1="45" x2="400" y2="270" stroke="var(--border)" stroke-width="2"/>

  <line x1="80" y1="90" x2="395" y2="90" stroke="var(--ledger)" stroke-width="2" marker-end="url(#arrow-g)"/>
  <text x="240" y="80" text-anchor="middle" fill="var(--ledger)" font-size="14" font-weight="600">1. SYN →</text>

  <line x1="400" y1="150" x2="85" y2="150" stroke="var(--blue)" stroke-width="2" marker-end="url(#arrow-b)"/>
  <text x="240" y="140" text-anchor="middle" fill="var(--blue)" font-size="14" font-weight="600">2. ← SYN-ACK</text>

  <line x1="80" y1="210" x2="395" y2="210" stroke="var(--amber)" stroke-width="2" marker-end="url(#arrow-a)"/>
  <text x="240" y="200" text-anchor="middle" fill="var(--amber)" font-size="14" font-weight="600">3. ACK →</text>

  <text x="240" y="250" text-anchor="middle" fill="var(--text-dim)" font-size="13">Connection established — application data can now flow</text>

  <defs>
    <marker id="arrow-g" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="var(--ledger)"/></marker>
    <marker id="arrow-b" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="var(--blue)"/></marker>
    <marker id="arrow-a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="var(--amber)"/></marker>
  </defs>
</svg>`,
ex:`Every single new HTTPS connection to an API involves this TCP handshake first, before the TLS handshake (a separate negotiation for encryption) even begins, before any actual HTTP request is sent. This is exactly why reusing connections (see Connection Pooling & Keep-Alive) is so valuable — skipping a repeated handshake for every request saves real, measurable latency.`,
trade:[`The handshake adds at least one full network round-trip of latency before any real data can be sent — for a user far from your server, this round-trip can be a meaningful chunk of total response time, which is one of the reasons keeping connections open and reused (rather than opening a new one per request) matters so much for performance.`]},

{cat:"NW", title:"DNS: How Domain Name Resolution Works", def:`DNS (Domain Name System) is essentially the internet's phone book — it translates a human-readable domain name (like `+"`api.example.com`"+`) into the actual IP address a computer needs to connect to.

The lookup process, roughly: your computer first checks its local cache (has it already looked this up recently?). If not, it asks a DNS resolver (often provided by your ISP or a public one like Google's 8.8.8.8), which in turn may ask a chain of other DNS servers — starting from root servers, down to servers responsible for ".com" domains, down to the specific server responsible for "example.com" — until it finds the actual IP address, then caches that answer for a while (based on a "TTL," or time-to-live, value) so it doesn't have to repeat the whole lookup every single time.`,

  <line x1="210" y1="67" x2="245" y2="67" stroke="var(--text-faint)" stroke-width="2" marker-end="url(#dn-x)"/>

  <text x="285" y="70" text-anchor="middle" fill="var(--text)" font-size="9.5">Root</text>
  <line x1="320" y1="67" x2="350" y2="67" stroke="var(--text-faint)" stroke-width="2" marker-end="url(#dn-x)"/>

  <rect x="355" y="45" width="70" height="45" rx="6" fill="var(--amber)" fill-opacity="0.18" stroke="var(--amber)" stroke-width="2"/>
  <text x="390" y="70" text-anchor="middle" fill="var(--text)" font-size="9.5">.com TLD</text>
  <line x1="425" y1="67" x2="450" y2="67" stroke="var(--text-faint)" stroke-width="2" marker-end="url(#dn-x)"/>

  <rect x="455" y="45" width="60" height="45" rx="6" fill="var(--violet)" fill-opacity="0.18" stroke="var(--violet)" stroke-width="2"/>
  <text x="485" y="65" text-anchor="middle" fill="var(--text)" font-size="9">example</text>
  <text x="485" y="78" text-anchor="middle" fill="var(--text)" font-size="9">.com</text>

  <text x="260" y="120" text-anchor="middle" fill="var(--text-dim)" font-size="10.5">Each hop's answer is cached for its TTL — next lookup skips the chain entirely</text>

    <marker id="dn-x" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--text-faint)"/></marker>
  </defs>
</svg>`,
ex:`A company migrating their payment API to a new server changes the DNS record to point to the new server's IP address. Because DNS answers are cached (based on the record's TTL) by resolvers all over the world, some clients might keep using the old IP address for a while after the change — which is exactly why teams often lower the TTL in advance of a planned migration, so the change propagates faster when it actually happens.`,
trade:[`DNS caching (via TTL) makes lookups fast and reduces load on DNS servers, but it also means DNS changes are never instant everywhere at once — planning around this propagation delay matters for any migration or failover that depends on a DNS change taking effect quickly.`,`DNS is also a common approach for basic failover and geographic routing (returning different IP addresses depending on the user's location, or automatically excluding a failed server's IP) — but it's a blunter, slower tool for this than something like a load balancer's active health checks.`]},

{cat:"NW", title:"HTTPS & the TLS Handshake", def:`HTTPS is just HTTP running over an encrypted connection, secured by TLS (Transport Layer Security). Before any actual HTTP request can be sent, the client and server perform a TLS handshake, roughly:

Step 1 — the client says hello, listing which encryption methods it supports.

Step 2 — the server responds with its chosen encryption method and its certificate (proving its identity, signed by a trusted authority).

Step 3 — the client verifies that certificate is legitimate and trusted, then both sides use some cryptographic exchange to agree on a shared secret key that only the two of them know.

Step 4 — from this point on, all actual data (the real HTTP request and response) is encrypted using that shared key, so anyone intercepting the traffic in between just sees unreadable, encrypted bytes.

This TLS handshake happens on top of (after) the TCP handshake — so establishing a brand-new HTTPS connection actually involves two separate round-trip negotiations before any real data moves.`,
diagram:`<svg viewBox="0 0 480 340" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="80" y="30" text-anchor="middle" fill="var(--text)" font-size="15" font-weight="600">Client</text>
  <line x1="80" y1="45" x2="80" y2="310" stroke="var(--border)" stroke-width="2"/>
  <text x="400" y="30" text-anchor="middle" fill="var(--text)" font-size="15" font-weight="600">Server</text>
  <line x1="400" y1="45" x2="400" y2="310" stroke="var(--border)" stroke-width="2"/>

  <line x1="80" y1="85" x2="395" y2="85" stroke="var(--ledger)" stroke-width="2" marker-end="url(#tarrow-g)"/>
  <text x="240" y="75" text-anchor="middle" fill="var(--ledger)" font-size="13" font-weight="600">1. ClientHello →</text>

  <line x1="400" y1="135" x2="85" y2="135" stroke="var(--blue)" stroke-width="2" marker-end="url(#tarrow-b)"/>
  <text x="240" y="125" text-anchor="middle" fill="var(--blue)" font-size="13" font-weight="600">2. ← ServerHello + Certificate</text>

  <line x1="80" y1="185" x2="395" y2="185" stroke="var(--amber)" stroke-width="2" marker-end="url(#tarrow-a)"/>
  <text x="240" y="175" text-anchor="middle" fill="var(--amber)" font-size="13" font-weight="600">3. Verify cert + key exchange →</text>

  <line x1="80" y1="230" x2="395" y2="230" stroke="var(--violet)" stroke-width="2"/>
  <line x1="400" y1="230" x2="85" y2="240" stroke="var(--violet)" stroke-width="2" marker-end="url(#tarrow-v)"/>

  <text x="240" y="280" text-anchor="middle" fill="var(--text-dim)" font-size="13">Encrypted connection established</text>
  <text x="240" y="300" text-anchor="middle" fill="var(--text-faint)" font-size="11">(runs on top of the TCP handshake shown in the previous topic)</text>

  <defs>
    <marker id="tarrow-g" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="var(--ledger)"/></marker>

    <marker id="tarrow-a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="var(--amber)"/></marker>
    <marker id="tarrow-v" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="var(--violet)"/></marker>
  </defs>
</svg>`,
ex:`When a mobile banking app connects to its backend API, the TLS handshake verifies the server is genuinely who it claims to be (preventing an attacker from impersonating the bank's server) and encrypts everything that follows, so someone intercepting the WiFi traffic at a coffee shop just sees meaningless encrypted bytes instead of account numbers or balances.`,
trade:[`The TLS handshake adds extra round-trip latency on top of the TCP handshake for every new connection — this is another reason connection reuse (keep-alive) matters so much, and why modern protocols like TLS 1.3 specifically worked to reduce the number of round-trips this handshake needs.`,`Skipping or misconfiguring certificate verification (a shortcut sometimes taken in testing) completely defeats the purpose of TLS and should never happen in production — it's the difference between "encrypted and verified" and "encrypted, but possibly talking to an attacker anyway."`]},

{cat:"NW", title:"Connection Pooling & Keep-Alive", def:`Since both the TCP handshake and the TLS handshake add real latency, and happen every time you open a brand-new connection, it's expensive to open a fresh connection for every single request. Two related techniques avoid this:

Keep-Alive — after a request/response completes, the underlying TCP (and TLS) connection is kept open for a little while instead of being closed immediately, so the next request to the same server can reuse it and skip both handshakes entirely.

Connection pooling — instead of opening one connection precisely when needed, an application maintains a pool of already-open, ready-to-use connections to a given destination (like a database, or a downstream API), borrowing one when a request needs to be made and returning it to the pool afterward, rather than constantly opening and closing connections.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="130" y="18" text-anchor="middle" fill="var(--red)" font-size="10.5" font-weight="600">Without pooling — pay handshakes every time</text>
  <rect x="30" y="30" width="50" height="24" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)"/>
  <text x="55" y="46" text-anchor="middle" fill="var(--red)" font-size="7">TCP+TLS</text>
  <rect x="90" y="30" width="40" height="24" fill="var(--panel)" stroke="var(--border)"/>
  <text x="110" y="46" text-anchor="middle" fill="var(--text-dim)" font-size="7">req</text>
  <text x="130" y="75" text-anchor="middle" fill="var(--red)" font-size="8">repeated for every single request</text>

  <text x="420" y="18" text-anchor="middle" fill="var(--ledger)" font-size="10.5" font-weight="600">With pooling — handshake once, reuse</text>
  <rect x="350" y="30" width="50" height="24" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="375" y="46" text-anchor="middle" fill="var(--ledger)" font-size="7">TCP+TLS</text>
  <rect x="410" y="30" width="30" height="24" fill="var(--panel)" stroke="var(--border)"/>
  <text x="425" y="46" text-anchor="middle" fill="var(--text-dim)" font-size="6.5">req1</text>
  <rect x="445" y="30" width="30" height="24" fill="var(--panel)" stroke="var(--border)"/>
  <text x="460" y="46" text-anchor="middle" fill="var(--text-dim)" font-size="6.5">req2</text>
  <rect x="480" y="30" width="30" height="24" fill="var(--panel)" stroke="var(--border)"/>
  <text x="495" y="46" text-anchor="middle" fill="var(--text-dim)" font-size="6.5">req3</text>
  <text x="420" y="75" text-anchor="middle" fill="var(--ledger)" font-size="8">one handshake, many requests reuse it</text>
</svg>`,
ex:`A service calling a downstream payment processor maintains a pool of 20 pre-established, already-authenticated HTTPS connections. When a request comes in, it borrows an already-open connection from the pool instead of paying the full cost of a new TCP handshake plus a new TLS handshake for every single request — shaving real, measurable latency off of every call, which adds up enormously at high request volume.`,
trade:[`Connection pools need careful sizing — too small, and requests queue up waiting for a free connection even though the downstream service has capacity; too large, and you might overwhelm the downstream service or exhaust its own connection limits (this connects directly back to the Application-Level Concurrency Limiting topic covered earlier).`,`Pooled connections can go stale (the other side closed it, or a network device in between dropped it silently) — a robust connection pool needs to detect and replace dead connections rather than handing out ones that will fail immediately.`]},

{cat:"NW", title:"HTTP/1.1 vs HTTP/2 vs HTTP/3", def:`Three generations of the HTTP protocol, each solving a real limitation of the previous one.

HTTP/1.1 — the long-standing default. One request has to complete before the next one can be sent on the same connection (unless you open multiple connections in parallel, which browsers do, but only up to a limited number per domain).

HTTP/2 — introduced "multiplexing": many requests and responses can be in flight over a single TCP connection at the same time, interleaved together, instead of waiting in line. This removes a lot of the need to open many parallel connections.

HTTP/3 — goes a step further and replaces TCP itself with a new transport protocol called QUIC (built on top of UDP). This solves a subtle problem in HTTP/2 called "head-of-line blocking at the TCP level" — where a single lost packet could stall every multiplexed request sharing that one TCP connection, even ones unrelated to the lost data.`,
diagram:`<svg viewBox="0 0 460 190" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="90" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">HTTP/1.1 — serial</text>
  <rect x="30" y="30" width="35" height="18" fill="var(--ledger)"/>
  <rect x="70" y="30" width="35" height="18" fill="var(--blue)"/>
  <rect x="110" y="30" width="35" height="18" fill="var(--amber)"/>
  <text x="90" y="65" text-anchor="middle" fill="var(--text-faint)" font-size="9.5">one at a time, in order</text>

  <text x="230" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">HTTP/2 — multiplexed</text>
  <rect x="175" y="90" width="110" height="16" fill="var(--ledger)" fill-opacity="0.6"/>
  <rect x="175" y="90" width="30" height="16" fill="var(--ledger)"/>
  <rect x="210" y="90" width="30" height="16" fill="var(--blue)"/>
  <rect x="245" y="90" width="30" height="16" fill="var(--amber)"/>
  <text x="230" y="125" text-anchor="middle" fill="var(--text-faint)" font-size="9.5">interleaved on 1 TCP connection</text>

  <text x="380" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">HTTP/3 — QUIC/UDP</text>
  <rect x="345" y="150" width="30" height="16" fill="var(--ledger)"/>
  <rect x="380" y="150" width="30" height="16" fill="var(--red)" stroke="var(--red)" stroke-dasharray="2,2"/>
  <rect x="415" y="150" width="30" height="16" fill="var(--amber)"/>
  <text x="380" y="180" text-anchor="middle" fill="var(--text-faint)" font-size="9">1 lost packet doesn't stall the others</text>
</svg>`,
ex:`A mobile app on a flaky cellular connection loading a dashboard with 10 separate API calls performs noticeably better over HTTP/2 or HTTP/3 than HTTP/1.1, because it's not stuck opening and waiting on multiple separate connections, and (with HTTP/3 specifically) a single dropped packet doesn't stall unrelated requests sharing the same connection.`,
trade:[`Newer protocol versions generally just make things faster with no real downside for the application layer, but they require both the client and server infrastructure to actually support them — this is usually a load balancer/CDN configuration concern rather than something application code needs to handle directly.`]},

{cat:"NW", title:"Proxy vs Reverse Proxy vs API Gateway", def:`Three related but distinct roles a server can play in front of or behind your traffic.

Forward proxy — sits in front of clients, making requests to the internet on their behalf. The destination server sees the proxy, not the original client. Often used for things like corporate network filtering or hiding client identity.

Reverse proxy — sits in front of servers, receiving requests from clients and forwarding them to the right backend server. The client only ever talks to the reverse proxy and doesn't know (or need to know) which actual backend server handled it. Load balancers are a common example of a reverse proxy.

API Gateway — a specialized reverse proxy built specifically for APIs, that often adds extra responsibilities on top of simple forwarding: authentication, rate limiting, request/response transformation, and routing requests to different backend microservices based on the URL path.`,

  </defs>
</svg>`,
ex:`An API Gateway sits in front of a fintech company's microservices, authenticating every incoming request once (so individual services don't each need to implement auth from scratch), applying a rate limit per API key, and routing `+"`/payments/*`"+` requests to the payments service and `+"`/accounts/*`"+` requests to the accounts service — all before the request ever reaches actual business logic.`,
trade:[`Centralizing concerns like auth and rate limiting in a gateway avoids duplicating that logic across every microservice, but it also becomes a critical, high-traffic single point that must be highly available and carefully capacity-planned — if the gateway goes down, everything behind it becomes unreachable, regardless of whether the actual services are healthy.`]},

{cat:"NW", title:"WebSockets vs Long Polling vs Server-Sent Events", def:`Three different approaches for pushing real-time updates to a client, since plain HTTP was originally designed around the client always initiating each request.

Long polling — the client makes a normal HTTP request, but the server just holds it open without responding until it actually has new data (or a timeout is reached), then the client immediately opens a new request to wait for the next update. Works over plain HTTP, but has overhead from constantly reopening connections.

Server-Sent Events (SSE) — the server keeps a single HTTP connection open and streams a continuous flow of updates to the client over it, one-way (server to client only). Simpler than WebSockets when you only need one-way updates.

WebSockets — a real two-way, persistent connection: after an initial HTTP handshake, the connection is upgraded into a dedicated channel where either side can send messages to the other at any time, with much lower overhead per message than repeatedly making new HTTP requests.`,
diagram:`<svg viewBox="0 0 480 190" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">

  <line x1="30" y1="115" x2="80" y2="130" stroke="var(--amber)" stroke-width="1.5" marker-end="url(#ws-a)"/>

  <text x="240" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">Server-Sent Events</text>

  <text x="240" y="185" text-anchor="middle" fill="var(--text-faint)" font-size="9">1 open stream, server → client</text>

  <text x="400" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">WebSockets</text>
  <line x1="400" y1="30" x2="400" y2="170" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="400" y1="40" x2="400" y2="150" stroke="var(--ledger)" stroke-width="2"/>
  <line x1="400" y1="60" x2="360" y2="60" stroke="var(--ledger)" stroke-width="1.5" marker-end="url(#ws-g)"/>
  <line x1="360" y1="90" x2="400" y2="90" stroke="var(--ledger)" stroke-width="1.5" marker-end="url(#ws-g)"/>
  <line x1="400" y1="120" x2="360" y2="120" stroke="var(--ledger)" stroke-width="1.5" marker-end="url(#ws-g)"/>
  <text x="400" y="185" text-anchor="middle" fill="var(--text-faint)" font-size="9">1 connection, both directions</text>

  <defs>
    <marker id="ws-a" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--amber)"/></marker>
    <marker id="ws-b" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--blue)"/></marker>
    <marker id="ws-g" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--ledger)"/></marker>
  </defs>
</svg>`,
ex:`A live stock/crypto price ticker showing constantly updating prices is a great fit for Server-Sent Events (one-way, server pushing updates). A trading platform where the client also needs to send rapid actions back (placing orders) and receive instant fills/updates fits WebSockets better, since it needs fast communication in both directions. A simpler notification badge that just needs occasional updates might reasonably use long polling if WebSocket infrastructure isn't already in place.`,
trade:[`WebSockets give the most capability (full two-way, low overhead) but require your infrastructure (load balancers, gateways) to properly support long-lived persistent connections rather than the short request-response pattern most HTTP infrastructure is tuned for — scaling WebSocket connections has real operational differences from scaling stateless HTTP request handling.`,`Long polling is the simplest to add on top of existing plain HTTP infrastructure with no special support needed, but it's the least efficient of the three, with more overhead per update.`]},

{cat:"NW", title:"CDN (Content Delivery Network)", def:`A network of servers distributed across many geographic locations that cache and serve content from a location physically close to the requesting user, instead of every request traveling all the way back to your one origin server. This reduces latency (physical distance = time) and reduces load on your origin server, since the CDN serves repeat requests from its own cache.`,

  <circle cx="480" cy="50" r="22" fill="var(--ledger)" fill-opacity="0.2" stroke="var(--ledger)" stroke-width="2"/>
  <text x="480" y="54" text-anchor="middle" fill="var(--ledger)" font-size="8.5">Edge (Asia)</text>
  <line x1="80" y1="72" x2="260" y2="135" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="280" y1="52" x2="280" y2="124" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="3 2"/>

  <text x="140" y="95" fill="var(--text-faint)" font-size="7.5">cache miss only</text>
  <circle cx="80" cy="110" r="6" fill="var(--amber)"/>
  <text x="30" y="114" fill="var(--amber)" font-size="8">User (US)</text>
  <line x1="80" y1="104" x2="80" y2="76" stroke="var(--amber)" stroke-width="2" marker-end="url(#cdnArrow)"/>
  <defs><marker id="cdnArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--amber)"/></marker></defs>
  <text x="280" y="185" text-anchor="middle" fill="var(--text-faint)" font-size="9">User's request hits the nearest edge cache; origin is only reached on a miss.</text>
</svg>`,
ex:`Static assets for a banking app's web dashboard (JavaScript files, images, CSS) are served through a CDN, so a user in Singapore loads them from a nearby CDN server in milliseconds instead of waiting for a round trip to the company's origin servers in the US. Sensitive, personalized data (like the user's actual account balance) is never cached at the CDN — that always goes directly to the origin, since it's different for every user and far too sensitive to cache in a shared, distributed location.`,
trade:[`Excellent for static, non-sensitive, widely-shared content (assets, public marketing pages), but a CDN should almost never cache personalized or sensitive financial data — misconfiguring cache rules to accidentally cache a personalized API response (like one user's balance) at a CDN, where it could potentially be served to a different user, would be a serious data-leak risk.`]},

{cat:"NW", title:"What Happens When You Type a URL and Press Enter", def:`A classic interview question because answering it well touches almost everything in this Networking section at once. Here's the journey, step by step, for visiting an HTTPS site like your bank's web login.

Step 1 — Check local caches first. The browser checks if it already knows the IP address for this domain (from a recent DNS lookup) and whether it already has a valid cached copy of the page. If everything needed is already cached and still fresh, the journey can stop right here.

Step 2 — DNS resolution. If the domain's IP address isn't cached, the browser triggers a DNS lookup (see the dedicated DNS topic) to translate the domain name into an actual IP address it can connect to.

Step 3 — TCP handshake. The browser opens a TCP connection to that IP address, performing the three-way SYN / SYN-ACK / ACK handshake covered earlier.

Step 4 — TLS handshake. Since this is HTTPS, a TLS handshake happens next: the server presents its certificate, the browser verifies it's legitimate, and both sides agree on an encryption key for everything that follows.

Step 5 — The HTTP request is sent. Now, finally, the browser sends the actual HTTP request (e.g., "GET /login") over this newly established, encrypted connection.

Step 6 — The request arrives at the backend infrastructure. This is where a backend engineer's world really starts: the request typically hits a load balancer or reverse proxy first, which might terminate the TLS connection, decide which backend server should handle it, and forward it along — possibly through an API Gateway doing authentication and rate limiting, before it reaches the actual application server.

Step 7 — The application server processes the request. The app server runs the actual business logic — which might mean querying a database, checking a cache, calling other internal services — and builds a response.

Step 8 — The HTTP response travels back. The response (HTML, or JSON, or whatever the endpoint returns) travels back through the same chain — app server → load balancer/gateway → back over the same encrypted TCP connection — to the browser.

Step 9 — The browser renders the page. If the response is a web page, the browser parses the HTML top to bottom, building a structural model of the page (the DOM). Along the way, it finds references to more resources — CSS files, JavaScript files, images — and fires off additional requests for each of those (often to a CDN, per the earlier topic), which can each independently go through some or all of steps 1-8 again. Once enough of the page, styles, and scripts have loaded, the browser paints the actual visual page onto the screen.

Step 10 — The page becomes interactive. Once the JavaScript has loaded and run, the page becomes interactive — buttons work, forms can be submitted, and this whole journey can start again for the next action the user takes (like actually submitting their login form).`,
diagram:`<svg viewBox="0 0 560 620" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <g font-size="13">
    <rect x="130" y="10" width="300" height="44" rx="6" fill="var(--panel-2)" stroke="var(--border)"/>
    <text x="280" y="37" text-anchor="middle" fill="var(--text)" font-weight="600">1-2. Check cache, then DNS lookup</text>

    <rect x="130" y="78" width="300" height="44" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
    <text x="280" y="105" text-anchor="middle" fill="var(--text)" font-weight="600">3. TCP handshake</text>

    <line x1="280" y1="122" x2="280" y2="144" stroke="var(--text-faint)" stroke-width="2" marker-end="url(#u-a)"/>

    <rect x="130" y="146" width="300" height="44" rx="6" fill="var(--blue)" fill-opacity="0.2" stroke="var(--blue)"/>
    <text x="280" y="173" text-anchor="middle" fill="var(--text)" font-weight="600">4. TLS handshake</text>

    <rect x="130" y="214" width="300" height="44" rx="6" fill="var(--amber)" fill-opacity="0.2" stroke="var(--amber)"/>
    <text x="280" y="241" text-anchor="middle" fill="var(--text)" font-weight="600">5. HTTP request sent</text>

    <line x1="280" y1="258" x2="280" y2="280" stroke="var(--text-faint)" stroke-width="2" marker-end="url(#u-a)"/>

    <rect x="80" y="282" width="400" height="110" rx="6" fill="var(--violet)" fill-opacity="0.12" stroke="var(--violet)"/>
    <text x="280" y="305" text-anchor="middle" fill="var(--violet)" font-weight="700" font-size="12">YOUR BACKEND (steps 6-8)</text>
    <text x="280" y="328" text-anchor="middle" fill="var(--text)">6. Load balancer / API Gateway</text>
    <text x="280" y="352" text-anchor="middle" fill="var(--text)">7. App server processes request</text>
    <text x="280" y="376" text-anchor="middle" fill="var(--text)">8. HTTP response sent back</text>

    <line x1="280" y1="392" x2="280" y2="414" stroke="var(--text-faint)" stroke-width="2" marker-end="url(#u-a)"/>

    <rect x="130" y="416" width="300" height="44" rx="6" fill="var(--panel-2)" stroke="var(--border)"/>
    <text x="280" y="443" text-anchor="middle" fill="var(--text)" font-weight="600">9. Browser renders the page</text>

    <line x1="280" y1="460" x2="280" y2="482" stroke="var(--text-faint)" stroke-width="2" marker-end="url(#u-a)"/>

    <rect x="130" y="484" width="300" height="44" rx="6" fill="var(--panel-2)" stroke="var(--border)"/>
    <text x="280" y="511" text-anchor="middle" fill="var(--text)" font-weight="600">10. Page becomes interactive</text>
  </g>
  <text x="280" y="560" text-anchor="middle" fill="var(--text-dim)" font-size="12">Steps 1-5 and 9-10: browser + network. Steps 6-8: what you own as a backend engineer.</text>
  <defs>
    <marker id="u-a" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--text-faint)"/></marker>
  </defs>
</svg>`,
ex:`Logging into a banking app's web dashboard: DNS resolves the bank's domain, a TCP+TLS connection is established, the login page HTML loads through the bank's load balancer and app servers, and then the browser fires off separate requests (often via a CDN) for the page's CSS and JavaScript. Once the user actually submits their login form, a brand-new HTTP request (reusing the already-open, already-encrypted connection, thanks to connection keep-alive) is sent to an authentication endpoint, which validates credentials against a database and returns a session token — kicking off the "real" application flow this whole guide has been about.`,
trade:[`As a backend engineer, you don't control steps 1-5 (that's the browser and network's job) or step 9-10 (that's the frontend's job) — your responsibility starts at step 6 and ends at step 8. But understanding the full picture matters, because a slow "page load" a user complains about could genuinely be a DNS issue, a TLS handshake issue, a slow backend response, or a frontend rendering issue — and correctly figuring out which one it is is exactly the kind of debugging skill covered in this guide's Debugging Production section.`,`This is also why so many performance techniques throughout this guide exist: DNS caching and CDNs shorten steps 1-2 and step 9's extra asset requests; connection keep-alive avoids repeating steps 3-4 on every subsequent request; and load balancers plus well-tuned app servers keep steps 6-8 fast — nearly every optimization in this entire guide maps to shortening one specific step in this journey.`]},

// ---------------- DISTRIBUTED SYSTEMS ----------------
{cat:"DS", title:"CAP Theorem", def:`CAP stands for three properties of a distributed system. The theorem says you can only fully guarantee two of the three at the same time — you cannot have all three.

C — Consistency: every read sees the most recent write, no matter which server answers it.

A — Availability: every request gets a response (even if it's not guaranteed to be the very latest data).

P — Partition tolerance: the system keeps working even when the network connection between servers breaks.

In practice, real networks do sometimes break, so Partition tolerance isn't really something you can opt out of — it will happen eventually. That means CAP really comes down to one practical question you have to answer for your system: "when the network breaks, do we stay Consistent, or do we stay Available?" You can't have both at that moment.`,
diagram:`<svg viewBox="0 0 480 420" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <polygon points="240,50 60,370 420,370" fill="none" stroke="var(--border)" stroke-width="2"/>

  <circle cx="240" cy="50" r="34" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="240" y="45" text-anchor="middle" fill="var(--text)" font-size="20" font-weight="700">C</text>
  <text x="240" y="64" text-anchor="middle" fill="var(--text-dim)" font-size="10">Consistency</text>

  <circle cx="60" cy="370" r="34" fill="var(--blue)" fill-opacity="0.2" stroke="var(--blue)" stroke-width="2"/>
  <text x="60" y="365" text-anchor="middle" fill="var(--text)" font-size="20" font-weight="700">A</text>
  <text x="60" y="384" text-anchor="middle" fill="var(--text-dim)" font-size="10">Availability</text>

  <circle cx="420" cy="370" r="34" fill="var(--amber)" fill-opacity="0.2" stroke="var(--amber)" stroke-width="2"/>
  <text x="420" y="365" text-anchor="middle" fill="var(--text)" font-size="20" font-weight="700">P</text>
  <text x="420" y="384" text-anchor="middle" fill="var(--text-dim)" font-size="10">Partition Tolerance</text>

  <text x="150" y="195" text-anchor="middle" fill="var(--ledger)" font-size="13" font-weight="600" transform="rotate(-58 150 195)">CP — fintech ledgers</text>
  <text x="330" y="195" text-anchor="middle" fill="var(--amber)" font-size="13" font-weight="600" transform="rotate(58 330 195)">AP — notifications</text>
  <text x="240" y="400" text-anchor="middle" fill="var(--text-faint)" font-size="12">CA — only possible if a partition never happens (rare in practice)</text>
</svg>`,
ex:`During a network split between two data centers, your ledger service must pick: reject transfer requests until the partition heals (CP — protects balance correctness), or keep accepting transfers and reconcile conflicts later (AP — risks a double-spend). Fintech ledgers almost always choose CP for the write path.`,
trade:[`CP systems: safer for money movement, but degrade to unavailable during partitions — customers see errors instead of stale data.`,`AP systems: stay responsive, but need conflict resolution logic afterward (compensating transactions, manual reconciliation).`,`Most real systems are CP for some data (balances) and AP for other data (notifications, analytics) — CAP is a per-subsystem decision, not a whole-system label.`]},

{cat:"DS", title:"PACELC", def:`An extension of CAP theorem that also covers the normal case, not just failures.

If Partitioned: choose Availability or Consistency (this part is just CAP).

Else (the network is healthy, nothing is broken): you still have to choose between Latency and Consistency. Making a write wait for confirmation from far-away replicas is safer but slower; letting a write finish quickly and sync up later is faster but risks reading stale data for a moment.`,
diagram:`<svg viewBox="0 0 560 170" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="280" y="20" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Is the network Partitioned right now?</text>
  <line x1="280" y1="28" x2="140" y2="70" stroke="var(--border)" stroke-width="1.5" marker-end="url(#paArrow)"/>
  <text x="180" y="55" fill="var(--text-faint)" font-size="9">Yes</text>
  <line x1="280" y1="28" x2="420" y2="70" stroke="var(--border)" stroke-width="1.5" marker-end="url(#paArrow2)"/>
  <text x="390" y="55" fill="var(--text-faint)" font-size="9">No (normal case)</text>
  <defs>
    <marker id="paArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker>
    <marker id="paArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker>
  </defs>
  <rect x="60" y="75" width="160" height="46" rx="6" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)" stroke-width="2"/>
  <text x="140" y="95" text-anchor="middle" fill="var(--red)" font-size="9.5" font-weight="600">(P) choose:</text>
  <text x="140" y="111" text-anchor="middle" fill="var(--red)" font-size="9">Availability vs Consistency</text>
  <rect x="340" y="75" width="160" height="46" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="420" y="95" text-anchor="middle" fill="var(--ledger)" font-size="9.5" font-weight="600">(E)lse choose:</text>
  <text x="420" y="111" text-anchor="middle" fill="var(--ledger)" font-size="9">Latency vs Consistency</text>
  <text x="280" y="150" text-anchor="middle" fill="var(--text-faint)" font-size="9">CAP only covers the left branch — PACELC also covers the everyday right branch</text>
</svg>`,
ex:`A globally distributed wallet service could synchronously replicate every balance write to all regions (high consistency, high latency) or write locally and replicate asynchronously (low latency, eventual consistency). Most payment processors accept a small latency cost for consistency on the money-moving path.`,
trade:[`Sync replication: strong consistency, but every write pays a cross-region round trip.`,`Async replication: fast writes, but a regional failure can lose the most recent unreplicated transactions.`,`Useful for explaining to interviewers why "eventually consistent and fast" isn't automatically a bad choice — it depends which data path you're describing.`]},

{cat:"DS", title:"Consensus: Paxos & Raft", def:`Algorithms that let a cluster of nodes agree on a single value (e.g., "who is the leader" or "what is the next log entry") even when some nodes fail. Raft is designed to be more understandable than Paxos and is what most modern systems (etcd, Consul, CockroachDB) implement.`,
diagram:`<svg viewBox="0 0 480 220" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <circle cx="240" cy="50" r="28" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2.5"/>
  <text x="240" y="55" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="700">Leader</text>

  <circle cx="90" cy="150" r="24" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="90" y="155" text-anchor="middle" fill="var(--text)" font-size="11">Follower</text>
  <circle cx="240" cy="170" r="24" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="240" y="175" text-anchor="middle" fill="var(--text)" font-size="11">Follower</text>
  <circle cx="390" cy="150" r="24" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="390" y="155" text-anchor="middle" fill="var(--text)" font-size="11">Follower</text>

  <line x1="220" y1="72" x2="105" y2="128" stroke="var(--ledger)" stroke-width="1.5" marker-end="url(#cs-g)"/>
  <line x1="240" y1="78" x2="240" y2="146" stroke="var(--ledger)" stroke-width="1.5" marker-end="url(#cs-g)"/>
  <line x1="260" y1="72" x2="375" y2="128" stroke="var(--ledger)" stroke-width="1.5" marker-end="url(#cs-g)"/>

  <text x="240" y="205" text-anchor="middle" fill="var(--text-dim)" font-size="11">Leader replicates its log; a write is "committed" once a majority acknowledge it</text>

  <defs>
    <marker id="cs-g" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--ledger)"/></marker>
  </defs>
</svg>`,
ex:`Your distributed configuration store (etcd) uses Raft internally to agree on which node is the leader for a given shard of your payment-routing config, so all app instances see a consistent view of routing rules.`,
trade:[`Guarantees safety under node failure and network issues, but requires a majority (quorum) of nodes to be reachable — an even split means no progress.`,`Adds latency (a write isn't committed until a majority acknowledges it) in exchange for strong consistency.`,`You rarely implement Raft yourself — you choose systems built on it (etcd, Consul, Kafka's KRaft) rather than reinventing it.`]},

{cat:"DS", title:"Logical Clocks & HLC", def:`Physical clocks on different machines drift slightly, so you can't fully trust wall-clock time alone to figure out which event happened first across a distributed system. A few different tools solve this:

Lamport clocks — give a simple "this happened before that" ordering between events, using a counter instead of real time.

Vector clocks — go further, and can actually detect when two events happened independently, with no cause-and-effect relationship between them at all.

Hybrid Logical Clocks (HLC) — combine real physical time with a logical counter, giving you both a correct ordering AND a timestamp that's still human-readable and close to the real time — a practical middle ground used in many real systems.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="90" y="18" text-anchor="middle" fill="var(--red)" font-size="10" font-weight="600">Wall-clock time (skewed)</text>
  <text x="90" y="45" text-anchor="middle" fill="var(--red)" font-size="9">Region A: 10:00:02.001</text>
  <text x="90" y="65" text-anchor="middle" fill="var(--red)" font-size="9">Region B: 10:00:02.003</text>
  <text x="90" y="90" text-anchor="middle" fill="var(--red)" font-size="8">skew can make B look earlier even if A happened first</text>

  <text x="440" y="18" text-anchor="middle" fill="var(--ledger)" font-size="10" font-weight="600">HLC (physical + logical counter)</text>
  <text x="440" y="45" text-anchor="middle" fill="var(--ledger)" font-size="9">Region A: (10:00:02, seq=5)</text>
  <text x="440" y="65" text-anchor="middle" fill="var(--ledger)" font-size="9">Region B: (10:00:02, seq=6)</text>
  <text x="440" y="90" text-anchor="middle" fill="var(--ledger)" font-size="8">counter breaks the tie — correct causal order, still human-readable</text>
</svg>`,
ex:`Two regional services process transactions 2ms apart by wall clock, but clock skew means the "later" one has an earlier timestamp. An HLC-based event ID lets your ledger reconstruct correct causal order regardless of skew, which matters for audit trails and dispute resolution.`,
trade:[`Vector clocks give precise causality but grow with the number of nodes — expensive at scale.`,`HLC is a practical middle ground: bounded size, still gives causal ordering, and stays close to real time for human debugging.`,`Never rely on raw wall-clock timestamps alone to order financial events across machines.`]},

{cat:"DS", title:"Thundering Herd / Cache Stampede", def:`When a popular cached value expires or a shared resource becomes available, many concurrent requests rush it simultaneously, overwhelming the backing store — the "herd" all recomputing or re-fetching at once.`,
diagram:`<svg viewBox="0 0 560 170" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="280" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Cache entry expires at t=0</text>
  <circle cx="60" cy="60" r="14" fill="var(--panel)" stroke="var(--border)"/>
  <circle cx="110" cy="45" r="14" fill="var(--panel)" stroke="var(--border)"/>
  <circle cx="160" cy="65" r="14" fill="var(--panel)" stroke="var(--border)"/>
  <circle cx="90" cy="90" r="14" fill="var(--panel)" stroke="var(--border)"/>
  <circle cx="140" cy="95" r="14" fill="var(--panel)" stroke="var(--border)"/>
  <text x="110" y="120" text-anchor="middle" fill="var(--text-faint)" font-size="9">50,000 requests, same instant</text>
  <line x1="175" y1="70" x2="330" y2="70" stroke="var(--red)" stroke-width="2" marker-end="url(#thArrow)"/>
  <defs><marker id="thArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--red)"/></marker></defs>
  <rect x="335" y="45" width="120" height="50" rx="6" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)" stroke-width="2"/>
  <text x="395" y="66" text-anchor="middle" fill="var(--red)" font-size="9.5">Backing store</text>
  <text x="395" y="82" text-anchor="middle" fill="var(--red)" font-size="9.5">overwhelmed</text>
  <text x="280" y="140" text-anchor="middle" fill="var(--text-faint)" font-size="9.5">Fix: jittered TTLs, request coalescing, or stale-while-revalidate</text>
</svg>`,
ex:`A currency exchange-rate cache expires at midnight and 50,000 concurrent requests all miss the cache in the same second, hammering the upstream rates provider and causing a cascading timeout across every service that needs a rate.`,
trade:[`Fix with jittered TTLs (don't expire everything at exactly the same second), request coalescing (one fetch serves all waiters), or stale-while-revalidate (serve slightly old data while refreshing in the background).`,`Locking the recompute to a single worker avoids duplicate work but adds a small latency tax to the unlucky first request.`,`Cheap to prevent proactively, expensive to firefight in production — always jitter cache expirations by default.`]},

{cat:"DS", title:"Cascading Failures & Metastability", def:`A cascading failure is when one component's failure overloads and takes down its neighbors, which then take down theirs. A metastable failure is a related trap: even after the original trigger is fixed, the system stays broken because retries/requeued work keep the load high enough to prevent recovery.`,
diagram:`<svg viewBox="0 0 560 170" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="70" width="100" height="40" rx="6" fill="var(--red)" fill-opacity="0.2" stroke="var(--red)" stroke-width="2"/>
  <text x="70" y="94" text-anchor="middle" fill="var(--red)" font-size="9">Fraud svc slows</text>
  <line x1="120" y1="90" x2="180" y2="90" stroke="var(--red)" stroke-width="2" marker-end="url(#cfArrow)"/>
  <defs><marker id="cfArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--red)"/></marker></defs>
  <rect x="185" y="70" width="100" height="40" rx="6" fill="var(--red)" fill-opacity="0.2" stroke="var(--red)" stroke-width="2"/>
  <text x="235" y="88" text-anchor="middle" fill="var(--red)" font-size="8.5">Callers retry</text>
  <text x="235" y="102" text-anchor="middle" fill="var(--red)" font-size="8.5">2x the load</text>
  <line x1="285" y1="90" x2="345" y2="90" stroke="var(--red)" stroke-width="2" marker-end="url(#cfArrow2)"/>
  <defs><marker id="cfArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--red)"/></marker></defs>
  <rect x="350" y="70" width="100" height="40" rx="6" fill="var(--red)" fill-opacity="0.25" stroke="var(--red)" stroke-width="2"/>
  <text x="400" y="88" text-anchor="middle" fill="var(--red)" font-size="8.5">Payment API</text>
  <text x="400" y="102" text-anchor="middle" fill="var(--red)" font-size="8.5">times out too</text>

  <rect x="20" y="130" width="430" height="30" fill="none" stroke="var(--border)" stroke-dasharray="4 3"/>
  <text x="35" y="149" fill="var(--text-dim)" font-size="9">Metastable trap: fraud service is fixed, but the queued retry backlog alone keeps load too high to recover.</text>
</svg>`,
ex:`A downstream fraud-check service slows down; callers retry aggressively; retries double the load on the already-struggling service; it falls over; upstream payment APIs start timing out too. Even after the fraud service is restored, the backlog of queued retries keeps it overloaded — the system doesn't recover on its own.`,
trade:[`Prevent with timeouts + circuit breakers so failures don't propagate, and backoff+jitter so retries don't synchronize into a new wave.`,`Load shedding (deliberately rejecting some requests) protects the system's ability to serve any traffic, at the cost of visibly failing some requests.`,`Recovery sometimes requires manually draining queued/retry backlogs, not just fixing the root cause — plan for that in runbooks.`]},

{cat:"DS", title:"Fan-in vs Fan-out", def:`Fan-out: one producer sends work to many consumers (broadcast/parallelize). Fan-in: many producers feed into one consumer or aggregator (collect/merge).`,
diagram:`<svg viewBox="0 0 520 200" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="120" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="12" font-weight="600">Fan-out</text>
  <rect x="80" y="30" width="80" height="40" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="120" y="55" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">Event</text>
  <line x1="120" y1="70" x2="40" y2="110" stroke="var(--ledger)" stroke-width="1.5" marker-end="url(#fi-g)"/>
  <line x1="120" y1="70" x2="120" y2="110" stroke="var(--ledger)" stroke-width="1.5" marker-end="url(#fi-g)"/>
  <line x1="120" y1="70" x2="200" y2="110" stroke="var(--ledger)" stroke-width="1.5" marker-end="url(#fi-g)"/>
  <rect x="10" y="112" width="60" height="35" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="40" y="134" text-anchor="middle" fill="var(--text)" font-size="9.5">Email</text>
  <rect x="90" y="112" width="60" height="35" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="120" y="134" text-anchor="middle" fill="var(--text)" font-size="9.5">Ledger</text>
  <rect x="170" y="112" width="60" height="35" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="200" y="134" text-anchor="middle" fill="var(--text)" font-size="9.5">Fraud</text>
  <text x="120" y="175" text-anchor="middle" fill="var(--text-faint)" font-size="10">1 event → many consumers</text>

  <text x="400" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="12" font-weight="600">Fan-in</text>
  <rect x="320" y="30" width="55" height="30" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="347" y="49" text-anchor="middle" fill="var(--text)" font-size="9.5">Region A</text>
  <rect x="400" y="30" width="55" height="30" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="427" y="49" text-anchor="middle" fill="var(--text)" font-size="9.5">Region B</text>
  <rect x="480" y="30" width="30" height="30" rx="5" fill="var(--panel-2)" stroke="var(--border)" style="display:none"/>
  <line x1="347" y1="60" x2="400" y2="115" stroke="var(--amber)" stroke-width="1.5" marker-end="url(#fi-a)"/>
  <line x1="427" y1="60" x2="400" y2="115" stroke="var(--amber)" stroke-width="1.5" marker-end="url(#fi-a)"/>
  <rect x="360" y="118" width="80" height="40" rx="6" fill="var(--amber)" fill-opacity="0.18" stroke="var(--amber)" stroke-width="2"/>
  <text x="400" y="143" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">Aggregator</text>
  <text x="400" y="180" text-anchor="middle" fill="var(--text-faint)" font-size="10">many producers → 1 consumer</text>

  <defs>
    <marker id="fi-g" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--ledger)"/></marker>
    <marker id="fi-a" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--amber)"/></marker>
  </defs>
</svg>`,
ex:`Fan-out: a single "payment completed" event triggers email, SMS, ledger update, and fraud-scoring services in parallel. Fan-in: settlement batches from 12 regional processors all get aggregated into one central reconciliation job at end of day.`,
trade:[`Fan-out risks overloading slow downstream consumers — add per-consumer backpressure or queues so one slow subscriber doesn't block the others.`,`Fan-in risks the aggregator becoming a bottleneck or single point of failure — consider sharding the aggregation itself if volume grows.`,`Both patterns need idempotency at the consumer/aggregator side since retries are inevitable at this scale.`]},

{cat:"DS", title:"Idempotency & Exactly-Once Delivery", def:`Idempotency means performing the same operation multiple times has the same effect as performing it once. True "exactly-once" delivery is very hard in distributed systems; in practice, you achieve "effectively-once" by combining at-least-once delivery with idempotent processing (dedup keys).`,
diagram:`<svg viewBox="0 0 560 170" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="20" y="20" fill="var(--text-dim)" font-size="10.5" font-weight="600">Client</text>
  <text x="220" y="20" fill="var(--text-dim)" font-size="10.5" font-weight="600">Server</text>
  <line x1="60" y1="30" x2="60" y2="150" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="260" y1="30" x2="260" y2="150" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="60" y1="45" x2="260" y2="45" stroke="var(--ledger)" stroke-width="1.5" marker-end="url(#idArrow1)"/>
  <text x="160" y="40" text-anchor="middle" fill="var(--text-dim)" font-size="8.5">POST /pay, key=abc123</text>
  <text x="270" y="60" fill="var(--text-dim)" font-size="8.5">processes, response lost in transit</text>
  <line x1="60" y1="85" x2="260" y2="85" stroke="var(--amber)" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#idArrow2)"/>
  <text x="160" y="80" text-anchor="middle" fill="var(--amber)" font-size="8.5">timeout → retry, same key=abc123</text>
  <text x="270" y="100" fill="var(--ledger)" font-size="8.5">key seen before → returns original result</text>
  <text x="270" y="118" fill="var(--ledger)" font-size="8.5">(does NOT charge a second time)</text>
  <defs>
    <marker id="idArrow1" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ledger)"/></marker>
    <marker id="idArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--amber)"/></marker>
  </defs>
  <text x="160" y="145" text-anchor="middle" fill="var(--text-faint)" font-size="9">At-least-once delivery + idempotency key = effectively-once outcome</text>
</svg>`,
ex:`A client's payment request times out and retries. If the server had already processed the first attempt, blindly reprocessing would double-charge the customer. An idempotency key (client-generated UUID per intent) lets the server recognize the retry and return the original result instead of charging again.`,
trade:[`Requires storing recently-seen idempotency keys (with a TTL) — adds storage and lookup cost, but this cost is far cheaper than a double-charge incident.`,`Idempotency at the API layer doesn't automatically make downstream side effects (emails, webhooks) idempotent too — each side effect needs its own dedup strategy.`]},

{cat:"DS", title:"Consistent Hashing", def:`A hashing scheme that maps both data and nodes onto a ring, so when a node is added or removed, only a small fraction of keys need to move — unlike naive modulo hashing where nearly everything reshuffles.`,
diagram:`<svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <circle cx="240" cy="240" r="180" fill="none" stroke="var(--border)" stroke-width="2"/>

  <circle cx="240" cy="60" r="14" fill="var(--ledger)"/>
  <text x="240" y="40" text-anchor="middle" fill="var(--ledger)" font-size="13" font-weight="700">N1</text>

  <circle cx="420" cy="240" r="14" fill="var(--ledger)"/>
  <text x="450" y="245" text-anchor="middle" fill="var(--ledger)" font-size="13" font-weight="700">N2</text>

  <circle cx="240" cy="420" r="14" fill="var(--ledger)"/>
  <text x="240" y="450" text-anchor="middle" fill="var(--ledger)" font-size="13" font-weight="700">N3</text>

  <circle cx="60" cy="240" r="14" fill="var(--ledger)"/>
  <text x="30" y="245" text-anchor="middle" fill="var(--ledger)" font-size="13" font-weight="700">N4</text>

  <circle cx="367" cy="113" r="8" fill="var(--amber)"/>
  <text x="385" y="100" text-anchor="middle" fill="var(--amber)" font-size="12" font-weight="600">K1</text>
  <path d="M367,113 Q400,175 420,225" fill="none" stroke="var(--amber)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ch-a)"/>

  <circle cx="367" cy="367" r="8" fill="var(--amber)"/>
  <text x="385" y="385" text-anchor="middle" fill="var(--amber)" font-size="12" font-weight="600">K2</text>
  <path d="M367,367 Q310,400 255,415" fill="none" stroke="var(--amber)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ch-a)"/>

  <circle cx="113" cy="113" r="8" fill="var(--amber)"/>
  <text x="95" y="100" text-anchor="middle" fill="var(--amber)" font-size="12" font-weight="600">K3</text>
  <path d="M113,113 Q170,80 225,63" fill="none" stroke="var(--amber)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ch-a)"/>

  <text x="240" y="240" text-anchor="middle" fill="var(--text-faint)" font-size="12">each key maps to the</text>
  <text x="240" y="256" text-anchor="middle" fill="var(--text-faint)" font-size="12">next node clockwise</text>

  <defs>
    <marker id="ch-a" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--amber)"/></marker>
  </defs>
</svg>`,
ex:`When scaling your account-sharding layer from 8 to 10 database shards, consistent hashing (or its virtual-node variant) moves roughly 20% of accounts, not 80%, minimizing the resharding migration window.`,
trade:[`Reduces data movement on scale events, but adds a layer of indirection (ring lookup) versus simple modulo sharding.`,`Virtual nodes (many points per physical node) smooth out load distribution but add bookkeeping complexity.`]},

{cat:"DS", title:"Consistency Models", def:`A spectrum describing what guarantees you get when you read data, relative to writes that happened before it.

Strong consistency — every read sees the very latest write, no matter which server answers it.

Eventual consistency — reads will reflect a write eventually, but there's no guaranteed time limit on "eventually."

Causal consistency — if one event caused another (like a comment that replies to a post), everyone sees them in that same cause-and-effect order.

Read-your-writes — a person will always see their own changes right away, even if other people might see them a bit later.

Monotonic reads — once you've seen a value, you will never see an older value after that, even if you ask again later.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <line x1="30" y1="60" x2="530" y2="60" stroke="var(--border)" stroke-width="2"/>
  <text x="30" y="45" text-anchor="middle" fill="var(--ledger)" font-size="9.5" font-weight="600">Strong</text>
  <circle cx="30" cy="60" r="6" fill="var(--ledger)"/>
  <text x="180" y="45" text-anchor="middle" fill="var(--text)" font-size="9.5" font-weight="600">Causal</text>
  <circle cx="180" cy="60" r="6" fill="var(--text)"/>
  <text x="330" y="45" text-anchor="middle" fill="var(--amber)" font-size="9.5" font-weight="600">Read-your-writes</text>
  <circle cx="330" cy="60" r="6" fill="var(--amber)"/>
  <text x="500" y="45" text-anchor="middle" fill="var(--text-faint)" font-size="9.5" font-weight="600">Eventual</text>
  <circle cx="500" cy="60" r="6" fill="var(--text-faint)"/>
  <text x="30" y="80" text-anchor="middle" fill="var(--text-faint)" font-size="8">costs latency</text>
  <text x="500" y="80" text-anchor="middle" fill="var(--text-faint)" font-size="8">costs guarantees</text>
  <line x1="30" y1="95" x2="500" y2="95" stroke="var(--border)" stroke-width="1.5" marker-end="url(#cmArrow)"/>
  <text x="265" y="115" text-anchor="middle" fill="var(--text-faint)" font-size="9">weaker guarantee, more availability/scale →</text>
  <defs><marker id="cmArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
</svg>`,
ex:`A user updates their profile photo and immediately views their own profile (read-your-writes needed, or they'd see the old photo). Meanwhile, another user viewing that profile a few seconds later seeing the old photo briefly is acceptable (eventual consistency is fine for that path).`,
