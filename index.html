Replica shard — a copy of a primary shard, kept in sync, sitting on a different node. Replicas exist for two reasons: if a node goes down, a replica can take over so no data is lost, and replicas can also serve read/search traffic, spreading the load across more machines.

The important catch: the number of primary shards is normally fixed once an index is created. You can add more replica shards later fairly easily (to handle more read traffic), but changing the number of primary shards usually means creating a brand new index with the new shard count and reindexing (copying) all the data into it — you can't just "add one more primary shard" to an existing index the way you might casually add a server to a pool.`,
ex:`An index of transaction records is created with 5 primary shards and 1 replica of each (10 shards total, spread across the cluster). A search for "refund" is broken into 5 smaller searches, one per primary shard (or its replica), run in parallel, and the results are merged together and ranked before being returned — much faster than searching one giant index sequentially. If a node holding one primary shard fails, its replica on another node is automatically promoted, and no data or search capability is lost.`,
trade:[`Too few shards limits how much you can parallelize search and how far you can scale later. Too many shards adds overhead (each shard has some fixed memory/resource cost, even when small) and can actually slow things down — this is why picking a sensible shard count upfront, based on expected data volume, matters far more in Elasticsearch than it might in some other systems.`,`Because changing the primary shard count later requires reindexing into a new index, many teams deliberately plan for future growth by either estimating shard count generously upfront, or using time-based indices (like one index per month) so that future growth just means creating new indices with a better shard count, rather than resizing an existing one.`]},

{cat:"DB", title:"Scaling Elasticsearch", def:`A few complementary strategies, often used together, for growing an Elasticsearch deployment as data and traffic increase.

Add more nodes (horizontal scaling) — since an index is already split into shards, adding more nodes to the cluster lets Elasticsearch spread those shards across more machines, increasing both storage capacity and parallel search throughput.

Add more replicas — if search (read) traffic is the bottleneck rather than data volume, adding more replica shards lets more nodes serve the same search traffic in parallel, without needing to change the primary shard count at all.

Use time-based indices — for data that naturally arrives over time (like logs or transaction records), it's common to create a new index per day or per month (for example, "transactions-2026-07") instead of one giant ever-growing index. This makes it easy to control shard count as you go, and makes deleting old data cheap (just delete the whole old index, instead of a slow row-by-row delete).

Use a hot-warm-cold architecture — put your newest, most-searched data on fast, expensive hardware (the "hot" tier), move older, less-frequently-searched data to cheaper, slower hardware (the "warm" tier), and eventually to very cheap storage for data that's rarely accessed but needs to be retained for compliance (the "cold" tier). This keeps costs down without deleting data you're still required to keep.

Use Index Lifecycle Management (ILM) — automate the above: define rules like "after 30 days, move this index to the warm tier; after 1 year, move it to cold storage; after 7 years, delete it," and let Elasticsearch handle the transitions automatically instead of doing it manually.`,
ex:`A fintech company's transaction-search index grows by millions of records daily. They use daily time-based indices, keep the last 30 days on fast hot-tier nodes (since customer support mostly searches recent transactions), automatically move indices older than 30 days to cheaper warm-tier storage, and automatically delete indices older than 7 years to match their regulatory data-retention policy — all handled automatically through Index Lifecycle Management rules, with no one manually managing this month by month.`,
trade:[`Time-based indices and ILM together solve most of the "how do we keep this manageable and affordable as it grows forever" problem, but they require some upfront design thinking (how to split indices, what the retention rules should be) rather than just letting one index grow indefinitely by default.`,`Hot-warm-cold architectures save real money at scale, but add operational complexity — you now have different hardware tiers to manage and monitor, and a bug in your ILM rules could accidentally delete data before it's supposed to be deleted, or move it to slow storage while it's still being actively queried.`]},

{cat:"DB", title:"Isolation Levels & Anomalies", def:`SQL defines four levels of isolation, controlling how much one transaction is allowed to "see" of another transaction's in-progress work. Going down this list, each level fixes one more problem, but also costs a bit more performance.

Read Uncommitted — the weakest level. You can see another transaction's changes even before it commits (a "dirty read") — risky, since that data might get rolled back and never actually happen.

Read Committed — you only ever see committed data, never uncommitted changes. But if you read the same row twice in one transaction, it might have changed in between (a "non-repeatable read").

Repeatable Read — reading the same row twice always gives the same result within one transaction. But a new row matching your query's filter could still appear if you re-run the same query (a "phantom read"), and a subtler bug called "write skew" is still possible.

Serializable — the strongest level. Transactions behave completely as if they ran one after another, never overlapping at all. Safest, but the most locking/retrying, so the lowest throughput under heavy concurrent access.`,
ex:`A transfer service uses Serializable isolation (or explicit locking) for balance updates to prevent write skew — e.g., two concurrent withdrawals that each individually check "balance ≥ amount" under Repeatable Read could both pass and overdraw the account, since neither sees the other's uncommitted change.`,
trade:[`Higher isolation levels prevent more anomalies but reduce concurrency (more locking/aborts) — Serializable can mean more transaction retries under load.`,`Choosing the right level per operation matters: analytics queries can often tolerate Read Committed; money-moving transactions usually need Serializable or equivalent explicit locking.`]},

{cat:"DB", title:"Database Anomaly: Dirty Read", def:`A dirty read happens when your transaction reads a value that another transaction has written but not yet committed. If that other transaction later rolls back (cancels its changes), you've just made a decision based on data that, officially, never actually happened.

This is the anomaly that only "Read Uncommitted" allows — every other standard isolation level blocks it.`,
ex:`Transaction A starts a withdrawal, temporarily reducing an account's balance in memory as part of an uncommitted transaction. Transaction B (running under Read Uncommitted) reads that in-progress, not-yet-committed balance and approves a purchase based on it. Then Transaction A hits an error and rolls back, undoing the withdrawal — but Transaction B already approved a purchase based on a balance that, as far as the official record is concerned, never existed.`,
trade:[`Dirty reads are almost never acceptable for financial data — the fix is simply never using Read Uncommitted for anything that touches money. It's really only ever appropriate for rough, non-critical analytics where seeing slightly-wrong, in-progress data is an acceptable trade for speed.`]},

{cat:"DB", title:"Database Anomaly: Non-Repeatable Read", def:`A non-repeatable read happens when you read the same row twice within a single transaction, and get two different answers — because another, already-committed transaction changed that row in between your two reads.

This is allowed under "Read Committed" but prevented from "Repeatable Read" and above.`,
ex:`Within one transaction, a report first reads an account's balance as $500. While that same transaction is still running, a completely separate, already-committed transaction deposits $100 into that account. When the original transaction reads the balance again a moment later, it now sees $600 — the same query gave two different answers in the same transaction, which can produce a confusing, internally inconsistent report.`,
trade:[`Fine for many read-only, non-critical reports where a small chance of mid-transaction change is acceptable — but if a transaction needs to make a decision based on a value staying the same throughout its whole execution (e.g., checking a balance and then acting on it later in the same transaction), you need at least Repeatable Read.`]},

{cat:"DB", title:"Database Anomaly: Phantom Read", def:`A phantom read happens when you run the same query twice within one transaction — not asking about one specific row, but asking a broader question like "give me all rows matching this condition" — and get a different set of rows back the second time, because another transaction inserted or deleted a row that now newly matches (or no longer matches) your filter.

This is subtly different from a non-repeatable read: a non-repeatable read is about one row changing, a phantom read is about the whole set of matching rows changing.`,
ex:`A fraud-review process queries "all transactions over $10,000 in the last hour" and gets 5 results. While it's still working through those 5, another transaction for $15,000 gets committed by someone else. If the fraud process re-runs the exact same query a moment later, it now sees 6 results — a new row "phantom" appeared that wasn't there the first time, potentially causing the review process to miss it if it already assumed it had "all" the results.`,
trade:[`Prevented by Serializable isolation (and, for the specific row ranges involved, sometimes by database-specific locking like range locks) — a real consideration for any process that needs a stable, complete view of "everything matching X" throughout its execution, not just one unchanging row.`]},

{cat:"DB", title:"Database Anomaly: Lost Update", def:`A lost update happens when two transactions both read the same value, both calculate a new value based on what they read, and both write their result back — and the second write silently overwrites the first, so one of the two updates is completely lost, with no error or warning at all.`,
ex:`Two concurrent requests both read an account balance of $100 to add a $20 deposit each. Both calculate $120 in their own memory and write $120 back. The correct final balance should be $140 (two separate $20 deposits), but because both writes independently computed from the same starting $100, one of the $20 deposits is silently lost — the balance ends up at $120, not $140, and nothing in the system ever flags an error.`,
trade:[`This is exactly the anomaly that pessimistic locking (lock the row before reading) or optimistic locking (check a version number hasn't changed before writing) is designed to prevent — never update a value by "read, calculate in application code, then write back" for money without one of these protections in place.`]},

{cat:"DB", title:"Database Anomaly: Write Skew (Serialization Anomaly)", def:`Write skew is a subtler anomaly where two transactions each read overlapping data, each individually make a change that looks perfectly valid on its own, but the two changes combined violate a rule that depends on both of them together. Each transaction, checked alone, did nothing wrong — the problem only exists when you look at the combined result.

This is sometimes grouped under the broader term "serialization anomaly," meaning any incorrect outcome that wouldn't have been possible if the transactions had truly run one at a time (serially), even though each transaction individually followed the rules it could see.`,
ex:`An account requires at least one of two joint owners to approve any withdrawal over $1,000, and the rule is "at least one owner must remain who hasn't already used their approval today." Owner A checks "has someone else already approved today?" — sees no — and approves a withdrawal. At almost the same moment, Owner B runs the exact same check — also sees no, since Owner A's approval hasn't been committed yet — and also approves a separate withdrawal. Individually, each approval looked completely valid at the moment it was checked. Combined, the rule "only one approval per day" has now been violated by both happening at once.`,
trade:[`This is the one anomaly that even Repeatable Read does not protect against — only Serializable isolation (or explicit application-level locking on all the rows the decision actually depends on) prevents it, which is exactly why financial approval and limit-checking logic often needs the strongest isolation level available, even though it's the most expensive one.`]},

{cat:"DB", title:"Indexing Strategy", def:`An index is a data structure (usually B-Tree) that lets the database find rows without scanning the whole table, at the cost of extra storage and slower writes (every index must be updated on insert/update/delete).`,
ex:`A `+"`transactions`"+` table queried heavily by `+"`account_id`"+` and `+"`created_at`"+` benefits from a composite index on `+"`(account_id, created_at)`"+` — put the equality-filtered column first, the range/sort column second, so the index serves both the filter and the ordering.`,
trade:[`More indexes speed up reads but slow down every write (each index needs maintenance) — on a high-TPS ledger table, over-indexing can become the actual bottleneck.`,`Composite index column order matters enormously — the same columns in the wrong order can make an index useless for a given query.`,`Periodically audit for unused indexes (via DB usage stats) and drop them; they're pure write-cost with no read benefit.`]},

{cat:"DB", title:"Query Plans & N+1", def:`EXPLAIN/EXPLAIN ANALYZE shows how the database will execute (or executed) a query — whether it uses an index, does a full scan, or picks a bad join order. The N+1 problem is issuing 1 query to fetch a list, then N additional queries (one per item) to fetch related data, instead of one batched query or join.`,
ex:`Fetching 100 transactions, then looping to fetch each transaction's merchant details one at a time, issues 101 queries instead of 1 join or 1 batched `+"`WHERE merchant_id IN (...)`"+` — at scale this alone can dominate response latency.`,
trade:[`N+1 is easy to introduce accidentally with ORMs (lazy loading) — always check generated SQL for hot endpoints, not just unit test correctness.`,`EXPLAIN ANALYZE should be a standard step before shipping any new query on a high-traffic table, not just a debugging tool used after an incident.`]},

{cat:"DB", title:"Normalization vs Denormalization", def:`Normalization minimizes data duplication via structured relations (reduces update anomalies, but requires joins). Denormalization duplicates data intentionally to avoid joins and speed up reads, at the cost of needing to keep duplicates in sync on writes.`,
ex:`A normalized schema stores merchant name once in a `+"`merchants`"+` table, joined on every transaction read. A denormalized read-model (populated via CQRS projection) might copy the merchant name directly onto each transaction record for a fast dashboard query, updated asynchronously when merchant details change.`,
trade:[`Normalized: single source of truth, easy consistency, but joins add read latency at scale.`,`Denormalized: fast reads, but risk of stale/inconsistent duplicated data unless you have a reliable update propagation mechanism (e.g., CDC, event-driven projections).`,`Ledger/transaction tables are typically append-only and denormalized for read performance; the *authoritative* balance-affecting writes still go through normalized, tightly-controlled tables.`]},

{cat:"DB", title:"Modeling Money Correctly", def:`Currency values must never be stored as floating point (binary floats can't represent decimal fractions like $0.10 exactly, causing rounding errors that compound). Use fixed-point/decimal types (or integer minor units, e.g., cents) and model transactions as immutable, append-only ledger entries rather than mutable balance fields.`,
ex:`Storing `+"`amount DECIMAL(19,4)`"+` (or an integer cents column) instead of `+"`FLOAT`"+` avoids the classic bug where repeated float arithmetic on prices/balances drifts by fractions of a cent — which, at scale, becomes a real reconciliation discrepancy that auditors will flag.`,
trade:[`Integer minor units (cents) are simplest and fastest but require careful handling of currencies with different decimal precision (e.g., JPY has no minor unit).`,`Decimal types are more flexible for multi-currency systems but need consistent rounding rules applied at defined points (never let rounding happen implicitly in arithmetic).`]},

{cat:"DB", title:"Database Connection Pooling", def:`Opening a brand-new database connection is genuinely expensive — beyond the TCP/TLS handshakes covered in the Networking section, the database itself typically has to do its own setup work (in Postgres, this historically means forking an entire new process per connection). Doing this for every single query would be far too slow, so applications keep a pool of already-open, ready-to-use database connections and borrow/return them as needed, instead of opening a new one per request.

The database server also has a hard limit on how many connections it can accept at once (a `+"`max_connections`"+` setting). This creates a real, easy-to-hit scaling problem: if you have many application instances, and each one keeps its own local pool of, say, 20 connections, you can very quickly exhaust the database's total connection limit just by scaling out your application horizontally — long before the database's actual query capacity is the bottleneck.

The common fix is an external connection pooler (like PgBouncer for Postgres) that sits between your many application instances and the database. Instead of each app instance holding its own direct pool of database connections, they all connect to the pooler, and the pooler maintains a much smaller, shared pool of actual connections to the real database — multiplexing many application-side connections onto far fewer real database-side connections.`,
ex:`A fintech company runs 50 instances of their transaction service, each configured with a local pool of 20 database connections — that's 1,000 potential connections, but their database's `+"`max_connections`"+` is set to 200. Under load, instances start failing to get a database connection at all, even though the database's actual CPU and query capacity aren't close to being maxed out. Introducing PgBouncer between the app instances and the database lets all 50 instances share a much smaller pool of real connections, solving the exhaustion problem without needing to raise `+"`max_connections`"+` to a number the database can't actually handle efficiently.`,
trade:[`This problem gets dramatically worse in serverless/auto-scaling environments (like AWS Lambda), where the number of application instances can spike very quickly and unpredictably — each new instance potentially opening its own fresh set of connections — which is exactly the scenario external poolers are most critical for.`,`A pool that's too small causes requests to queue up waiting for a connection even when the database itself has spare capacity; a pool that's too large risks exhausting the database's connection limit — sizing needs to account for the number of application instances multiplied by their per-instance pool size, not just one instance in isolation.`,`Idle connections sitting in a pool for too long can also go stale or get silently closed by the database or a network device in between — a well-configured pool needs a reasonable idle timeout and a way to detect and discard dead connections rather than handing one out that will fail immediately.`]},

{cat:"DB", title:"Index Types: B-Tree vs Hash vs LSM-Tree", def:`Three different data structures a database can use to find rows quickly, each good at different things.

B-Tree — a balanced tree structure, and the default index type in most relational databases. Handles equality lookups, range queries ("between these two dates"), and sorted results all reasonably well. When in doubt, this is the right choice.

Hash index — turns a key into a location using a hash function. Extremely fast, but only for exact-match lookups ("find this exact ID") — it cannot answer a range query or return results in sorted order at all.

LSM-Tree (Log-Structured Merge-Tree) — built for very high write speed. New writes are first buffered in memory, then flushed to disk as sorted files that get merged together in the background over time. This is the structure behind write-heavy databases like Cassandra and RocksDB.`,
ex:`A B-Tree index on `+"`created_at`"+` efficiently serves "transactions in the last 24 hours" (a range query). A hash index on an exact idempotency-key lookup table serves "does this exact key exist" lookups slightly faster than a B-Tree, but couldn't serve a "keys created between X and Y" query at all. A high-volume event-ingestion store built on an LSM-tree (e.g., Cassandra) sustains far higher write throughput than a B-Tree-based relational table under the same load, at the cost of read amplification (may need to check multiple files) and background compaction overhead.`,
trade:[`B-Tree is the right general-purpose default — supports the widest range of query patterns and is what you get automatically in Postgres/MySQL unless you specify otherwise.`,`Hash indexes are a narrow optimization (equality-only) that's rarely worth the specialization unless you've profiled a genuine equality-lookup bottleneck — and many databases restrict what operations they even support on a hash index (e.g., historically not crash-safe replication in some engines).`,`LSM-trees trade read performance and operational complexity (compaction tuning) for write throughput — the right choice when your workload is write-heavy and append-like (event logs, time-series) rather than read-heavy or update-heavy.`]},

// ---------------- CORE PRINCIPLES ----------------
{cat:"CP", title:"SOLID Principles", def:`Five guidelines for writing OOP code that stays easy to maintain as it grows. Each letter is its own rule:

S — Single Responsibility: a class should have only one reason to change. If a class handles both "calculate the fee" and "send the email receipt," a change to email formatting shouldn't risk breaking fee calculation.

O — Open/Closed: you should be able to add new behavior without modifying existing, already-tested code. Instead of editing a class every time there's a new case, you extend it (e.g., by adding a new implementation of an interface).

L — Liskov Substitution: anywhere the code expects the base type, a subtype should work correctly as a drop-in replacement, without surprising behavior.

I — Interface Segregation: it's better to have several small, specific interfaces than one giant interface that forces classes to implement methods they don't actually need.

D — Dependency Inversion: code should depend on an abstraction (an interface), not on a specific concrete implementation — so the concrete implementation can be swapped out later.`,
ex:`A `+"`PaymentProcessor`"+` interface (Dependency Inversion) lets you swap between Stripe, Adyen, or a mock implementation in tests without changing the calling code. Splitting `+"`FraudCheck`"+` and `+"`TransactionLogger`"+` into separate classes rather than one giant `+"`PaymentHandler`"+` follows Single Responsibility.`,
trade:[`Improves testability and reduces ripple effects when requirements change, but over-applying SOLID (excessive abstraction/interfaces for things that never vary) adds indirection with no real benefit — apply pragmatically, not dogmatically.`]},

{cat:"CP", title:"ACID", def:`ACID is a set of four guarantees a traditional database transaction gives you.

Atomicity — all the steps in a transaction happen together, or none of them do. No partial results.

Consistency — a transaction can only move the database from one valid state to another valid state, according to your defined rules (like "balance can never go negative").

Isolation — transactions running at the same time don't interfere with each other, to whatever degree your chosen isolation level guarantees.

Durability — once a transaction is confirmed as committed, it survives even a crash right after — the data is safely and permanently saved.`,
ex:`A transfer debiting Account A and crediting Account B must be atomic — if the credit fails after the debit succeeds, the whole transaction rolls back rather than leaving money "lost" in transit.`,
trade:[`ACID within a single database is well-understood and battle-tested, but doesn't extend cleanly across microservices with separate databases — that's where sagas/outbox patterns take over instead of distributed ACID transactions.`]},

{cat:"CP", title:"BASE", def:`BASE is an alternative set of guarantees to ACID, for systems that would rather stay available and scale easily than guarantee instant consistency.

Basically Available — the system tries to always respond, even if that response isn't guaranteed to be the very latest data.

Soft state — the system's state can change over time even without new input, simply as it catches up and settles into consistency across replicas.

Eventual consistency — if you stop sending new writes, the system will eventually settle into a consistent state on its own — just not necessarily right away.`,
ex:`A notification-preferences service can be BASE: if a user updates their email preference, it's fine if it takes a few seconds to propagate to all regions — no financial correctness is at stake.`,
trade:[`Enables much higher availability and horizontal scale, but requires the business logic to tolerate temporary inconsistency — never appropriate for the core balance/ledger write path in fintech, but often fine for everything around it.`]},

{cat:"CP", title:"Domain-Driven Design (DDD)", def:`An approach to modeling a complex business domain so the code actually matches how the business really thinks about it.

Bounded Context — a clear boundary around where a particular model and vocabulary apply. The word "Account" might mean something slightly different in the Payments context than in the Support context, and that's fine as long as each context is explicit about its own meaning.

Ubiquitous Language — a shared vocabulary that both engineers and business/domain experts use consistently, so a word means the same thing in a conversation as it does in the code.

Aggregate — a cluster of related objects that are always changed together as one unit, with a single "Aggregate Root" object that's the only entry point allowed to change anything inside it — this is what protects business rules from being bypassed.`,
ex:`"Account" is an Aggregate Root that owns its balance invariant (never negative, per business rule) — all changes to balance must go through the Account aggregate's methods, never by directly updating a database row from outside its boundary. "Payments" and "Risk" might be separate Bounded Contexts with their own definition of what a "Transaction" even means.`,
trade:[`Gives clear ownership boundaries and protects invariants, but is overkill for simple CRUD services — best applied where the business logic is genuinely complex (which most core fintech domains are).`]},

{cat:"CP", title:"CQRS (Command Query Responsibility Segregation)", def:`Separate the write model (commands that change state, optimized for correctness/consistency) from the read model (queries, optimized for fast, denormalized reads) — often backed by different data stores kept in sync asynchronously.`,
ex:`Transfers are written to a strongly consistent ledger table (command side). A denormalized "account summary" read model, updated asynchronously from ledger events, powers the fast dashboard view — so dashboard load doesn't compete with transaction-processing load on the same tables.`,
trade:[`Decouples read and write scaling and lets each be optimized independently, but introduces eventual consistency between write and read models — the dashboard might lag the true balance by seconds, which must be an acceptable and clearly communicated trade for that specific view.`,`Adds real architectural complexity (two models, a sync mechanism) — don't reach for CQRS until read/write scaling or modeling needs actually diverge.`]},

{cat:"CP", title:"Event Sourcing", def:`Instead of storing only current state, store the full sequence of events that led to it; current state is derived by replaying events (optionally accelerated with periodic snapshots).`,
ex:`Instead of an `+"`accounts.balance`"+` column that's mutated in place, store every `+"`MoneyDeposited`"+`/`+"`MoneyWithdrawn`"+` event; the current balance is the sum of all events, giving you a complete, naturally immutable audit trail for free — a very natural fit with double-entry ledger requirements.`,
trade:[`Gives a perfect audit trail and the ability to replay/rebuild state (or new projections) from history — extremely valuable for regulated financial systems.`,`Querying current state requires replay or maintained snapshots/projections (often paired with CQRS), adding architectural complexity versus just reading a mutable row.`]},

{cat:"CP", title:"Microservices vs SOA vs Monolith", def:`Three ways to structure how an application is built and deployed.

Monolith — one single deployable unit, usually with a shared codebase and often a shared database. Simplest to build and deploy at first.

SOA (Service-Oriented Architecture) — services are split up but still share some infrastructure and contracts, often communicating through a central enterprise service bus.

Microservices — services are fully independent: each one is deployed on its own, and each one owns its own database, communicating with others only over the network.`,
ex:`Splitting "Payments," "Risk," and "Ledger" into separate microservices lets each team deploy independently and scale the ledger service separately from the (spikier) risk-scoring service — but now a single logical transaction may need a saga instead of one local ACID transaction.`,
trade:[`Microservices give independent deployability and scaling, but introduce distributed-systems complexity (network failures, distributed transactions, versioning) that a monolith simply doesn't have.`,`A shared database between "microservices" is a common anti-pattern — it looks like microservices but keeps the tight coupling of a monolith without the deployment benefits.`,`Starting with a well-modularized monolith and extracting services only where scaling/team boundaries demand it is often more pragmatic than microservices from day one.`]},

{cat:"CP", title:"OOP Fundamentals", def:`The core ideas behind object-oriented programming.

Encapsulation — keeping an object's data together with the methods that operate on it, and hiding the internal details behind a controlled interface, so outside code can't reach in and set things directly.

Inheritance — a subtype reuses and extends the behavior of a supertype, instead of rewriting it from scratch.

Polymorphism — different types can respond to the exact same method call, each in their own way, so the calling code doesn't need to know exactly which type it's dealing with.

Abstraction — showing only what's relevant to the outside world, and hiding the messy implementation details behind it.

Composition over inheritance — a modern preference for building behavior by combining several smaller, focused objects together, rather than building one long chain of "is-a" inheritance relationships.`,
ex:`An `+"`Account`"+` class encapsulates its balance (private field, only modifiable through controlled methods that enforce invariants like "never negative") rather than exposing a public mutable field anyone could set directly, bypassing business rules.`,
trade:[`Deep inheritance hierarchies often become brittle as requirements evolve (changing a base class ripples unpredictably to every subclass) — composition (e.g., injecting a `+"`FraudChecker`"+` strategy into an `+"`Account`"+` rather than subclassing `+"`Account`"+` per fraud policy) is usually more flexible and is the modern default preference.`]},

// ---------------- RELIABILITY & STABILITY ----------------
{cat:"RS", title:"Zero-Downtime Deployment", def:`Ways to release new code without any customer-visible interruption.

Rolling deployment — replace instances one (or a few) at a time behind a load balancer, so there's always a working set of instances handling traffic while others update.

Blue-green — run the old version ("blue") and new version ("green") fully side by side, then switch all traffic over in one atomic step. Rolling back just means switching back.

Canary — send a small percentage of real traffic to the new version first, watch it closely for problems, and only ramp up to 100% once you're confident it's healthy.`,
ex:`A canary release routes 5% of payment traffic to the new version of the transaction service; error rates and latency are compared against the baseline before ramping to 100% — catching a regression while it only affects a small fraction of transactions.`,
trade:[`Canary/blue-green give strong safety nets but require running extra infrastructure temporarily and good automated comparison metrics — without solid observability, a canary is just "hope you notice the dashboard in time."`,`Database schema changes need their own compatible strategy (expand-contract) since you can't blue-green a shared database the same way as stateless app servers.`]},

{cat:"RS", title:"Circuit Breaker", def:`Wraps calls to a potentially-failing dependency; after enough failures, it "opens" and fails fast without even attempting the call for a cooldown period, then "half-opens" to test if the dependency has recovered before fully closing again.`,
ex:`Calls to a third-party fraud-scoring API start timing out; the circuit breaker opens after a failure threshold, so subsequent payment requests fail fast (or fall back to a default risk score) instead of every request hanging for the full timeout and piling up threads.`,
trade:[`Prevents resource exhaustion and cascading failure from a struggling dependency, but requires a sensible fallback behavior (fail fast? default value? queue for later?) — the fallback choice has real business implications, especially for financial decisions.`,`Poorly tuned thresholds can cause a breaker to open on transient blips, unnecessarily degrading service — needs tuning against real traffic patterns.`]},

{cat:"RS", title:"Retry with Backoff & Jitter", def:`Retrying a failed operation after a delay that grows exponentially (backoff), with randomization added (jitter) so that many clients retrying the same failure don't all retry at the exact same moment and create a synchronized thundering herd.`,
ex:`A client's call to the payment gateway times out; instead of retrying immediately (which could hit the gateway again while it's still overloaded), it waits ~1s, then ~2s, then ~4s, each with random jitter, spreading retry load out over time.`,
trade:[`Essential for resilience against transient failures, but retries must be paired with idempotency — retrying a non-idempotent payment call without a dedup key risks a double charge.`,`Backoff without jitter can still synchronize retries across many clients that failed at the same moment — jitter is not optional at scale.`]},

{cat:"RS", title:"Rate Limiting Algorithms", def:`Different ways to cap how many requests are allowed in a given time period.

Token bucket — a bucket refills with tokens at a steady rate, and every request spends one token. This naturally allows short bursts (if the bucket is full) while still enforcing a steady long-term rate.

Leaky bucket — the opposite framing: requests go into a bucket that "leaks" out at a fixed steady rate, smoothing bursts into an even output regardless of how bursty the input was.

Fixed window — count requests in fixed time blocks (like "0-60 seconds," "60-120 seconds"). Simple, but a burst right at the boundary between two windows can let through nearly double the intended rate.

Sliding window — a more accurate version of fixed window that looks at a continuously moving time range instead of fixed blocks, avoiding that boundary-burst problem.`,
ex:`A public payments API uses a token bucket per API key, allowing short bursts (e.g., a retry storm from a legitimate client) while enforcing a steady long-term rate, rejecting or queuing requests beyond the limit with a `+"`429`"+` and a `+"`Retry-After`"+` header.`,
trade:[`Fixed window is simplest to implement but allows up to 2x the intended rate right at window boundaries.`,`Sliding window/token bucket are more accurate but require more state (timestamps or token counts) to track, especially in a distributed rate limiter shared across many app instances.`,`Distributed rate limiting needs a shared store (Redis) — adds a dependency and potential latency to every rate-limited request.`]},

{cat:"RS", title:"Bulkhead Pattern", def:`Named after ship compartments that contain flooding — isolate resource pools (thread pools, connection pools) per dependency so that one overwhelmed dependency can't exhaust resources needed by unrelated parts of the system.`,
ex:`Calls to the (occasionally slow) merchant-notification service use a separate, smaller thread pool from the core payment-processing path, so notification slowness can't starve threads needed for actually completing payments.`,
trade:[`Contains failure blast radius effectively, but requires more careful capacity planning (sizing multiple pools) than one shared pool — and a pool that's too small for its dependency becomes its own bottleneck.`]},

{cat:"RS", title:"Observability: Metrics, Logs, Traces", def:`Three complementary tools for understanding what's happening inside a running system.

Metrics — aggregated numbers over time, like request rate, error rate, and latency (often called the "RED method"). Good for spotting *that* something is wrong and *when* it started.

Logs — individual, timestamped records of specific events, ideally structured (consistent fields) and tagged with a request/trace ID so you can find every log line related to one specific request. Good for understanding *why* something went wrong, in detail.

Traces — the full path a single request took as it traveled across multiple services, showing exactly how much time was spent in each one. Good for finding *where* in a chain of services the problem actually happened.`,
ex:`A slow checkout is diagnosed by: metrics showing p99 latency spiked at 2:14pm → a trace for a specific slow request showing 800ms was spent in the fraud-check service → structured logs from that service, filtered by trace ID, showing it was waiting on a slow downstream DB query.`,
trade:[`All three together tell a complete story; any one alone is usually insufficient — metrics tell you *something* is wrong, traces tell you *where*, logs tell you *why*.`,`Structured logging with correlation IDs must be designed in from the start — retrofitting trace correlation into an unstructured logging codebase after an incident is painful.`,`In fintech, logs must also respect PII/PCI constraints (never log raw card numbers, mask sensitive fields) — observability and compliance requirements intersect here directly.`]},

{cat:"RS", title:"Chaos Engineering", def:`Deliberately injecting failures (killing instances, adding latency, dropping network packets) into a system — ideally in a controlled way in production or a production-like environment — to verify that resilience mechanisms (retries, circuit breakers, failover) actually work as designed, before a real incident tests them for you.`,
ex:`A scheduled "game day" kills a database replica mid-traffic to verify the failover to a standby completes within the expected RTO and that the application handles the brief unavailability gracefully rather than throwing unhandled errors to customers.`,
trade:[`Reveals real gaps that code review and unit tests miss (actual failover behavior, actual timeout configuration), but requires a mature enough observability and rollback setup to run safely — chaos testing without good monitoring is just causing outages.`]},

{cat:"RS", title:"SLI, SLO & SLA", def:`Three related terms that are easy to mix up, each building on the one before it.

SLI (Service Level Indicator) — an actual measurement of how your system is behaving right now, like "99.95% of requests succeeded in the last hour" or "p99 latency was 220ms." This is a raw number, not a promise.

SLO (Service Level Objective) — an internal target you set for that measurement, like "we want 99.9% of requests to succeed, measured over 30 days." This is a goal your team holds itself to, and it's what your alerting should usually be built around.

SLA (Service Level Agreement) — an external, often contractual promise to a customer, usually with a real consequence (like a service credit or refund) if you fail to meet it, such as "99.9% uptime per month or you get a partial refund." An SLA is typically set a bit looser than your internal SLO, so you have a safety buffer before you're actually breaking a customer promise.

A closely related idea is the "error budget": if your SLO is 99.9%, that means you're allowed 0.1% of requests to fail before you've used up your budget for the period. Once the budget is spent, teams often deliberately slow down on risky changes until the budget resets.`,
ex:`A payments API might have an SLI showing "99.94% success rate this month," an internal SLO target of "99.9% success rate," and a customer-facing SLA promising "99.5% uptime or a service credit." The gap between the SLO (99.9%) and the SLA (99.5%) is the safety buffer — it means the team can be alerted and fix a problem internally well before it ever risks breaking the actual promise made to the customer.`,
trade:[`Setting an SLO too close to your SLA leaves no room for error — a single bad day can turn an internal miss into an external, possibly costly, contractual breach.`,`Setting an SLO too loose means you're not actually pushing the team toward the reliability the business needs — the SLO should represent a genuinely meaningful reliability bar, not just "whatever we happen to already be hitting."`,`Error budgets are a useful forcing function: they turn "should we ship this risky change now?" into a data-driven question instead of a purely political one.`]},

{cat:"RS", title:"Expand-Contract Pattern (Zero-Downtime Schema Migration)", def:`A three-phase approach to changing a database schema without any downtime, designed so old and new application code can both run safely against the schema at the same time during rollout.

Expand — add the new column or table alongside the old one. Nothing is removed yet, so old code keeps working exactly as before.

Migrate — backfill any needed historical data, and switch the application to read from (and write to) the new structure.

Contract — once every instance is confirmed running the new code and the data is verified, remove the old column or table.`,
ex:`Renaming a `+"`balance`"+` column to `+"`current_balance`"+`: first add the new column and dual-write to both (expand); backfill historical rows and switch application reads to the new column (migrate); once all instances are confirmed running the new code, drop the old column (contract) — at no point does a mid-deployment old-code instance break against the new schema.`,
trade:[`Takes longer and requires more deployment steps than a naive single-step migration, but is the only safe approach when you can't guarantee every application instance restarts atomically at the exact moment of a schema change (which is essentially always true in a rolling-deployment environment).`]},

{cat:"RS", title:"Capacity Planning & Autoscaling", def:`Capacity planning means proactively estimating how much infrastructure you'll need, based on load testing and historical traffic trends — rather than finding out the hard way during a spike.

Autoscaling means automatically adding or removing instances in response to real-time signals like CPU usage, request rate, or queue depth, instead of running a single fixed amount of infrastructure sized for peak load all year round.`,
ex:`Based on load testing showing a payment service saturates at 500 requests/second per instance, autoscaling is configured to add instances once average utilization crosses 60% of that threshold — leaving enough headroom to absorb a sudden spike (like a flash sale) before existing instances actually max out.`,
trade:[`Autoscaling reacting to a lagging signal (like CPU) can be too slow for a sudden, sharp spike — for a known event (a product launch, a holiday sale), it's often better to proactively pre-scale ahead of time rather than relying on autoscaling alone.`,`Overly aggressive scale-down settings can cause "flapping" — scaling down, then immediately needing to scale right back up — which adds cost and latency from constant instance churn. Use cooldown periods and sensible thresholds to avoid this.`]},

// ---------------- DESIGN PATTERNS ----------------
{cat:"PT", title:"Outbox Pattern", def:`To reliably publish an event whenever you write to your database (avoiding the "dual write" problem where the DB write succeeds but the message publish fails, or vice versa), write the event to an "outbox" table in the *same local transaction* as the business data change, then a separate relay process (or CDC tool like Debezium) reads the outbox and publishes to the message broker.`,
ex:`When a transaction is recorded, a `+"`TransactionCompleted`"+` event row is inserted into the outbox table in the same DB transaction. A relay process tails the outbox and publishes to Kafka, guaranteeing the event is eventually published if and only if the transaction was actually committed.`,
trade:[`Solves the dual-write consistency problem cleanly, but adds an extra table and a relay/CDC process to operate and monitor.`,`Consumers must still handle at-least-once delivery (the relay might publish the same event twice on retry) — pair with idempotent consumers.`]},

{cat:"PT", title:"Saga Pattern", def:`A way to handle a business transaction that spans multiple services — where a single distributed ACID transaction isn't practical — by breaking it into a sequence of smaller local transactions. If a later step fails, you don't roll back; instead, you run a "compensating action" for each already-completed step to undo its effect.

Orchestration — a central coordinator explicitly tells each service what step to do next, in order. Easier to follow and debug, since there's one place that shows the whole flow.

Choreography — there's no central coordinator; instead, each service listens for events from the previous step and reacts on its own. Avoids a central dependency, but the overall flow is harder to see all in one place, since it's spread across many services' individual event handlers.`,
ex:`Booking a flight + hotel + car as one logical transaction: if the car booking fails after flight and hotel succeeded, the saga triggers compensating transactions (cancel hotel, refund flight) rather than trying to roll back atomically across three separate services and databases.`,
trade:[`Orchestration is easier to understand, monitor, and debug (one place to look) but creates a central coordinator dependency.`,`Choreography avoids a central point but makes the overall flow harder to trace/reason about — you have to piece it together from multiple services' event handlers.`,`Compensating transactions aren't a true rollback — they're a separate business operation (e.g., "refund" isn't the exact inverse of "charge" if fees or timing differ) and must be designed explicitly, not assumed automatic.`],
code:`// A minimal orchestration-style saga in Go: transferring money between
// two accounts as a sequence of steps, each with its own compensating
// (undo) action if a LATER step fails.

type Step struct {
    Name string
    Do   func() error
    Undo func() error
}

// RunSaga executes each step in order. If any step fails, it runs the
// Undo function for every step that already succeeded, in reverse order.
func RunSaga(steps []Step) error {
    completed := []Step{}

    for _, step := range steps {
        if err := step.Do(); err != nil {
            for i := len(completed) - 1; i >= 0; i-- {
                if undoErr := completed[i].Undo(); undoErr != nil {
                    // In real systems: log this loudly and alert a human.
                    // A failed compensation needs manual follow-up.
                    log.Printf("compensation failed for %s: %v", completed[i].Name, undoErr)
                }
            }
            return fmt.Errorf("saga failed at %q, rolled back: %w", step.Name, err)
        }
        completed = append(completed, step)
    }
    return nil
}

func TransferMoneySaga(fromAcct, toAcct string, amount int) error {
    steps := []Step{
        {
            Name: "debit sender",
            Do:   func() error { return debitAccount(fromAcct, amount) },
            Undo: func() error { return creditAccount(fromAcct, amount) },
        },
        {
            Name: "credit receiver",
            Do:   func() error { return creditAccount(toAcct, amount) },
            Undo: func() error { return debitAccount(toAcct, amount) },
        },
        {
            Name: "notify ledger service",
            Do:   func() error { return notifyLedgerService(fromAcct, toAcct, amount) },
            Undo: func() error { return nil }, // notification is safe to just skip on rollback
        },
    }
    return RunSaga(steps)
}`},

{cat:"PT", title:"Two-Phase Commit (2PC)", def:`A protocol for atomic commit across multiple resource managers: a coordinator asks all participants to "prepare" (and lock resources), and only if all agree does it tell everyone to "commit" (or "abort" if any disagree).`,
ex:`A single database engine uses 2PC internally to commit a transaction across multiple internal shards/nodes atomically — but doing this across independently-owned microservices (each with its own DB) is generally avoided in favor of sagas.`,
trade:[`Gives true atomicity across participants, but is blocking: if the coordinator crashes after "prepare" but before "commit," participants hold locks indefinitely waiting for a decision — a real availability risk.`,`Rarely used across microservice/team boundaries at scale because of this blocking behavior and tight coupling; sagas are generally preferred despite being weaker consistency, because they don't create this availability hazard.`],
code:`// A minimal 2PC coordinator in Go. Notice the key difference from the
// saga above: EVERY participant must say "yes" in Phase 1 before ANY
// of them are told to actually commit in Phase 2 — locks are held by
// every participant the whole time in between.

type Participant interface {
    Prepare() error // lock resources, return nil only if ready to commit
    Commit() error
    Abort() error
}

func TwoPhaseCommit(participants []Participant) error {
    // ---- Phase 1: Prepare ----
    prepared := []Participant{}
    for _, p := range participants {
        if err := p.Prepare(); err != nil {
            // Someone said no -> tell everyone who already said yes to abort.
            for _, pp := range prepared {
                _ = pp.Abort()
            }
            return fmt.Errorf("prepare phase failed, aborted all: %w", err)
        }
        prepared = append(prepared, p)
    }

    // ---- Phase 2: Commit ----
    // Every participant has said yes and is holding its locks.
    // This is the dangerous part: if the coordinator crashes here,
    // partway through telling participants to commit, some
    // participants may be committed while others are still just
    // sitting there prepared and locked, waiting indefinitely.
    for _, p := range participants {
        if err := p.Commit(); err != nil {
            return fmt.Errorf("commit failed mid-phase-2, manual recovery needed: %w", err)
        }
    }
    return nil
}`},

{cat:"PT", title:"Strategy Pattern", def:`Define a family of interchangeable algorithms behind a common interface, letting you swap the implementation at runtime without changing the code that uses it.`,
ex:`A `+"`FraudCheckStrategy`"+` interface has implementations for rule-based scoring, an ML model, and a manual-review-only mode for high-risk regions — the checkout flow calls the interface without knowing (or caring) which strategy is active, allowing A/B testing or per-region configuration.`,
trade:[`Makes adding new algorithms easy without touching existing code (Open/Closed principle), but can be overkill if you genuinely only ever have one implementation — don't add the abstraction speculatively.`]},

{cat:"PT", title:"Adapter Pattern", def:`Wrap an incompatible interface (often third-party) behind the interface your application actually expects, isolating the rest of the codebase from that vendor's specific API shape.`,
ex:`Wrapping Stripe's and Adyen's very different SDKs behind a common internal `+"`PaymentGateway`"+` interface means the core payment-processing logic doesn't change when you add a third provider or swap vendors — only the adapter implementation changes.`,
trade:[`Isolates vendor-specific complexity and makes swapping providers much cheaper later, but the adapter itself needs careful design to not just leak the vendor's quirks through a thin wrapper — a bad adapter gives false confidence of abstraction.`]},

{cat:"PT", title:"Singleton (and Why It's Risky Distributed)", def:`Ensures a class has exactly one instance within a process, with global access to it. In a distributed, multi-instance, stateless-service world, a "singleton" only means one instance *per process* — it does not give you a single instance across your whole fleet, which is a common and dangerous misunderstanding.`,
ex:`A developer implements a Singleton in-memory rate limiter assuming it enforces a global limit — but with 20 service instances running behind a load balancer, each has its own singleton, so the "global" limit is actually 20x higher than intended. The real fix is a shared, external store (Redis) for the counter, not a language-level Singleton.`,
trade:[`Singletons are fine for genuinely process-local concerns (a local cache, a config object), but must never be assumed to provide fleet-wide coordination — that requires an external, shared system.`,`Overuse of Singleton for convenience creates hidden global state that makes testing harder (shared state leaks between tests) — prefer dependency injection where practical.`]},

{cat:"PT", title:"Repository Pattern", def:`Abstracts data access behind an interface that looks like an in-memory collection (e.g., `+"`find`"+`, `+"`save`"+`), decoupling business logic from the specific persistence technology (SQL, NoSQL, in-memory for tests).`,
ex:`A `+"`TransactionRepository`"+` interface lets the core transfer logic be unit-tested against an in-memory fake implementation, without spinning up a real Postgres instance for every test, while production code uses the real SQL-backed implementation.`,
trade:[`Improves testability and keeps persistence details out of business logic, but can leak abstraction if the interface tries too hard to hide genuinely important DB-specific behavior (like transaction boundaries or isolation level) that the business logic actually needs to be aware of.`]},

{cat:"PT", title:"Change Data Capture (CDC)", def:`A way to keep two systems in sync by watching a database's internal change log (the same log it uses for its own replication) and streaming every insert/update/delete out as an event — instead of your application code manually publishing an event every time it writes to the database, which is easy to accidentally forget.`,
ex:`A tool like Debezium reads Postgres's write-ahead log and automatically publishes a `+"`row changed`"+` event to Kafka every time a row in the `+"`transactions`"+` table changes — the fraud and analytics teams get a reliable stream of every transaction without the payments team having to remember to manually publish events for every code path that touches that table.`,
trade:[`Guarantees you never "forget" to publish an event, since it reads from the database itself rather than trusting application code — but the events describe raw row changes (technical shape), not necessarily meaningful business events, so consumers sometimes need translation logic.`,`Adds an extra moving piece (the CDC tool) to operate and monitor, and ties your event stream's shape closely to your database schema, which can make schema changes trickier.`]},

{cat:"PT", title:"Dead Letter Queue (DLQ)", def:`A separate queue where messages get moved after they repeatedly fail to be processed (instead of blocking the main queue forever or being silently dropped) — so a broken or malformed message doesn't stop every message behind it, and someone can investigate it later.`,
ex:`A malformed webhook payload from a partner keeps causing the payment-processing consumer to crash on every retry; after 5 failed attempts, it's automatically moved to a DLQ. The main queue keeps flowing for every other (valid) message, and an engineer is alerted to inspect the DLQ and fix or manually reprocess the bad one.`,
trade:[`Prevents one bad message ("poison message") from blocking an entire queue, but a DLQ needs active monitoring and a clear process for someone to actually look at what lands there — an unwatched DLQ just becomes a silent pile of dropped, unprocessed work.`]},

{cat:"PT", title:"Inbox Pattern", def:`The consumer-side counterpart to the Outbox pattern: before processing an incoming event, check (and record) whether you've already seen this exact event ID — if so, skip it. This protects against the fact that message brokers typically guarantee "at-least-once" delivery, meaning the same event can arrive more than once.`,
ex:`A `+"`TransactionCompleted`"+` event gets delivered twice due to a network retry on the broker's side. The consumer checks an "inbox" table for that event's ID before processing; since it's already there from the first delivery, it skips reprocessing instead of crediting the merchant's account twice.`,
trade:[`Essential for correctness whenever you have at-least-once delivery (which is most real-world message brokers) and the operation being triggered isn't naturally idempotent on its own — adds a small lookup/write cost per event, which is a very reasonable price for correctness on money-related events.`]},

{cat:"PT", title:"Factory / Abstract Factory", def:`Factory: a method whose job is to create and return an object, hiding the decision of exactly which concrete type to construct from the calling code. Abstract Factory: takes this further by producing a whole family of related objects that are meant to be used together, without the caller needing to know their concrete types.`,
ex:`A `+"`PaymentMethodFactory`"+` takes a payment type string ("card", "bank_transfer", "wallet") and returns the right concrete handler object — the checkout code just calls `+"`factory.create(type)`"+` and works with the result through a common interface, without an if/else chain scattered through the business logic.`,
trade:[`Centralizes and simplifies object-creation logic that would otherwise be duplicated everywhere a new instance is needed, but adding a factory for something that only ever has one implementation is unnecessary ceremony — introduce it once you actually have multiple types to choose between.`]},

{cat:"PT", title:"Decorator Pattern", def:`Wraps an object to add extra behavior before or after its original behavior, without changing its code — you can stack multiple decorators to combine behaviors, like layers around a core function.`,
ex:`An API request handler is wrapped with a logging decorator, then an authentication-check decorator, then a rate-limiting decorator — each layer adds one specific concern, and the core handler code stays focused purely on the actual business logic, with cross-cutting concerns stacked around it as middleware.`,
trade:[`Lets you compose behaviors flexibly without a combinatorial explosion of subclasses (e.g., "LoggedAuthenticatedRateLimitedHandler"), but too many stacked decorators can make it hard to trace exactly what happens to a request, since the logic is spread across many small wrapper layers instead of one place.`]},

{cat:"PT", title:"Observer Pattern", def:`An object (the "subject") maintains a list of dependents ("observers") and automatically notifies them whenever its state changes, without the subject needing to know any details about what its observers actually do with that notification.`,
ex:`When a transaction's status changes to "completed," the `+"`Transaction`"+` object notifies its registered observers — one observer sends a receipt email, another updates a real-time dashboard, another triggers loyalty-points calculation — and the core transaction-processing code doesn't need to know any of those things exist.`,
trade:[`Decouples the thing that changes from the things that react to the change, making it easy to add new reactions later without touching existing code — but in a distributed system, this pattern is usually implemented via events on a message broker rather than in-process objects, since observers may live in entirely different services.`]},

// ---------------- TESTING STRATEGY ----------------
{cat:"TE", title:"Test Pyramid", def:`A guideline for how many tests of each type you should have, shaped like a pyramid.

Unit tests (the wide base) — many fast, cheap tests, each checking one small piece of logic in isolation.

Integration tests (the middle) — fewer of these, checking that multiple pieces actually work correctly together.

End-to-end tests (the narrow top) — even fewer of these — slower and more brittle, but they check the full real flow through the whole system.`,
ex:`Core interest-calculation logic gets extensive unit tests (fast, isolated, run on every commit). The full checkout flow through real services gets a handful of E2E tests (slower, run less often) rather than trying to E2E-test every edge case of the calculation logic itself.`,
trade:[`Keeps the test suite fast and maintainable, but teams sometimes over-invest in E2E tests because they feel more "realistic" — leading to slow, flaky CI pipelines that erode trust in tests over time.`]},

{cat:"TE", title:"Contract Testing", def:`Verifies that a service (consumer) and the service it depends on (provider) agree on the shape of their interaction, without needing to run both together in a full integration test — the consumer defines expectations ("contracts") that the provider's test suite verifies it still satisfies.`,
ex:`The mobile app team's expected response shape for `+"`GET /accounts/{id}/balance`"+` is captured as a Pact contract; the backend team's CI pipeline runs that contract against their actual implementation, catching a breaking field rename before it ever reaches a shared staging environment.`,
trade:[`Catches breaking API changes earlier and cheaper than full E2E tests across teams, but requires organizational buy-in to maintain contracts as a shared artifact between teams — it doesn't work well if only one side participates.`]},

{cat:"TE", title:"Testing Concurrency & Idempotency", def:`Standard sequential unit tests often can't catch race conditions. Techniques include: deliberately running the same operation concurrently in a test (stress-style), using tools that detect race conditions statically or at runtime, and explicitly testing that retrying an operation (with the same idempotency key) produces the same result as the first attempt.`,
ex:`A test fires 50 concurrent requests to withdraw money from the same account with a total requested amount exceeding the balance, asserting that the final balance never goes negative regardless of interleaving — this is the kind of test that would have caught a missing lock or a broken optimistic-locking retry loop.`,
trade:[`Concurrency tests are inherently less deterministic and can be flaky if not carefully designed (e.g., using proper synchronization barriers to actually force overlap) — worth the investment for money-moving code paths specifically, even if you don't do it everywhere.`]},

{cat:"TE", title:"Property-Based Testing for Financial Calculations", def:`Instead of hand-writing individual example-based test cases, define properties that should always hold (e.g., "the sum of all debits equals the sum of all credits" or "rounding never creates or destroys money") and let a framework generate many random inputs to try to falsify them.`,
ex:`A property test generates thousands of random transaction sequences and asserts that total money in the system is conserved after every operation (no leaks from rounding), catching an edge case around currencies with different decimal precision that example-based tests happened to miss.`,
trade:[`Excellent at finding edge cases humans don't think to write examples for, but requires more upfront effort to define correct properties, and failures can be harder to immediately interpret than a simple example-based test failure.`]},

{cat:"TE", title:"Load & Soak Testing", def:`Load testing verifies behavior under expected (or peak) traffic volume. Soak testing runs sustained load over a long duration (hours/days) specifically to catch problems that only appear over time — memory leaks, connection pool exhaustion, gradual resource degradation.`,
ex:`A payment service passes a load test at 2x expected Black Friday traffic for 10 minutes, but a 24-hour soak test at normal load reveals a slow memory leak in a connection-pooling library that would have caused an outage on day two of a real sustained peak period.`,
trade:[`Load tests catch capacity limits; soak tests catch time-dependent degradation — they find genuinely different classes of bugs, so skipping soak testing leaves a real blind spot for anything long-running.`]},

{cat:"TE", title:"Test-Driven Development (TDD)", def:`A way of writing code where you write a failing test *first* (describing what the code should do), then write just enough code to make it pass, then clean up the code (refactor) while keeping the test passing — often summarized as "red, green, refactor."`,
ex:`Before writing the interest-calculation function, you first write a test asserting `+"`calculateInterest(1000, 0.05, 12) == 50`"+`, watch it fail (since the function doesn't exist yet), write the simplest implementation that makes it pass, then clean up the implementation — confident the test will catch you if you accidentally break the behavior while refactoring.`,
trade:[`Forces you to think about the expected behavior and edge cases before writing implementation, and leaves you with a test suite "for free" as a byproduct — but writing tests first can feel slower up front, and it works best for logic with clear, well-understood inputs/outputs (like financial calculations) rather than exploratory or UI-heavy work where the right design isn't known yet.`,`TDD is a personal/team workflow discipline, not a replacement for the test pyramid — you still need to think about which layer (unit/integration/E2E) each test belongs to.`]},

{cat:"TE", title:"Test Data Management for Regulated Data", def:`Real customer data (names, account numbers, transaction history) is sensitive and often legally restricted from being copied into test/staging environments as-is. Test data management covers generating realistic synthetic data, or masking/anonymizing real data (replacing real values with fake-but-realistic ones) so tests remain meaningful without exposing real personal or financial information.`,
ex:`Instead of copying production customer records into a staging database for testing, a masking pipeline replaces real names with fake ones, scrambles account numbers into realistic-but-fake numbers, and shifts dates, so the data still "looks real" enough to catch bugs but can never be traced back to an actual person.`,
trade:[`Synthetic data avoids any risk of a data leak from a lower-security test environment, but crafting synthetic data that reproduces real-world edge cases (unusual transaction patterns, rare currency combinations) takes deliberate effort — poorly generated synthetic data can miss the very edge cases you needed to test.`,`Masking real data preserves realistic patterns better than fully synthetic data, but must be done thoroughly and consistently (e.g., masking a customer's ID consistently everywhere it appears) or it risks re-identification.`]},

// ---------------- CACHING ----------------
{cat:"CH", title:"Cache-Aside vs Write-Through vs Write-Behind", def:`Three patterns for how an application's cache and database stay in sync.

Cache-aside (the most common) — the app checks the cache first; on a miss, it reads the database and then saves the result into the cache for next time.

Write-through — every write goes to the cache and the database at the same time, together, so they never disagree.

Write-behind — a write goes to the cache immediately (fast!) and is saved to the database later, asynchronously. This is the fastest option for writes, but if the app crashes before that database save happens, that write is lost.`,
ex:`Exchange rates use cache-aside (read-heavy, tolerant of a brief miss). A write-through pattern might be used for a session store where cache and DB should never disagree. Write-behind would be a poor fit for anything balance-related in fintech, given the risk of losing unflushed writes on a crash.`,
trade:[`Cache-aside is simple and safe for read-heavy, DB-authoritative data, but has a cache-miss penalty and needs stampede protection (see Thundering Herd).`,`Write-behind maximizes write throughput but risks data loss on crash before the flush — essentially never appropriate for authoritative financial data.`]},

{cat:"CH", title:"Cache Invalidation", def:`Deciding when cached data becomes stale and must be removed or refreshed: TTL-based expiry (simple, but can serve stale data until expiry), explicit invalidation on write (more accurate, but requires every writer to remember to invalidate), and versioned keys (write new data under a new key/version rather than mutating cached entries).`,
ex:`A merchant's cached profile data is invalidated explicitly whenever the merchant updates their settings, rather than relying purely on a TTL — since serving stale settlement bank details for even a few minutes could route a payout incorrectly.`,
trade:[`TTL-only is simple but always has a staleness window; explicit invalidation is more accurate but couples every write path to remembering the cache — a missed invalidation path is a classic source of "why is this still showing old data" bugs.`]},

{cat:"CH", title:"Multi-Level Caching", def:`Combining a fast local (in-process) cache with a shared distributed cache (Redis/Memcached) — checking local first, then distributed, then the database — to reduce both network hops and load on the shared cache layer.`,
ex:`Frequently-accessed, rarely-changing reference data (currency codes, fee schedules) is cached both locally in each app instance's memory (nanosecond access) and in Redis (shared, survives app restarts), falling back to the database only on a full miss at both levels.`,
trade:[`Reduces latency and shared-cache load significantly, but adds a second layer of invalidation to reason about — a local cache can go stale independently of the shared cache if invalidation isn't propagated to all instances (e.g., via pub/sub).`]},

{cat:"CH", title:"Why You Don't Cache Authoritative Balances", def:`Account balances are the canonical example of data that should generally not be cached without an extremely tight, explicit invalidation contract — a stale cached balance can let a customer overdraw an account or a service approve a payment that shouldn't be approved.`,
ex:`If a checkout service reads a cached balance that's 2 seconds stale, it might approve a purchase that the real-time balance could no longer cover — the fix is to always re-verify the authoritative balance (or use a reservation/hold mechanism) at the actual moment of debit, never trust a cached read for the final approval decision.`,
trade:[`You can still cache balances for *display* purposes (a slightly-stale number shown in a UI is usually fine, with a clear "as of" indicator), as long as the actual money-moving decision always re-checks the source of truth.`]},

// ---------------- MESSAGING / APIs ----------------
{cat:"MA", title:"Kafka vs RabbitMQ vs SQS", def:`Three common message broker options, each with a different sweet spot.

Kafka — a distributed log built for very high throughput. Messages stay around and can be replayed later, and multiple independent consumers can each read the same stream at their own pace. Great when several different teams/services all need to react to the same events.

RabbitMQ — a traditional message broker with flexible routing rules. Good for complex routing logic and lower-latency point-to-point messaging, though it doesn't naturally support replay the way Kafka does.

SQS — a fully-managed, simple queue service. Easiest of the three to operate (nothing to maintain yourself), and a great default choice when you just need straightforward decoupling without replay or complicated routing needs.`,
ex:`A stream of `+"`TransactionCompleted`"+` events that multiple independent consumers (ledger, fraud, notifications, analytics) each need to read at their own pace, with replay capability for reprocessing, fits Kafka well. A simple background job queue for sending receipts fits SQS or RabbitMQ without needing Kafka's operational complexity.`,
trade:[`Kafka gives replay and high throughput but has real operational complexity (partitioning, consumer group management, retention tuning).`,`SQS is easiest to operate (managed) but lacks replay and has weaker ordering guarantees (standard queues) unless you use FIFO queues, which cap throughput.`,`Choosing the simplest tool that meets the actual requirement (replay? ordering? multiple independent consumers?) beats defaulting to Kafka for everything.`]},

{cat:"MA", title:"Kafka Partitioning & Ordering", def:`Kafka only guarantees message ordering *within* a partition, not across the whole topic. The partition key determines which partition a message lands in — messages with the same key always go to the same partition, preserving their relative order.`,
ex:`Partitioning `+"`TransactionEvent`"+` messages by `+"`account_id`"+` guarantees all events for a given account are processed in order by the same consumer instance — critical since processing a `+"`Withdrawal`"+` before its preceding `+"`Deposit`"+` out of order could incorrectly reject it for insufficient funds.`,
trade:[`Good key selection (even distribution) avoids hot partitions, but a poorly chosen key (e.g., partitioning by a low-cardinality field, or a single "celebrity" account dominating volume) creates a bottleneck on one partition regardless of overall cluster size.`,`If you need global ordering across all accounts (rare, and usually a red flag for a scalability bottleneck), you're limited to a single partition — a real throughput ceiling.`]},

{cat:"MA", title:"REST vs gRPC vs GraphQL", def:`Three common ways for services or clients to talk to each other over the network.

REST — organizes an API around "resources" using plain HTTP and JSON. Simple, well understood by almost everyone, and a safe default for a public-facing API.

gRPC — uses a compact binary format (Protobuf) over HTTP/2. Very low latency and enforces a strict, typed contract between caller and callee. A great fit for fast internal service-to-service calls.

GraphQL — lets the client ask for exactly the fields it needs in a single request, instead of getting back a fixed shape of data. Useful when a front-end needs to combine lots of varied data efficiently, less commonly used for plain backend-to-backend calls.`,
ex:`Internal calls between the payment service and the ledger service use gRPC for low latency and a strict schema contract. The public-facing merchant API uses REST for broad client compatibility and simplicity. A mobile app's dashboard aggregating many different account/transaction fields in one screen might use GraphQL to avoid multiple round trips.`,
trade:[`gRPC's strict typing and performance are excellent internally, but it's less friendly for public/external partner integrations expecting plain REST/JSON.`,`GraphQL gives clients flexibility but pushes complexity (query cost limiting, N+1 resolution) onto the server — needs careful guardrails to avoid abuse.`]},

{cat:"MA", title:"API Versioning & Backward Compatibility", def:`Strategies for evolving an API without breaking existing clients: additive-only changes (new optional fields, never remove/rename existing ones), explicit version numbers (URL path or header), and a clear deprecation policy with a defined sunset timeline communicated in advance.`,
ex:`Adding a new optional `+"`riskScore`"+` field to a transaction response is backward compatible; renaming `+"`amount`"+` to `+"`transactionAmount`"+` is not — the latter requires a new API version or a transition period supporting both field names simultaneously.`,
trade:[`Strict backward compatibility slows down how quickly you can "clean up" an API, but breaking external partner integrations in a fintech context (often bank/processor integrations with long change-management cycles) can be far more costly than the discipline of maintaining compatibility.`]},

{cat:"MA", title:"Schema Evolution (Avro/Protobuf + Registry)", def:`When events flow through a message broker to multiple independent consumers, the event schema needs to change over time without breaking consumers still running the old version. A schema registry (with Avro or Protobuf) enforces compatibility rules (e.g., only additive, optional-field changes) at publish time.`,
ex:`Adding a new optional field to the `+"`TransactionCompleted`"+` event schema is safe and old consumers simply ignore the new field; removing or renaming a field that a downstream reconciliation consumer depends on would silently break that consumer's processing — a schema registry with compatibility checks catches this at publish/deploy time instead of at 2am in production.`,
trade:[`Adds infrastructure (the registry) and process overhead (schema review before publishing), but prevents an entire class of silent, hard-to-diagnose downstream breakage — especially valuable when producer and consumer teams are different and don't deploy in lockstep.`]},

// ---------------- SECURITY ----------------
{cat:"SC", title:"AuthN vs AuthZ (OAuth2 / OIDC / JWT)", def:`Authentication (AuthN) — proving who you are (logging in).

Authorization (AuthZ) — proving what you're allowed to do, once you're already known to be you.
