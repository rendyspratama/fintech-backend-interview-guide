<script>
/* =========================================================
   DATA
   ========================================================= */
const CATEGORIES = [
  {code:"NW", name:"Networking Fundamentals"},
  {code:"DS", name:"Distributed Systems"},
  {code:"TS", name:"Thread Safety"},
  {code:"CA", name:"Concurrency in Applications"},
  {code:"CD", name:"Concurrency in Databases"},
  {code:"DB", name:"Database Theory & Design"},
  {code:"CP", name:"Core Principles & Paradigms"},
  {code:"RS", name:"Reliability & Stability"},
  {code:"PT", name:"Design Patterns"},
  {code:"TE", name:"Testing Strategy"},
  {code:"CH", name:"Caching Strategies"},
  {code:"MA", name:"Messaging, APIs & Serialization"},
  {code:"SC", name:"Security Fundamentals"},
  {code:"MR", name:"Multi-Region, LB & DR"},
  {code:"FT", name:"Fintech-Specific"},
  {code:"PF", name:"DB Performance at Scale"},
  {code:"DG", name:"Debugging Production"},
  {code:"CC", name:"Cloud, CI/CD & Containers"},
];

const TOPICS = [
// ---------------- NETWORKING FUNDAMENTALS ----------------
{cat:"NW", title:"The OSI 7 Layers", def:`A conceptual model that breaks down everything involved in network communication into 7 stacked layers, from the physical wire up to the actual application. Each layer only talks to the layers directly above and below it, which is what lets you swap out one layer (like switching from WiFi to Ethernet) without the layers above needing to know or care.

Layer 1 — Physical: the actual physical medium — cables, radio waves (WiFi), voltage signals. Just raw bits traveling somewhere.

Layer 2 — Data Link: handles communication between two directly-connected devices on the same local network, using physical addresses (MAC addresses). Ethernet and WiFi protocols live here.

Layer 3 — Network: handles routing data across different networks to reach a destination that isn't directly connected — this is where IP (Internet Protocol) and IP addresses live.

Layer 4 — Transport: handles getting data reliably (or not) from one specific application on one machine to a specific application on another — this is where TCP and UDP live (see the dedicated topic below).

Layer 5 — Session: manages opening, maintaining, and closing a "conversation" between two applications. In practice, a lot of what this layer conceptually covers is now handled inside the application layer or the transport layer in real-world systems.

Layer 6 — Presentation: handles translating data into a common format both sides understand — encryption/decryption (like TLS) and data format conversion conceptually live here, though in practice TLS is often described as sitting "on top of" TCP rather than as its own strict layer.

Layer 7 — Application: the layer your actual code lives at — HTTP, gRPC, DNS, and other protocols your application directly uses.

In everyday backend work, you'll mostly think in terms of a simpler 4-layer model (Link, Internet, Transport, Application) rather than the full academic 7 layers — but interviewers still commonly ask about the 7-layer version, so it's worth knowing both.`,
ex:`When your service makes an HTTPS call to a payment processor: your application code works at Layer 7 (building an HTTP request), TLS encryption happens conceptually around Layer 6, TCP at Layer 4 breaks it into a reliable byte stream, IP at Layer 3 routes it across the internet to the right server, and Layer 1/2 handle the actual physical transmission over cables and network hardware — all of this happens on every single API call, and you almost never have to think about most of these layers directly, which is exactly the point of the model.`,
trade:[`You'll rarely operate at Layers 1, 2, 5, or 6 directly as a backend engineer — the layers that matter day-to-day are 3 (IP/routing), 4 (TCP/UDP), and 7 (HTTP/your application protocol) — but understanding the full stack helps you reason about where a problem actually lives when something goes wrong (e.g., is this a DNS issue, a TCP connection issue, or an application-level bug?).`]},

{cat:"NW", title:"TCP vs UDP", def:`Two different transport-layer (Layer 4) protocols, with fundamentally different guarantees.

TCP (Transmission Control Protocol) — connection-based and reliable. It guarantees that data arrives in order, with nothing missing (it automatically retransmits lost pieces), and it manages flow so a fast sender doesn't overwhelm a slow receiver. This reliability comes at the cost of some overhead and latency.

UDP (User Datagram Protocol) — connectionless and unreliable. It just fires data off with no guarantee it arrives, no guarantee of order, and no automatic retry. In exchange, it has much lower overhead and latency.`,
ex:`A payment API call needs TCP — you absolutely need every byte of that request and response to arrive, in order, with nothing silently dropped. A live stock-price ticker or video call might use UDP for parts of its data, because getting the very latest price update a moment faster is more valuable than perfectly retransmitting an old, now-stale price update that arrived late.`,
trade:[`Almost all normal backend/API traffic (HTTP, database connections, gRPC) runs on TCP, because losing or reordering data silently would be a correctness disaster for most business logic — UDP is reserved for specific cases where speed matters more than perfect reliability, and where the application itself can tolerate or work around missing data.`]},

{cat:"NW", title:"TCP Handshake & Connection Lifecycle", def:`Before any data can be sent over TCP, the two sides perform a "three-way handshake" to establish a connection:

Step 1 (SYN) — the client sends a SYN ("synchronize") packet to the server, essentially saying "I'd like to start a connection."

Step 2 (SYN-ACK) — the server responds with a SYN-ACK packet, saying "okay, acknowledged, and here's my own synchronize request back."

Step 3 (ACK) — the client sends an ACK packet, acknowledging the server's response, and the connection is now officially open.

Only after this handshake completes can actual application data (like an HTTP request) start flowing. Closing a connection involves a similar back-and-forth (often called a "four-way close").`,
ex:`Every single new HTTPS connection to an API involves this TCP handshake first, before the TLS handshake (a separate negotiation for encryption) even begins, before any actual HTTP request is sent. This is exactly why reusing connections (see Connection Pooling & Keep-Alive) is so valuable — skipping a repeated handshake for every request saves real, measurable latency.`,
trade:[`The handshake adds at least one full network round-trip of latency before any real data can be sent — for a user far from your server, this round-trip can be a meaningful chunk of total response time, which is one of the reasons keeping connections open and reused (rather than opening a new one per request) matters so much for performance.`]},

{cat:"NW", title:"DNS: How Domain Name Resolution Works", def:`DNS (Domain Name System) is essentially the internet's phone book — it translates a human-readable domain name (like `+"`api.example.com`"+`) into the actual IP address a computer needs to connect to.

The lookup process, roughly: your computer first checks its local cache (has it already looked this up recently?). If not, it asks a DNS resolver (often provided by your ISP or a public one like Google's 8.8.8.8), which in turn may ask a chain of other DNS servers — starting from root servers, down to servers responsible for ".com" domains, down to the specific server responsible for "example.com" — until it finds the actual IP address, then caches that answer for a while (based on a "TTL," or time-to-live, value) so it doesn't have to repeat the whole lookup every single time.`,
ex:`A company migrating their payment API to a new server changes the DNS record to point to the new server's IP address. Because DNS answers are cached (based on the record's TTL) by resolvers all over the world, some clients might keep using the old IP address for a while after the change — which is exactly why teams often lower the TTL in advance of a planned migration, so the change propagates faster when it actually happens.`,
trade:[`DNS caching (via TTL) makes lookups fast and reduces load on DNS servers, but it also means DNS changes are never instant everywhere at once — planning around this propagation delay matters for any migration or failover that depends on a DNS change taking effect quickly.`,`DNS is also a common approach for basic failover and geographic routing (returning different IP addresses depending on the user's location, or automatically excluding a failed server's IP) — but it's a blunter, slower tool for this than something like a load balancer's active health checks.`]},

{cat:"NW", title:"HTTPS & the TLS Handshake", def:`HTTPS is just HTTP running over an encrypted connection, secured by TLS (Transport Layer Security). Before any actual HTTP request can be sent, the client and server perform a TLS handshake, roughly:

Step 1 — the client says hello, listing which encryption methods it supports.

Step 2 — the server responds with its chosen encryption method and its certificate (proving its identity, signed by a trusted authority).

Step 3 — the client verifies that certificate is legitimate and trusted, then both sides use some cryptographic exchange to agree on a shared secret key that only the two of them know.

Step 4 — from this point on, all actual data (the real HTTP request and response) is encrypted using that shared key, so anyone intercepting the traffic in between just sees unreadable, encrypted bytes.

This TLS handshake happens on top of (after) the TCP handshake — so establishing a brand-new HTTPS connection actually involves two separate round-trip negotiations before any real data moves.`,
ex:`When a mobile banking app connects to its backend API, the TLS handshake verifies the server is genuinely who it claims to be (preventing an attacker from impersonating the bank's server) and encrypts everything that follows, so someone intercepting the WiFi traffic at a coffee shop just sees meaningless encrypted bytes instead of account numbers or balances.`,
trade:[`The TLS handshake adds extra round-trip latency on top of the TCP handshake for every new connection — this is another reason connection reuse (keep-alive) matters so much, and why modern protocols like TLS 1.3 specifically worked to reduce the number of round-trips this handshake needs.`,`Skipping or misconfiguring certificate verification (a shortcut sometimes taken in testing) completely defeats the purpose of TLS and should never happen in production — it's the difference between "encrypted and verified" and "encrypted, but possibly talking to an attacker anyway."`]},

{cat:"NW", title:"Connection Pooling & Keep-Alive", def:`Since both the TCP handshake and the TLS handshake add real latency, and happen every time you open a brand-new connection, it's expensive to open a fresh connection for every single request. Two related techniques avoid this:

Keep-Alive — after a request/response completes, the underlying TCP (and TLS) connection is kept open for a little while instead of being closed immediately, so the next request to the same server can reuse it and skip both handshakes entirely.

Connection pooling — instead of opening one connection precisely when needed, an application maintains a pool of already-open, ready-to-use connections to a given destination (like a database, or a downstream API), borrowing one when a request needs to be made and returning it to the pool afterward, rather than constantly opening and closing connections.`,
ex:`A service calling a downstream payment processor maintains a pool of 20 pre-established, already-authenticated HTTPS connections. When a request comes in, it borrows an already-open connection from the pool instead of paying the full cost of a new TCP handshake plus a new TLS handshake for every single request — shaving real, measurable latency off of every call, which adds up enormously at high request volume.`,
trade:[`Connection pools need careful sizing — too small, and requests queue up waiting for a free connection even though the downstream service has capacity; too large, and you might overwhelm the downstream service or exhaust its own connection limits (this connects directly back to the Application-Level Concurrency Limiting topic covered earlier).`,`Pooled connections can go stale (the other side closed it, or a network device in between dropped it silently) — a robust connection pool needs to detect and replace dead connections rather than handing out ones that will fail immediately.`]},

{cat:"NW", title:"HTTP/1.1 vs HTTP/2 vs HTTP/3", def:`Three generations of the HTTP protocol, each solving a real limitation of the previous one.

HTTP/1.1 — the long-standing default. One request has to complete before the next one can be sent on the same connection (unless you open multiple connections in parallel, which browsers do, but only up to a limited number per domain).

HTTP/2 — introduced "multiplexing": many requests and responses can be in flight over a single TCP connection at the same time, interleaved together, instead of waiting in line. This removes a lot of the need to open many parallel connections.

HTTP/3 — goes a step further and replaces TCP itself with a new transport protocol called QUIC (built on top of UDP). This solves a subtle problem in HTTP/2 called "head-of-line blocking at the TCP level" — where a single lost packet could stall every multiplexed request sharing that one TCP connection, even ones unrelated to the lost data.`,
ex:`A mobile app on a flaky cellular connection loading a dashboard with 10 separate API calls performs noticeably better over HTTP/2 or HTTP/3 than HTTP/1.1, because it's not stuck opening and waiting on multiple separate connections, and (with HTTP/3 specifically) a single dropped packet doesn't stall unrelated requests sharing the same connection.`,
trade:[`Newer protocol versions generally just make things faster with no real downside for the application layer, but they require both the client and server infrastructure to actually support them — this is usually a load balancer/CDN configuration concern rather than something application code needs to handle directly.`]},

{cat:"NW", title:"Proxy vs Reverse Proxy vs API Gateway", def:`Three related but distinct roles a server can play in front of or behind your traffic.

Forward proxy — sits in front of clients, making requests to the internet on their behalf. The destination server sees the proxy, not the original client. Often used for things like corporate network filtering or hiding client identity.

Reverse proxy — sits in front of servers, receiving requests from clients and forwarding them to the right backend server. The client only ever talks to the reverse proxy and doesn't know (or need to know) which actual backend server handled it. Load balancers are a common example of a reverse proxy.

API Gateway — a specialized reverse proxy built specifically for APIs, that often adds extra responsibilities on top of simple forwarding: authentication, rate limiting, request/response transformation, and routing requests to different backend microservices based on the URL path.`,
ex:`An API Gateway sits in front of a fintech company's microservices, authenticating every incoming request once (so individual services don't each need to implement auth from scratch), applying a rate limit per API key, and routing `+"`/payments/*`"+` requests to the payments service and `+"`/accounts/*`"+` requests to the accounts service — all before the request ever reaches actual business logic.`,
trade:[`Centralizing concerns like auth and rate limiting in a gateway avoids duplicating that logic across every microservice, but it also becomes a critical, high-traffic single point that must be highly available and carefully capacity-planned — if the gateway goes down, everything behind it becomes unreachable, regardless of whether the actual services are healthy.`]},

{cat:"NW", title:"WebSockets vs Long Polling vs Server-Sent Events", def:`Three different approaches for pushing real-time updates to a client, since plain HTTP was originally designed around the client always initiating each request.

Long polling — the client makes a normal HTTP request, but the server just holds it open without responding until it actually has new data (or a timeout is reached), then the client immediately opens a new request to wait for the next update. Works over plain HTTP, but has overhead from constantly reopening connections.

Server-Sent Events (SSE) — the server keeps a single HTTP connection open and streams a continuous flow of updates to the client over it, one-way (server to client only). Simpler than WebSockets when you only need one-way updates.

WebSockets — a real two-way, persistent connection: after an initial HTTP handshake, the connection is upgraded into a dedicated channel where either side can send messages to the other at any time, with much lower overhead per message than repeatedly making new HTTP requests.`,
ex:`A live stock/crypto price ticker showing constantly updating prices is a great fit for Server-Sent Events (one-way, server pushing updates). A trading platform where the client also needs to send rapid actions back (placing orders) and receive instant fills/updates fits WebSockets better, since it needs fast communication in both directions. A simpler notification badge that just needs occasional updates might reasonably use long polling if WebSocket infrastructure isn't already in place.`,
trade:[`WebSockets give the most capability (full two-way, low overhead) but require your infrastructure (load balancers, gateways) to properly support long-lived persistent connections rather than the short request-response pattern most HTTP infrastructure is tuned for — scaling WebSocket connections has real operational differences from scaling stateless HTTP request handling.`,`Long polling is the simplest to add on top of existing plain HTTP infrastructure with no special support needed, but it's the least efficient of the three, with more overhead per update.`]},

{cat:"NW", title:"CDN (Content Delivery Network)", def:`A network of servers distributed across many geographic locations that cache and serve content from a location physically close to the requesting user, instead of every request traveling all the way back to your one origin server. This reduces latency (physical distance = time) and reduces load on your origin server, since the CDN serves repeat requests from its own cache.`,
ex:`Static assets for a banking app's web dashboard (JavaScript files, images, CSS) are served through a CDN, so a user in Singapore loads them from a nearby CDN server in milliseconds instead of waiting for a round trip to the company's origin servers in the US. Sensitive, personalized data (like the user's actual account balance) is never cached at the CDN — that always goes directly to the origin, since it's different for every user and far too sensitive to cache in a shared, distributed location.`,
trade:[`Excellent for static, non-sensitive, widely-shared content (assets, public marketing pages), but a CDN should almost never cache personalized or sensitive financial data — misconfiguring cache rules to accidentally cache a personalized API response (like one user's balance) at a CDN, where it could potentially be served to a different user, would be a serious data-leak risk.`]},

{cat:"NW", title:"What Happens When You Type a URL and Press Enter", def:`A classic interview question because answering it well touches almost everything in this Networking section at once. Here's the journey, step by step, for visiting an HTTPS site like your bank's web login.

Step 1 — Check local caches first. The browser checks if it already knows the IP address for this domain (from a recent DNS lookup) and whether it already has a valid cached copy of the page. If everything needed is already cached and still fresh, the journey can stop right here.

Step 2 — DNS resolution. If the domain's IP address isn't cached, the browser triggers a DNS lookup (see the dedicated DNS topic) to translate the domain name into an actual IP address it can connect to.

Step 3 — TCP handshake. The browser opens a TCP connection to that IP address, performing the three-way SYN / SYN-ACK / ACK handshake covered earlier.

Step 4 — TLS handshake. Since this is HTTPS, a TLS handshake happens next: the server presents its certificate, the browser verifies it's legitimate, and both sides agree on an encryption key for everything that follows.

Step 5 — The HTTP request is sent. Now, finally, the browser sends the actual HTTP request (e.g., "GET /login") over this newly established, encrypted connection.

Step 6 — The request arrives at the backend infrastructure. This is where a backend engineer's world really starts: the request typically hits a load balancer or reverse proxy first, which might terminate the TLS connection, decide which backend server should handle it, and forward it along — possibly through an API Gateway doing authentication and rate limiting, before it reaches the actual application server.

Step 7 — The application server processes the request. The app server runs the actual business logic — which might mean querying a database, checking a cache, calling other internal services — and builds a response.

Step 8 — The HTTP response travels back. The response (HTML, or JSON, or whatever the endpoint returns) travels back through the same chain — app server → load balancer/gateway → back over the same encrypted TCP connection — to the browser.

Step 9 — The browser renders the page. If the response is a web page, the browser parses the HTML top to bottom, building a structural model of the page (the DOM). Along the way, it finds references to more resources — CSS files, JavaScript files, images — and fires off additional requests for each of those (often to a CDN, per the earlier topic), which can each independently go through some or all of steps 1-8 again. Once enough of the page, styles, and scripts have loaded, the browser paints the actual visual page onto the screen.

Step 10 — The page becomes interactive. Once the JavaScript has loaded and run, the page becomes interactive — buttons work, forms can be submitted, and this whole journey can start again for the next action the user takes (like actually submitting their login form).`,
ex:`Logging into a banking app's web dashboard: DNS resolves the bank's domain, a TCP+TLS connection is established, the login page HTML loads through the bank's load balancer and app servers, and then the browser fires off separate requests (often via a CDN) for the page's CSS and JavaScript. Once the user actually submits their login form, a brand-new HTTP request (reusing the already-open, already-encrypted connection, thanks to connection keep-alive) is sent to an authentication endpoint, which validates credentials against a database and returns a session token — kicking off the "real" application flow this whole guide has been about.`,
trade:[`As a backend engineer, you don't control steps 1-5 (that's the browser and network's job) or step 9-10 (that's the frontend's job) — your responsibility starts at step 6 and ends at step 8. But understanding the full picture matters, because a slow "page load" a user complains about could genuinely be a DNS issue, a TLS handshake issue, a slow backend response, or a frontend rendering issue — and correctly figuring out which one it is is exactly the kind of debugging skill covered in this guide's Debugging Production section.`,`This is also why so many performance techniques throughout this guide exist: DNS caching and CDNs shorten steps 1-2 and step 9's extra asset requests; connection keep-alive avoids repeating steps 3-4 on every subsequent request; and load balancers plus well-tuned app servers keep steps 6-8 fast — nearly every optimization in this entire guide maps to shortening one specific step in this journey.`]},

// ---------------- DISTRIBUTED SYSTEMS ----------------
{cat:"DS", title:"CAP Theorem", def:`CAP stands for three properties of a distributed system. The theorem says you can only fully guarantee two of the three at the same time — you cannot have all three.

C — Consistency: every read sees the most recent write, no matter which server answers it.

A — Availability: every request gets a response (even if it's not guaranteed to be the very latest data).

P — Partition tolerance: the system keeps working even when the network connection between servers breaks.

In practice, real networks do sometimes break, so Partition tolerance isn't really something you can opt out of — it will happen eventually. That means CAP really comes down to one practical question you have to answer for your system: "when the network breaks, do we stay Consistent, or do we stay Available?" You can't have both at that moment.`,
ex:`During a network split between two data centers, your ledger service must pick: reject transfer requests until the partition heals (CP — protects balance correctness), or keep accepting transfers and reconcile conflicts later (AP — risks a double-spend). Fintech ledgers almost always choose CP for the write path.`,
trade:[`CP systems: safer for money movement, but degrade to unavailable during partitions — customers see errors instead of stale data.`,`AP systems: stay responsive, but need conflict resolution logic afterward (compensating transactions, manual reconciliation).`,`Most real systems are CP for some data (balances) and AP for other data (notifications, analytics) — CAP is a per-subsystem decision, not a whole-system label.`]},

{cat:"DS", title:"PACELC", def:`An extension of CAP theorem that also covers the normal case, not just failures.

If Partitioned: choose Availability or Consistency (this part is just CAP).

Else (the network is healthy, nothing is broken): you still have to choose between Latency and Consistency. Making a write wait for confirmation from far-away replicas is safer but slower; letting a write finish quickly and sync up later is faster but risks reading stale data for a moment.`,
ex:`A globally distributed wallet service could synchronously replicate every balance write to all regions (high consistency, high latency) or write locally and replicate asynchronously (low latency, eventual consistency). Most payment processors accept a small latency cost for consistency on the money-moving path.`,
trade:[`Sync replication: strong consistency, but every write pays a cross-region round trip.`,`Async replication: fast writes, but a regional failure can lose the most recent unreplicated transactions.`,`Useful for explaining to interviewers why "eventually consistent and fast" isn't automatically a bad choice — it depends which data path you're describing.`]},

{cat:"DS", title:"Consensus: Paxos & Raft", def:`Algorithms that let a cluster of nodes agree on a single value (e.g., "who is the leader" or "what is the next log entry") even when some nodes fail. Raft is designed to be more understandable than Paxos and is what most modern systems (etcd, Consul, CockroachDB) implement.`,
ex:`Your distributed configuration store (etcd) uses Raft internally to agree on which node is the leader for a given shard of your payment-routing config, so all app instances see a consistent view of routing rules.`,
trade:[`Guarantees safety under node failure and network issues, but requires a majority (quorum) of nodes to be reachable — an even split means no progress.`,`Adds latency (a write isn't committed until a majority acknowledges it) in exchange for strong consistency.`,`You rarely implement Raft yourself — you choose systems built on it (etcd, Consul, Kafka's KRaft) rather than reinventing it.`]},

{cat:"DS", title:"Logical Clocks & HLC", def:`Physical clocks on different machines drift slightly, so you can't fully trust wall-clock time alone to figure out which event happened first across a distributed system. A few different tools solve this:

Lamport clocks — give a simple "this happened before that" ordering between events, using a counter instead of real time.

Vector clocks — go further, and can actually detect when two events happened independently, with no cause-and-effect relationship between them at all.

Hybrid Logical Clocks (HLC) — combine real physical time with a logical counter, giving you both a correct ordering AND a timestamp that's still human-readable and close to the real time — a practical middle ground used in many real systems.`,
ex:`Two regional services process transactions 2ms apart by wall clock, but clock skew means the "later" one has an earlier timestamp. An HLC-based event ID lets your ledger reconstruct correct causal order regardless of skew, which matters for audit trails and dispute resolution.`,
trade:[`Vector clocks give precise causality but grow with the number of nodes — expensive at scale.`,`HLC is a practical middle ground: bounded size, still gives causal ordering, and stays close to real time for human debugging.`,`Never rely on raw wall-clock timestamps alone to order financial events across machines.`]},

{cat:"DS", title:"Thundering Herd / Cache Stampede", def:`When a popular cached value expires or a shared resource becomes available, many concurrent requests rush it simultaneously, overwhelming the backing store — the "herd" all recomputing or re-fetching at once.`,
ex:`A currency exchange-rate cache expires at midnight and 50,000 concurrent requests all miss the cache in the same second, hammering the upstream rates provider and causing a cascading timeout across every service that needs a rate.`,
trade:[`Fix with jittered TTLs (don't expire everything at exactly the same second), request coalescing (one fetch serves all waiters), or stale-while-revalidate (serve slightly old data while refreshing in the background).`,`Locking the recompute to a single worker avoids duplicate work but adds a small latency tax to the unlucky first request.`,`Cheap to prevent proactively, expensive to firefight in production — always jitter cache expirations by default.`]},

{cat:"DS", title:"Cascading Failures & Metastability", def:`A cascading failure is when one component's failure overloads and takes down its neighbors, which then take down theirs. A metastable failure is a related trap: even after the original trigger is fixed, the system stays broken because retries/requeued work keep the load high enough to prevent recovery.`,
ex:`A downstream fraud-check service slows down; callers retry aggressively; retries double the load on the already-struggling service; it falls over; upstream payment APIs start timing out too. Even after the fraud service is restored, the backlog of queued retries keeps it overloaded — the system doesn't recover on its own.`,
trade:[`Prevent with timeouts + circuit breakers so failures don't propagate, and backoff+jitter so retries don't synchronize into a new wave.`,`Load shedding (deliberately rejecting some requests) protects the system's ability to serve any traffic, at the cost of visibly failing some requests.`,`Recovery sometimes requires manually draining queued/retry backlogs, not just fixing the root cause — plan for that in runbooks.`]},

{cat:"DS", title:"Fan-in vs Fan-out", def:`Fan-out: one producer sends work to many consumers (broadcast/parallelize). Fan-in: many producers feed into one consumer or aggregator (collect/merge).`,
ex:`Fan-out: a single "payment completed" event triggers email, SMS, ledger update, and fraud-scoring services in parallel. Fan-in: settlement batches from 12 regional processors all get aggregated into one central reconciliation job at end of day.`,
trade:[`Fan-out risks overloading slow downstream consumers — add per-consumer backpressure or queues so one slow subscriber doesn't block the others.`,`Fan-in risks the aggregator becoming a bottleneck or single point of failure — consider sharding the aggregation itself if volume grows.`,`Both patterns need idempotency at the consumer/aggregator side since retries are inevitable at this scale.`]},

{cat:"DS", title:"Idempotency & Exactly-Once Delivery", def:`Idempotency means performing the same operation multiple times has the same effect as performing it once. True "exactly-once" delivery is very hard in distributed systems; in practice, you achieve "effectively-once" by combining at-least-once delivery with idempotent processing (dedup keys).`,
ex:`A client's payment request times out and retries. If the server had already processed the first attempt, blindly reprocessing would double-charge the customer. An idempotency key (client-generated UUID per intent) lets the server recognize the retry and return the original result instead of charging again.`,
trade:[`Requires storing recently-seen idempotency keys (with a TTL) — adds storage and lookup cost, but this cost is far cheaper than a double-charge incident.`,`Idempotency at the API layer doesn't automatically make downstream side effects (emails, webhooks) idempotent too — each side effect needs its own dedup strategy.`]},

{cat:"DS", title:"Consistent Hashing", def:`A hashing scheme that maps both data and nodes onto a ring, so when a node is added or removed, only a small fraction of keys need to move — unlike naive modulo hashing where nearly everything reshuffles.`,
ex:`When scaling your account-sharding layer from 8 to 10 database shards, consistent hashing (or its virtual-node variant) moves roughly 20% of accounts, not 80%, minimizing the resharding migration window.`,
trade:[`Reduces data movement on scale events, but adds a layer of indirection (ring lookup) versus simple modulo sharding.`,`Virtual nodes (many points per physical node) smooth out load distribution but add bookkeeping complexity.`]},

{cat:"DS", title:"Consistency Models", def:`A spectrum describing what guarantees you get when you read data, relative to writes that happened before it.

Strong consistency — every read sees the very latest write, no matter which server answers it.

Eventual consistency — reads will reflect a write eventually, but there's no guaranteed time limit on "eventually."

Causal consistency — if one event caused another (like a comment that replies to a post), everyone sees them in that same cause-and-effect order.

Read-your-writes — a person will always see their own changes right away, even if other people might see them a bit later.

Monotonic reads — once you've seen a value, you will never see an older value after that, even if you ask again later.`,
ex:`A user updates their profile photo and immediately views their own profile (read-your-writes needed, or they'd see the old photo). Meanwhile, another user viewing that profile a few seconds later seeing the old photo briefly is acceptable (eventual consistency is fine for that path).`,
trade:[`Stronger models are easier to reason about but cost latency/availability; weaker models scale better but push complexity onto the application to handle "surprising" read results.`,`Different parts of the same product can and should use different consistency models — balance reads need strong consistency, activity feeds can be eventually consistent.`]},

{cat:"DS", title:"Quorum Reads/Writes (N, R, W)", def:`Used in systems that keep several copies (replicas) of the same data.

N is how many total copies of the data exist.

W is how many copies must confirm a write before it's considered successful.

R is how many copies get checked on a read, using whichever one has the newest value.

The rule to remember: if W + R is greater than N, a read is mathematically guaranteed to overlap with the most recent write, so you always get fresh data. If W + R is not greater than N, reads might miss the latest write and return something slightly stale — but writes and reads both complete faster.`,
ex:`A Dynamo-style leaderless datastore with N=3 replicas might use W=2, R=2 (W+R=4 > N=3) to guarantee every read sees the latest committed write for account metadata, while a less critical dataset might use W=1, R=1 for lower latency at the cost of possibly reading stale data.`,
trade:[`Tuning N/R/W lets you trade consistency for latency/availability per use case without changing the underlying system — a powerful knob, but easy to misconfigure (e.g., picking W+R ≤ N for data that actually needs strong consistency).`]},

{cat:"DS", title:"Split-Brain", def:`A failure mode where a network partition causes a cluster to divide into two (or more) groups that each believe they're the legitimate leader/primary, potentially both accepting writes independently — leading to conflicting, hard-to-reconcile state.`,
ex:`A database cluster's primary is isolated by a network partition; the remaining nodes elect a new primary and keep accepting writes. If the original primary doesn't step down (because it doesn't know it's partitioned) and keeps accepting writes too, you now have two "primaries" for the same ledger accepting conflicting transactions.`,
trade:[`Prevented via quorum-based leader election (a leader must be acknowledged by a majority, so only one side of a partition can ever have a majority) and fencing (forcibly cutting off a demoted leader's ability to write) — never solvable by "just add a timeout," which is a common naive first instinct.`]},

{cat:"DS", title:"Replication Strategies", def:`Three common ways to keep copies of data in sync across multiple servers.

Leader-follower (single-leader) — every write goes through one designated leader, which then copies the change to its followers. Simple, and there's never a conflict about which write "wins," but that one leader is a bottleneck and a single point of failure until a new leader takes over.

Multi-leader — more than one server can accept writes, and they copy changes to each other. This gives better write availability (useful across regions) but now two servers could accept conflicting writes to the same data at the same time, and something has to resolve that conflict.

Leaderless (Dynamo-style) — any replica can accept a write; correctness is achieved afterward using quorums (see the Quorum topic) and versioning, rather than routing everything through one designated leader.`,
ex:`A single-region ledger uses leader-follower replication (simple, strongly consistent). A globally distributed shopping cart service might use multi-leader replication across regions for low local write latency, accepting that concurrent edits to the same cart need conflict resolution (e.g., "last write wins" or merge logic).`,
trade:[`Leader-follower is simplest and safest for data needing strong consistency, but write throughput and write availability are bounded by a single node.`,`Multi-leader and leaderless designs scale write availability globally, but push real conflict-resolution complexity onto the application — rarely worth it for core financial ledgers, often worth it for less critical, high-write-volume data.`]},

{cat:"DS", title:"Distributed Locks & Fencing Tokens", def:`A distributed lock (via Redis/ZooKeeper/etcd) coordinates exclusive access across processes. A fencing token is a monotonically increasing number issued with the lock so that a "resurrected" client holding a stale lock can't corrupt state after being paused (e.g., by GC) past the lock's expiry.`,
ex:`A batch job acquires a lock to process end-of-day settlement, gets paused by a long GC pause past the lock's TTL, and another instance acquires the lock and starts processing. Without a fencing token, the resumed first instance could still write, corrupting the settlement. With fencing tokens, the storage layer rejects writes carrying a stale (lower) token.`,
trade:[`Locks alone (e.g., naive Redlock) assume no pauses longer than the TTL — an assumption that fails in practice (GC pauses, VM stalls).`,`Fencing tokens require the *storage layer* to check and reject stale tokens — locking alone at the application layer isn't sufficient protection.`]},

// ---------------- THREAD SAFETY ----------------
{cat:"TS", title:"Race Conditions & Data Races", def:`A race condition is a bug where the outcome depends on timing/interleaving of concurrent operations. A data race specifically is when two threads access the same memory concurrently, at least one write, without synchronization.`,
ex:`Two threads both read an account balance of $100, both add a $20 deposit in memory, and both write back $120 — one deposit is silently lost instead of the balance being $140.`,
trade:[`Fixed via synchronization (locks, atomics) or by avoiding shared mutable state entirely (immutability, message passing).`,`Race conditions are notoriously hard to catch in testing since they depend on timing — favor design that makes them structurally impossible over relying on tests to catch them.`]},

{cat:"TS", title:"Mutex vs Semaphore vs Monitor", def:`Three tools for controlling access to shared code or data from multiple threads.

Mutex — only one thread is allowed in at a time. Everyone else waits in line.

Semaphore — like a mutex, but allows up to N threads in at once instead of just one (a "counting lock"). Useful when you want to allow some concurrency, just not unlimited concurrency.

Monitor — combines a lock with the ability for a thread to wait efficiently for a specific condition to become true (instead of constantly checking in a loop), and be woken up automatically once it does.`,
ex:`A mutex protects a single in-memory balance cache from concurrent writes. A semaphore with permit count 5 limits concurrent outbound calls to a rate-limited third-party payment gateway. A monitor lets worker threads wait efficiently for "new transaction available" rather than busy-polling.`,
trade:[`Mutexes are simplest but can become contention bottlenecks under high concurrency on hot resources.`,`Semaphores allow controlled parallelism but need careful permit-count tuning against downstream capacity.`,`Monitors avoid busy-waiting but add complexity (spurious wakeups, condition re-checking) that's easy to get subtly wrong.`]},

{cat:"TS", title:"Compare-And-Swap (CAS) / Atomics", def:`A CPU-level atomic instruction: "if the current value equals X, replace it with Y, else fail" — done in a single indivisible step. Lets you build lock-free counters and structures without a mutex.`,
ex:`An in-memory request counter for rate limiting uses AtomicInteger.compareAndSet instead of a mutex, avoiding lock contention on a very hot code path that's checked on every incoming API call.`,
trade:[`Lock-free and generally faster under contention than a mutex, but harder to reason about for anything beyond simple counters/references.`,`CAS loops can spin under very high contention (many failed retries) — sometimes a mutex is actually more predictable at extreme contention levels.`,`Not a substitute for transactional correctness across multiple related fields — CAS protects one memory location at a time.`]},

{cat:"TS", title:"Memory Visibility & Happens-Before", def:`Even without a data race bug in logic, one thread's write may not be visible to another thread due to CPU caching and compiler reordering, unless a "happens-before" relationship is established (via volatile, locks, or atomics).`,
ex:`A background thread sets a `+"`configReloaded = true`"+` flag after loading new fraud-rule config, but without `+"`volatile`"+` or proper synchronization, other threads might keep reading a cached `+"`false`"+` value indefinitely and never pick up the new rules.`,
trade:[`volatile guarantees visibility but not atomicity of compound operations (e.g., increment-and-check) — don't assume it replaces locking for anything beyond simple flags.`,`Understanding happens-before is essential for correctly reasoning about lock-free code — get it wrong and bugs appear only under specific CPU/JIT conditions, making them nearly impossible to reproduce.`]},

{cat:"TS", title:"Deadlock, Livelock, Starvation", def:`Three different ways concurrent code can get stuck.

Deadlock — two or more threads each hold something the other one needs, and each is waiting for the other to let go first — so neither ever moves, forever (this is called a "circular wait").

Livelock — threads keep actively reacting to each other and changing what they're doing, but nothing actually gets accomplished, like two people repeatedly stepping the same way trying to avoid each other in a hallway.

Starvation — one thread keeps getting skipped over in favor of others, so it never gets its turn, even though it isn't technically stuck.`,
ex:`Imagine transferring money from Account 1 to Account 2, and at the same time, someone else is transferring money the other way (Account 2 to Account 1):
— Thread A (transfer 1→2): locks Account 1, then tries to lock Account 2.
— Thread B (transfer 2→1): locks Account 2, then tries to lock Account 1.
Thread A is now holding Account 1 and waiting for Account 2. Thread B is holding Account 2 and waiting for Account 1. Neither will ever let go, so both wait forever — that's the deadlock.

The standard fix is "lock ordering": always lock accounts in the same order, no matter which direction the transfer is going — for example, always lock the account with the *smaller* ID first. So both transfers become:
— Transfer 1→2: lock Account 1 first (smaller ID), then Account 2.
— Transfer 2→1: also lock Account 1 first (smaller ID), then Account 2 — even though the money is moving the opposite direction.
Now both threads try to grab Account 1 first. One of them gets it and proceeds to Account 2 next; the other simply waits its turn for Account 1 — no circular waiting, no deadlock, just a normal queue.`,
trade:[`Lock ordering completely prevents this kind of deadlock, but it only works if *every* piece of code that locks multiple accounts follows the same ordering rule — one forgotten exception anywhere in the codebase brings the deadlock risk right back.`,`A simpler backup plan: give every lock attempt a timeout. If a thread can't get the second lock within, say, 2 seconds, it gives up, releases what it's holding, and retries. This turns a silent forever-hang into a quick, visible, retryable failure — often preferred in production financial systems because it's a much safer failure mode than a frozen thread.`]},

{cat:"TS", title:"Immutability as a Thread-Safety Strategy", def:`If an object's state can never change after construction, it's inherently thread-safe to share across threads — there's nothing to race over.`,
ex:`Representing a completed transaction as an immutable value object (amount, timestamp, parties, status) means it can be freely passed between threads, cached, and logged without any synchronization concerns — only the process of *creating the next* transaction record needs coordination.`,
trade:[`Eliminates a whole category of concurrency bugs, but can increase memory allocation (new objects instead of in-place mutation) — usually a good trade for correctness-critical financial data.`,`Doesn't help when you genuinely need shared mutable state (e.g., a running balance) — that still needs proper synchronization or a different strategy (event sourcing, CAS).`]},

{cat:"TS", title:"False Sharing", def:`A performance (not correctness) problem: two threads modify different variables that happen to sit on the same CPU cache line, causing unnecessary cache invalidation traffic between cores even though there's no actual logical conflict.`,
ex:`Two counters — one tracking successful payments, one tracking failed payments — are declared adjacently in a struct and updated by different threads. Despite no logical race, throughput suffers because every update invalidates the other thread's cached copy of the cache line.`,
trade:[`Fixed with padding/alignment to separate hot variables onto different cache lines — a micro-optimization only worth pursuing after profiling shows it's a real bottleneck.`,`Easy to over-apply as premature optimization; only chase this once you have profiler evidence of cache-line contention.`]},

{cat:"TS", title:"Thread-Local Storage", def:`A mechanism giving each thread its own independent copy of a variable, so concurrent threads never see or interfere with each other's copy — no synchronization needed, since there's nothing shared.`,
ex:`A per-request correlation ID or a database connection handle is stored in thread-local storage so that logging or DB calls anywhere in the call stack can access "the current request's" context without explicitly passing it through every function signature, and without any risk of one thread reading another's ID.`,
trade:[`Eliminates synchronization overhead entirely for per-thread state, but can quietly leak memory or stale state in thread-pool environments if not cleared after each task — a classic bug where a pooled thread "remembers" data from a previous, unrelated request.`,`Doesn't help (and isn't meant to help) with genuinely shared mutable state — it solves a different problem than locks/atomics.`]},

// ---------------- CONCURRENCY IN APPLICATIONS ----------------
{cat:"CA", title:"Concurrency vs Parallelism", def:`Concurrency is structuring a program to handle multiple tasks that can be in progress at once (may or may not run simultaneously). Parallelism is actually executing multiple tasks at the exact same time on multiple cores.`,
ex:`A single-core service handling thousands of concurrent HTTP connections via an event loop (Node.js) is concurrent but not parallel. A multi-threaded batch job crunching a settlement file across 16 CPU cores simultaneously is both concurrent and parallel.`,
trade:[`Concurrency (without parallelism) is enough for I/O-bound work (waiting on network/DB) since the CPU isn't the bottleneck.`,`Parallelism is needed for CPU-bound work (e.g., heavy fraud-scoring computation) where you actually need more cores doing simultaneous work.`]},

{cat:"CA", title:"Threads vs Coroutines / Green Threads", def:`Two different ways to run many things "at once."

OS threads — managed by the operating system, each one is relatively heavy (uses megabytes of memory just for its stack) and the OS decides when each one gets CPU time.

Coroutines / green threads / virtual threads (goroutines, Kotlin coroutines, Java virtual threads) — much lighter weight, managed by your programming language's runtime instead of the OS. Because each one is so cheap, you can run millions of them at once on the same machine, which is exactly what you want when most of them are just waiting on a slow network call rather than doing real work.`,
ex:`A payment-gateway proxy handling 100,000 concurrent slow upstream connections would exhaust memory with one OS thread per connection; using virtual threads or an async runtime lets each connection be represented cheaply while still writing simple sequential-looking code.`,
trade:[`Lightweight concurrency dramatically increases the number of concurrent tasks you can handle per machine, but debugging tools and stack traces can be less mature/intuitive than traditional threads.`,`Blocking calls inside a coroutine/green-thread runtime can still starve the underlying thread pool if not handled correctly — you need runtime-aware I/O libraries, not just any blocking call.`]},

{cat:"CA", title:"Event Loop & Non-Blocking I/O", def:`A single (or few) thread(s) repeatedly pull events (completed I/O, timers) off a queue and dispatch callbacks/continuations, never blocking on I/O — the OS notifies the loop when a socket is ready instead of a thread waiting on it.`,
ex:`A webhook-delivery service uses an event loop (Netty/Node.js style) to manage tens of thousands of concurrent outbound HTTP calls to merchant endpoints without needing tens of thousands of OS threads.`,
trade:[`Extremely efficient for I/O-bound workloads with many concurrent connections, but a single long-running CPU-bound task (e.g., heavy JSON parsing or crypto) blocks the entire event loop for everyone.`,`Requires disciplined use of non-blocking libraries throughout the stack — one accidental blocking call defeats the whole model.`]},

{cat:"CA", title:"Thread Pool Sizing", def:`Choosing the number of worker threads: for CPU-bound work, roughly (number of cores); for I/O-bound work, a much larger pool since threads spend most time waiting, not computing.`,
ex:`A thread pool calling an external card-network API (I/O-bound, ~200ms latency per call) benefits from a much larger pool (e.g., 100+ threads) than a thread pool doing in-memory fraud-score computation (CPU-bound, sized near core count).`,
trade:[`Oversized pools for CPU-bound work cause excessive context switching and cache thrashing with no throughput gain.`,`Undersized pools for I/O-bound work leave the CPU idle while requests queue up waiting for a free thread.`,`Unbounded pools risk resource exhaustion under load spikes — always bound the pool and pair it with a rejection/backpressure policy.`]},

{cat:"CA", title:"Futures, Promises & Structured Concurrency", def:`Futures/Promises represent a value that will be available later, enabling composable async code. Structured concurrency takes this further: child async tasks are scoped to a parent, so cancellation and error propagation are automatic and you can't "leak" a forgotten background task.`,
ex:`A payment request kicks off parallel calls to fraud-check, balance-check, and limits-check as futures, combining results before deciding to approve. With structured concurrency, if the parent request is cancelled (client disconnected), all three child calls are automatically cancelled instead of running to completion pointlessly.`,
trade:[`Plain futures/callbacks can lead to "fire and forget" tasks that outlive their logical parent, silently consuming resources or completing after they no longer matter.`,`Structured concurrency adds a small amount of ceremony but prevents an entire class of resource-leak and lost-error bugs — worth it for anything beyond trivial async code.`]},

{cat:"CA", title:"Producer-Consumer & Backpressure", def:`Producers generate work faster than consumers can process it unless bounded. Backpressure is the mechanism by which a slow consumer signals producers to slow down (bounded queues, reactive streams, or blocking puts) instead of the system falling over from unbounded buffering.`,
ex:`A transaction-ingestion pipeline reading from Kafka processes records slower during a downstream DB hiccup. Without backpressure, an unbounded in-memory queue grows until the service OOMs; with backpressure (bounded queue + consumer lag causing the Kafka consumer to naturally slow its poll rate), the system degrades gracefully instead of crashing.`,
trade:[`Bounded queues force an explicit decision when full: block the producer, drop the item, or reject with an error — there's no free lunch, just choosing where the pain shows up.`,`Backpressure-aware systems (reactive streams, Kafka consumer groups) add complexity but prevent unbounded memory growth under load spikes.`]},

{cat:"CA", title:"Application-Level Concurrency Limiting", def:`Using a semaphore (or similar bounded-permit mechanism) to cap how many concurrent operations of a specific type an application will run at once — distinct from a rate limiter (which caps operations per time window); this caps *simultaneous in-flight* operations regardless of how fast they complete.`,
ex:`A service calling a third-party card network with a documented "max 20 concurrent connections" limit wraps those calls with a semaphore of 20 permits, so a sudden burst of 500 incoming payment requests queues politely behind the semaphore instead of opening 500 simultaneous connections and getting throttled or blacklisted by the card network.`,
trade:[`Protects both your own resources and your dependency's from being overwhelmed by concurrency spikes, but the permit count needs tuning against the dependency's real capacity — set it too low and you under-utilize available throughput, too high and you defeat the purpose.`,`Complements, rather than replaces, a time-window rate limiter — you often want both concurrency limits and rate limits on the same critical dependency.`]},

// ---------------- CONCURRENCY IN DATABASES ----------------
{cat:"CD", title:"Pessimistic Locking", def:`Lock a row (or range) before reading it with intent to modify, so no other transaction can touch it until you commit or roll back — assumes conflicts are likely, so it prevents them upfront (e.g., `+"`SELECT ... FOR UPDATE`"+`).`,
ex:`Transferring money between two accounts: `+"`SELECT balance FROM accounts WHERE id=1 FOR UPDATE`"+` locks that row so no concurrent transfer can read a stale balance and cause a lost update, at the cost of making concurrent transfers on the same account wait in line.`,
trade:[`Guarantees correctness under high contention on the same row, but serializes access — a "hot" account (e.g., a popular merchant) becomes a throughput bottleneck.`,`Risk of deadlock if multiple rows are locked in inconsistent order across transactions — mitigate with a fixed lock-acquisition order.`]},

{cat:"CD", title:"Optimistic Locking", def:`Don't lock upfront — read data with a version/timestamp column, and when writing, check the version hasn't changed; if it has, reject and retry. Assumes conflicts are rare, so it detects them after the fact instead of preventing them.`,
ex:`An account row has a `+"`version`"+` column. A transfer reads balance and version=5, computes the new balance, then writes `+"`UPDATE accounts SET balance=X, version=6 WHERE id=1 AND version=5`"+`. If another transaction already bumped the version, the update affects 0 rows and the app retries.`,
trade:[`Scales much better than pessimistic locking under low-to-moderate contention since there's no blocking — but under high contention on the same row, retries pile up and can actually perform worse than a lock would.`,`Requires the application to handle retry logic explicitly, including a cap on retries and a clear failure path.`]},

{cat:"CD", title:"Lock Granularity & Escalation", def:`Locks can be taken at row, page, or table level. Finer granularity (row-level) allows more concurrency but costs more memory/overhead to track; the database may automatically escalate many row locks into a single table lock under memory pressure, unexpectedly serializing unrelated transactions.`,
ex:`A large batch job updating millions of ledger rows in one transaction can trigger lock escalation to a table lock, unexpectedly blocking unrelated real-time transactions on completely different accounts in the same table.`,
trade:[`Row-level locking maximizes concurrency but has more overhead per lock; batch jobs should be chunked into smaller transactions specifically to avoid triggering escalation.`,`Understanding your specific database's escalation thresholds (SQL Server does this explicitly; Postgres/MySQL behave differently) is essential before running large batch updates in production.`]},

{cat:"CD", title:"Lock Contention & Hot Rows", def:`Lock contention happens when many operations all want to lock the same thing at the same time and have to wait in line for each other. A "hot row" is a single database row (like one very active account's balance) that gets touched so often that it becomes the line everyone is stuck waiting in — no matter how many servers or database replicas you add elsewhere, that one row can only be updated by one transaction at a time, so it caps your overall speed.`,
ex:`A popular merchant's account balance row gets debited and credited thousands of times per second. If every one of those updates locks that same row, they queue up one after another — adding more app servers doesn't help, because the bottleneck isn't your servers, it's that one row.`,
trade:[
  `Fix in application/thread code — keep locks short: only wrap the bare minimum of code in a lock. Do the slow stuff (logging, calling another service, writing a file) outside the lock, so you're not holding the door shut while doing unrelated work.`,
  `Fix in application/thread code — avoid locks entirely where you can: use built-in thread-safe tools (like Java's ConcurrentHashMap, or atomic counters) instead of manually wrapping a lock around a shared value.`,
  `Fix in application/thread code — split one big lock into many small ones ("lock striping"): instead of one lock guarding an entire list or map, split the data into chunks (e.g., 16 buckets) each with its own lock, so unrelated updates don't wait on each other.`,
  `Fix in the database — keep transactions short: do all your calculations first, then open the transaction, write, and commit immediately — never leave a transaction open while waiting on a slow network call or, worse, user input.`,
  `Fix in the database — prefer optimistic locking for hot rows: instead of locking the row while you read it, read it freely, then when you write, check that a version number hasn't changed. This lets many readers proceed without queuing, and only actually blocks on the (hopefully rare) real conflict.`,
  `Fix in the database — make sure your queries are actually using an index for their WHERE clause. A query without a useful index may scan (and briefly lock) far more rows than it needs to, dragging unrelated rows into the contention.`,
  `Fix in the database — process big updates/deletes in small batches (e.g., 1,000 rows at a time) instead of one huge transaction touching millions of rows at once — a giant transaction holds many locks for a long time, blocking everything else that needs those rows.`,
  `Fix in the database — for queue-style workloads (many workers picking up jobs from a shared table), use "SKIP LOCKED" so a worker just grabs the next available, unlocked row instead of waiting behind a row someone else already grabbed. Use "NOWAIT" when you'd rather fail fast and retry than wait at all.`,
  `Fix in the database — use the lowest isolation level that's still safe for what you're doing (e.g., Read Committed instead of Serializable) when you don't specifically need the stronger guarantee — higher isolation levels take more locks and hold them longer.`,
  `Structural fix — split the hot value into several sub-counters (e.g., 10 partial balances that sum to the real total) and add up all the sub-counters when you need to read the total. This trades a slightly more complex read for much higher write throughput, since writes now spread across 10 rows instead of fighting over 1.`,
  `Structural fix (the classic fintech answer) — switch from "one row holding the current balance, updated in place" to an append-only ledger: every transaction is a new row (an insert, never an update), and the balance is calculated by summing the ledger rows (or read from a periodically-refreshed snapshot). Inserts don't compete for the same row the way updates do, so this sidesteps hot-row contention almost entirely.`
]},

{cat:"CD", title:"MVCC (Multi-Version Concurrency Control)", def:`Instead of blocking readers when a writer is active, the database keeps multiple versions of a row and gives each transaction a consistent snapshot as of when it started — readers never block writers and vice versa (used by Postgres and MySQL/InnoDB).`,
ex:`A reporting query summing account balances for a dashboard runs concurrently with live transfers updating those same accounts; MVCC lets the report see a consistent snapshot without blocking the transfers, and without the transfers blocking the report.`,
trade:[`Great default for read-heavy + write-heavy mixed workloads, but old row versions need cleanup (vacuuming in Postgres) — neglecting this causes table bloat and performance degradation over time.`,`MVCC solves reader-writer blocking, but doesn't eliminate write-write conflicts — you still need locking or optimistic checks for concurrent writers to the same row.`]},

{cat:"CD", title:"Deadlock Detection in Databases", def:`This is the same problem as thread deadlocks, but between database transactions instead of application threads. The database keeps a small map of "who is waiting on whom." If it finds a cycle — Transaction A is waiting for a row Transaction B is holding, and Transaction B is waiting for a row Transaction A is holding — it knows they'll wait forever, so it automatically kills one of them (called the "victim") and lets the other continue. The killed transaction gets a deadlock error back and needs to retry.`,
ex:`Two transfers run at the same time in opposite directions:
— Transaction A: `+"`UPDATE accounts SET balance = balance - 50 WHERE id = 1`"+`, then tries to update account 2.
— Transaction B: `+"`UPDATE accounts SET balance = balance - 50 WHERE id = 2`"+`, then tries to update account 1.
A is holding account 1 and waiting for account 2. B is holding account 2 and waiting for account 1. The database spots this cycle within milliseconds and cancels one of them with a deadlock error — the app catches that error and simply retries the whole transaction.

The real fix, the same as with threads, is lock ordering: make every transaction that touches multiple accounts always update the lower account ID first, regardless of transfer direction. So both A and B would update account 1 before account 2 — meaning whichever transaction gets to account 1 first just makes the other one wait its turn normally, instead of the two of them locking each other out.`,
trade:[`Your application code must always expect deadlock errors can happen and be ready to automatically retry — this is normal, expected behavior under concurrent access, not a bug to eliminate entirely.`,`Preventing deadlocks with consistent lock ordering is better than just relying on retry, because every retry adds delay, and under very high traffic the same transactions can deadlock again and again, wasting time each round.`]},

{cat:"CD", title:"Advisory Locks & Distributed DB Concurrency", def:`Advisory locks are application-defined locks the database tracks on your behalf (identified by an arbitrary key you choose) that don't correspond to any actual row or table — useful for coordinating logic that isn't naturally tied to a specific row. This is distinct from distributed locks (Redis/ZooKeeper), which coordinate across services rather than within a single database.`,
ex:`A nightly reconciliation job needs to ensure only one instance runs at a time across multiple app servers; rather than building separate coordination infrastructure, it takes a Postgres advisory lock on a fixed key (e.g., `+"`hashtext('reconciliation-job')`"+`) for the job's duration — any other instance's attempt to acquire the same key fails immediately.`,
trade:[`Cheaper and simpler than standing up a separate distributed-locking system (Redis/ZooKeeper) when you already have the database in the loop, but ties your coordination mechanism to that specific database's availability and doesn't work if the coordinating processes span multiple independent databases.`]},

// ---------------- DATABASE THEORY & DESIGN ----------------
{cat:"DB", title:"SQL vs NoSQL vs NewSQL", def:`Three broad families of database, each trading off different things.

SQL (relational, like Postgres/MySQL) — strong consistency, real joins between tables, and mature, well-tested transaction support. The safest default for anything that needs correctness guarantees.

NoSQL (document, key-value, or wide-column stores) — trades away some of that in exchange for flexible schemas, easier horizontal scaling, or very high write throughput, depending on which kind of NoSQL store you pick.

NewSQL (CockroachDB, Google Spanner, YugabyteDB) — tries to give you the best of both: horizontal scale across many machines, while still keeping SQL-style queries and strong consistency guarantees.`,
ex:`Core account/ledger data goes in Postgres or a NewSQL store (needs ACID + joins + strong consistency). Session tokens and idempotency keys go in Redis (key-value, low latency). Audit/event logs go in a wide-column or document store (high write volume, denormalized, rarely joined).`,
trade:[`Relational: strongest correctness guarantees and query flexibility, but harder to scale writes horizontally without sharding effort.`,`NoSQL: easier horizontal scale and schema flexibility, but weaker/no multi-row transactions and joins — pushes consistency logic into the application.`,`NewSQL: closest to "best of both," but with more operational complexity and often higher latency per transaction than a single-node relational DB.`,`Fintech default: core money data on relational/NewSQL; NoSQL for supporting, non-authoritative data.`]},

{cat:"DB", title:"Elasticsearch: What It Is & Core Components", def:`Elasticsearch (often shortened to "ES") is a distributed search and analytics engine. It's built on top of a library called Lucene, and it specializes in one thing regular databases aren't great at: searching through large amounts of text and data very quickly, including fuzzy/partial matches, ranking results by relevance, and aggregating (summarizing) huge datasets fast.

It's grouped under "NoSQL" in the earlier comparison, but it's really its own specialized category — most teams don't use it as their main database; they use it alongside a regular database, specifically for search and analytics needs that database isn't built for.

The core building blocks:

Cluster — the whole Elasticsearch setup: one or more servers working together as one logical system.

Node — a single server (or process) that's part of the cluster. A cluster is made of many nodes.

Index — roughly Elasticsearch's version of a "table" in a relational database. It's a collection of related documents.

Document — roughly Elasticsearch's version of a "row." It's a single JSON record — for example, one log entry, or one transaction record.

Mapping — roughly Elasticsearch's version of a "schema." It defines what fields a document has and how each field should be treated (as searchable text, as an exact-match value, as a number, as a date, and so on).

Shard — a smaller, self-contained slice of an index. Every index is actually split into multiple shards under the hood, which is what makes Elasticsearch able to scale — see the dedicated Sharding topic below.`,
ex:`A fintech company wants customer support agents to search through millions of transaction records by free-text description ("find anything mentioning 'refund dispute'"), even with typos or partial matches. Their main Postgres database can technically do a text search, but it's slow and limited at that scale. So transaction records are also copied into an Elasticsearch index, purpose-built for this kind of fast, flexible search — while Postgres remains the actual source of truth for the transaction data itself.`,
trade:[`Elasticsearch is excellent at search and analytics, but it's generally not meant to be your primary system of record for critical transactional data — it has weaker consistency and transaction guarantees than a relational database, so the common pattern is: keep your real source of truth in a proper database, and sync a copy into Elasticsearch (often via CDC, covered earlier in this guide) purely for search and analytics.`]},

{cat:"DB", title:"How Elasticsearch Achieves Fast Reads (Inverted Index)", def:`A regular database, searching for "find all rows where the description contains the word refund," often has to scan through rows checking each one — slow at scale unless you have a very specific kind of index built for exactly that phrase, which is hard to do for free-text search.

Elasticsearch instead builds something called an inverted index. Instead of storing "this document contains these words" (a normal, forward way of thinking about it), it flips it around and stores "this word appears in these documents." So when you search for the word "refund," Elasticsearch doesn't scan every document — it just looks up "refund" directly in this reversed index and instantly gets the list of matching documents back.

A few other things that contribute to Elasticsearch's speed:

It's built for reading, and does a lot of work upfront at write time (breaking text into searchable words, building the inverted index) so that the read/search itself stays cheap.

Data is distributed across multiple shards (see the next topic) so a single search can be run in parallel across many machines at once, and the partial results are combined at the end.

It keeps frequently-used data structures cached in memory, and uses a "near real-time" model — new writes become searchable within about a second, not instantly, which is a deliberate trade-off that keeps both writes and reads fast.`,
ex:`Searching for every transaction where the memo field contains the word "refund" across 50 million records returns in well under a second, because Elasticsearch already has a pre-built inverted index mapping "refund" directly to every matching document — instead of having to check the memo field of all 50 million records one by one, the way a naive full-table text scan would.`,
trade:[`This design makes Elasticsearch extremely fast for search and read-heavy workloads, but the upfront indexing work at write time means writes are relatively more expensive than in a plain key-value or relational insert — Elasticsearch is optimized for "search often, write less often" access patterns, not for extremely high-frequency single-row updates.`]},

{cat:"DB", title:"Elasticsearch Indexing Pipeline: Analyzers & Tokenizers", def:`This is the actual process that happens at write time to turn raw text into the fast, searchable inverted index described above. Every piece of text goes through an "analyzer," which is really three steps chained together.

Step 1 — Character filters (optional): clean up the raw text before anything else happens. Example: stripping out HTML tags, or converting "&" into "and."

Step 2 — Tokenizer (required, exactly one per analyzer): breaks the text into individual pieces called "tokens." Example: the standard tokenizer splits "Refund Dispute #4521" into the tokens "Refund," "Dispute," "4521" — splitting on whitespace and punctuation.

Step 3 — Token filters (optional, can chain several): modify the tokens after they've been split. Common examples: lowercase (so "Refund" and "refund" match each other), stop word removal (dropping common, low-value words like "the" or "and"), stemming (reducing "disputing," "disputed," "disputes" all down to the root "disput," so searching for any form matches all of them).

The result of this whole pipeline — the final list of processed tokens — is exactly what gets stored in the inverted index. This is why the analyzer you choose matters so much: it directly decides what a search will and won't match.

A field can also be mapped as "keyword" instead of "text," which means it skips this whole analysis pipeline and is stored and matched as one single exact value, not broken into searchable tokens at all.`,
ex:`A transaction memo field "Refund - Order #4521 (Disputed)" gets analyzed at write time into tokens like "refund," "order," "4521," "disput" (lowercased and stemmed). Later, a search for "disputing order 4521" gets analyzed the same way at search time into "disput," "order," "4521" — and because both went through the same stemming and lowercasing, they match, even though the original text and the search text weren't written the exact same way.

Meanwhile, the transaction's status field is mapped as "keyword" (not "text"), storing the exact value "DISPUTED" — useful for exact filters like "show me all transactions with status = DISPUTED," where you want an exact match, not a fuzzy text search.`,
trade:[`Choosing "text" (analyzed, tokenized) vs "keyword" (exact, unanalyzed) for each field is one of the most important mapping decisions in Elasticsearch — text fields support fuzzy/partial search but can't be used for exact filtering or sorting the way you'd expect; keyword fields support exact filtering and sorting but won't match partial or reworded text at all. Many real setups map the same field both ways at once (one as text, one as keyword) specifically to support both use cases.`,`Getting the analyzer wrong is a common, hard-to-notice mistake — if the same text isn't analyzed consistently at write time and search time, searches that should intuitively match will silently return nothing, and it's not always obvious why.`]},

{cat:"DB", title:"Elasticsearch Query Types: Term vs Match vs Aggregation", def:`Three fundamentally different kinds of questions you can ask Elasticsearch, and it's important to pick the right one.

Term query — an exact match query. It does NOT run the text through an analyzer first — it looks for the precise value you gave, exactly as stored. Use this against "keyword" fields, or against fields where you deliberately want an exact match.

Match query — a full-text search query. It DOES run your search text through the same analyzer the field used at index time, then finds documents containing those resulting tokens, ranking results by relevance (how well they match) rather than just a plain yes/no. Use this against "text" fields for natural, fuzzy, human-style search.

Aggregation query — not about finding individual matching documents at all, but about summarizing/grouping data across many documents at once, similar to a SQL "GROUP BY." Examples: "count how many transactions per status," "average transaction amount per day," "top 10 merchants by transaction volume."

A single request to Elasticsearch can combine these: run a match query to find relevant documents, apply a term-query filter to narrow it further, and run an aggregation on top of the filtered results — all in one round trip.`,
ex:`Term query: `+"`status: \"DISPUTED\"`"+` — finds only documents where the keyword field status is exactly "DISPUTED," no analysis, no fuzzy matching, no partial credit.

Match query: searching the memo text field for "refund disput" — finds documents whose analyzed memo tokens overlap with the analyzed search tokens, ranking a memo that closely matches higher than one that only loosely matches.

Aggregation: "group all of last month's transactions by status, and give me a count for each" — returns something like `+"`{DISPUTED: 340, RESOLVED: 1200, PENDING: 90}`"+` in one fast query, without pulling back a single individual transaction document.`,
trade:[`Using a term query against a "text" field (instead of "keyword") often silently returns nothing, because the field was broken into lowercased, stemmed tokens at index time, and your exact, unprocessed search value doesn't match any of them — this exact-vs-analyzed mismatch is one of the most common beginner mistakes in Elasticsearch.`,`Aggregations are extremely powerful for dashboards and reporting (much faster than pulling all matching documents back and summarizing them yourself in application code), but a very high-cardinality aggregation (grouping by a field with millions of unique values, like a unique transaction ID) can be memory-intensive on the cluster — aggregations are best suited to fields with a reasonably bounded number of distinct values.`]},

{cat:"DB", title:"Elasticsearch Sharding", def:`Every Elasticsearch index is split into multiple shards, and each shard is a complete, independent mini search-index on its own. This is what lets an index scale beyond what a single machine could hold or search through alone — different shards can live on different nodes, and a search runs across all of them in parallel.

There are two kinds of shards:

Primary shard — holds the actual, authoritative copy of a slice of the index's data. You choose how many primary shards an index has when you create it.
