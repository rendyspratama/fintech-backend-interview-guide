{cat:"DB", title:"Bloom Filters", def:`A probabilistic data structure that answers one specific question extremely quickly and with very little memory: "is this value DEFINITELY NOT in this dataset, or might it possibly be?" It can never give a false "definitely not in there" — but it can occasionally give a false "might be in there" for a value that actually isn't (a "false positive"). It never produces a false negative.

The practical value: checking a bloom filter is extremely fast and memory-cheap compared to actually checking the real, much larger dataset. So it's used as a quick first check — if the bloom filter says "definitely not there," you can skip the expensive real lookup entirely; only when it says "might be there" do you bother doing the slower, real check.

This is exactly how systems like Cassandra (and other LSM-tree-based stores, covered in the Elasticsearch indexing topic earlier) use bloom filters internally: before checking an on-disk file for a key, they first check an in-memory bloom filter for that file. If the filter says the key definitely isn't there, the expensive disk read is skipped entirely — a huge speedup, since disk access is so much slower than an in-memory check.`,
diagram:`<svg viewBox="0 0 480 190" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="240" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Bit array (simplified) — adding "user_42"</text>
  <g font-size="12" font-weight="700" text-anchor="middle">
    <rect x="20" y="30" width="36" height="36" fill="var(--panel-2)" stroke="var(--border)"/><text x="38" y="53" fill="var(--text-faint)">0</text>
    <rect x="56" y="30" width="36" height="36" fill="var(--ledger-dim)" stroke="var(--ledger)"/><text x="74" y="53" fill="var(--text)">1</text>
    <rect x="92" y="30" width="36" height="36" fill="var(--panel-2)" stroke="var(--border)"/><text x="110" y="53" fill="var(--text-faint)">0</text>
    <rect x="128" y="30" width="36" height="36" fill="var(--panel-2)" stroke="var(--border)"/><text x="146" y="53" fill="var(--text-faint)">0</text>
    <rect x="164" y="30" width="36" height="36" fill="var(--ledger-dim)" stroke="var(--ledger)"/><text x="182" y="53" fill="var(--text)">1</text>
    <rect x="200" y="30" width="36" height="36" fill="var(--panel-2)" stroke="var(--border)"/><text x="218" y="53" fill="var(--text-faint)">0</text>
    <rect x="236" y="30" width="36" height="36" fill="var(--panel-2)" stroke="var(--border)"/><text x="254" y="53" fill="var(--text-faint)">0</text>
    <rect x="272" y="30" width="36" height="36" fill="var(--ledger-dim)" stroke="var(--ledger)"/><text x="290" y="53" fill="var(--text)">1</text>
    <rect x="308" y="30" width="36" height="36" fill="var(--panel-2)" stroke="var(--border)"/><text x="326" y="53" fill="var(--text-faint)">0</text>
  </g>
  <text x="180" y="90" text-anchor="middle" fill="var(--ledger)" font-size="10.5">3 hash functions set bits 1, 4, 7 to 1</text>

  <text x="60" y="130" fill="var(--ledger)" font-size="11" font-weight="600">Look up "user_42" → hashes to bits 1,4,7, all set → "might exist" → do real check</text>
  <text x="60" y="155" fill="var(--red)" font-size="11" font-weight="600">Look up "user_99" → hashes to bit 2 (=0) → "definitely not there" → skip disk read entirely</text>
</svg>`,
ex:`A distributed database storing billions of keys across many on-disk files keeps a small bloom filter in memory for each file. When looking up a specific key, it checks each file's bloom filter first; for the vast majority of files (which definitely don't contain that key), the filter says so instantly, and the database skips reading that file from disk at all — only actually reading from disk for the small number of files where the filter says the key might be present.`,
trade:[`Bloom filters trade a small, tunable chance of unnecessary work (a false positive leading to a real check that turns up nothing) for a huge reduction in memory usage and lookup time compared to checking the real dataset directly — a very good trade when the real check (like a disk read) is expensive and most lookups are genuinely "not found."`,`You can never remove an item from a standard bloom filter once it's added (doing so could accidentally cause false negatives, which the whole structure promises to never produce) — if you need to support removals, you need a variant designed for it, or you need to periodically rebuild the filter from scratch.`]},

{cat:"DB", title:"Database Connection Pooling", def:`Opening a brand-new database connection is genuinely expensive — beyond the TCP/TLS handshakes covered in the Networking section, the database itself typically has to do its own setup work (in Postgres, this historically means forking an entire new process per connection). Doing this for every single query would be far too slow, so applications keep a pool of already-open, ready-to-use database connections and borrow/return them as needed, instead of opening a new one per request.

The database server also has a hard limit on how many connections it can accept at once (a `+"`max_connections`"+` setting). This creates a real, easy-to-hit scaling problem: if you have many application instances, and each one keeps its own local pool of, say, 20 connections, you can very quickly exhaust the database's total connection limit just by scaling out your application horizontally — long before the database's actual query capacity is the bottleneck.

The common fix is an external connection pooler (like PgBouncer for Postgres) that sits between your many application instances and the database. Instead of each app instance holding its own direct pool of database connections, they all connect to the pooler, and the pooler maintains a much smaller, shared pool of actual connections to the real database — multiplexing many application-side connections onto far fewer real database-side connections.`,
diagram:`<svg viewBox="0 0 560 170" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="90" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10.5" font-weight="600">50 app instances</text>
  <rect x="20" y="30" width="50" height="24" fill="var(--panel)" stroke="var(--border)"/>
  <text x="45" y="46" text-anchor="middle" fill="var(--text-dim)" font-size="7">×20 conns</text>
  <rect x="80" y="30" width="50" height="24" fill="var(--panel)" stroke="var(--border)"/>
  <text x="105" y="46" text-anchor="middle" fill="var(--text-dim)" font-size="7">×20 conns</text>
  <rect x="140" y="30" width="50" height="24" fill="var(--panel)" stroke="var(--border)"/>
  <text x="165" y="46" text-anchor="middle" fill="var(--text-dim)" font-size="7">...×48 more</text>
  <text x="105" y="72" text-anchor="middle" fill="var(--red)" font-size="8.5">1,000 potential connections</text>

  <line x1="105" y1="80" x2="280" y2="110" stroke="var(--border)" stroke-width="1.5" marker-end="url(#poolArrow)"/>
  <defs><marker id="poolArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <rect x="230" y="95" width="120" height="34" rx="5" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-width="2"/>
  <text x="290" y="116" text-anchor="middle" fill="var(--amber)" font-size="9">PgBouncer</text>

  <line x1="350" y1="112" x2="440" y2="112" stroke="var(--ledger)" stroke-width="2" marker-end="url(#poolArrow2)"/>
  <defs><marker id="poolArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ledger)"/></marker></defs>
  <rect x="445" y="90" width="100" height="44" rx="5" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="495" y="108" text-anchor="middle" fill="var(--ledger)" font-size="8.5">Database</text>
  <text x="495" y="122" text-anchor="middle" fill="var(--ledger)" font-size="8">max_connections=200</text>

  <text x="290" y="155" text-anchor="middle" fill="var(--text-faint)" font-size="8.5">many app-side connections multiplexed onto far fewer real DB connections</text>
</svg>`,
ex:`A fintech company runs 50 instances of their transaction service, each configured with a local pool of 20 database connections — that's 1,000 potential connections, but their database's `+"`max_connections`"+` is set to 200. Under load, instances start failing to get a database connection at all, even though the database's actual CPU and query capacity aren't close to being maxed out. Introducing PgBouncer between the app instances and the database lets all 50 instances share a much smaller pool of real connections, solving the exhaustion problem without needing to raise `+"`max_connections`"+` to a number the database can't actually handle efficiently.`,
trade:[`This problem gets dramatically worse in serverless/auto-scaling environments (like AWS Lambda), where the number of application instances can spike very quickly and unpredictably — each new instance potentially opening its own fresh set of connections — which is exactly the scenario external poolers are most critical for.`,`A pool that's too small causes requests to queue up waiting for a connection even when the database itself has spare capacity; a pool that's too large risks exhausting the database's connection limit — sizing needs to account for the number of application instances multiplied by their per-instance pool size, not just one instance in isolation.`,`Idle connections sitting in a pool for too long can also go stale or get silently closed by the database or a network device in between — a well-configured pool needs a reasonable idle timeout and a way to detect and discard dead connections rather than handing one out that will fail immediately.`]},

{cat:"DB", title:"Index Types: B-Tree vs Hash vs LSM-Tree", def:`Three different data structures a database can use to find rows quickly, each good at different things.

B-Tree — a balanced tree structure, and the default index type in most relational databases. Handles equality lookups, range queries ("between these two dates"), and sorted results all reasonably well. When in doubt, this is the right choice.

Hash index — turns a key into a location using a hash function. Extremely fast, but only for exact-match lookups ("find this exact ID") — it cannot answer a range query or return results in sorted order at all.

LSM-Tree (Log-Structured Merge-Tree) — built for very high write speed. New writes are first buffered in memory, then flushed to disk as sorted files that get merged together in the background over time. This is the structure behind write-heavy databases like Cassandra and RocksDB.`,
diagram:`<svg viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="240" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">B-Tree structure (simplified)</text>
  <rect x="205" y="30" width="70" height="34" rx="5" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="240" y="52" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">50</text>

  <line x1="220" y1="64" x2="120" y2="95" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="260" y1="64" x2="360" y2="95" stroke="var(--border)" stroke-width="1.5"/>

  <rect x="85" y="97" width="70" height="34" rx="5" fill="var(--blue)" fill-opacity="0.2" stroke="var(--blue)" stroke-width="2"/>
  <text x="120" y="119" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">20</text>
  <rect x="325" y="97" width="70" height="34" rx="5" fill="var(--blue)" fill-opacity="0.2" stroke="var(--blue)" stroke-width="2"/>
  <text x="360" y="119" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">80</text>

  <line x1="105" y1="131" x2="60" y2="160" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="135" y1="131" x2="180" y2="160" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="345" y1="131" x2="300" y2="160" stroke="var(--border)" stroke-width="1.5"/>
  <line x1="375" y1="131" x2="420" y2="160" stroke="var(--border)" stroke-width="1.5"/>

  <rect x="30" y="162" width="60" height="30" rx="4" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="60" y="182" text-anchor="middle" fill="var(--text)" font-size="11">5,10</text>
  <rect x="150" y="162" width="60" height="30" rx="4" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="180" y="182" text-anchor="middle" fill="var(--text)" font-size="11">25,30</text>
  <rect x="270" y="162" width="60" height="30" rx="4" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="300" y="182" text-anchor="middle" fill="var(--text)" font-size="11">60,70</text>
  <rect x="390" y="162" width="60" height="30" rx="4" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="420" y="182" text-anchor="middle" fill="var(--text)" font-size="11">90,99</text>
</svg>`,
ex:`A B-Tree index on `+"`created_at`"+` efficiently serves "transactions in the last 24 hours" (a range query). A hash index on an exact idempotency-key lookup table serves "does this exact key exist" lookups slightly faster than a B-Tree, but couldn't serve a "keys created between X and Y" query at all. A high-volume event-ingestion store built on an LSM-tree (e.g., Cassandra) sustains far higher write throughput than a B-Tree-based relational table under the same load, at the cost of read amplification (may need to check multiple files) and background compaction overhead.`,
trade:[`B-Tree is the right general-purpose default — supports the widest range of query patterns and is what you get automatically in Postgres/MySQL unless you specify otherwise.`,`Hash indexes are a narrow optimization (equality-only) that's rarely worth the specialization unless you've profiled a genuine equality-lookup bottleneck — and many databases restrict what operations they even support on a hash index (e.g., historically not crash-safe replication in some engines).`,`LSM-trees trade read performance and operational complexity (compaction tuning) for write throughput — the right choice when your workload is write-heavy and append-like (event logs, time-series) rather than read-heavy or update-heavy.`]},

// ---------------- CORE PRINCIPLES ----------------
{cat:"CP", title:"SOLID Principles", def:`Five guidelines for writing OOP code that stays easy to maintain as it grows. Each letter is its own rule:

S — Single Responsibility: a class should have only one reason to change. If a class handles both "calculate the fee" and "send the email receipt," a change to email formatting shouldn't risk breaking fee calculation.

O — Open/Closed: you should be able to add new behavior without modifying existing, already-tested code. Instead of editing a class every time there's a new case, you extend it (e.g., by adding a new implementation of an interface).

L — Liskov Substitution: anywhere the code expects the base type, a subtype should work correctly as a drop-in replacement, without surprising behavior.

I — Interface Segregation: it's better to have several small, specific interfaces than one giant interface that forces classes to implement methods they don't actually need.

D — Dependency Inversion: code should depend on an abstraction (an interface), not on a specific concrete implementation — so the concrete implementation can be swapped out later.`,
diagram:`<svg viewBox="0 0 560 120" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="10" y="30" width="100" height="50" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="60" y="52" text-anchor="middle" fill="var(--ledger)" font-size="16" font-weight="700">S</text>
  <text x="60" y="68" text-anchor="middle" fill="var(--text-faint)" font-size="6.5">one reason to change</text>
  <rect x="120" y="30" width="100" height="50" rx="6" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-width="2"/>
  <text x="170" y="52" text-anchor="middle" fill="var(--amber)" font-size="16" font-weight="700">O</text>
  <text x="170" y="68" text-anchor="middle" fill="var(--text-faint)" font-size="6.5">extend, don't edit</text>
  <rect x="230" y="30" width="100" height="50" rx="6" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)" stroke-width="2"/>
  <text x="280" y="52" text-anchor="middle" fill="var(--red)" font-size="16" font-weight="700">L</text>
  <text x="280" y="68" text-anchor="middle" fill="var(--text-faint)" font-size="6.5">subtypes drop in cleanly</text>
  <rect x="340" y="30" width="100" height="50" rx="6" fill="var(--text)" fill-opacity="0.1" stroke="var(--border)" stroke-width="2"/>
  <text x="390" y="52" text-anchor="middle" fill="var(--text)" font-size="16" font-weight="700">I</text>
  <text x="390" y="68" text-anchor="middle" fill="var(--text-faint)" font-size="6.5">small, specific interfaces</text>
  <rect x="450" y="30" width="100" height="50" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="500" y="52" text-anchor="middle" fill="var(--ledger)" font-size="16" font-weight="700">D</text>
  <text x="500" y="68" text-anchor="middle" fill="var(--text-faint)" font-size="6.5">depend on abstractions</text>
</svg>`,
ex:`A `+"`PaymentProcessor`"+` interface (Dependency Inversion) lets you swap between Stripe, Adyen, or a mock implementation in tests without changing the calling code. Splitting `+"`FraudCheck`"+` and `+"`TransactionLogger`"+` into separate classes rather than one giant `+"`PaymentHandler`"+` follows Single Responsibility.`,
trade:[`Improves testability and reduces ripple effects when requirements change, but over-applying SOLID (excessive abstraction/interfaces for things that never vary) adds indirection with no real benefit — apply pragmatically, not dogmatically.`]},

{cat:"CP", title:"ACID", def:`ACID is a set of four guarantees a traditional database transaction gives you.

Atomicity — all the steps in a transaction happen together, or none of them do. No partial results.

Consistency — a transaction can only move the database from one valid state to another valid state, according to your defined rules (like "balance can never go negative").

Isolation — transactions running at the same time don't interfere with each other, to whatever degree your chosen isolation level guarantees.

Durability — once a transaction is confirmed as committed, it survives even a crash right after — the data is safely and permanently saved.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="10" y="30" width="130" height="60" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="75" y="55" text-anchor="middle" fill="var(--ledger)" font-size="14" font-weight="700">A</text>
  <text x="75" y="72" text-anchor="middle" fill="var(--text-dim)" font-size="7.5">all-or-nothing</text>
  <rect x="150" y="30" width="130" height="60" rx="6" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-width="2"/>
  <text x="215" y="55" text-anchor="middle" fill="var(--amber)" font-size="14" font-weight="700">C</text>
  <text x="215" y="72" text-anchor="middle" fill="var(--text-dim)" font-size="7.5">valid state → valid state</text>
  <rect x="290" y="30" width="130" height="60" rx="6" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)" stroke-width="2"/>
  <text x="355" y="55" text-anchor="middle" fill="var(--red)" font-size="14" font-weight="700">I</text>
  <text x="355" y="72" text-anchor="middle" fill="var(--text-dim)" font-size="7.5">concurrent txns don't interfere</text>
  <rect x="430" y="30" width="130" height="60" rx="6" fill="var(--text)" fill-opacity="0.1" stroke="var(--border)" stroke-width="2"/>
  <text x="495" y="55" text-anchor="middle" fill="var(--text)" font-size="14" font-weight="700">D</text>
  <text x="495" y="72" text-anchor="middle" fill="var(--text-dim)" font-size="7.5">survives a crash after commit</text>
</svg>`,
ex:`A transfer debiting Account A and crediting Account B must be atomic — if the credit fails after the debit succeeds, the whole transaction rolls back rather than leaving money "lost" in transit.`,
trade:[`ACID within a single database is well-understood and battle-tested, but doesn't extend cleanly across microservices with separate databases — that's where sagas/outbox patterns take over instead of distributed ACID transactions.`]},

{cat:"CP", title:"BASE", def:`BASE is an alternative set of guarantees to ACID, for systems that would rather stay available and scale easily than guarantee instant consistency.

Basically Available — the system tries to always respond, even if that response isn't guaranteed to be the very latest data.

Soft state — the system's state can change over time even without new input, simply as it catches up and settles into consistency across replicas.

Eventual consistency — if you stop sending new writes, the system will eventually settle into a consistent state on its own — just not necessarily right away.`,
diagram:`<svg viewBox="0 0 560 120" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="10" y="25" width="170" height="60" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="95" y="48" text-anchor="middle" fill="var(--ledger)" font-size="10" font-weight="600">Basically Available</text>
  <text x="95" y="65" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">always responds, maybe not latest</text>
  <rect x="195" y="25" width="170" height="60" rx="6" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-width="2"/>
  <text x="280" y="48" text-anchor="middle" fill="var(--amber)" font-size="10" font-weight="600">Soft State</text>
  <text x="280" y="65" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">changes even without new input</text>
  <rect x="380" y="25" width="170" height="60" rx="6" fill="var(--text)" fill-opacity="0.1" stroke="var(--border)" stroke-width="2"/>
  <text x="465" y="48" text-anchor="middle" fill="var(--text)" font-size="10" font-weight="600">Eventual Consistency</text>
  <text x="465" y="65" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">settles down once writes stop</text>
</svg>`,
ex:`A notification-preferences service can be BASE: if a user updates their email preference, it's fine if it takes a few seconds to propagate to all regions — no financial correctness is at stake.`,
trade:[`Enables much higher availability and horizontal scale, but requires the business logic to tolerate temporary inconsistency — never appropriate for the core balance/ledger write path in fintech, but often fine for everything around it.`]},

{cat:"CP", title:"Domain-Driven Design (DDD)", def:`An approach to modeling a complex business domain so the code actually matches how the business really thinks about it.

Bounded Context — a clear boundary around where a particular model and vocabulary apply. The word "Account" might mean something slightly different in the Payments context than in the Support context, and that's fine as long as each context is explicit about its own meaning.

Ubiquitous Language — a shared vocabulary that both engineers and business/domain experts use consistently, so a word means the same thing in a conversation as it does in the code.

Aggregate — a cluster of related objects that are always changed together as one unit, with a single "Aggregate Root" object that's the only entry point allowed to change anything inside it — this is what protects business rules from being bypassed.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="20" width="240" height="110" rx="8" fill="none" stroke="var(--ledger)" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="140" y="38" text-anchor="middle" fill="var(--ledger)" font-size="10" font-weight="600">Payments Bounded Context</text>
  <rect x="60" y="55" width="160" height="60" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="140" y="78" text-anchor="middle" fill="var(--ledger)" font-size="9" font-weight="600">Account (Aggregate Root)</text>
  <text x="140" y="95" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">owns the balance invariant</text>
  <text x="140" y="107" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">only entry point for changes</text>

  <rect x="300" y="20" width="240" height="110" rx="8" fill="none" stroke="var(--amber)" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="420" y="38" text-anchor="middle" fill="var(--amber)" font-size="10" font-weight="600">Support Bounded Context</text>
  <rect x="340" y="55" width="160" height="60" rx="6" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-width="2"/>
  <text x="420" y="80" text-anchor="middle" fill="var(--amber)" font-size="9" font-weight="600">"Account" means</text>
  <text x="420" y="95" text-anchor="middle" fill="var(--amber)" font-size="9" font-weight="600">something different here</text>
</svg>`,
ex:`"Account" is an Aggregate Root that owns its balance invariant (never negative, per business rule) — all changes to balance must go through the Account aggregate's methods, never by directly updating a database row from outside its boundary. "Payments" and "Risk" might be separate Bounded Contexts with their own definition of what a "Transaction" even means.`,
trade:[`Gives clear ownership boundaries and protects invariants, but is overkill for simple CRUD services — best applied where the business logic is genuinely complex (which most core fintech domains are).`]},

{cat:"CP", title:"CQRS (Command Query Responsibility Segregation)", def:`Separate the write model (commands that change state, optimized for correctness/consistency) from the read model (queries, optimized for fast, denormalized reads) — often backed by different data stores kept in sync asynchronously.`,
diagram:`<svg viewBox="0 0 480 180" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="60" width="100" height="45" rx="6" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="70" y="87" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Client</text>

  <line x1="120" y1="70" x2="170" y2="45" stroke="var(--ledger)" stroke-width="2" marker-end="url(#cq-g)"/>
  <text x="145" y="35" fill="var(--ledger)" font-size="10" font-weight="600">Command</text>
  <rect x="175" y="20" width="130" height="50" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="240" y="42" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Write Model</text>
  <text x="240" y="58" text-anchor="middle" fill="var(--text-dim)" font-size="9.5">strongly consistent</text>

  <line x1="120" y1="95" x2="170" y2="120" stroke="var(--blue)" stroke-width="2" marker-end="url(#cq-b)"/>
  <text x="145" y="135" fill="var(--blue)" font-size="10" font-weight="600">Query</text>
  <rect x="175" y="105" width="130" height="50" rx="6" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)" stroke-width="2"/>
  <text x="240" y="127" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Read Model</text>
  <text x="240" y="143" text-anchor="middle" fill="var(--text-dim)" font-size="9.5">fast, denormalized</text>

  <path d="M305,45 Q360,80 305,120" fill="none" stroke="var(--amber)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#cq-a)"/>
  <text x="380" y="85" text-anchor="middle" fill="var(--amber)" font-size="10" font-weight="600">async sync</text>

  <text x="240" y="175" text-anchor="middle" fill="var(--text-faint)" font-size="10.5">Read model may lag slightly behind the write model</text>

  <defs>
    <marker id="cq-g" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--ledger)"/></marker>
    <marker id="cq-b" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--blue)"/></marker>
    <marker id="cq-a" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--amber)"/></marker>
  </defs>
</svg>`,
ex:`Transfers are written to a strongly consistent ledger table (command side). A denormalized "account summary" read model, updated asynchronously from ledger events, powers the fast dashboard view — so dashboard load doesn't compete with transaction-processing load on the same tables.`,
trade:[`Decouples read and write scaling and lets each be optimized independently, but introduces eventual consistency between write and read models — the dashboard might lag the true balance by seconds, which must be an acceptable and clearly communicated trade for that specific view.`,`Adds real architectural complexity (two models, a sync mechanism) — don't reach for CQRS until read/write scaling or modeling needs actually diverge.`]},

{cat:"CP", title:"Event Sourcing", def:`Instead of storing only current state, store the full sequence of events that led to it; current state is derived by replaying events (optionally accelerated with periodic snapshots).`,
diagram:`<svg viewBox="0 0 480 160" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="240" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Event log for Account #42</text>
  <rect x="20" y="35" width="100" height="40" rx="5" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="70" y="53" text-anchor="middle" fill="var(--text)" font-size="10.5" font-weight="600">Deposited</text>
  <text x="70" y="66" text-anchor="middle" fill="var(--text-dim)" font-size="9">+100</text>

  <line x1="120" y1="55" x2="145" y2="55" stroke="var(--border)" stroke-width="1.5" marker-end="url(#es-x)"/>

  <rect x="150" y="35" width="100" height="40" rx="5" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)" stroke-width="2"/>
  <text x="200" y="53" text-anchor="middle" fill="var(--text)" font-size="10.5" font-weight="600">Withdrew</text>
  <text x="200" y="66" text-anchor="middle" fill="var(--text-dim)" font-size="9">-30</text>

  <line x1="250" y1="55" x2="275" y2="55" stroke="var(--border)" stroke-width="1.5" marker-end="url(#es-x)"/>

  <rect x="280" y="35" width="100" height="40" rx="5" fill="var(--amber)" fill-opacity="0.18" stroke="var(--amber)" stroke-width="2"/>
  <text x="330" y="53" text-anchor="middle" fill="var(--text)" font-size="10.5" font-weight="600">Deposited</text>
  <text x="330" y="66" text-anchor="middle" fill="var(--text-dim)" font-size="9">+50</text>

  <line x1="330" y1="80" x2="330" y2="105" stroke="var(--violet)" stroke-width="2" marker-end="url(#es-v)"/>
  <text x="330" y="98" text-anchor="middle" fill="var(--violet)" font-size="10" font-weight="600">replay/sum</text>

  <rect x="230" y="108" width="200" height="40" rx="6" fill="var(--violet)" fill-opacity="0.15" stroke="var(--violet)" stroke-width="2"/>
  <text x="330" y="133" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="700">Current balance = 120</text>

  <defs>
    <marker id="es-x" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--text-faint)"/></marker>
    <marker id="es-v" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--violet)"/></marker>
  </defs>
</svg>`,
ex:`Instead of an `+"`accounts.balance`"+` column that's mutated in place, store every `+"`MoneyDeposited`"+`/`+"`MoneyWithdrawn`"+` event; the current balance is the sum of all events, giving you a complete, naturally immutable audit trail for free — a very natural fit with double-entry ledger requirements.`,
trade:[`Gives a perfect audit trail and the ability to replay/rebuild state (or new projections) from history — extremely valuable for regulated financial systems.`,`Querying current state requires replay or maintained snapshots/projections (often paired with CQRS), adding architectural complexity versus just reading a mutable row.`]},

{cat:"CP", title:"Microservices vs SOA vs Monolith", def:`Three ways to structure how an application is built and deployed.

Monolith — one single deployable unit, usually with a shared codebase and often a shared database. Simplest to build and deploy at first.

SOA (Service-Oriented Architecture) — services are split up but still share some infrastructure and contracts, often communicating through a central enterprise service bus.

Microservices — services are fully independent: each one is deployed on its own, and each one owns its own database, communicating with others only over the network.`,
diagram:`<svg viewBox="0 0 545 170" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="80" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Monolith</text>
  <rect x="20" y="30" width="120" height="90" rx="6" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <line x1="20" y1="60" x2="140" y2="60" stroke="var(--border)"/>
  <line x1="20" y1="90" x2="140" y2="90" stroke="var(--border)"/>
  <text x="80" y="48" text-anchor="middle" fill="var(--text)" font-size="10">Payments</text>
  <text x="80" y="78" text-anchor="middle" fill="var(--text)" font-size="10">Risk</text>
  <text x="80" y="108" text-anchor="middle" fill="var(--text)" font-size="10">1 shared DB</text>

  <text x="260" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">SOA</text>
  <rect x="200" y="30" width="70" height="30" rx="5" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)"/>
  <text x="235" y="49" text-anchor="middle" fill="var(--text)" font-size="9.5">Payments</text>
  <rect x="280" y="30" width="70" height="30" rx="5" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)"/>
  <text x="315" y="49" text-anchor="middle" fill="var(--text)" font-size="9.5">Risk</text>
  <rect x="200" y="75" width="150" height="30" rx="5" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="275" y="94" text-anchor="middle" fill="var(--text)" font-size="9.5">Enterprise Service Bus</text>
  <line x1="235" y1="60" x2="260" y2="75" stroke="var(--border)"/>
  <line x1="315" y1="60" x2="290" y2="75" stroke="var(--border)"/>

  <text x="440" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Microservices</text>
  <rect x="380" y="30" width="70" height="35" rx="5" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
  <text x="415" y="50" text-anchor="middle" fill="var(--text)" font-size="9.5">Payments</text>
  <text x="415" y="62" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">own DB</text>
  <rect x="460" y="30" width="70" height="35" rx="5" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
  <text x="495" y="50" text-anchor="middle" fill="var(--text)" font-size="9.5">Risk</text>
  <text x="495" y="62" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">own DB</text>
  <line x1="450" y1="47" x2="460" y2="47" stroke="var(--ledger)" stroke-width="1.5"/>
  <text x="455" y="90" text-anchor="middle" fill="var(--text-faint)" font-size="8">network calls only</text>

  <text x="260" y="150" text-anchor="middle" fill="var(--text-faint)" font-size="10.5">Coupling decreases left → right; operational complexity increases left → right</text>
</svg>`,
ex:`Splitting "Payments," "Risk," and "Ledger" into separate microservices lets each team deploy independently and scale the ledger service separately from the (spikier) risk-scoring service — but now a single logical transaction may need a saga instead of one local ACID transaction.`,
trade:[`Microservices give independent deployability and scaling, but introduce distributed-systems complexity (network failures, distributed transactions, versioning) that a monolith simply doesn't have.`,`A shared database between "microservices" is a common anti-pattern — it looks like microservices but keeps the tight coupling of a monolith without the deployment benefits.`,`Starting with a well-modularized monolith and extracting services only where scaling/team boundaries demand it is often more pragmatic than microservices from day one.`]},

{cat:"CP", title:"OOP Fundamentals", def:`The core ideas behind object-oriented programming.

Encapsulation — keeping an object's data together with the methods that operate on it, and hiding the internal details behind a controlled interface, so outside code can't reach in and set things directly.

Inheritance — a subtype reuses and extends the behavior of a supertype, instead of rewriting it from scratch.

Polymorphism — different types can respond to the exact same method call, each in their own way, so the calling code doesn't need to know exactly which type it's dealing with.

Abstraction — showing only what's relevant to the outside world, and hiding the messy implementation details behind it.

Composition over inheritance — a modern preference for building behavior by combining several smaller, focused objects together, rather than building one long chain of "is-a" inheritance relationships.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="120" y="18" text-anchor="middle" fill="var(--red)" font-size="10" font-weight="600">Inheritance chain — brittle</text>
  <rect x="60" y="30" width="120" height="24" fill="var(--panel)" stroke="var(--border)"/>
  <text x="120" y="46" text-anchor="middle" fill="var(--text-dim)" font-size="8">Account</text>
  <line x1="120" y1="54" x2="120" y2="66" stroke="var(--red)" stroke-width="1.5"/>
  <rect x="60" y="68" width="120" height="24" fill="var(--red)" fill-opacity="0.12" stroke="var(--red)"/>
  <text x="120" y="84" text-anchor="middle" fill="var(--red)" font-size="8">SavingsAccount</text>
  <text x="120" y="105" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">changing the base ripples down</text>

  <text x="420" y="18" text-anchor="middle" fill="var(--ledger)" font-size="10" font-weight="600">Composition — flexible</text>
  <rect x="360" y="30" width="120" height="24" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)"/>
  <text x="420" y="46" text-anchor="middle" fill="var(--ledger)" font-size="8">Account</text>
  <line x1="420" y1="54" x2="420" y2="66" stroke="var(--ledger)" stroke-width="1.5"/>
  <rect x="360" y="68" width="120" height="24" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)"/>
  <text x="420" y="84" text-anchor="middle" fill="var(--amber)" font-size="8">has-a FraudChecker</text>
  <text x="420" y="105" text-anchor="middle" fill="var(--text-faint)" font-size="7.5">swap the strategy independently</text>
</svg>`,
ex:`An `+"`Account`"+` class encapsulates its balance (private field, only modifiable through controlled methods that enforce invariants like "never negative") rather than exposing a public mutable field anyone could set directly, bypassing business rules.`,
trade:[`Deep inheritance hierarchies often become brittle as requirements evolve (changing a base class ripples unpredictably to every subclass) — composition (e.g., injecting a `+"`FraudChecker`"+` strategy into an `+"`Account`"+` rather than subclassing `+"`Account`"+` per fraud policy) is usually more flexible and is the modern default preference.`]},

// ---------------- RELIABILITY & STABILITY ----------------
{cat:"RS", title:"Zero-Downtime Deployment", def:`Ways to release new code without any customer-visible interruption.

Rolling deployment — replace instances one (or a few) at a time behind a load balancer, so there's always a working set of instances handling traffic while others update.

Blue-green — run the old version ("blue") and new version ("green") fully side by side, then switch all traffic over in one atomic step. Rolling back just means switching back.

Canary — send a small percentage of real traffic to the new version first, watch it closely for problems, and only ramp up to 100% once you're confident it's healthy.

Feature flags (dark launches) — a different angle on the same problem: instead of controlling the rollout at the infrastructure level (which servers get the new code), ship the new code to everyone, but keep the new behavior hidden behind a flag/toggle that's initially off. This decouples "deploying code" from "turning on a feature" entirely — you can deploy safely at any time, then turn the feature on for a small percentage of users (or turn it back off instantly, without a redeploy) whenever you're ready.`,
diagram:`<svg viewBox="0 0 480 180" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="120" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Canary</text>
  <rect x="20" y="30" width="200" height="30" rx="5" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
  <rect x="20" y="30" width="10" height="30" fill="var(--amber)"/>
  <text x="120" y="50" text-anchor="middle" fill="var(--text)" font-size="10">95% old · 5% new (watched closely)</text>

  <text x="360" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Blue-Green</text>
  <rect x="260" y="30" width="90" height="40" rx="5" fill="var(--blue)" fill-opacity="0.2" stroke="var(--blue)"/>
  <text x="305" y="53" text-anchor="middle" fill="var(--text)" font-size="10">Blue (live)</text>
  <rect x="360" y="30" width="90" height="40" rx="5" fill="var(--panel-2)" stroke="var(--border)" stroke-dasharray="3,3"/>
  <text x="405" y="53" text-anchor="middle" fill="var(--text-dim)" font-size="10">Green (idle)</text>
  <line x1="352" y1="50" x2="358" y2="50" stroke="var(--text-faint)" stroke-width="1"/>
  <text x="355" y="40" text-anchor="middle" fill="var(--text-faint)" font-size="8">switch →</text>

  <text x="240" y="105" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Feature Flag (dark launch)</text>
  <rect x="120" y="118" width="240" height="40" rx="6" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="240" y="135" text-anchor="middle" fill="var(--text)" font-size="10">All servers run new code</text>
  <text x="240" y="150" text-anchor="middle" fill="var(--amber)" font-size="9.5" font-weight="600">flag=off for 95% · flag=on for 5%</text>

  <text x="240" y="175" text-anchor="middle" fill="var(--text-faint)" font-size="10">Flag toggles instantly — no redeploy needed to turn a feature off</text>
</svg>`,
ex:`A canary release routes 5% of payment traffic to the new version of the transaction service; error rates and latency are compared against the baseline before ramping to 100% — catching a regression while it only affects a small fraction of transactions. Separately, a new fraud-scoring algorithm might be deployed to 100% of servers immediately but kept behind a feature flag that's only enabled for 1% of transactions at first — letting the team turn it off instantly (a config change, not a rollback deploy) the moment something looks wrong.`,
trade:[`Canary/blue-green give strong safety nets but require running extra infrastructure temporarily and good automated comparison metrics — without solid observability, a canary is just "hope you notice the dashboard in time."`,`Database schema changes need their own compatible strategy (expand-contract) since you can't blue-green a shared database the same way as stateless app servers.`,`Feature flags decouple deployment risk from feature risk (a huge win — turning a feature off is instant, while rolling back a deploy takes time), but flags left in code long after they're no longer needed pile up as clutter and hidden complexity — a real discipline is required to clean up flags once a feature is fully rolled out and stable.`]},

{cat:"RS", title:"Circuit Breaker", def:`Wraps calls to a potentially-failing dependency; after enough failures, it "opens" and fails fast without even attempting the call for a cooldown period, then "half-opens" to test if the dependency has recovered before fully closing again.`,
diagram:`<svg viewBox="0 0 520 380" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <circle cx="120" cy="90" r="60" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="120" y="85" text-anchor="middle" fill="var(--text)" font-size="16" font-weight="700">Closed</text>
  <text x="120" y="103" text-anchor="middle" fill="var(--text-dim)" font-size="11">calls flow normally</text>

  <circle cx="400" cy="90" r="60" fill="var(--red)" fill-opacity="0.18" stroke="var(--red)" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" fill="var(--text)" font-size="16" font-weight="700">Open</text>
  <text x="400" y="103" text-anchor="middle" fill="var(--text-dim)" font-size="11">fails fast, no calls made</text>

  <circle cx="260" cy="290" r="60" fill="var(--amber)" fill-opacity="0.18" stroke="var(--amber)" stroke-width="2"/>
  <text x="260" y="285" text-anchor="middle" fill="var(--text)" font-size="16" font-weight="700">Half-Open</text>
  <text x="260" y="303" text-anchor="middle" fill="var(--text-dim)" font-size="11">one test call allowed</text>

  <path d="M180,80 Q260,50 340,80" fill="none" stroke="var(--red)" stroke-width="2" marker-end="url(#cb-r)"/>
  <text x="260" y="45" text-anchor="middle" fill="var(--red)" font-size="12" font-weight="600">failure threshold exceeded</text>

  <path d="M370,145 Q320,220 290,240" fill="none" stroke="var(--amber)" stroke-width="2" marker-end="url(#cb-a)"/>
  <text x="400" y="200" text-anchor="middle" fill="var(--amber)" font-size="12" font-weight="600">cooldown timeout elapses</text>

  <path d="M210,255 Q160,180 130,150" fill="none" stroke="var(--ledger)" stroke-width="2" marker-end="url(#cb-g)"/>
  <text x="110" y="200" text-anchor="middle" fill="var(--ledger)" font-size="12" font-weight="600">test call succeeds</text>

  <path d="M310,255 Q360,180 390,150" fill="none" stroke="var(--red)" stroke-width="2" marker-end="url(#cb-r2)"/>
  <text x="410" y="200" text-anchor="middle" fill="var(--red)" font-size="12" font-weight="600">test call fails</text>

  <defs>
    <marker id="cb-r" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="var(--red)"/></marker>
    <marker id="cb-r2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="var(--red)"/></marker>
    <marker id="cb-a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="var(--amber)"/></marker>
    <marker id="cb-g" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="var(--ledger)"/></marker>
  </defs>
</svg>`,
ex:`Calls to a third-party fraud-scoring API start timing out; the circuit breaker opens after a failure threshold, so subsequent payment requests fail fast (or fall back to a default risk score) instead of every request hanging for the full timeout and piling up threads.`,
trade:[`Prevents resource exhaustion and cascading failure from a struggling dependency, but requires a sensible fallback behavior (fail fast? default value? queue for later?) — the fallback choice has real business implications, especially for financial decisions.`,`Poorly tuned thresholds can cause a breaker to open on transient blips, unnecessarily degrading service — needs tuning against real traffic patterns.`]},

{cat:"RS", title:"Retry with Backoff & Jitter", def:`Retrying a failed operation after a delay that grows exponentially (backoff), with randomization added (jitter) so that many clients retrying the same failure don't all retry at the exact same moment and create a synchronized thundering herd.`,
diagram:`<svg viewBox="0 0 460 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <line x1="20" y1="100" x2="440" y2="100" stroke="var(--border)" stroke-width="2"/>
  <circle cx="30" cy="100" r="6" fill="var(--red)"/>
  <text x="30" y="120" text-anchor="middle" fill="var(--text-faint)" font-size="9">fail</text>
  <circle cx="70" cy="100" r="6" fill="var(--amber)"/>
  <text x="70" y="120" text-anchor="middle" fill="var(--text-faint)" font-size="9">~1s</text>
  <circle cx="150" cy="100" r="6" fill="var(--amber)"/>
  <text x="150" y="120" text-anchor="middle" fill="var(--text-faint)" font-size="9">~2s</text>
  <circle cx="300" cy="100" r="6" fill="var(--amber)"/>
  <text x="300" y="120" text-anchor="middle" fill="var(--text-faint)" font-size="9">~4s</text>
  <path d="M40,90 Q55,70 65,90" fill="none" stroke="var(--text-faint)" stroke-width="1" stroke-dasharray="2,2"/>
  <path d="M80,90 Q115,60 140,90" fill="none" stroke="var(--text-faint)" stroke-width="1" stroke-dasharray="2,2"/>
  <path d="M160,90 Q230,50 290,90" fill="none" stroke="var(--text-faint)" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="230" y="30" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Gap doubles each retry, plus a little random jitter</text>
</svg>`,
ex:`A client's call to the payment gateway times out; instead of retrying immediately (which could hit the gateway again while it's still overloaded), it waits ~1s, then ~2s, then ~4s, each with random jitter, spreading retry load out over time.`,
trade:[`Essential for resilience against transient failures, but retries must be paired with idempotency — retrying a non-idempotent payment call without a dedup key risks a double charge.`,`Backoff without jitter can still synchronize retries across many clients that failed at the same moment — jitter is not optional at scale.`]},

{cat:"RS", title:"Rate Limiting Algorithms", def:`Different ways to cap how many requests are allowed in a given time period.

Token bucket — a bucket refills with tokens at a steady rate, and every request spends one token. This naturally allows short bursts (if the bucket is full) while still enforcing a steady long-term rate.

Leaky bucket — the opposite framing: requests go into a bucket that "leaks" out at a fixed steady rate, smoothing bursts into an even output regardless of how bursty the input was.

Fixed window — count requests in fixed time blocks (like "0-60 seconds," "60-120 seconds"). Simple, but a burst right at the boundary between two windows can let through nearly double the intended rate.

Sliding window — a more accurate version of fixed window that looks at a continuously moving time range instead of fixed blocks, avoiding that boundary-burst problem.`,
diagram:`<svg viewBox="0 0 420 170" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="210" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">Token Bucket</text>
  <path d="M150,30 L270,30 L280,140 Q210,155 140,140 Z" fill="none" stroke="var(--border)" stroke-width="2"/>
  <rect x="150" y="60" width="120" height="75" fill="var(--ledger)" fill-opacity="0.35" clip-path="inset(0 0 0 0)"/>
  <text x="80" y="30" fill="var(--ledger)" font-size="11" font-weight="600">refills steadily →</text>
  <line x1="130" y1="35" x2="150" y2="45" stroke="var(--ledger)" stroke-width="2" marker-end="url(#tb-g)"/>

  <text x="330" y="60" fill="var(--amber)" font-size="11" font-weight="600">← request</text>
  <text x="330" y="75" fill="var(--amber)" font-size="10">spends 1 token</text>
  <line x1="325" y1="65" x2="282" y2="80" stroke="var(--amber)" stroke-width="2" marker-end="url(#tb-a)"/>

  <text x="210" y="163" text-anchor="middle" fill="var(--text-faint)" font-size="10.5">Full bucket = burst capacity. Empty bucket = requests wait or get rejected.</text>

  <defs>
    <marker id="tb-g" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--ledger)"/></marker>
    <marker id="tb-a" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--amber)"/></marker>
  </defs>
</svg>`,
ex:`A public payments API uses a token bucket per API key, allowing short bursts (e.g., a retry storm from a legitimate client) while enforcing a steady long-term rate, rejecting or queuing requests beyond the limit with a `+"`429`"+` and a `+"`Retry-After`"+` header.`,
trade:[`Fixed window is simplest to implement but allows up to 2x the intended rate right at window boundaries.`,`Sliding window/token bucket are more accurate but require more state (timestamps or token counts) to track, especially in a distributed rate limiter shared across many app instances.`,`Distributed rate limiting needs a shared store (Redis) — adds a dependency and potential latency to every rate-limited request.`]},

{cat:"RS", title:"Bulkhead Pattern", def:`Named after ship compartments that contain flooding — isolate resource pools (thread pools, connection pools) per dependency so that one overwhelmed dependency can't exhaust resources needed by unrelated parts of the system.`,
diagram:`<svg viewBox="0 0 440 160" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="30" width="130" height="100" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="85" y="55" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">Payment pool</text>
  <text x="85" y="72" text-anchor="middle" fill="var(--ledger)" font-size="10">✓ healthy</text>

  <line x1="150" y1="80" x2="170" y2="80" stroke="var(--border)" stroke-width="3"/>

  <rect x="170" y="30" width="130" height="100" rx="6" fill="var(--red)" fill-opacity="0.15" stroke="var(--red)" stroke-width="2"/>
  <text x="235" y="55" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">Notification pool</text>
  <text x="235" y="72" text-anchor="middle" fill="var(--red)" font-size="10" font-weight="600">overwhelmed ✗</text>

  <line x1="300" y1="80" x2="320" y2="80" stroke="var(--border)" stroke-width="3"/>

  <rect x="320" y="30" width="100" height="100" rx="6" fill="var(--blue)" fill-opacity="0.15" stroke="var(--blue)" stroke-width="2"/>
  <text x="370" y="55" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">Reporting pool</text>
  <text x="370" y="72" text-anchor="middle" fill="var(--blue)" font-size="10">✓ healthy</text>

  <text x="220" y="150" text-anchor="middle" fill="var(--text-faint)" font-size="10.5">Bulkheads (the walls) stop trouble from spreading between compartments</text>
</svg>`,
ex:`Calls to the (occasionally slow) merchant-notification service use a separate, smaller thread pool from the core payment-processing path, so notification slowness can't starve threads needed for actually completing payments.`,
trade:[`Contains failure blast radius effectively, but requires more careful capacity planning (sizing multiple pools) than one shared pool — and a pool that's too small for its dependency becomes its own bottleneck.`]},

{cat:"RS", title:"Observability: Metrics, Logs, Traces", def:`Three complementary tools for understanding what's happening inside a running system.

Metrics — aggregated numbers over time, like request rate, error rate, and latency (often called the "RED method"). Good for spotting *that* something is wrong and *when* it started.

Logs — individual, timestamped records of specific events, ideally structured (consistent fields) and tagged with a request/trace ID so you can find every log line related to one specific request. Good for understanding *why* something went wrong, in detail.

Traces — the full path a single request took as it traveled across multiple services, showing exactly how much time was spent in each one. Good for finding *where* in a chain of services the problem actually happened.`,
diagram:`<svg viewBox="0 0 560 170" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="90" y="20" text-anchor="middle" fill="var(--ledger)" font-size="11" font-weight="600">Metrics — WHAT &amp; WHEN</text>
  <path d="M20,80 L45,75 L70,60 L95,68 L120,45 L145,55 L170,40" fill="none" stroke="var(--ledger)" stroke-width="2"/>
  <line x1="120" y1="30" x2="120" y2="90" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="120" y="105" text-anchor="middle" fill="var(--red)" font-size="8">spike at 2:14pm</text>

  <text x="335" y="20" text-anchor="middle" fill="var(--amber)" font-size="11" font-weight="600">Traces — WHERE</text>
  <rect x="230" y="35" width="60" height="16" fill="var(--panel-2)" stroke="var(--border)"/>
  <text x="260" y="46" text-anchor="middle" fill="var(--text-dim)" font-size="7">gateway</text>
  <rect x="300" y="35" width="140" height="16" fill="var(--red)" fill-opacity="0.3" stroke="var(--red)"/>
  <text x="370" y="46" text-anchor="middle" fill="var(--red)" font-size="7">fraud-check: 800ms</text>
  <rect x="230" y="55" width="0" height="16"/>
  <text x="335" y="70" text-anchor="middle" fill="var(--text-faint)" font-size="8">most of the request time is here</text>

  <text x="500" y="20" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">Logs — WHY</text>
  <rect x="450" y="35" width="100" height="55" fill="var(--panel)" stroke="var(--border)"/>
  <text x="460" y="48" fill="var(--text-faint)" font-size="6.5">trace=xyz DB slow</text>
  <text x="460" y="60" fill="var(--text-faint)" font-size="6.5">trace=xyz retry #1</text>
  <text x="460" y="72" fill="var(--text-faint)" font-size="6.5">trace=xyz timeout</text>

  <rect x="20" y="120" width="520" height="34" fill="none" stroke="var(--border)" stroke-dasharray="4 3"/>
  <text x="35" y="140" fill="var(--text-dim)" font-size="9.5">Metrics flag the spike, the trace localizes it to fraud-check, logs filtered by trace ID explain the DB wait.</text>
</svg>`,
ex:`A slow checkout is diagnosed by: metrics showing p99 latency spiked at 2:14pm → a trace for a specific slow request showing 800ms was spent in the fraud-check service → structured logs from that service, filtered by trace ID, showing it was waiting on a slow downstream DB query.`,
trade:[`All three together tell a complete story; any one alone is usually insufficient — metrics tell you *something* is wrong, traces tell you *where*, logs tell you *why*.`,`Structured logging with correlation IDs must be designed in from the start — retrofitting trace correlation into an unstructured logging codebase after an incident is painful.`,`In fintech, logs must also respect PII/PCI constraints (never log raw card numbers, mask sensitive fields) — observability and compliance requirements intersect here directly.`]},

{cat:"RS", title:"Chaos Engineering", def:`Deliberately injecting failures (killing instances, adding latency, dropping network packets) into a system — ideally in a controlled way in production or a production-like environment — to verify that resilience mechanisms (retries, circuit breakers, failover) actually work as designed, before a real incident tests them for you.`,
diagram:`<svg viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="30" y="35" width="120" height="40" rx="6" fill="var(--red)" fill-opacity="0.15" stroke="var(--red)" stroke-width="2"/>
  <text x="90" y="53" text-anchor="middle" fill="var(--red)" font-size="9">Inject failure</text>
  <text x="90" y="67" text-anchor="middle" fill="var(--red)" font-size="7.5">(kill instance, add latency)</text>
  <line x1="150" y1="55" x2="220" y2="55" stroke="var(--border)" stroke-width="2" marker-end="url(#chaosArrow)"/>
  <defs><marker id="chaosArrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <rect x="225" y="35" width="120" height="40" rx="6" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)" stroke-width="2"/>
  <text x="285" y="53" text-anchor="middle" fill="var(--amber)" font-size="9">Resilience kicks in?</text>
  <text x="285" y="67" text-anchor="middle" fill="var(--amber)" font-size="7.5">retry, circuit breaker, failover</text>
  <line x1="345" y1="55" x2="415" y2="55" stroke="var(--border)" stroke-width="2" marker-end="url(#chaosArrow2)"/>
  <defs><marker id="chaosArrow2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--border)"/></marker></defs>
  <rect x="420" y="35" width="120" height="40" rx="6" fill="var(--ledger)" fill-opacity="0.15" stroke="var(--ledger)" stroke-width="2"/>
  <text x="480" y="53" text-anchor="middle" fill="var(--ledger)" font-size="9">Verified — before</text>
  <text x="480" y="67" text-anchor="middle" fill="var(--ledger)" font-size="7.5">a real incident tests it</text>
</svg>`,
ex:`A scheduled "game day" kills a database replica mid-traffic to verify the failover to a standby completes within the expected RTO and that the application handles the brief unavailability gracefully rather than throwing unhandled errors to customers.`,
trade:[`Reveals real gaps that code review and unit tests miss (actual failover behavior, actual timeout configuration), but requires a mature enough observability and rollback setup to run safely — chaos testing without good monitoring is just causing outages.`]},

{cat:"RS", title:"SLI, SLO & SLA", def:`Three related terms that are easy to mix up, each building on the one before it.

SLI (Service Level Indicator) — an actual measurement of how your system is behaving right now, like "99.95% of requests succeeded in the last hour" or "p99 latency was 220ms." This is a raw number, not a promise.

SLO (Service Level Objective) — an internal target you set for that measurement, like "we want 99.9% of requests to succeed, measured over 30 days." This is a goal your team holds itself to, and it's what your alerting should usually be built around.

SLA (Service Level Agreement) — an external, often contractual promise to a customer, usually with a real consequence (like a service credit or refund) if you fail to meet it, such as "99.9% uptime per month or you get a partial refund." An SLA is typically set a bit looser than your internal SLO, so you have a safety buffer before you're actually breaking a customer promise.

A closely related idea is the "error budget": if your SLO is 99.9%, that means you're allowed 0.1% of requests to fail before you've used up your budget for the period. Once the budget is spent, teams often deliberately slow down on risky changes until the budget resets.`,
diagram:`<svg viewBox="0 0 560 140" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <line x1="40" y1="70" x2="520" y2="70" stroke="var(--border)" stroke-width="2"/>
  <circle cx="80" cy="70" r="7" fill="var(--ledger)"/>
  <text x="80" y="50" text-anchor="middle" fill="var(--ledger)" font-size="9.5" font-weight="600">SLI 99.94%</text>
  <text x="80" y="95" text-anchor="middle" fill="var(--text-faint)" font-size="8">raw measurement</text>
  <circle cx="280" cy="70" r="7" fill="var(--amber)"/>
  <text x="280" y="50" text-anchor="middle" fill="var(--amber)" font-size="9.5" font-weight="600">SLO 99.9%</text>
  <text x="280" y="95" text-anchor="middle" fill="var(--text-faint)" font-size="8">internal target, drives alerting</text>
  <circle cx="460" cy="70" r="7" fill="var(--red)"/>
  <text x="460" y="50" text-anchor="middle" fill="var(--red)" font-size="9.5" font-weight="600">SLA 99.5%</text>
  <text x="460" y="95" text-anchor="middle" fill="var(--text-faint)" font-size="8">contractual promise</text>
  <path d="M 280 78 L 460 78" stroke="var(--text-faint)" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="370" y="120" text-anchor="middle" fill="var(--text-faint)" font-size="9">safety buffer — internal miss gets caught before it becomes a contract breach</text>
</svg>`,
ex:`A payments API might have an SLI showing "99.94% success rate this month," an internal SLO target of "99.9% success rate," and a customer-facing SLA promising "99.5% uptime or a service credit." The gap between the SLO (99.9%) and the SLA (99.5%) is the safety buffer — it means the team can be alerted and fix a problem internally well before it ever risks breaking the actual promise made to the customer.`,
trade:[`Setting an SLO too close to your SLA leaves no room for error — a single bad day can turn an internal miss into an external, possibly costly, contractual breach.`,`Setting an SLO too loose means you're not actually pushing the team toward the reliability the business needs — the SLO should represent a genuinely meaningful reliability bar, not just "whatever we happen to already be hitting."`,`Error budgets are a useful forcing function: they turn "should we ship this risky change now?" into a data-driven question instead of a purely political one.`]},

{cat:"RS", title:"Expand-Contract Pattern (Zero-Downtime Schema Migration)", def:`A three-phase approach to changing a database schema without any downtime, designed so old and new application code can both run safely against the schema at the same time during rollout.

Expand — add the new column or table alongside the old one. Nothing is removed yet, so old code keeps working exactly as before.

Migrate — backfill any needed historical data, and switch the application to read from (and write to) the new structure.

Contract — once every instance is confirmed running the new code and the data is verified, remove the old column or table.`,
diagram:`<svg viewBox="0 0 480 140" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="30" width="130" height="60" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)" stroke-width="2"/>
  <text x="85" y="55" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="700">Expand</text>
  <text x="85" y="72" text-anchor="middle" fill="var(--text-dim)" font-size="9">add new column</text>

  <line x1="150" y1="60" x2="180" y2="60" stroke="var(--text-faint)" stroke-width="2" marker-end="url(#ex-x)"/>

  <rect x="185" y="30" width="130" height="60" rx="6" fill="var(--blue)" fill-opacity="0.18" stroke="var(--blue)" stroke-width="2"/>
  <text x="250" y="55" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="700">Migrate</text>
  <text x="250" y="72" text-anchor="middle" fill="var(--text-dim)" font-size="9">backfill + dual-write</text>

  <line x1="315" y1="60" x2="345" y2="60" stroke="var(--text-faint)" stroke-width="2" marker-end="url(#ex-x)"/>

  <rect x="350" y="30" width="130" height="60" rx="6" fill="var(--amber)" fill-opacity="0.18" stroke="var(--amber)" stroke-width="2"/>
  <text x="415" y="55" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="700">Contract</text>
  <text x="415" y="72" text-anchor="middle" fill="var(--text-dim)" font-size="9">drop old column</text>

  <text x="240" y="120" text-anchor="middle" fill="var(--text-faint)" font-size="10.5">Old and new code both run safely at every phase</text>

  <defs>
    <marker id="ex-x" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--text-faint)"/></marker>
  </defs>
</svg>`,
ex:`Renaming a `+"`balance`"+` column to `+"`current_balance`"+`: first add the new column and dual-write to both (expand); backfill historical rows and switch application reads to the new column (migrate); once all instances are confirmed running the new code, drop the old column (contract) — at no point does a mid-deployment old-code instance break against the new schema.`,
trade:[`Takes longer and requires more deployment steps than a naive single-step migration, but is the only safe approach when you can't guarantee every application instance restarts atomically at the exact moment of a schema change (which is essentially always true in a rolling-deployment environment).`]},

{cat:"RS", title:"Capacity Planning & Autoscaling", def:`Capacity planning means proactively estimating how much infrastructure you'll need, based on load testing and historical traffic trends — rather than finding out the hard way during a spike.

Autoscaling means automatically adding or removing instances in response to real-time signals like CPU usage, request rate, or queue depth, instead of running a single fixed amount of infrastructure sized for peak load all year round.`,
diagram:`<svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <path d="M20,120 L100,110 L180,60 L260,30 L340,55 L420,100 L500,115" fill="none" stroke="var(--ledger)" stroke-width="2"/>
  <text x="260" y="18" text-anchor="middle" fill="var(--text-dim)" font-size="10">traffic over the day</text>
  <rect x="30" y="130" width="40" height="10" fill="var(--panel)" stroke="var(--border)"/>
  <rect x="120" y="130" width="60" height="10" fill="var(--panel)" stroke="var(--border)"/>
  <rect x="220" y="130" width="90" height="10" fill="var(--amber)" fill-opacity="0.3" stroke="var(--amber)"/>
  <text x="265" y="145" text-anchor="middle" fill="var(--amber)" font-size="7.5">scaled up for peak</text>
  <rect x="350" y="130" width="60" height="10" fill="var(--panel)" stroke="var(--border)"/>
  <rect x="450" y="130" width="40" height="10" fill="var(--panel)" stroke="var(--border)"/>
  <text x="30" y="55" fill="var(--text-faint)" font-size="8">instance count tracks the curve instead of staying fixed at peak size all day</text>
</svg>`,
ex:`Based on load testing showing a payment service saturates at 500 requests/second per instance, autoscaling is configured to add instances once average utilization crosses 60% of that threshold — leaving enough headroom to absorb a sudden spike (like a flash sale) before existing instances actually max out.`,
trade:[`Autoscaling reacting to a lagging signal (like CPU) can be too slow for a sudden, sharp spike — for a known event (a product launch, a holiday sale), it's often better to proactively pre-scale ahead of time rather than relying on autoscaling alone.`,`Overly aggressive scale-down settings can cause "flapping" — scaling down, then immediately needing to scale right back up — which adds cost and latency from constant instance churn. Use cooldown periods and sensible thresholds to avoid this.`]},

// ---------------- DESIGN PATTERNS ----------------
{cat:"PT", title:"Outbox Pattern", def:`To reliably publish an event whenever you write to your database (avoiding the "dual write" problem where the DB write succeeds but the message publish fails, or vice versa), write the event to an "outbox" table in the *same local transaction* as the business data change, then a separate relay process (or CDC tool like Debezium) reads the outbox and publishes to the message broker.`,
diagram:`<svg viewBox="0 0 560 240" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <rect x="20" y="70" width="200" height="100" rx="8" fill="var(--panel-2)" stroke="var(--border)" stroke-width="2"/>
  <text x="120" y="60" text-anchor="middle" fill="var(--text-dim)" font-size="11" font-weight="600">ONE LOCAL TRANSACTION</text>
  <rect x="35" y="85" width="170" height="35" rx="5" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
  <text x="120" y="107" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">transactions table</text>
  <rect x="35" y="128" width="170" height="35" rx="5" fill="var(--blue)" fill-opacity="0.2" stroke="var(--blue)"/>
  <text x="120" y="150" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">outbox table</text>

  <line x1="220" y1="145" x2="270" y2="145" stroke="var(--amber)" stroke-width="2" marker-end="url(#ob-a)"/>
  <text x="245" y="135" text-anchor="middle" fill="var(--amber)" font-size="10">reads</text>

  <rect x="275" y="120" width="110" height="50" rx="6" fill="var(--amber)" fill-opacity="0.18" stroke="var(--amber)"/>
  <text x="330" y="140" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Relay</text>
  <text x="330" y="155" text-anchor="middle" fill="var(--text-dim)" font-size="9.5">(or CDC/Debezium)</text>

  <line x1="385" y1="145" x2="435" y2="145" stroke="var(--violet)" stroke-width="2" marker-end="url(#ob-v)"/>
  <text x="410" y="135" text-anchor="middle" fill="var(--violet)" font-size="10">publishes</text>

  <rect x="440" y="120" width="105" height="50" rx="6" fill="var(--violet)" fill-opacity="0.18" stroke="var(--violet)"/>
  <text x="492" y="150" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Kafka</text>

  <text x="280" y="210" text-anchor="middle" fill="var(--text-dim)" font-size="12">Business write and event both commit together, or neither does — no dual-write gap</text>
</svg>`,
ex:`When a transaction is recorded, a `+"`TransactionCompleted`"+` event row is inserted into the outbox table in the same DB transaction. A relay process tails the outbox and publishes to Kafka, guaranteeing the event is eventually published if and only if the transaction was actually committed.`,
trade:[`Solves the dual-write consistency problem cleanly, but adds an extra table and a relay/CDC process to operate and monitor.`,`Consumers must still handle at-least-once delivery (the relay might publish the same event twice on retry) — pair with idempotent consumers.`]},

{cat:"PT", title:"Saga Pattern", def:`A way to handle a business transaction that spans multiple services — where a single distributed ACID transaction isn't practical — by breaking it into a sequence of smaller local transactions. If a later step fails, you don't roll back; instead, you run a "compensating action" for each already-completed step to undo its effect.

Orchestration — a central coordinator explicitly tells each service what step to do next, in order. Easier to follow and debug, since there's one place that shows the whole flow.

Choreography — there's no central coordinator; instead, each service listens for events from the previous step and reacts on its own. Avoids a central dependency, but the overall flow is harder to see all in one place, since it's spread across many services' individual event handlers.`,
diagram:`<svg viewBox="0 0 560 260" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="10" y="20" fill="var(--text-dim)" font-size="12" font-weight="600">Forward path →</text>
  <rect x="10" y="30" width="150" height="50" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
  <text x="85" y="60" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">1. Debit sender</text>

  <line x1="160" y1="55" x2="200" y2="55" stroke="var(--ledger)" stroke-width="2" marker-end="url(#sg-g)"/>

  <rect x="205" y="30" width="150" height="50" rx="6" fill="var(--ledger-dim)" stroke="var(--ledger)"/>
  <text x="280" y="60" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">2. Credit receiver</text>

  <line x1="355" y1="55" x2="395" y2="55" stroke="var(--ledger)" stroke-width="2" marker-end="url(#sg-g)"/>

  <rect x="400" y="30" width="150" height="50" rx="6" fill="var(--red)" fill-opacity="0.2" stroke="var(--red)"/>
  <text x="475" y="55" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">3. Notify ledger</text>
  <text x="475" y="70" text-anchor="middle" fill="var(--red)" font-size="11" font-weight="700">✗ fails</text>

  <text x="10" y="130" fill="var(--amber)" font-size="12" font-weight="600">Compensating path (rollback), triggered by the failure ←</text>

  <line x1="475" y1="80" x2="475" y2="105" stroke="var(--red)" stroke-width="2"/>
  <path d="M475,105 L280,105 L280,140" stroke="var(--amber)" stroke-width="2" fill="none" marker-end="url(#sg-a)"/>

  <rect x="205" y="145" width="150" height="50" rx="6" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)"/>
  <text x="280" y="175" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Undo: debit receiver</text>

  <line x1="205" y1="170" x2="160" y2="170" stroke="var(--amber)" stroke-width="2" marker-end="url(#sg-a)"/>

  <rect x="10" y="145" width="150" height="50" rx="6" fill="var(--amber)" fill-opacity="0.15" stroke="var(--amber)"/>
  <text x="85" y="175" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="600">Undo: credit sender</text>

  <text x="280" y="230" text-anchor="middle" fill="var(--text-dim)" font-size="12">Step 3 fails → compensating actions undo steps 2 and 1, in reverse order</text>

  <defs>
    <marker id="sg-g" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--ledger)"/></marker>
    <marker id="sg-a" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="var(--amber)"/></marker>
  </defs>
</svg>`,
ex:`Booking a flight + hotel + car as one logical transaction: if the car booking fails after flight and hotel succeeded, the saga triggers compensating transactions (cancel hotel, refund flight) rather than trying to roll back atomically across three separate services and databases.`,
trade:[`Orchestration is easier to understand, monitor, and debug (one place to look) but creates a central coordinator dependency.`,`Choreography avoids a central point but makes the overall flow harder to trace/reason about — you have to piece it together from multiple services' event handlers.`,`Compensating transactions aren't a true rollback — they're a separate business operation (e.g., "refund" isn't the exact inverse of "charge" if fees or timing differ) and must be designed explicitly, not assumed automatic.`],
code:`// A minimal orchestration-style saga in Go: transferring money between
// two accounts as a sequence of steps, each with its own compensating
// (undo) action if a LATER step fails.

type Step struct {
    Name string
    Do   func() error
    Undo func() error
}

// RunSaga executes each step in order. If any step fails, it runs the
// Undo function for every step that already succeeded, in reverse order.
func RunSaga(steps []Step) error {
    completed := []Step{}

    for _, step := range steps {
        if err := step.Do(); err != nil {
            for i := len(completed) - 1; i >= 0; i-- {
                if undoErr := completed[i].Undo(); undoErr != nil {
                    // In real systems: log this loudly and alert a human.
                    // A failed compensation needs manual follow-up.
                    log.Printf("compensation failed for %s: %v", completed[i].Name, undoErr)
                }
            }
            return fmt.Errorf("saga failed at %q, rolled back: %w", step.Name, err)
        }
        completed = append(completed, step)
    }
    return nil
}

func TransferMoneySaga(fromAcct, toAcct string, amount int) error {
    steps := []Step{
        {
            Name: "debit sender",
            Do:   func() error { return debitAccount(fromAcct, amount) },
            Undo: func() error { return creditAccount(fromAcct, amount) },
        },
        {
            Name: "credit receiver",
            Do:   func() error { return creditAccount(toAcct, amount) },
            Undo: func() error { return debitAccount(toAcct, amount) },
        },
        {
            Name: "notify ledger service",
            Do:   func() error { return notifyLedgerService(fromAcct, toAcct, amount) },
            Undo: func() error { return nil }, // notification is safe to just skip on rollback
        },
    }
    return RunSaga(steps)
}`},

{cat:"PT", title:"Two-Phase Commit (2PC)", def:`A protocol for atomic commit across multiple resource managers: a coordinator asks all participants to "prepare" (and lock resources), and only if all agree does it tell everyone to "commit" (or "abort" if any disagree).`,
diagram:`<svg viewBox="0 0 520 340" xmlns="http://www.w3.org/2000/svg" font-family="var(--sans)">
  <text x="80" y="25" text-anchor="middle" fill="var(--text)" font-size="14" font-weight="600">Coordinator</text>
